# lyric-grpc — gRPC client and server library for Lyric.
#
# Ships five packages:
#   Grpc.Types         — platform-neutral types: GrpcChannel, GrpcStatus,
#                        GrpcStatusCode, GrpcCallOptions, GrpcStream.
#   Grpc               — client API (openChannel, callUnary, openServerStream)
#                        and server API (ServiceRegistry, addMethod, start).
#   Grpc.Aspects       — pub aspect templates: RequiresGrpcAuth,
#                        RequiresGrpcRole, GrpcRateLimit, GrpcCircuitBreaker.
#   Grpc.Kernel.Net    — Grpc.Net.Client (client) + Grpc.AspNetCore (server).
#   Grpc.Kernel.Jvm    — io.grpc client + server (Phase 6).
#
# Client usage (unary call):
#   val ch = Grpc.openChannel("https://collector:4317").unwrap()
#   match Grpc.callUnary(ch, "svc.Name", "Method", req, Grpc.defaultOptions()) {
#     case Err(st) -> log("rpc failed: " + st.message)
#     case Ok(resp) -> { ... }
#   }
#   Grpc.closeChannel(ch)
#
# Server usage (service hosting):
#   val registry = Grpc.create()
#   val registry = Grpc.addMethod(registry, "Svc", "Method", "Pkg.handler")
#   Grpc.start(registry)
#
# Auth aspects delegate to lyric-auth; circuit-breaker to lyric-resilience.
# Field numbering: declaration-order default + lyric-grpc.lock + @proto_field.
# See docs/37-grpc-proto-sketch.md.

[package]
name        = "Lyric.Grpc"
version     = "0.1.0"
description = "gRPC client and server library for Lyric — unary, streaming, service hosting, and aspect templates."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[features]
dotnet = []
# io.grpc (grpc-java) backend (Phase 6).
jvm    = []

[project]
name            = "Lyric.Grpc"
output          = "single"
output_assembly = "Lyric.Grpc.dll"

[project.packages]
# Platform-neutral types: GrpcChannel, GrpcStatus, GrpcStatusCode, etc.
"Grpc.Types"      = "src/types.l"
# Client + server public API.
"Grpc"            = "src/grpc.l"
# Pub aspect templates for cross-cutting gRPC handler concerns.
"Grpc.Aspects"    = "src/aspects.l"
# .NET kernel: Grpc.Net.Client (client) + Grpc.AspNetCore (server).
"Grpc.Kernel.Net" = "src/_kernel/net/grpc_kernel.l"
# JVM kernel: io.grpc client + server (Phase 6).
"Grpc.Kernel.Jvm" = "src/_kernel/jvm/grpc_kernel.l"

[project.tests]
"Grpc.GrpcTypesTests" = "tests/grpc_types_tests.l"

[dependencies]
"Lyric.Stdlib"     = { path = "../stdlib" }
"Lyric.Auth"       = { path = "../lyric-auth" }
"Lyric.Resilience" = { path = "../lyric-resilience" }

[nuget]
# Client: Grpc.Net.Client ships with .NET 5+ but the NuGet package pins a
# specific version and pulls in Grpc.Core.Api for CallInvoker abstractions.
"Grpc.Net.Client" = "2.65.0"
# Server: grpc-dotnet is part of the ASP.NET Core SDK from .NET 6+.
"Grpc.AspNetCore" = "2.65.0"

[maven]
"io.grpc:grpc-netty-shaded" = "1.65.0"
"io.grpc:grpc-protobuf"     = "1.65.0"
"io.grpc:grpc-stub"         = "1.65.0"
