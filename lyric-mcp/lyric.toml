# lyric-mcp — Model Context Protocol client + server for Lyric.
#
# Ships four packages:
#   - Mcp        — shared types: protocol version negotiation, content
#                  blocks, tool/resource/prompt wire shapes, and the JSON
#                  encode/decode helpers both the server and client use.
#   - Mcp.Server — MCP server surface: McpServer builder (newServer /
#                  addTool / addResource / addPrompt) + serveStdio.
#   - Mcp.Client — MCP client surface: connectStdio + listTools / callTool /
#                  listResources / readResource / listPrompts / getPrompt /
#                  ping / disconnect.
#   - Mcp.Stdio  — client-side piped-child-process NDJSON transport
#                  (Std.Process.PipedProcess wrapped as a JsonRpc.RpcTransport).
#
# Built on lyric-jsonrpc (JsonRpc.Json / JsonRpc / JsonRpc.Stdio) — see
# docs/62-jsonrpc-mcp.md §5 for the agreed build spec this library
# implements. First consumer: nichobbs/cloud-agents' in-container
# permission-callback MCP server.

[package]
name        = "Lyric.Mcp"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Model Context Protocol (MCP) client and server for Lyric, built on lyric-jsonrpc."

[project]
name            = "Lyric.Mcp"
output          = "single"
output_assembly = "Mcp.dll"

[project.packages]
"Mcp"        = "src/mcp.l"
"Mcp.Server" = "src/server.l"
"Mcp.Client" = "src/client.l"
"Mcp.Stdio"  = "src/stdio.l"

[project.tests]
"Mcp.McpTests"                = "tests/mcp_tests.l"
"Mcp.McpSerializationTests"   = "tests/mcp_serialization_tests.l"
"Mcp.McpStdioProcessTests"    = "tests/mcp_stdio_process_tests.l"

[features]
default = ["dotnet"]
dotnet  = []
jvm     = []

[dependencies]
"Lyric.JsonRpc" = { workspace = true }
