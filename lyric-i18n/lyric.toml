[package]
name        = "Lyric.I18n"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Internationalization and localization library for Lyric: locale-aware translation with variable substitution."

[project]
name            = "Lyric.I18n"
output          = "single"
output_assembly = "I18n.dll"

[project.packages]
"I18n"        = "src/i18n.l"
"I18n.Kernel" = "src/i18n_kernel.l"

# tests/i18n_tests.l: 25/25 pass on --target dotnet; 24/25 pass on
# --target jvm (one genuine JVM-only ClassCastException in
# availableLocales(), tracked in #5439; the JVM run also prints benign
# false-positive "unknown name" diagnostics for cross-package Std.* calls,
# tracked in #5440). The former #3719 blocker this comment used to cite is
# closed and no longer applies.
[project.tests]
"I18n.I18nTests"       = "tests/i18n_tests.l"
"I18n.I18nKernelTests" = "tests/i18n_kernel_tests.l"

