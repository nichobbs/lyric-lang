[package]
name        = "Lyric.I18n"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Internationalization and localization library for Lyric: locale-aware translation with variable substitution."

[project]
name            = "Lyric.I18n"
output          = "single"
output_assembly = "I18n.dll"

[project.packages]
"I18n" = "src/i18n.l"

# tests/i18n_tests.l is written and idiomatic, but its store-construction path
# consumes `fromJson(...): Result[InProcessTranslationStore, I18nError]`, which
# hits the cross-package generic-erasure bug #3502 (`isOk(Result<Object,Object>)`
# Method not found). Registration is deferred to the PR that resolves #3502 and
# CI-wires the suite — registering it now would make `lyric test --manifest
# lyric-i18n/lyric.toml` fail with a compile-time error.
# [project.tests]
# "I18n.I18nTests" = "tests/i18n_tests.l"

