[package]
name        = "Lyric.I18n"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Internationalization and localization library for Lyric: locale-aware translation with variable substitution."

[project]
name            = "Lyric.I18n"
output          = "single"
output_assembly = "I18n.dll"

[project.packages]
"I18n"        = "src/i18n.l"
"I18n.Kernel" = "src/i18n_kernel.l"

# tests/i18n_tests.l is written and idiomatic.  Std.Json.enumerateObject
# runtime method-resolution issue tracked in #3719 blocks these tests.
[project.tests]
"I18n.I18nTests"       = "tests/i18n_tests.l"
"I18n.I18nKernelTests" = "tests/i18n_kernel_tests.l"

