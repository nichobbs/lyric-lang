[package]
name        = "Lyric.I18n"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Internationalization and localization library for Lyric: locale-aware translation with variable substitution."

[project]
name            = "Lyric.I18n"
output          = "single"
output_assembly = "I18n.dll"

[project.packages]
"I18n"            = "src"
"I18n.Kernel.Net" = "src/_kernel/net"

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }
