[package]
name        = "Lyric.I18n"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Internationalization and localization library for Lyric: locale-aware translation with variable substitution."

[project]
name            = "Lyric.I18n"
output          = "single"
output_assembly = "I18n.dll"

[project.packages]
"I18n" = "src/i18n.l"

# tests/i18n_tests.l is written and idiomatic.  Its earlier #3502 blocker is
# resolved, but the suite now surfaces a separate gap: the translation-loading
# path calls Std.Json.enumerateObject, which the emitted Std.Json surface does
# not expose (Method not found) — tracked in #3694.  Registration stays deferred
# until #3694 lands; enabling it now would make `lyric test` fail.
# [project.tests]
# "I18n.I18nTests" = "tests/i18n_tests.l"

