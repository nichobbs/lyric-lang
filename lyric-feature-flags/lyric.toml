[package]
name        = "Lyric.Flags"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Feature flag library for Lyric: in-process and remote flag stores with aspect-gated execution."

[project]
name            = "Lyric.Flags"
output          = "single"
output_assembly = "Flags.dll"

[project.packages]
"Flags"            = "src"
"Flags.Aspects"    = "src"
"Flags.Kernel.Net" = "src/_kernel/net"
"Flags.Kernel.Jvm" = "src/_kernel/jvm"

[features]
remote = []   # Remote flag store via HTTP polling (custom endpoint, LaunchDarkly, Unleash)
dotnet = []   # .NET kernel backend
jvm    = []   # JVM kernel backend (Phase 6)

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }

# Remote HTTP polling on JVM uses java.net.http.HttpClient (JDK 11+) — no
# external Maven dependency required.
[maven]
