[package]
name        = "Lyric.Flags"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Feature flag library for Lyric: in-process and remote flag stores with aspect-gated execution."

[project]
name            = "Lyric.Flags"
output          = "single"
output_assembly = "Flags.dll"

[project.packages]
"Flags"            = "src/flags.l"
"Flags.Aspects"    = "src/flags_aspects.l"
"Flags.Kernel.Net" = "src/_kernel/net"

[project.tests]
"Flags.FlagsTests" = "tests/flags_tests.l"

[features]
remote = []   # Remote flag store via HTTP polling (custom endpoint, LaunchDarkly, Unleash)

