[package]
name        = "Lyric.Flags"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Feature flag library for Lyric: in-process flag store with aspect-gated execution."

[project]
name            = "Lyric.Flags"
output          = "single"
output_assembly = "Flags.dll"

[project.packages]
"Flags"          = "src/flags.l"
"Flags.Aspects"  = "src/flags_aspects.l"
"Flags.Registry" = "src/flags_registry.l"

[project.tests]
"Flags.FlagsTests"              = "tests/flags_tests.l"
"Flags.FlagsAspectWeavingTests" = "tests/flags_aspect_weaving_tests.l"
