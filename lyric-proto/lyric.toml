# lyric-proto — Pure-Lyric Protocol Buffer wire-format encoder and decoder.
#
# Implements the proto3 binary encoding subset entirely in Lyric, with only
# two kernel helpers:
#   - float/double → IEEE 754 bit pattern (System.BitConverter on .NET,
#     java.lang.Float/Double on JVM)
#   - ProtoBuffer: a mutable byte-accumulator (System.IO.MemoryStream on .NET,
#     java.io.ByteArrayOutputStream on JVM)
#
# All encoding and decoding logic lives in pure Lyric (Proto.Encoding /
# Proto.Decoding).  Consumers build a List[ProtoField] describing the fields
# of a proto3 message, pass it to encodeMessage, and get back a slice[Byte].
# Decoding is the reverse: decodeMessage parses a slice[Byte] into a
# List[DecodedField] that the caller can pattern-match on.
#
# This library is used by lyric-grpc for payload framing and by lyric-otel
# for manual OTLP payload construction.

[package]
name        = "Lyric.Proto"
version     = "0.1.0"
description = "Pure-Lyric Protocol Buffer (proto3) wire-format encoder and decoder."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[features]
default = ["dotnet"]
dotnet = []
jvm    = []

[project]
name            = "Lyric.Proto"
output          = "single"
output_assembly = "Lyric.Proto.dll"

[project.packages]
# JVM kernel: ProtoBuffer (ByteArrayOutputStream) + IEEE 754 helpers (Phase 6).
"Proto.Kernel.Jvm" = "src/_kernel/jvm/proto_kernel.l"
# Merged package: types + encoding + decoding + public API + .NET kernel boundary.
"Proto"            = "src/proto_main.l"

[dependencies]
"Lyric.Stdlib" = "*"

[project.tests]
"Proto.ProtoTypesTests" = "tests/proto_types_tests.l"
