[package]
name        = "Lyric.Testing"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Test helpers and mock implementations for Lyric libraries."

[project]
name            = "Lyric.Testing"
output          = "single"
output_assembly = "Testing.dll"

[project.packages]
"Testing" = "src/testing.l"

[project.tests]
"Testing.TestingTests" = "tests/testing_tests.l"

[dependencies]
"Lyric.Cache"    = { workspace = true }
"Lyric.Mail"     = { workspace = true }
"Lyric.Storage"  = { workspace = true }
"Lyric.Mq"       = { workspace = true }
"Lyric.Session"  = { workspace = true }
"Lyric.Flags"    = { workspace = true }
