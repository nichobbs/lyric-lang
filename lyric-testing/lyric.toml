[package]
name        = "Lyric.Testing"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Test helpers and mock implementations for Lyric libraries."

[project]
name            = "Lyric.Testing"
output          = "single"
output_assembly = "Testing.dll"

[project.packages]
"Testing" = "src"

[project.tests]
"Testing.TestingTests" = "tests/testing_tests.l"

[dependencies]
"Lyric.Stdlib"   = { path = "../lyric-stdlib" }
"Lyric.Cache"    = { path = "../lyric-cache" }
"Lyric.Mail"     = { path = "../lyric-mail" }
"Lyric.Storage"  = { path = "../lyric-storage" }
"Lyric.Mq"       = { path = "../lyric-mq" }
"Lyric.Session"  = { path = "../lyric-session" }
"Lyric.Flags"    = { path = "../lyric-feature-flags" }
