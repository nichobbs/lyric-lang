[package]
name        = "Lyric.Storage"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Object and file storage library for Lyric: S3, Azure Blob Storage, and local filesystem."

[project]
name            = "Lyric.Storage"
output          = "single"
output_assembly = "Storage.dll"

[project.packages]
"Storage"            = "src"
"Storage.Aspects"    = "src"
"Storage.Kernel.Net" = "src/_kernel/net"
"Storage.Kernel.Jvm" = "src/_kernel/jvm"

[project.tests]
"Storage.StorageTests" = "tests/storage_tests.l"

[features]
dotnet    = []   # .NET kernel backend
jvm       = []   # JVM kernel backend (Phase 6)
s3        = []   # Amazon S3 (AWSSDK.S3 on .NET / software.amazon.awssdk:s3 on JVM)
azureblob = []   # Azure Blob Storage (Azure.Storage.Blobs on .NET / com.azure:azure-storage-blob on JVM)
local     = []   # Local filesystem storage (cross-platform, no extra deps)

[dependencies]
"Lyric.Stdlib" = { path = "../lyric-stdlib" }

[nuget]
# feature = "s3" — AWS SDK S3 module for .NET
"AWSSDK.S3"             = "3.7.300"
# feature = "azureblob" — Azure Blob Storage SDK for .NET
"Azure.Storage.Blobs"   = "12.21.0"
# feature = "local" — no extra NuGet deps (uses BCL System.IO)

[maven]
# feature = "s3" — AWS SDK S3 module for JVM
"software.amazon.awssdk:s3"          = { version = "2.25.70", features = ["s3"] }
# feature = "azureblob" — Azure Blob Storage SDK for JVM
"com.azure:azure-storage-blob"       = { version = "12.25.0", features = ["azureblob"] }
# feature = "local" — no extra Maven deps (uses java.nio.file.Files)
