[package]
name        = "Lyric.Storage"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Object and file storage library for Lyric: S3, Azure Blob Storage, and local filesystem."

[project]
name            = "Lyric.Storage"
output          = "single"
output_assembly = "Storage.dll"

[project.packages]
"Storage"            = "src"
"Storage.Aspects"    = "src"
"Storage.Kernel.Net" = "src/_kernel/net"

[features]
s3        = []   # Amazon S3 (AWSSDK.S3 on .NET)
azureblob = []   # Azure Blob Storage (Azure.Storage.Blobs on .NET)
local     = []   # Local filesystem storage (cross-platform, no extra deps)

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }

[nuget]
# feature = "s3" — AWS SDK S3 module for .NET
"AWSSDK.S3"             = "3.7.300"
# feature = "azureblob" — Azure Blob Storage SDK for .NET
"Azure.Storage.Blobs"   = "12.21.0"
# feature = "local" — no extra NuGet deps (uses BCL System.IO)
