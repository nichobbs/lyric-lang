[package]
name        = "Lyric.Storage"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Object and file storage library for Lyric: S3, Azure Blob Storage, and local filesystem."

[project]
name            = "Lyric.Storage"
output          = "single"
output_assembly = "Storage.dll"

[project.packages]
"Storage"            = "src/storage.l"
"Storage.Aspects"    = "src/storage_aspects.l"
"Storage.Kernel.Net" = "src/_kernel/net/storage_kernel.l"
"Storage.Kernel.Jvm" = "src/_kernel/jvm/storage_kernel.l"

# Storage test suite.  Runs via `lyric test --manifest`.
# - storage_tests.l — pure wire-type surface (StorageError, StorageMetadata,
#                     StorageObject, ListEntry, ListResult) plus the
#                     production-quality end-to-end local-fs data plane
#                     (connect / put / get / delete / list / exists /
#                     presignedUrl, including pagination cursor #1012 and
#                     ETag-from-sidecar #1011).
[project.tests]
"Storage.StorageTests" = "tests/storage_tests.l"
# No aspect-weaving test module here: lyric-storage's suite also runs under
# `--target jvm` in CI, and B'-mode aspect weaving with a `call` context is a
# known JVM backend gap (the `__LyricBModeCallContext` record traps at runtime).
# ValidateKey's empty-key DoS fix (removed `requires: args.key != ""`) is covered
# by the aspect body plus `isSafeKey("")` rejection in storage_tests.l, which run
# on both targets. Add a weaving test once JVM B'-mode weaving is supported.

# `s3` / `azureblob` feature flags + their NuGet entries were removed
# alongside the F# host shim deletion in this PR (#1439): every `@cfg`-
# gated kernel function is gone, so the flags controlled nothing and
# the NuGet refs were dead weight.  Restore both halves together when
# the native bindings work picks up the S3 / Azure backends.

# Target-kernel selection (#1444): `Storage.Kernel.Net` is gated on
# `dotnet`, `Storage.Kernel.Jvm` on `jvm`.  Both kernels export the same
# `host*` surface; the inactive one is erased.  The JVM kernel needs
# nothing beyond `java.base` — no `[maven]` table required.
#
# `dotnet` and `jvm` are MUTUALLY EXCLUSIVE: activating both leaves two
# definitions of every `host*` function in the bundle (ambiguous-symbol
# build error).  Select exactly one, matching `--target`:
#   --target dotnet                          (default features)
#   --target jvm --no-default-features --features jvm
[features]
default = ["dotnet"]
dotnet  = []
jvm     = []

