# Stdlib-bundle proof manifest — bundles every `Std.X` package in
# `std/` (including the kernel sub-packages under `std/_kernel/`)
# into a single `Lyric.Stdlib.dll` per `docs/20-project-as-dll.md` §5.1.
#
# Currently only a smoke set wires up; expand the [project.packages]
# table once each batch lands cleanly.  See
# `docs/10-bootstrap-progress.md` for the proof's progress log.

[package]
name        = "Lyric.Stdlib"
version     = "0.1.0"
description = "Lyric standard library — bundled distribution."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[project]
name            = "Lyric.Stdlib"
output          = "single"
# Distinct from the F# `Lyric.Stdlib.dll` shim that `copyStdlibArtifacts`
# stages next to every emitted DLL — using `Lyric.Stdlib.dll` here would
# clobber the bundle.  Once the F# shim merges into the bundle (or the
# project emit grows a "this IS the stdlib, skip the copy" hook), this can
# revert to `Lyric.Stdlib.dll`.
output_assembly = "Lyric.StdlibBundle.dll"

[project.packages]
# Tier 0 — no intra-stdlib imports beyond Std.Core.  This batch is
# the working subset of the stdlib bundle proof; expanding to the full
# stdlib surfaces individual codegen gaps tracked separately
# (see `docs/10-bootstrap-progress.md` D-progress-103).
"Std.Core"             = "std/core.l"
"Std.Errors"           = "std/errors.l"
"Std.String"           = "std/string.l"
