[package]
name        = "Lyric.Mq"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Transport-agnostic message queue library for Lyric: publish, consume, dead-letter, and idempotency aspects."

[project]
name            = "Lyric.Mq"
output          = "single"
output_assembly = "Mq.dll"

[project.packages]
"Mq"              = "src"
"Mq.Aspects"      = "src"
"Mq.Kernel.Net"   = "src/_kernel/net"
"Mq.Kernel.Jvm"   = "src/_kernel/jvm"

[project.tests]
"Mq.MqTests" = "tests/mq_tests.l"

[features]
dotnet          = []   # Target the .NET kernel (`Mq.Kernel.Net`)
jvm             = []   # Target the JVM kernel (`Mq.Kernel.Jvm`)
rabbitmq        = []   # RabbitMQ via AMQP 0-9-1 (RabbitMQ.Client on .NET)
azureservicebus = []   # Azure Service Bus (Azure.Messaging.ServiceBus on .NET)
sqs             = []   # Amazon SQS (AWSSDK.SQS on .NET)
kafka           = []   # Apache Kafka (Confluent.Kafka on .NET)

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }
"Lyric.Cache"  = { path = "../lyric-cache" }

# NOTE: The [nuget] table does not yet support per-feature gating (see docs/21-nuget-linking.md).
# All four broker packages are restored unconditionally; only the active feature's code compiles.
[nuget]
# feature = "rabbitmq" — AMQP 0-9-1 client for .NET
"RabbitMQ.Client"            = "6.8.1"
# feature = "azureservicebus" — Azure Service Bus SDK for .NET
"Azure.Messaging.ServiceBus" = "7.18.0"
# feature = "sqs" — AWS SDK SQS module for .NET
"AWSSDK.SQS"                 = "3.7.300"
# feature = "kafka" — Confluent Kafka .NET client
"Confluent.Kafka"             = "2.4.0"

# NOTE: The [maven] table mirrors the [nuget] table above for JVM builds.
# All four broker JARs are declared; only the active feature's code compiles.
[maven]
# feature = "rabbitmq" — AMQP 0-9-1 client for JVM
"com.rabbitmq:amqp-client"                  = { version = "5.21.0", features = ["rabbitmq"] }
# feature = "azureservicebus" — Azure Service Bus SDK for JVM
"com.azure:azure-messaging-servicebus"      = { version = "7.17.6", features = ["azureservicebus"] }
# feature = "sqs" — AWS SDK v2 SQS module for JVM
"software.amazon.awssdk:sqs"                = { version = "2.25.70", features = ["sqs"] }
# feature = "kafka" — Apache Kafka JVM client
"org.apache.kafka:kafka-clients"            = { version = "3.7.0", features = ["kafka"] }
