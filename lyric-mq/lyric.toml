[package]
name        = "Lyric.Mq"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Transport-agnostic message queue library for Lyric: publish, consume, dead-letter, and idempotency aspects."

[project]
name            = "Lyric.Mq"
output          = "single"
output_assembly = "Mq.dll"

[project.packages]
"Mq"              = "src"
"Mq.Aspects"      = "src"
"Mq.Kernel.Net"   = "src/_kernel/net"
"Mq.Kernel.Jvm"   = "src/_kernel/jvm"

[features]
rabbitmq        = []   # RabbitMQ via AMQP 0-9-1 (RabbitMQ.Client on .NET)
azureservicebus = []   # Azure Service Bus (Azure.Messaging.ServiceBus on .NET)
sqs             = []   # Amazon SQS (AWSSDK.SQS on .NET)
kafka           = []   # Apache Kafka (Confluent.Kafka on .NET)

[dependencies]
"Lyric.Stdlib"     = { path = "../stdlib" }
"Lyric.Resilience" = { path = "../lyric-resilience" }
"Lyric.Cache"      = { path = "../lyric-cache" }
