[package]
name        = "Lyric.Db"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Database access library for Lyric with a driver-agnostic interface and aspect templates."

[project]
name            = "Lyric.Db"
output          = "single"
output_assembly = "Db.dll"

[project.packages]
"Db"            = "src/db.l"
"Db.Aspects"    = "src/db_aspects.l"
"Db.Kernel.Net" = "src/_kernel/net/db_kernel.l"

[features]
postgres = []    # enable the Npgsql (PostgreSQL) driver
sqlite   = []    # enable the Microsoft.Data.Sqlite driver

[dependencies]
"Std.Logging"   = { path = "../lyric-logging" }
