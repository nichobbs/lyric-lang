[package]
name        = "Lyric.Db"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Database access library for Lyric with a driver-agnostic interface and aspect templates."

[project]
name            = "Lyric.Db"
output          = "single"
output_assembly = "Db.dll"

[project.packages]
"Db"             = "src"
"Db.Aspects"     = "src"
"Db.Kernel.Net"  = "src/_kernel/net"
"Db.Kernel.Jvm"  = "src/_kernel/jvm"

[features]
dotnet   = []    # Target the .NET kernel (Db.Kernel.Net)
jvm      = []    # Target the JVM kernel (Db.Kernel.Jvm)
postgres = []    # enable the Npgsql / PostgreSQL JDBC driver
sqlite   = []    # enable the Microsoft.Data.Sqlite / SQLite JDBC driver

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }

[maven]
# feature = "postgres" — PostgreSQL JDBC driver for JVM
"org.postgresql:postgresql" = { version = "42.7.3", features = ["postgres"] }
# feature = "sqlite" — SQLite JDBC driver for JVM
"org.xerial:sqlite-jdbc"    = { version = "3.45.3.0", features = ["sqlite"] }
