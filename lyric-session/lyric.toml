[package]
name        = "Lyric.Session"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Distributed session management for Lyric web applications."

[project]
name            = "Lyric.Session"
output          = "single"
output_assembly = "Session.dll"

[project.packages]
"Session"            = "src"
"Session.Kernel.Net" = "src/_kernel/net"
"Session.Kernel.Jvm" = "src/_kernel/jvm"

# Session-fixation regression suite — pins the no-auto-create invariant
# in InProcessSessionStore.set() (#316 / #436).  Runs via the
# multi-package test runner once issue #465 lands; until then the test
# files serve as living specs alongside the source.
[project.tests]
"Session.SessionFixationTests" = "tests/session_fixation_tests.l"

[features]
dotnet   = []   # .NET kernel backend (StackExchange.Redis, System.Collections.Concurrent)
jvm      = []   # JVM kernel backend (Lettuce Redis, java.util.concurrent — Phase 6)
redis    = []   # Redis-backed sessions (StackExchange.Redis / Lettuce)
inmemory = []   # In-process sessions (suitable for single-instance deployments)

[dependencies]
"Lyric.Stdlib" = { path = "../lyric-stdlib" }
"Lyric.Cache"  = { path = "../lyric-cache" }

[nuget]
# feature = "redis" — Redis client for .NET session backing store
"StackExchange.Redis" = "2.7.33"
# feature = "inmemory" — no extra NuGet deps

[maven]
# feature = "redis" — Lettuce Redis client for JVM session backing store
"io.lettuce:lettuce-core" = { version = "6.3.2.RELEASE", features = ["redis"] }
# feature = "inmemory" — java.util.concurrent.ConcurrentHashMap (no extra Maven dep)
