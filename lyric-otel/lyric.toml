# lyric-otel — OpenTelemetry instrumentation for Lyric.
#
# Ships three pub aspect templates (Tracing, Metrics, RequestLogging) backed
# by platform-dispatch wrapper functions gated by @cfg(feature = "dotnet") /
# @cfg(feature = "jvm").  Consumers import the template and bind a
# `matches:` selector locally:
#
#   aspect MyTracing from OTel.Tracing {
#     matches: name like "*/service/*"
#   }
#
# Span/metric recording (OTel.*) is pure Lyric and platform-neutral.
# OTLP/HTTP export (OTel.Otlp) POSTs protobuf built by OTel.Otlp.Codec
# (on top of lyric-proto) via a dedicated HttpClient/ByteArrayContent
# kernel — no OTel .NET/Java SDK dependency (issue #5410).
#
# See docs/27-aspect-libraries.md and docs/26-aspects.md §18.

[package]
name        = "Lyric.OTel"
version     = "0.2.0"
description = "OpenTelemetry instrumentation (OTLP/HTTP export + aspect templates) for Lyric."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[features]
default = ["dotnet"]
# Enable the .NET OTLP/HTTP transport kernel.
dotnet = []
# JVM feature flag kept for API-shape parity; every JVM code path it
# gates (`_kernel/jvm/otlp_kernel.l`) always returns Err("not
# implemented") — see README.md "Platform support".
jvm    = []

[project]
name   = "Lyric.OTel"
output = "single"
output_assembly = "Lyric.OTel.dll"

[project.packages]
# Shared platform-neutral types + in-process span/metric buffers.
"OTel.Types"              = "src/types.l"
# Pure-Lyric OTLP protobuf encoder (spans + metrics).
"OTel.Otlp.Codec"         = "src/otlp_codec.l"
# .NET extern boundary for OTLP/HTTP transport (feature-gated).
"OTel.Kernel.Net.Otlp"    = "src/_kernel/net/otlp_kernel.l"
# JVM extern boundary for OTLP/HTTP transport (feature-gated; always Err).
"OTel.Kernel.Jvm.Otlp"    = "src/_kernel/jvm/otlp_kernel.l"
# Span/metric recording API + pub aspect templates.
"OTel"                    = "src/otel.l"
# OTLP exporter configuration and lifecycle API.
"OTel.Otlp"               = "src/otlp.l"

[project.tests]
"OTel.OTelTypesTests"      = "tests/otel_types_tests.l"
"OTel.SpanTests"           = "tests/otel_span_tests.l"
"OTel.OtlpCodecTests"      = "tests/otlp_codec_tests.l"
"OTel.OtlpTransportTests"  = "tests/otlp_transport_tests.l"

[dependencies]
"Lyric.Proto" = { workspace = true }
