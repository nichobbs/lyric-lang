[package]
name        = "Lyric.Validation"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Declarative input validation for Lyric: combinators, typed error messages, and aspect templates."

[project]
name            = "Lyric.Validation"
output          = "single"
output_assembly = "Validation.dll"

[project.packages]
"Validation"         = "src/validation.l"
"Validation.Aspects" = "src/validation_aspects.l"

[project.tests]
"Validation.ValidationTests" = "tests/validation_tests.l"
# tests/aspect_weaving_tests.l is staged but NOT registered: it asserts the
# ValidateInput aspect actually short-circuits when woven, which fails today
# because aspect weaving is non-functional for the C-mode @inline_template +
# `from`-instance pattern (#3543). Register + CI-wire it in the PR that fixes
# #3543.
# "Validation.AspectWeavingTests" = "tests/aspect_weaving_tests.l"
