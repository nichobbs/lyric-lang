[package]
name        = "Lyric.Ws"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "WebSocket server library for Lyric: connection lifecycle, message routing, and authentication aspects."

[project]
name            = "Lyric.Ws"
output          = "single"
output_assembly = "Ws.dll"

[project.packages]
"Ws"            = "src/ws.l"
"Ws.Aspects"    = "src/ws_aspects.l"
"Ws.Kernel.Net" = "src/_kernel/net/ws_kernel.l"

[project.tests]
"Ws.WsTests"                       = "tests/ws_tests.l"
"Ws.WsSecurityAspectWeavingTests"  = "tests/ws_security_aspect_weaving_tests.l"

[features]
default = ["dotnet"]
dotnet = []   # ASP.NET Core WebSockets
jvm    = []   # Undertow WebSockets (Phase 6)

[dependencies]
"Lyric.Auth"   = { workspace = true }

# [nuget] — no third-party packages needed for the current .NET kernel
# implementation; the real ASP.NET Core WebSocket upgrade path (deferred to
# #778) will add Microsoft.AspNetCore.WebSockets when that work lands.
# System.Threading.RateLimiting and Microsoft.AspNetCore.WebSockets both
# ship in the .NET 10 BCL and do not require separate NuGet packages.
