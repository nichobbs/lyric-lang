[package]
name        = "Lyric.Ws"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "WebSocket server library for Lyric: connection lifecycle, message routing, and authentication aspects."

[project]
name            = "Lyric.Ws"
output          = "single"
output_assembly = "Ws.dll"

[project.packages]
"Ws"            = "src"
"Ws.Aspects"    = "src"
"Ws.Kernel.Net" = "src/_kernel/net"
"Ws.Kernel.Jvm" = "src/_kernel/jvm"

[features]
dotnet = []   # ASP.NET Core WebSockets
jvm    = []   # Undertow WebSockets (Phase 6)

[project.tests]
"Ws.WsTests" = "tests/ws_tests.l"

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }
"Lyric.Auth"   = { path = "../lyric-auth" }

[nuget]
# feature = "dotnet" — ASP.NET Core WebSocket middleware
"Microsoft.AspNetCore.WebSockets"  = "10.0.0"
# System.Threading.RateLimiting ships in .NET 7+ BCL; listed for pre-.NET 7 compat
"System.Threading.RateLimiting"    = "9.0.0"

[maven]
# feature = "jvm" — Undertow WebSocket JSR-356 implementation (Phase 6)
"io.undertow:undertow-websockets-jsr" = { version = "2.3.13.Final", features = ["jvm"] }
