# Stdlib-bundle manifest — bundles every `Std.X` package in `std/`
# (including the kernel sub-packages under `std/_kernel/`) into a
# single `Lyric.Stdlib.dll` per `docs/20-project-as-dll.md` §5.1.
# Post D-progress-137 (F# shim retirement) this is the only
# `Lyric.Stdlib.dll` the SDK ships.
#
# Currently only a smoke set wires up; expand the [project.packages]
# table once each batch lands cleanly.  See
# `docs/10-bootstrap-progress.md` for the proof's progress log.

[package]
name        = "Lyric.Stdlib"
version     = "0.1.0"
description = "Lyric standard library — bundled distribution."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[project]
name            = "Lyric.Stdlib"
output          = "single"
# The F# `Lyric.Stdlib.dll` shim retired entirely (D-progress-137), so
# the bundle reclaims the canonical name — `lib/Lyric.Stdlib.dll` in
# the installed SDK is now this Lyric-compiled bundle, not the F#
# shim it replaced.
output_assembly = "Lyric.Stdlib.dll"

[project.packages]
# Tier 0 — base layer; no intra-stdlib imports beyond Std.Core.
"Std.Core"             = "std/core.l"
"Std.Errors"           = "std/errors.l"
"Std.String"           = "std/string.l"
"Std.Core.Proof"       = "std/core_proof.l"
# Kernel boundary for process execution — only Std.Core dependency.
"Std.ProcessHost"      = "std/_kernel/process_host.l"
# Kernel boundary for console I/O — @externTarget pattern, no extra deps.
"Std.ConsoleHost"      = "std/_kernel/console_host.l"
# Regex kernel boundary (extern type + @externTarget).
"Std.RegexHost"        = "std/_kernel/regex_host.l"
# Public Std.Regex wrapper — opaque CompiledRegex, Result-based API.
"Std.Regex"            = "std/regex.l"

# Tier 1 — collections; depends on Tier 0 + kernel.
"Std.Collections"      = "std/collections.l"
"Std.Process"          = "std/process.l"

# Tier 2 — numeric, text, stream utilities.
"Std.Math"             = "std/math.l"
"Std.Parse"            = "std/parse.l"
"Std.Stream"           = "std/stream.l"

# Tier 3 — time (environment and logging deferred; see below).
"Std.Time"             = "std/time.l"

# Tier 4 — structured data.
"Std.Json"             = "std/json.l"

# Tier 5 — testing utilities.
"Std.Testing.Mocking"  = "std/testing_mocking.l"
#   Std.Environment — Std.EnvironmentHost uses `extern package {}` syntax;
#                     the type checker does not flatten EMSig members into the
#                     symbol table, so `getEnvironmentVariable` etc. are
#                     unresolvable.  Fix: rewrite environment_host.l to use
#                     `@externTarget pub func` (like math_host.l), then re-add.
#   Std.Log         — same issue as Std.Environment (log_host.l uses
#                     `extern package System.Diagnostics { ... }`).
#   Std.Iter      — calls List[T].add / toArray across the in-project →
#                   kernel boundary; needs project-emitter fix for CLR type
#                   resolution of extern generics in intra-project artifacts.
#   Std.File      — same issue as Std.Iter (uses newList + .add + .toArray).
#   Std.Console   — uses `import System.Console` BCL direct import (not yet
#                   handled in project-mode emit)
#   Std.Directory — uses `import System.IO` BCL direct import
#   Std.Path      — uses `import System.IO` BCL direct import
#   Std.Http      — depends on Std.Task; HTTP client surface still settling
#   Std.App       — depends on Std.File; App entrypoint wiring TBD
#   Std.Testing   — depends on Std.File; expand once Std.File lands
#   Std.Testing.Property  — depends on Std.Random (kernel)
#   Std.Testing.Snapshot  — depends on Std.File
