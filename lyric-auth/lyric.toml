# lyric-auth — Transport-agnostic authentication primitives.
#
# Ships one public package:
#   Auth  — JWT verification (HMAC-SHA256 / RS256), claim extraction,
#            API key comparison.  No transport dependency — works for
#            HTTP, gRPC, WebSockets, message queues, CLI tools.
#
# Protocol-specific aspect *bindings* live in the consuming library:
#   lyric-web  → Web.Aspects.RequiresAuth, RequiresRole, ApiKey
#   lyric-grpc → (future) Grpc.Aspects.RequiresAuth, RequiresRole
#
# See docs/27-aspect-libraries.md for the split between verification
# (this library) and extraction / binding (protocol libraries).

[package]
name        = "Lyric.Auth"
version     = "0.1.0"
description = "Transport-agnostic JWT, claim, and API-key verification."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[features]
default = ["dotnet"]
# ASP.NET Core backend — System.IdentityModel.Tokens.Jwt.
dotnet = []
# JVM backend — io.jsonwebtoken (Phase 6).
jvm    = []

[project]
name            = "Lyric.Auth"
output          = "single"
output_assembly = "Lyric.Auth.dll"

[project.packages]
"Auth"             = "src/auth.l"
"Auth.Aspects"     = "src/auth_aspects.l"
"Auth.Kernel.Net"  = "src/_kernel/net/auth_kernel.l"
"Auth.Kernel.Jvm"  = "src/_kernel/jvm/auth_kernel.l"

# Security regression suite — pins the JWT algorithm-pinning (#315) and
# role allow-list (#360) invariants.  Runs via the multi-package test
# runner once issue #465 lands; until then the test files serve as
# living specs alongside the source.
[project.tests]
"Auth.AuthSecurityTests"       = "tests/auth_security_tests.l"
"Auth.AuthAspectWeavingTests"  = "tests/auth_aspect_weaving_tests.l"

