[package]
name        = "Lyric.Mail"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Email sending library for Lyric: SMTP, Amazon SES, and SendGrid providers."

[project]
name            = "Lyric.Mail"
output          = "single"
output_assembly = "Mail.dll"

[project.packages]
"Mail"            = "src/mail.l"
"Mail.Kernel.Net" = "src/_kernel/net/mail_kernel.l"

[features]
smtp     = []   # SMTP via System.Net.Mail (MailKit on .NET)
ses      = []   # Amazon SES (AWSSDK.SimpleEmail on .NET)
sendgrid = []   # SendGrid (SendGrid .NET library)

[dependencies]
"Lyric.Stdlib" = { path = "../lyric-stdlib" }

[nuget]
# feature = "smtp" — SMTP client for .NET
"MailKit"              = "4.7.0"
# feature = "ses" — AWS SDK SES module for .NET
"AWSSDK.SimpleEmail"   = "3.7.300"
# feature = "sendgrid" — SendGrid .NET client
"SendGrid"             = "9.29.3"
