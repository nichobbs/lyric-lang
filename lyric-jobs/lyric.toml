[package]
name        = "Lyric.Jobs"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Background job scheduling and execution library for Lyric."

[project]
name            = "Lyric.Jobs"
output          = "single"
output_assembly = "Jobs.dll"

[project.packages]
"Jobs"            = "src"
"Jobs.Aspects"    = "src"
"Jobs.Kernel.Net" = "src/_kernel/net"
"Jobs.Kernel.Jvm" = "src/_kernel/jvm"

[features]
hangfire = []   # Hangfire backend for .NET (Hangfire.Core + Hangfire.SqlServer); degrades to Quartz on JVM
quartz   = []   # Quartz.NET scheduler (.NET); Quartz Scheduler on JVM
dotnet   = []   # .NET kernel backend
jvm      = []   # JVM kernel backend (Phase 6)

[dependencies]
"Lyric.Stdlib"     = { path = "../stdlib" }
"Lyric.Resilience" = { path = "../lyric-resilience" }

[nuget]
# feature = "hangfire" — Hangfire job scheduler for .NET
"Hangfire.Core"      = "1.8.14"
"Hangfire.SqlServer" = "1.8.14"
# feature = "quartz" — Quartz.NET scheduler
"Quartz"             = "3.9.0"

# Hangfire has no JVM port; both hangfire and quartz Lyric features map to
# Quartz Scheduler on JVM.  The @cfg gates in Jobs.Kernel.Jvm are preserved so
# feature selection remains meaningful at the Lyric level.
[maven]
# feature = "hangfire" — degraded JVM fallback to Quartz Scheduler
"org.quartz-scheduler:quartz" = { version = "2.3.2", features = ["hangfire"] }
# feature = "quartz" — JVM Quartz Scheduler
"org.quartz-scheduler:quartz" = { version = "2.3.2", features = ["quartz"] }
