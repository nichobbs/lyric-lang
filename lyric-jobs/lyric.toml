[package]
name        = "Lyric.Jobs"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Background job scheduling and execution library for Lyric."

[project]
name            = "Lyric.Jobs"
output          = "single"
output_assembly = "Jobs.dll"

[project.packages]
"Jobs"            = "src/jobs.l"
"Jobs.Aspects"    = "src/jobs_aspects.l"
"Jobs.Kernel.Net" = "src/_kernel/net/jobs_kernel.l"

[project.tests]
"Jobs.JobsTests" = "tests/jobs_tests.l"

[features]
hangfire = []   # Hangfire backend for .NET (Hangfire.Core + Hangfire.SqlServer)
quartz   = []   # Quartz.NET scheduler

[dependencies]
"Lyric.Resilience" = { path = "../lyric-resilience" }

[nuget]
# feature = "hangfire" — Hangfire job scheduler for .NET
"Hangfire.Core"      = "1.8.14"
"Hangfire.SqlServer" = "1.8.14"
# feature = "quartz" — Quartz.NET scheduler
"Quartz"             = "3.9.0"
