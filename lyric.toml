# lyric.toml — workspace root
#
# Declares the workspace containing all compiler, stdlib, and ecosystem libraries.
# Members are auto-discovered by walking the directory tree and finding lyric.toml files.
#
# See docs/38-workspace.md for the workspace design specification.

[workspace]
exclude = [
  "bootstrap",
  "docs",
  "book",
  "examples",
  "native",
  "scripts",
  "resolver",
  ".github",
  # lyric-stdlib is resolved specially -- every package's `import Std.*`
  # goes through the dedicated stdlib-path/bundle mechanism (LYRIC_STD_PATH,
  # the single Lyric.Stdlib.dll bundle), not a normal `{ workspace = true }`
  # dependency declaration -- so it doesn't fit the workspace-member model
  # ordinary ecosystem libraries use and is excluded from auto-discovery.
  "lyric-stdlib",
]
