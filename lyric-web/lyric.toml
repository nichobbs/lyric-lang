# lyric-web — HTTP web service library for Lyric.
#
# Ships four packages:
#   Web                — Router/Request/Response/Middleware, static file
#                        serving, the HTTP server entry point (built on
#                        Std.HttpServer), and runtime config blocks.
#   Web.OpenApi        — OpenAPI 3.1 spec type vocabulary and code-first
#                        spec-builder.
#   Web.Aspects        — pub aspect templates: RequiresAuth, RequiresRole,
#                        ApiKey, RateLimit, HttpCircuitBreaker.
#   Web.Kernel.Net     — rate-limiter extern boundary (ConcurrentDictionary).
#
# Both development workflows are supported:
#   Code-first:  annotate handlers with @get / @post / etc., run
#                `lyric web spec` to produce openapi.yaml.
#   Spec-first:  run `lyric generate openapi spec.yaml` to produce
#                handler stubs + record types, then implement the bodies.
#
# See docs/26-aspects.md §18, docs/27-aspect-libraries.md,
# docs/58-wire-templates-sketch.md, D053, D124.

[package]
name        = "Lyric.Web"
version     = "0.1.0"
description = "OpenAPI-first web service library with typed routing, runtime config, and aspect templates."
authors     = ["Lyric authors"]
license     = "Apache-2.0"

[features]
default = ["dotnet"]
# ASP.NET Core / Kestrel HTTP server backend.
dotnet = []
# JVM backend (Phase 6 — not yet implemented).
jvm    = []

[project]
name            = "Lyric.Web"
output          = "single"
output_assembly = "Web.dll"

[project.packages]
# Core types, router, config, server entry point.
"Web"             = "src/web.l"
# OpenAPI 3.1 spec vocabulary and code-first spec builder.
"Web.OpenApi"     = "src/openapi.l"
# Pub aspect templates for cross-cutting handler concerns.
"Web.Aspects"     = "src/aspects.l"
# .NET extern boundary — ASP.NET Core minimal APIs + Kestrel.
"Web.Kernel.Net"  = "src/_kernel/net/web_kernel.l"
# JVM extern boundary (Undertow HTTP server, Phase 6) does not exist yet — the
# prior extern-package-based scaffold was deleted as dead code (see
# docs/03-decision-log.md); a real implementation needs extern type + JVM
# auto-FFI, following the pattern in lyric-stdlib/std/_kernel_jvm/.

[project.tests]
"Web.CorsGuardTests"   = "tests/cors_guard_tests.l"
"Web.RateLimitTests"   = "tests/rate_limit_tests.l"
"Web.SecurityAspectWeavingTests" = "tests/security_aspect_weaving_tests.l"
"Web.DispatchTests"    = "tests/dispatch_tests.l"

[dependencies]
"Lyric.Auth"         = { workspace = true }
"Lyric.Resilience"   = { workspace = true }

[nuget]
# The dotnet HTTP server (Std.HttpServer, System.Net.HttpListener) is part
# of the base class library; no extra package needed.
# Add if using OpenTelemetry integration:
# "OpenTelemetry.Extensions.Hosting" = "1.9.0"

[maven]
# JVM HTTP server backend (Phase 6).
"io.undertow:undertow-core" = "2.3.13.Final"
