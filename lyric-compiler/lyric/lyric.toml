[package]
name = "Lyric.Cli"
version = "0.1.0"
description = "Self-hosted Lyric compiler CLI"
authors = ["Lyric contributors"]
license = "Apache-2.0"

[build]
kind = "exe"

[project]
name = "lyric"
output = "single"

[project.packages]
"Lyric.Manifest" = "manifest.l"
"Lyric.ManifestBridge" = "manifest_bridge.l"
"Lyric.Pack" = "pack_bridge.l"
"Lyric.Discovery" = "discovery.l"
"Lyric.Cfg" = "cfg.l"
"Lyric.CfgGate" = "cfg_gate.l"
"Lyric.AliasRewriter" = "alias_rewriter.l"
"Lyric.Mono" = "mono.l"
"Lyric.Propagate" = "propagate.l"
"Lyric.TestSynthBridge" = "test_synth_bridge.l"
"Lyric.ContractMeta" = "contract_meta.l"
"Lyric.ContractMetaEmit" = "contract_meta_emit.l"
"Lyric.RestoredPackages" = "restored_packages.l"
"Lyric.Doc" = "doc_bridge.l"
"Lyric.Lint" = "lint_bridge.l"
"Lyric.Verifier" = "verifier_bridge.l"
"Lyric.Release" = "release.l"
"Lyric.OpenApi" = "open_api_bridge.l"
"Lyric.OpenApiGen" = "open_api_gen.l"
"Lyric.OpenApiParser" = "open_api_parser.l"
"Lyric.BenchSynth" = "bench_synth_bridge.l"
"Lyric.DiagnosticUtil" = "diagnostic_util.l"
"Lyric.CliShell" = "cli_shell.l"
"Lyric.CliSuggest" = "cli_suggest.l"
"Lyric.Lsp" = "lsp.l"
"Lyric.Emitter" = "emitter.l"
"Lyric.Cli" = "cli.l"
