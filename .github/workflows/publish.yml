name: Publish

# Triggered when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`)
# or manually via workflow_dispatch for pre-release testing.
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
      publish_ecosystem:
        description: >-
          Publish ecosystem libraries (lyric-web, lyric-auth, lyric-cache, etc.)
          as individual NuGet packages after the global tool is pushed.
          Uncheck to publish the `lyric` tool only.
        required: false
        default: true
        type: boolean

permissions:
  contents: write   # upload release assets
  id-token: write   # OIDC for NuGet trusted publishing and key-vault signing

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

# ---------------------------------------------------------------------------
# Create GitHub Release atomically before building binaries.
# This prevents race conditions where one architecture fails after the
# release is already created with incomplete assets.
# ---------------------------------------------------------------------------
jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.VERSION }}" \
            --draft \
            --title "v${{ steps.ver.outputs.VERSION }}" \
            --notes "Lyric compiler release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build self-contained standalone binaries for all supported platforms.
  #
  # Each matrix leg runs `bootstrap.sh --stage 2` so the released binary is
  # built by the self-hosted Lyric compiler (stage-2 reproducibility fixpoint,
  # D-progress-531): the stage-1 self-hosted compiler re-emits itself + the
  # full stdlib into .bootstrap/stage2/lib/ (101 DLLs, byte-for-byte
  # reproducible), and `dotnet publish -p:StageDir=...stage2/lib` AOT-links
  # those self-hosted DLLs into a native binary via ILCompiler.  The resulting
  # binary contains code emitted by the self-hosted Lyric compiler — not by
  # the F# bootstrap.
  #
  # Lyric.Stdlib.dll (the single full bundle, D111) ships in lib/ beside the
  # binary so `lyric build` resolves the stdlib via findCompiledStdlibDir and
  # can link user programs against it.
  # ---------------------------------------------------------------------------
  build-standalone:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive_suffix: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive_suffix: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_suffix: tar.gz
            notarize: true
          - os: macos-latest
            rid: osx-x64
            archive_suffix: tar.gz
          # win-x64 temporarily disabled: the F# `seed: mint` stage-0 fails on
          # Windows (the F# emitter's package cache lands in %TEMP% instead of
          # the script's $FSCACHE, because .NET Path.GetTempPath() reads TMP/TEMP
          # on Windows, not TMPDIR — so the harvest finds no DLLs).  Re-enable
          # once fixed.  Tracking: #3941.
          # - os: windows-latest
          #   rid: win-x64
          #   archive_suffix: zip
          #   authenticode: true

    runs-on: ${{ matrix.os }}

    # Optional-signing secrets are hoisted into `env` so the step `if:` guards
    # below can test them.  The `secrets` context is NOT permitted inside `if:`
    # conditionals — referencing it there makes the whole workflow file invalid
    # ("Unrecognized named-value: 'secrets'") and every push startup-fails.
    env:
      AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
      APPLE_TEAM_ID:       ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install ARM64 cross-compilation toolchain (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-multiarch

      - name: Install unzip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install unzip -y

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: bootstrap/global.json

      - name: Build stage 2 (self-hosted compiler)
        shell: bash
        # Seeds from the latest published self-hosted release (`download`), then
        # has the stage-1 true compiler re-emit itself + the full stdlib into
        # .bootstrap/stage2/lib/.  The released binary is AOT-linked from those
        # self-hosted DLLs — it contains code emitted by the self-hosted Lyric
        # compiler, not by the F# bootstrap (D-progress-531, 101/101 DLLs
        # byte-for-byte reproducible at stage-3 fixpoint).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/bootstrap.sh --stage 2

      - name: Restore AOT project
        working-directory: bootstrap
        run: dotnet restore src/Lyric.Cli.Aot/Lyric.Cli.Aot.csproj --runtime ${{ matrix.rid }}

      - name: Publish self-contained AOT binary
        shell: bash
        working-directory: bootstrap
        # StageDir overrides the default .bootstrap/stage1 reference glob to point
        # at the self-hosted stage-2 DLLs.  ILCompiler cross-compiles those managed
        # IL assemblies (RID-independent) to the target architecture natively.
        run: |
          dotnet publish src/Lyric.Cli.Aot/Lyric.Cli.Aot.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:Version=${{ needs.create-release.outputs.version }} \
            -p:StageDir="${GITHUB_WORKSPACE}/.bootstrap/stage2/lib" \
            --output publish/${{ matrix.rid }} \
            --no-restore

      # ── Windows: Authenticode signing via Azure Key Vault ─────────────────
      - name: Sign Windows binary (Authenticode)
        if: matrix.authenticode == true && env.AZURE_KEY_VAULT_URL != ''
        shell: bash
        run: |
          dotnet tool install --global AzureSignTool --version 5.0.0
          AzureSignTool sign \
            --azure-key-vault-url "${{ secrets.AZURE_KEY_VAULT_URL }}" \
            --azure-key-vault-tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --azure-key-vault-client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --azure-key-vault-client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --azure-key-vault-certificate "${{ secrets.AZURE_CERT_NAME }}" \
            --timestamp-rfc3161 http://timestamp.digicert.com \
            --description "Lyric compiler" \
            --description-url "https://github.com/${{ github.repository }}" \
            "bootstrap/publish/win-x64/lyric.exe"

      # ── macOS: codesign + notarize (osx-arm64 only) ─────────────────────
      - name: Sign and notarize macOS binary
        if: matrix.notarize == true && env.APPLE_TEAM_ID != ''
        shell: bash
        env:
          APPLE_CERT_BASE64:    ${{ secrets.APPLE_DEVELOPER_CERT_BASE64 }}
          APPLE_CERT_PASSWORD:  ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASS:  lyric-ci-keychain
        run: |
          # Import signing certificate into a temporary keychain.
          echo "$APPLE_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$APPLE_KEYCHAIN_PASS" lyric-ci.keychain
          security default-keychain -s lyric-ci.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASS" lyric-ci.keychain
          security import /tmp/cert.p12 -k lyric-ci.keychain -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$APPLE_KEYCHAIN_PASS" lyric-ci.keychain

          # Sign the binary.
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_ID }}" \
            bootstrap/publish/osx-arm64/lyric

          rm -f /tmp/cert.p12

          # Re-archive after signing (archive is created below and submitted).

      # ── Bundle the deployable stdlib beside the binary ────────────────────
      # Lyric.Stdlib.dll (the single full bundle emitted by stage-2) ships in
      # lib/ beside the binary so an installed `lyric` resolves the stdlib via
      # findCompiledStdlibDir's `<binary>/lib` branch and can compile user code.
      # The bundle is managed IL (RID-independent) so the stage-2 copy on this
      # runner is identical to the one on any other platform.
      - name: Stage stdlib into lib/
        shell: bash
        run: |
          mkdir -p bootstrap/publish/${{ matrix.rid }}/lib
          cp .bootstrap/stage2/lib/Lyric.Stdlib.dll \
             bootstrap/publish/${{ matrix.rid }}/lib/

      # ── Package archive ───────────────────────────────────────────────────
      - name: Package tar.gz archive (Linux / macOS)
        if: matrix.archive_suffix == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE="lyric-${VERSION}-${{ matrix.rid }}.tar.gz"
          tar -czf "$ARCHIVE" -C bootstrap/publish/${{ matrix.rid }} .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package zip archive (Windows)
        if: matrix.archive_suffix == 'zip'
        shell: pwsh
        run: |
          $version  = "${{ needs.create-release.outputs.version }}"
          $archive  = "lyric-${version}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "bootstrap/publish/${{ matrix.rid }}/*" `
                           -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── macOS: submit for notarization after archive is ready ─────────────
      - name: Notarize macOS archive
        if: matrix.notarize == true && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          xcrun notarytool submit "$ARCHIVE" \
            --apple-id    "${{ secrets.APPLE_ID }}" \
            --password    "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id     "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple bootstrap/publish/${{ matrix.rid }}/lyric \
            || echo "::warning::stapler staple failed — notarization ticket not embedded; binary requires internet access at first launch"

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload release asset
        shell: bash
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" "$ARCHIVE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build and publish the NuGet global tool package (lyric).
  #
  # Authentication uses NuGet Trusted Publishing (OIDC) via the NuGet/login
  # action: it exchanges the GitHub Actions OIDC token for a short-lived API
  # key.  No long-lived NUGET_API_KEY secret is required.
  #
  # Prerequisites (one-time):
  #   1. Set the `NUGET_USER` repository secret to your nuget.org profile name
  #      (the account that owns the Trusted Publishing policy — NOT an email).
  #   2. On nuget.org → your account → Trusted Publishing, add a policy scoped
  #      to Repository Owner "nichobbs", Repository "lyric-lang", and Workflow
  #      File "publish.yml" (file name only).  The owner/repo MUST match this
  #      repository — the OIDC token subject is `repo:nichobbs/lyric-lang:...`,
  #      so a policy registered for any other owner (e.g. the upstream
  #      "lyric-lang" org) will never match.  The policy applies to every
  #      package owned by that account, so it covers `lyric` and the ecosystem
  #      libraries at once.
  #
  # Run after binaries so the release page shows assets before the NuGet
  # package appears on nuget.org.
  # ---------------------------------------------------------------------------
  publish-nuget:
    runs-on: ubuntu-latest
    needs: [build-standalone, create-release]

    # Hoist the optional signing secrets into `env` rather than interpolating
    # ${{ secrets.* }} into `run:` scripts: the `secrets` context is not
    # allowed in `if:` conditionals, so the step guard reads from `env`.
    env:
      NUGET_SIGNING_CERT_BASE64:   ${{ secrets.NUGET_SIGNING_CERT_BASE64 }}
      NUGET_SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: bootstrap/global.json

      - name: Restore
        working-directory: bootstrap
        run: dotnet restore src/Lyric.Cli.Aot/Lyric.Cli.Aot.csproj

      - name: Build stage 2 (for NuGet package)
        shell: bash
        # Stage-2 produces .bootstrap/stage2/lib/ with the full self-hosted DLL
        # closure (compiler + Lyric.Stdlib.dll).  The NuGet global tool pack step
        # uses those DLLs via -p:StageDir so the packed tool ships the complete,
        # self-hosted-emitted stdlib and can compile user code at runtime.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/bootstrap.sh --stage 2

      - name: Pack NuGet global tool
        working-directory: bootstrap
        # bootstrap/Directory.Build.props sets IsPackable=false for every
        # project under bootstrap/, so `dotnet pack` is a silent no-op (restore
        # only, no .nupkg) without the IsPackable=true override.  PublishAot is
        # the AOT *standalone binary* concern (build-standalone); a global tool
        # is a portable framework-dependent IL package, so disable AOT here.
        # StageDir overrides the default .bootstrap/stage1 reference glob to
        # pack the self-hosted stage-2 DLLs instead.
        run: |
          dotnet pack src/Lyric.Cli.Aot/Lyric.Cli.Aot.csproj \
            --configuration Release \
            -p:PackageVersion=${{ needs.create-release.outputs.version }} \
            -p:PackAsTool=true \
            -p:ToolCommandName=lyric \
            -p:PackageId=lyric \
            -p:IsPackable=true \
            -p:PublishAot=false \
            -p:StageDir="${GITHUB_WORKSPACE}/.bootstrap/stage2/lib" \
            --output nupkgs \
            --no-restore

      # Validate the packed tool BEFORE publishing it.  A global tool is
      # framework-dependent and resolves its stdlib bundle beside itself at run
      # time, so installing it and running `lyric --version` loads
      # Lyric.Cli.Program.main and every Std.* TypeRef — a missing/wrong stdlib
      # bundle fails here instead of shipping a broken tool to NuGet.  `lyric
      # run` additionally exercises the user-code build + colocation path.
      - name: Smoke-test the packed tool
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool install --tool-path /tmp/lyric-tool \
            --add-source bootstrap/nupkgs \
            lyric --version "${{ needs.create-release.outputs.version }}"
          /tmp/lyric-tool/lyric --version
          printf 'package Smoke\nimport Std.Core\nimport Std.Console as Console\nfunc main(): Unit { Console.print("tool smoke ok") }\n' > /tmp/smoke.l
          # Assert the OUTPUT, not just the exit code: a runtime that produces
          # wrong output but still exits 0 would otherwise slip through.
          out="$(/tmp/lyric-tool/lyric run /tmp/smoke.l)"
          echo "$out"
          echo "$out" | grep -q "tool smoke ok"

      # Sign the NuGet package if a code-signing certificate is configured.
      # Set NUGET_SIGNING_CERT_BASE64 and NUGET_SIGNING_CERT_PASSWORD in
      # repository secrets.  The certificate fingerprint should be recorded in
      # docs/34-distribution-strategy.md §8 (Code-signing).
      - name: Sign NuGet package
        if: env.NUGET_SIGNING_CERT_BASE64 != ''
        run: |
          echo "$NUGET_SIGNING_CERT_BASE64" | base64 --decode \
            > /tmp/nuget-signing.pfx
          dotnet nuget sign bootstrap/nupkgs/*.nupkg \
            --certificate-path /tmp/nuget-signing.pfx \
            --certificate-password "$NUGET_SIGNING_CERT_PASSWORD" \
            --timestamper http://timestamp.digicert.com \
            --overwrite
          rm -f /tmp/nuget-signing.pfx

      # Exchange the GitHub Actions OIDC token for a short-lived NuGet API key
      # via NuGet.org Trusted Publishing:
      #   https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      # There is no public raw token-exchange endpoint — NuGet/login is the
      # supported client.  One-time setup on nuget.org: create a Trusted
      # Publishing policy owned by the `secrets.NUGET_USER` account, scoped to
      # Repository Owner `nichobbs`, Repository `lyric-lang`, Workflow File
      # `publish.yml`.  `secrets.NUGET_USER` is the nuget.org profile name (NOT
      # an email).  The workflow-level `id-token: write` permission lets the
      # action mint the OIDC token.
      - name: NuGet login (OIDC → short-lived API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1
        id: nuget-auth
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        env:
          NUGET_KEY: ${{ steps.nuget-auth.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push bootstrap/nupkgs/*.nupkg \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ---------------------------------------------------------------------------
  # Build and publish each ecosystem library as an individual NuGet package,
  # in topological dependency order (docs/39-package-registry.md §8).
  #
  # Uses the same OIDC trusted-publishing mechanism as publish-nuget.
  # Each package ID must have a trusted publisher configured on NuGet.org
  # pointing to this workflow before it can be published this way.
  #
  # The `lyric` CLI binary (built from stage-2 + AOT) drives `lyric build`
  # and `lyric publish` for each library.  `lyric publish` reads
  # LYRIC_NUGET_API_KEY from the environment and passes it to
  # `dotnet nuget push`.
  # ---------------------------------------------------------------------------
  publish-ecosystem:
    runs-on: ubuntu-latest
    needs: [publish-nuget, create-release]
    # Skipped when workflow_dispatch is used with publish_ecosystem unchecked.
    # Tag-push releases always publish ecosystem libs (inputs.publish_ecosystem
    # is empty for tag pushes, so != 'false' evaluates to true).
    if: inputs.publish_ecosystem != 'false'

    env:
      NUGET_SIGNING_CERT_BASE64:   ${{ secrets.NUGET_SIGNING_CERT_BASE64 }}
      NUGET_SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: bootstrap/global.json

      # Reuse the self-contained binary build-standalone already published to
      # this release instead of rebuilding the whole compiler (stage 2 + AOT)
      # from scratch.  build-standalone runs before this job (via publish-nuget),
      # so the asset exists; `gh release download` works on the still-draft
      # release with GITHUB_TOKEN.  This publishes the ecosystem libraries with
      # the exact `lyric` binary being shipped, and skips a multi-minute rebuild.
      - name: Download released lyric binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p bin
          gh release download "v${{ needs.create-release.outputs.version }}" \
            --pattern 'lyric-*-linux-x64.tar.gz' --output /tmp/lyric.tgz
          tar -xzf /tmp/lyric.tgz -C bin
          chmod +x bin/lyric
          ./bin/lyric --version

      # Deploy the full Lyric.Stdlib.dll bundle beside the binary so `lyric
      # build` can link the ecosystem libraries against it.  The released AOT
      # binary carries its own statically-linked stdlib, so it runs and can
      # emit the bundle (unlike the framework-dependent `make lyric` binary,
      # which resolves the smaller bootstrap bundle from disk).
      - name: Stage the full stdlib bundle beside the binary
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/stage-selfhosted-stdlib.sh ./bin/lyric "$(pwd)/bin"

      # Same Trusted Publishing exchange as publish-nuget — see that job's
      # NuGet login step for the one-time nuget.org policy setup.
      - name: NuGet login (OIDC → short-lived API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1
        id: nuget-auth
        with:
          user: ${{ secrets.NUGET_USER }}

      # Decode the signing certificate so lyric publish can sign each .nupkg
      # immediately after dotnet pack and before dotnet nuget push.
      # lyric publish reads LYRIC_NUGET_SIGNING_CERT / _PASSWORD / _TIMESTAMPER.
      - name: Decode NuGet signing certificate
        if: env.NUGET_SIGNING_CERT_BASE64 != ''
        run: |
          echo "$NUGET_SIGNING_CERT_BASE64" | base64 --decode > /tmp/nuget-signing.pfx

      # Build and publish each library in topological dependency order.
      # `lyric build` auto-restores NuGet deps when the lock file is absent or
      # stale.  `lyric publish --skip-duplicate` is idempotent: re-publishing
      # an already-uploaded version is treated as a no-op.
      # Signing (when LYRIC_NUGET_SIGNING_CERT is set) is performed by
      # `lyric publish` itself after dotnet pack and before dotnet nuget push.
      - name: Build and publish ecosystem libraries
        shell: bash
        env:
          LYRIC_NUGET_API_KEY: ${{ steps.nuget-auth.outputs.NUGET_API_KEY }}
          LYRIC_NUGET_SIGNING_CERT: /tmp/nuget-signing.pfx
          LYRIC_NUGET_SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}
          LYRIC_NUGET_SIGNING_TIMESTAMPER: http://timestamp.digicert.com
        run: |
          set -euo pipefail
          LYRIC=./bin/lyric
          API_KEY="${{ steps.nuget-auth.outputs.NUGET_API_KEY }}"
          VERSION="${{ needs.create-release.outputs.version }}"

          publish_lib() {
            local manifest="$1"
            local version="$2"
            echo "=== Building ${manifest} (version ${version}) ==="
            "$LYRIC" build --manifest "$manifest" --package-version "$version"
            echo "=== Publishing ${manifest} ==="
            "$LYRIC" publish --manifest "$manifest" --api-key "$API_KEY" --skip-duplicate --package-version "$version"
          }

          # Tier 1: no Lyric package dependencies.
          publish_lib lyric-resilience/lyric.toml "$VERSION"
          publish_lib lyric-validation/lyric.toml "$VERSION"
          publish_lib lyric-logging/lyric.toml "$VERSION"
          publish_lib lyric-cache/lyric.toml "$VERSION"

          # Tier 2: depends on Tier 1.
          publish_lib lyric-auth/lyric.toml "$VERSION"
          publish_lib lyric-otel/lyric.toml "$VERSION"
          publish_lib lyric-proto/lyric.toml "$VERSION"

          # Tier 3: depends on Tier 1–2.
          publish_lib lyric-grpc/lyric.toml "$VERSION"
          publish_lib lyric-web/lyric.toml "$VERSION"
          publish_lib lyric-db/lyric.toml "$VERSION"
          publish_lib lyric-health/lyric.toml "$VERSION"
          publish_lib lyric-mq/lyric.toml "$VERSION"
          publish_lib lyric-jobs/lyric.toml "$VERSION"
          publish_lib lyric-mail/lyric.toml "$VERSION"
          publish_lib lyric-storage/lyric.toml "$VERSION"
          publish_lib lyric-ws/lyric.toml "$VERSION"
          publish_lib lyric-session/lyric.toml "$VERSION"
          publish_lib lyric-search/lyric.toml "$VERSION"
          publish_lib lyric-feature-flags/lyric.toml "$VERSION"
          publish_lib lyric-i18n/lyric.toml "$VERSION"
          publish_lib lyric-testing/lyric.toml "$VERSION"

          # Tier 4: depends on Tier 3.
          publish_lib lyric-lambda/lyric.toml "$VERSION"

      - name: Remove signing certificate
        if: always() && env.NUGET_SIGNING_CERT_BASE64 != ''
        run: rm -f /tmp/nuget-signing.pfx

  # ---------------------------------------------------------------------------
  # Build and package the VS Code extension as a release artifact (.vsix).
  #
  # Since the extension runs purely platform-independent JS/TS and delegates all
  # compiler and LSP tasks to the `lyric lsp` CLI, the resulting .vsix is fully
  # architecture-independent and can be compiled on any OS runner.
  # ---------------------------------------------------------------------------
  publish-vscode:
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: lyric-vscode/package-lock.json

      - name: Install dependencies and compile
        run: |
          cd lyric-vscode
          npm ci
          npm run vscode:prepublish

      - name: Package extension (.vsix)
        # Override the package.json version dynamically during release packaging so that
        # the internal .vsix extension version matches the release versioning exactly.
        run: |
          cd lyric-vscode
          npx @vscode/vsce package ${{ needs.create-release.outputs.version }} -o ../lyric-lang-${{ needs.create-release.outputs.version }}.vsix

      - name: Upload .vsix to GitHub Release
        shell: bash
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" lyric-lang-${{ needs.create-release.outputs.version }}.vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Mark the release as ready (non-draft) after all uploads and publishing
  # are complete.  Runs only if all prior jobs succeeded or were skipped.
  # ---------------------------------------------------------------------------
  finalize-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-standalone, publish-nuget, publish-ecosystem, publish-vscode]
    if: >-
      always() &&
      needs.create-release.result == 'success' &&
      (needs.build-standalone.result == 'success' || needs.build-standalone.result == 'skipped') &&
      (needs.publish-nuget.result == 'success' || needs.publish-nuget.result == 'skipped') &&
      (needs.publish-ecosystem.result == 'success' || needs.publish-ecosystem.result == 'skipped') &&
      (needs.publish-vscode.result == 'success' || needs.publish-vscode.result == 'skipped')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Mark release as ready
        shell: bash
        run: |
          gh release edit "v${{ needs.create-release.outputs.version }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
