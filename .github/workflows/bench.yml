name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'benchmarks/**'
      - 'lyric-stdlib/**'
      - '.github/workflows/bench.yml'
      - '.github/scripts/bench_report.py'
  schedule:
    # Weekly on Sunday at 02:00 UTC — low-traffic window for consistent timings.
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Timed iterations per benchmark'
        type: string
        default: '15'
      warmup:
        description: 'Warmup iterations per benchmark'
        type: string
        default: '5'

permissions:
  contents: read

# Release configuration for the AOT entry-point build below: benchmark timings
# must reflect an optimized build, not the Debug config CI's build-and-test
# job uses for fast iteration.
env:
  BUILD_CONFIG: Release

jobs:
  bench:
    name: Run benchmarks
    # Pinned to ubuntu-24.04 so scheduled runs compare against a stable
    # machine image.  ubuntu-latest silently shifts to newer images on
    # GitHub's schedule, which breaks historical timing comparisons.
    runs-on: ubuntu-24.04

    env:
      RUNS:      ${{ github.event.inputs.runs   || '15' }}
      WARMUP:    ${{ github.event.inputs.warmup || '5'  }}
      # Single source of truth for the AOT binary path — was duplicated
      # verbatim across the staging step and every bench step (#4757).
      LYRIC_BIN: bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history: LYRIC_BOOTSTRAP_MINT=1 below runs
          # scripts/mint-stage0-fsharp.sh, which resolves the historical F#
          # bootstrap commit via `git rev-parse 44a0d1e7~1` (falling back to a
          # hardcoded SHA) and `git worktree add`s it — both require the
          # commit object to be present locally, which a shallow clone lacks.
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: bootstrap/global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bootstrap/**/*.fsproj', 'bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Bootstrap.sln and the F# `src/Lyric.Cli` project were deleted once the
      # self-hosted compiler became the sole toolchain (see ci.yml's
      # build-and-test job for the canonical pattern this mirrors). Mint the
      # stage-1 self-hosted bundle from F# history, then build the AOT
      # entry-point project — the resulting `lyric` binary is what `lyric
      # bench` runs through below.
      - name: Bootstrap stage 1 (mint clean stage-0 from F# history → self-hosted packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LYRIC_BOOTSTRAP_MINT: '1'
        run: ./scripts/bootstrap.sh --stage 1

      - name: Build AOT entry-point
        run: dotnet build bootstrap/src/Lyric.Cli.Aot --configuration $BUILD_CONFIG

      - name: Stage stdlib bundle beside the binary
        # `lyric bench` synthesizes and compiles the @bench_module source, so
        # the harness's Std.* imports (Std.Time, etc.) must resolve against a
        # deployed Lyric.Stdlib.dll beside the binary — mirrors ci.yml's
        # "Build AOT entry-point + smoke-test the examples" step.
        run: bash scripts/stage-selfhosted-stdlib.sh "$LYRIC_BIN" "$(dirname "$LYRIC_BIN")"

      - name: Create results directory
        run: mkdir -p bench-results

      # ── Run each benchmark suite ─────────────────────────────────────────────
      # Stdout is captured verbatim; the report generator parses the
      # "name  min=Xms  max=Xms  mean=Xms" lines.
      # continue-on-error lets a single failing suite produce a partial report
      # rather than skipping the report step entirely.

      - name: bench — numeric kernels
        continue-on-error: true
        run: |
          "$LYRIC_BIN" bench benchmarks/bench_numeric.l \
            --runs "$RUNS" --warmup "$WARMUP" \
            | tee bench-results/bench_numeric.txt

      - name: bench — collections throughput
        continue-on-error: true
        run: |
          "$LYRIC_BIN" bench benchmarks/bench_collections.l \
            --runs "$RUNS" --warmup "$WARMUP" \
            | tee bench-results/bench_collections.txt

      - name: bench — contract overhead
        continue-on-error: true
        run: |
          "$LYRIC_BIN" bench benchmarks/bench_contracts.l \
            --runs "$RUNS" --warmup "$WARMUP" \
            | tee bench-results/bench_contracts.txt

      - name: bench — string operations
        continue-on-error: true
        run: |
          "$LYRIC_BIN" bench benchmarks/bench_string.l \
            --runs "$RUNS" --warmup "$WARMUP" \
            | tee bench-results/bench_string.txt

      # ── Generate HTML report ─────────────────────────────────────────────────

      - name: Generate HTML report
        run: |
          python3 .github/scripts/bench_report.py \
            bench-results/bench_numeric.txt \
            bench-results/bench_collections.txt \
            bench-results/bench_contracts.txt \
            bench-results/bench_string.txt \
            --output bench-results/report.html \
            --title "Lyric Performance Report" \
            --git-sha "${{ github.sha }}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bench-report-${{ github.sha }}
          path: |
            bench-results/report.html
            bench-results/*.txt
          retention-days: 90
