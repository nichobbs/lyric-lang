      # Auto-FFI F0015 negative-compile test (#2945).  The auto-FFI self-test
      # above covers only the happy path (valid signatures resolve), so a
      # regression that silently disabled the signature-verification block in
      # msil/codegen.l (e.g. `canVerify` or `isExplicitStatic` stuck false)
      # would go undetected.  This step builds a fixture whose @externStatic
      # @externTarget declares an arity that matches no System.Math.Max
      # overload and asserts the build fails with F0015.
      - name: Auto-FFI F0015 signature-mismatch negative test
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping F0015 negative test"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          cat > "$work/f0015_fixture.l" <<'LYR'
          package F0015Fixture

          @externStatic
          @externTarget("System.Math.Max")
          func badMax(a: in Int): Int = ()

          func main(): Int {
            badMax(1)
          }
          LYR
          rc=0
          ( cd "$work" && "$bin_abs" build f0015_fixture.l ) > "$work/build.out" 2>&1 || rc=$?
          echo "--- build output (rc=$rc) ---"; cat "$work/build.out"
          if [ "$rc" -eq 0 ]; then
            echo "::error::expected non-zero exit for a mismatched @externTarget signature"
            exit 1
          fi
          grep -q "F0015" "$work/build.out" || {
            echo "::error::build failed but did not report F0015"; exit 1; }
          echo "F0015 signature-mismatch negative test passed (rc=$rc)"

          # F0027 (#5704, D-progress-671): a hint-less @externTarget whose
          # calling convention can't be metadata-verified must WARN (not fail —
          # option A is warning-first), and an explicit @externStatic/
          # @externInstance must silence it.  Task.Run's delegate parameter is
          # unscoreable, so it is a stable unverifiable case.
          cat > "$work/f0027_pos.l" <<'LYR'
          package F0027Pos
          extern type BclTask = "System.Threading.Tasks.Task"
          @externTarget("System.Threading.Tasks.Task.Run")
          func hintlessTaskRun(action: in () -> Unit): BclTask = ()
          func main(): Int { 0 }
          LYR
          rc=0
          ( cd "$work" && "$bin_abs" build f0027_pos.l ) > "$work/f0027_pos.out" 2>&1 || rc=$?
          echo "--- F0027 positive fixture (rc=$rc) ---"; cat "$work/f0027_pos.out"
          if [ "$rc" -ne 0 ]; then
            echo "::error::F0027 is warning-first (option A) but the hint-less fixture failed the build"; exit 1
          fi
          grep -q "F0027" "$work/f0027_pos.out" || {
            echo "::error::hint-less unverifiable @externTarget did not warn F0027"; exit 1; }
          cat > "$work/f0027_neg.l" <<'LYR'
          package F0027Neg
          extern type BclTask = "System.Threading.Tasks.Task"
          @externStatic
          @externTarget("System.Threading.Tasks.Task.Run")
          func annotatedTaskRun(action: in () -> Unit): BclTask = ()
          func main(): Int { 0 }
          LYR
          rc=0
          ( cd "$work" && "$bin_abs" build f0027_neg.l ) > "$work/f0027_neg.out" 2>&1 || rc=$?
          echo "--- F0027 negative fixture (rc=$rc) ---"; cat "$work/f0027_neg.out"
          if [ "$rc" -ne 0 ]; then
            echo "::error::annotated @externStatic fixture failed to build"; exit 1
          fi
          if grep -q "F0027" "$work/f0027_neg.out"; then
            echo "::error::explicit @externStatic did not silence F0027"; exit 1
          fi
          echo "F0027 hint-less-extern warning test passed"

      # D105 Phase 2: F0020–F0023 external-interface impl conformance negative
      # tests.  Phase 1 (PR #3851) wired `impl ExternInterface for Record` end
      # to end at the codegen layer; this phase adds metadata-direct signature
      # validation so a mis-shaped impl fails at build time instead of at first
      # use with `TypeLoadException`.  Each fixture targets one diagnostic.
      - name: FFI iface impl F0020–F0023 + generic-iface negative tests
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping F0020–F0023 negative tests"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          run_fixture() {
            local diag="$1" file="$2"
            local rc=0
            ( cd "$work" && "$bin_abs" build "$file" ) > "$work/build.out" 2>&1 || rc=$?
            echo "--- $diag fixture build output (rc=$rc) ---"; cat "$work/build.out"
            if [ "$rc" -eq 0 ]; then
              echo "::error::$diag fixture compiled but expected failure"
              exit 1
            fi
            grep -q "$diag" "$work/build.out" || {
              echo "::error::$diag fixture failed but did not report $diag"; exit 1; }
            echo "$diag negative test passed (rc=$rc)"
          }
          # F0020: impl block targets a non-interface (System.Math is a class).
          cat > "$work/f0020_fixture.l" <<'LYR'
          package F0020Fixture

          extern type NotAnIface = "System.Math"

          record R { tag: Int }

          impl NotAnIface for R {
          }

          func main(): Int { 0 }
          LYR
          run_fixture "F0020" "f0020_fixture.l"
          # F0021: impl is missing a required interface method (IDisposable.Dispose).
          cat > "$work/f0021_fixture.l" <<'LYR'
          package F0021Fixture

          extern type IDisposable = "System.IDisposable"

          record R { tag: Int }

