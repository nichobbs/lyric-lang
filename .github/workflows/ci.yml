      # dictTokensForLowering cache hit/miss logic in Msil.Lowering; it rides
      # the same step because it imports `Msil.*` like M2a-M2d.
      # metadata_reader_self_test.l (#4751, #4786) verifies refPackDir() and
      # refPackDirDebugInfo() agree via Msil.MetadataReader; converted from a
      # plain `func main` program requiring LYRIC_LOAD_COMPILER=1 to
      # @test_module, so it now rides this step for the same reason.
      #
      # INVARIANT: this step stages compiler DLLs into `<libdir>/selfhosted`
      # while running as a `background: true` step alongside 22+ other
      # concurrent steps in this job. That's only safe because no other
      # concurrent step in compiler-self-tests-dotnet-b reads from that path.
      # If you add a new `LYRIC_LOAD_COMPILER=1` (or otherwise
      # selfhosted-compiler-dependent) background step to this job, it MUST
      # either run after this step completes or stage its own copy --
      # reading `<libdir>/selfhosted` concurrently with this step's staging
      # write is a race with no failure signal (silently flaky, not a
      # deterministic error).
      - name: MSIL backend self-tests M2a-M2d (native lyric test)
