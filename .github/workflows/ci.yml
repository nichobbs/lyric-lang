name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Single build configuration shared across every dotnet build / test /
# path-discovery step.  Changing it here flips the configuration for
# every dependent path (bin/$BUILD_CONFIG/net10.0/...) at once — keeps
# the AOT smoke + ecosystem test paths from drifting (#1080).
env:
  BUILD_CONFIG: Debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      # Determine whether any non-docs files changed. When only book/,
      # docs/, or *.md files changed (docs-only PR), the expensive
      # build and test steps are skipped and the job exits green so
      # that required status checks are satisfied and auto-merge can
      # proceed.
      - name: Detect code changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # First-ever push to a branch has no parent; treat as code change.
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "First push — assuming code changes."
            exit 0
          fi

          # Skip the full build when only documentation or repository
          # metadata files changed.  The filter set is:
          #
          # * `book/`, `docs/`, `*.md` — narrative docs.
          # * `.github/CODEOWNERS`, `.github/PULL_REQUEST_TEMPLATE*`,
          #   `.github/ISSUE_TEMPLATE/` — repository metadata that
          #   doesn't affect what CI does.  `ci.yml` itself and any
          #   shell scripts under `.github/` stay *inside* the build
          #   set so that misconfigurations are caught on the same PR
          #   they land in, not the next unrelated push.
          #
          # `pipefail` stays on so a `git diff` failure propagates and
          # the outer `|| changed="yes"` fires the safe fallback.  A
          # single combined `grep -vE` keeps the pipeline short so the
          # `|| true` wrapper only has to absorb one benign exit-1
          # (every line filtered out on a docs-only PR); `head -1`
          # then sees empty stdin and `changed` ends up empty,
          # correctly signalling "skip".
          set -o pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | { grep -vE '^(book/|docs/|\.github/(CODEOWNERS|PULL_REQUEST_TEMPLATE|ISSUE_TEMPLATE/))|\.md$' || true; } \
            | head -1) || changed="yes"

          if [ -n "$changed" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected — full build and test will run."
          else
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — build and test skipped."
          fi

      # Guardrail for #733: PR #687 gutted `_kernel/net/*.l` files in
      # eight ecosystem libraries; the lint blocks new stubs from
      # landing while restoration PRs reintroduce real bindings.
      - name: Audit ecosystem kernel stubs (#733 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-kernel-stubs.sh

      # Guardrail for #335: keep `docs/17-axiom-audit.md` section 18
      # totals in sync with the actual `@axiom("...")`-bearing files
      # under `lyric-stdlib/std/_kernel*/`.  Forces the audit doc to
      # be updated whenever a new BCL surface gets an `@axiom`.
      - name: Audit stdlib axioms (#335 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-axioms.sh

      # Guardrail for #2125: the F# stage-0 emitter mis-resolves a qualified
      # `Str.fromInt`/`Str.toUpper`/`Str.toLower` call to `Std.Char.<same>` in a
      # compiler source importing both Std.String and Std.Char (the names
      # collide).  Use `toString` / string-only ops until the emitter is fixed.
      - name: Audit Str/Char qualified-name collision (#2125 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-strchar-collision.sh

      - name: Set up .NET (uses bootstrap/global.json)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Z3 (for the Phase 4 verifier smoke tests)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Cache NuGet packages
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bootstrap/**/*.fsproj', 'bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Cache the stage-0 F# Release publish (`./scripts/bootstrap.sh` stage 0).
      # Keyed on the EXACT hash of every stage-0 input with NO restore-keys
      # fallback: a restore only happens on a byte-identical F# tree, so the
      # cached `lyric` binary is always valid for the current sources. On any
      # F# / fsproj / global.json / Directory.Build.props / bootstrap.sh
      # change the key misses and stage 0 rebuilds. The stage-1 step opts into
      # reuse via STAGE0_REUSE_PUBLISHED=1 (below); a miss safely degrades to a
      # full rebuild. Saves a full Release publish on the common .l-only PR.
      - name: Cache stage-0 F# publish
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/cache@v5
        with:
          path: .bootstrap/stage0-publish
          key: ${{ runner.os }}-stage0-${{ hashFiles('bootstrap/src/**/*.fs', 'bootstrap/src/**/*.fsproj', 'bootstrap/global.json', 'bootstrap/Directory.Build.props', 'scripts/bootstrap.sh') }}

      - name: Restore
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet restore Bootstrap.sln

      - name: Build
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet build Bootstrap.sln --configuration $BUILD_CONFIG --no-restore

      - name: Lexer tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Lexer.Tests --no-build --configuration $BUILD_CONFIG

      - name: Parser tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Parser.Tests --no-build --configuration $BUILD_CONFIG

      - name: Type-checker tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.TypeChecker.Tests --no-build --configuration $BUILD_CONFIG

      - name: Emitter tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Emitter.Tests --no-build --configuration $BUILD_CONFIG

      # The emitter test suite writes /tmp/lyric-jvm-selftest/Hello.class via the
      # Jvm.SelfTest stage-B2 program.  Existing tests verify structural validity
      # with `javap -c` but never execute the class via `java`, so JVM-side
      # codegen bugs (linkage, descriptor mismatches, etc.) reach main undetected.
      # Closes #744.
      - name: JVM execution smoke (run Hello.class via `java`)
        if: steps.changes.outputs.has_code_changes == 'true'
        timeout-minutes: 1
        env:
          # Hardcoded path; shared with the emitter test that writes the
          # class so a rename in either site is caught here as a missing
          # file rather than a silent skip (#776).
          JVM_SELFTEST_DIR: /tmp/lyric-jvm-selftest
        run: |
          set -euo pipefail
          if [ ! -f "$JVM_SELFTEST_DIR/Hello.class" ]; then
            echo "::error::Hello.class missing under $JVM_SELFTEST_DIR — Jvm.SelfTest must have run during the Emitter tests step"
            exit 1
          fi
          out=$(java -cp "$JVM_SELFTEST_DIR" Hello)
          echo "java output: $out"
          if [ "$out" != "hello from lyric-jvm" ]; then
            echo "::error::JVM execution produced unexpected output: '$out'"
            exit 1
          fi

      - name: CLI tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Cli.Tests --no-build --configuration $BUILD_CONFIG

      - name: Bootstrap stage 1 (F# → self-hosted packages)
        if: steps.changes.outputs.has_code_changes == 'true'
        # Stage 1 is required: the AOT smoke test, ecosystem tests, and
        # the cli.l re-parse guarantee all depend on the stage-1 bundle.
        # The previous `continue-on-error: true` masked latent parse
        # errors in cli.l (#616) — a `var out` binding sat unfixed for
        # weeks because the failure was swallowed and downstream steps
        # silently skipped.  Stage 1 now fails CI loudly.
        working-directory: ${{ github.workspace }}
        env:
          # Reuse the cached stage-0 publish when the "Cache stage-0 F#
          # publish" step restored one (exact F#-hash match). Safe: a cache
          # miss leaves nothing to reuse and stage 0 rebuilds.
          STAGE0_REUSE_PUBLISHED: "1"
        run: ./scripts/bootstrap.sh --stage 1

      # Track A A1.4 (#860) deleted the F# user-facing CLI; the AOT
      # entry-point project at `bootstrap/src/Lyric.Cli.Aot/` now
      # serves all user commands by trampolining into the Lyric-emitted
      # `Lyric.Cli.Program.main` in the stage-1 bundle.  Build it and
      # use the resulting `lyric` binary for the example smoke tests.
      #
      # Stage 1 is required (continue-on-error was removed above), so
      # a missing bundle here means CI infrastructure broke between
      # steps — fail loudly instead of silently skipping.
      - name: Build AOT entry-point + smoke-test the examples
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; AOT smoke test cannot run"
            exit 1
          fi
          dotnet build bootstrap/src/Lyric.Cli.Aot --configuration $BUILD_CONFIG
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT entry-point binary not found at $lyric_bin"
            exit 1
          fi
          # Route any emitProject / --target jvm / LYRIC_FORCE_SUBPROCESS hop
          # to the F# bootstrap CLI.  Required since #1082 stripped the AOT
          # entry point of its path-discovery shim — the AOT binary is a
          # pure trampoline and never auto-locates lyric.dll.
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          for ex in examples/*.l; do
            # `@proof_required` files are verifier-only — they have no
            # `func main` so `lyric build` doesn't apply.  The AOT
            # binary's `lyric prove` path needs `Lyric.Emitter.dll`
            # in its resolution context (the F# emitter is what
            # `Std.VerifierEnvHost.hostGetEnv` chains through); the
            # AOT csproj doesn't carry the F# emitter today, so skip
            # them for now.  Tracked as a follow-up to Track A.
            if head -n 1 "$ex" | grep -q '^@proof_required'; then
              echo "=== skip proof-only $ex (AOT prove path: follow-up) ==="
              continue
            fi
            echo "=== build $ex ==="
            out="/tmp/$(basename "$ex" .l).dll"
            "$lyric_bin" build "$ex" -o "$out" --force
          done

      # Ecosystem security regression tests — exercises lyric-auth (#315, #360)
      # and lyric-session (#316) through the multi-package test runner added in
      # #465.  Skipped silently if the stage-1 bundle or AOT binary is absent
      # (mirrors the AOT smoke step above).  Fails CI when tests are present
      # and actually fail, so security regressions are caught on every push.
      - name: Ecosystem test suite (lyric-auth + lyric-session)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem tests cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Stage 1 compiled all Lyric.Stdlib*.dll files into .bootstrap/stage1/.
          # Copy them all to the canonical dep-resolution path so the test runner's
          # local-path dep resolver finds it without re-running a manifest build.
          # The main bundle (Lyric.Stdlib.dll) is required for compile-time dep
          # resolution; the individual DLLs (e.g. Lyric.Stdlib.Testing.dll) are
          # needed at runtime by compiled test DLLs.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::warning::no Lyric.Stdlib*.dll found in .bootstrap/stage1; skipping ecosystem tests"
            exit 0
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # NOTE: the per-test-dir stdlib pre-copy that used to live here is no
          # longer needed — `lyric test --manifest` now co-locates the split
          # `Lyric.Stdlib.*.dll` assemblies next to each compiled test DLL
          # itself (cmdTestManifest -> copyRuntimeDepsBeside, #1468 / #1841).
          # The `mkdir` stays because the Session.Host pre-copy below runs
          # before `lyric test` creates the directory.
          mkdir -p lyric-session/.lyric-test
          # lyric-session's compiled test DLL carries @externTarget
          # references into its F# host shim (Session.Host).
          # `additionalProbingPaths` in the runtimeconfig only resolves
          # NuGet-style versioned layouts, so the host DLL must live
          # alongside the test DLL itself for `dotnet exec` to load it.
          # Session.Host is `dotnet publish`-ed by bootstrap.sh into
          # .bootstrap/stage1/, so we copy from there.
          #
          # lyric-auth no longer needs a host shim: its kernel binds
          # HMAC-SHA256 directly to System.Security.Cryptography.HMACSHA256
          # and implements constant-time comparison in pure Lyric.
          cli_bin_dir="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0"
          if [ -f .bootstrap/stage1/Lyric.Session.Host.dll ]; then
            cp .bootstrap/stage1/Lyric.Session.Host.dll lyric-session/.lyric-test/
          else
            echo "::error::Lyric.Session.Host.dll missing from .bootstrap/stage1"
            exit 1
          fi
          # StackExchange.Redis ships next to Session.Host (bootstrap.sh
          # copies it from the publish output).  Load is lazy — copy
          # if present so Redis-backed tests can run. Silent skip is
          # acceptable: if the DLL is absent, Redis-backed tests skip
          # gracefully via the SessionStore factory (#1145).
          if [ -f .bootstrap/stage1/StackExchange.Redis.dll ]; then
            cp .bootstrap/stage1/StackExchange.Redis.dll lyric-session/.lyric-test/
          fi
          # Route emitProject subprocess calls to the F# bootstrap CLI, which
          # handles --internal-project-build.  The AOT binary is a pure trampoline
          # into the Lyric CLI dispatcher and does not handle internal flags
          # (#1082 stripped the AOT entry point of its path-discovery shim).
          cli_dll="$cli_bin_dir/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # lyric-session depends on Lyric.Cache (a local path dep).  The test
          # runner's local-dep resolver requires the dep's output DLL to already
          # exist (lyric-cache/bin/Cache.dll) and errors otherwise, so build it
          # here before running the session suite.  Copy the result next to the
          # session test DLL so `dotnet exec` loads it at runtime — the
          # runtimeconfig additionalProbingPaths only resolves NuGet-style
          # versioned layouts (same reason the host-shim DLLs are copied above).
          echo "=== building lyric-cache (lyric-session dependency) ==="
          if ! "$lyric_bin" build --manifest lyric-cache/lyric.toml; then
            echo "::error::failed to build lyric-cache (lyric-session dependency)"
            exit 1
          fi
          if [ -f lyric-cache/bin/Cache.dll ]; then
            cp lyric-cache/bin/Cache.dll lyric-session/.lyric-test/
          else
            echo "::error::lyric-cache build produced no lyric-cache/bin/Cache.dll"
            exit 1
          fi
          # Run both test manifests; capture exit codes so both always run
          # before we report the overall result.
          overall=0
          echo "=== lyric-auth tests ==="
          "$lyric_bin" test --manifest lyric-auth/lyric.toml || overall=$?
          echo "=== lyric-session tests ==="
          "$lyric_bin" test --manifest lyric-session/lyric.toml || overall=$?
          if [ $overall -ne 0 ]; then
            echo "::error::ecosystem test suite failed — security regression detected"
            exit $overall
          fi
          echo "ecosystem test suite passed"

      # Full self-hosted stdlib bundle (#2592, stage-2 milestone) — builds
      # the entire public Std.* surface through the self-hosted MSIL backend
      # via lyric-stdlib/lyric.full.toml.  The bootstrap lyric.toml is only
      # the F#-stage-0 smoke set; this step guards that the self-hosted
      # emitter can compile the whole standard library so the milestone
      # cannot silently regress.
      - name: Build full stdlib (self-hosted, lyric.full.toml)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if ! "$lyric_bin" build --manifest lyric-stdlib/lyric.full.toml; then
            echo "::error::full self-hosted stdlib bundle failed to build"
            exit 1
          fi
          echo "full self-hosted stdlib bundle built"

      # Multi-file example packages — builds each showcase service in
      # examples/{rbac,ledger,jobqueue,product-catalog} end-to-end via
      # `lyric build --manifest` (#2514).  Unlike the single-file AOT
      # smoke test above, this exercises the full project pipeline across
      # cross-file + cross-package references, aspect instantiations, and
      # the lyric-web/db/otel/grpc/auth/resilience library dependencies.
      # Library deps are built bottom-up first so each example's restored
      # path-dependency DLLs exist.  Fails CI if any package regresses.
      - name: Build example packages (lyric build --manifest)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; example package build cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # The self-hosted MSIL bridge resolves `import Std.X` from
          # lyric-stdlib/std/*.l source, but each manifest also lists
          # Lyric.Stdlib as a path dependency whose output DLL must exist;
          # stage 1 already compiled it into .bootstrap/stage1/.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI (the
          # AOT binary is a pure trampoline; same wiring as the steps above).
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Build the dependency libraries bottom-up so each example's
          # restored path deps resolve to an existing bin/<assembly>.dll.
          libs=(lyric-logging lyric-auth lyric-resilience lyric-otel lyric-db lyric-web lyric-health lyric-grpc)
          for lib in "${libs[@]}"; do
            echo "=== build dependency $lib ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::failed to build example dependency $lib"
              exit 1
            fi
          done
          # Build each example package end-to-end.
          examples=(rbac ledger jobqueue product-catalog)
          for ex in "${examples[@]}"; do
            echo "=== build example $ex ==="
            if ! "$lyric_bin" build --manifest "examples/$ex/lyric.toml"; then
              echo "::error::example package $ex failed to build"
              exit 1
            fi
          done
          echo "all example packages built"

      # Ecosystem library builds (#2530) — builds every lyric-* library in
      # topological order so regressions in any library are caught on every
      # push.  Libraries are grouped into three tiers by dependency depth.
      # The step is idempotent: `lyric build` skips unchanged output DLLs,
      # so libraries already built by the example packages step above are
      # not re-compiled from scratch.
      - name: Ecosystem library builds (#2530)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem library builds cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Ensure stdlib DLLs are in the canonical dep-resolution path.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI.
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Tier 0: libraries with no local path dependencies.
          tier0=(
            lyric-cache lyric-logging lyric-proto lyric-generator-sdk
            lyric-mail lyric-storage lyric-auth lyric-resilience
            lyric-validation lyric-i18n lyric-otel lyric-feature-flags
            lyric-aws-xray lyric-aws-secrets lyric-db
          )
          for lib in "${tier0[@]}"; do
            echo "=== build $lib (tier 0) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 0) failed to build"
              exit 1
            fi
          done
          # Tier 1: libraries depending only on tier-0 libraries.
          tier1=(lyric-mq lyric-session lyric-jobs lyric-search lyric-ws lyric-web lyric-grpc)
          for lib in "${tier1[@]}"; do
            echo "=== build $lib (tier 1) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 1) failed to build"
              exit 1
            fi
          done
          # Tier 2: libraries depending on tier-0 and tier-1 libraries.
          tier2=(lyric-health lyric-testing lyric-lambda)
          for lib in "${tier2[@]}"; do
            echo "=== build $lib (tier 2) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 2) failed to build"
              exit 1
            fi
          done
          echo "all ecosystem libraries built"

      # Weaver self-test — exercises `Lyric.Weaver` via native `lyric test`.
      # The compiler-package imports (Lyric.Lexer / Lyric.Parser /
      # Lyric.Weaver) are resolved by LINKING the already-compiled stage-1
      # bundle DLLs as restored dependencies (#2364), so no recompile-from-
      # source `LYRIC_LOAD_COMPILER=1` is needed.  Resolves issue #1324
      # without any new F# test shims.
      - name: Weaver self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
