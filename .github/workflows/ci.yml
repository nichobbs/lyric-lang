          "$lyric_bin" test --target jvm lyric-compiler/jvm/record_method_jvm_self_test.l
      # Control-flow terminator self-test on the JVM target (#2870, epic #2663).
      # Pins the fix for the stray trailing void `return` appended after a tail
      # `if`/`else` (or `match`) whose arms all `return`: the if/match lowering no
      # longer lands an unreachable join label at the past-end bytecode offset
      # (its StackMapTable frame pointed past the method body → VerifyError), and
      # the AST-level `blockTerminates` predicate suppresses the implicit return.
      # Asserts the both-branches-return repro, a nested if/else-if/else chain,
      # an all-arms-return `match`, plus a Unit fall-off and an else-less `if` to
      # prove the implicit-return path still works — all under `java`.  Imports
      # only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Control-flow terminator self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
