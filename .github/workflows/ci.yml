          echo "named-arg/default-param self-test ran: func_default_args_self_test.l (--target jvm)" >> "$GITHUB_STEP_SUMMARY"

      # Numeric / character conversion-method self-test (#1901, Band-1 of epic
      # #1470).  Exercises `.toByte()` / `.toInt()` / `.toLong()` / `.toChar()`
      # / `.toDouble()` end-to-end: the type checker types each conversion and
      # both backends lower it to native width-conversion opcodes (`conv.*` on
      # MSIL; `i2l`/`l2i`/`d2i`/… on the JVM, with `.toByte()` masked to the
      # unsigned 0..255 range to match MSIL's `conv.u1`).  Run on BOTH targets —
      # parity is asserted, not deferred.  Imports only `Std.*`.
