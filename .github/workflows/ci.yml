        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping MSIL backend self-tests"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping MSIL backend self-tests"
            exit 1
          fi
          bash scripts/stage-selfhosted-compiler.sh "$lyric_bin" "$(dirname "$lyric_bin")" .bootstrap/stage1
          ran=""
          for t in \
            lyric-compiler/msil/msil_self_test_m2a.l \
            lyric-compiler/msil/msil_self_test_m2b.l \
            lyric-compiler/msil/msil_self_test_m2c.l \
            lyric-compiler/msil/msil_self_test_m2d.l \
            lyric-compiler/msil/msil_self_test_m88.l \
            lyric-compiler/msil/msil_bracket_arg_self_test.l \
            lyric-compiler/msil/lowering_token_self_test.l \
            lyric-compiler/msil/metadata_reader_self_test.l ; do
            echo "=== $t ==="
            bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet "$t"
            ran="$ran $t"
          done
          echo "MSIL backend self-tests ran:$ran" >> "$GITHUB_STEP_SUMMARY"

      # Out/inout-parameter self-test — pins the self-hosted MSIL byref calling
