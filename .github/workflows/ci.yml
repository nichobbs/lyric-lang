      # Record instance-method self-test on the JVM target (#2865, epic #2663).
      # Pins record instance-method DISPATCH on `--target jvm`: a method declared
      # inside a `record` body (`RMFunc`) is emitted as a true non-static instance
      # method (slot 0 = `this`, `getfield` field reads through the receiver), and
      # a call `rec.m(args)` lowers to a precisely-typed `invokevirtual` via the
      # J3 `<class>#<method>` registry.  Before this fix the method was emitted
      # static while the caller used `invokevirtual` → JVM VerifyError "Expecting
      # non-static method".  Asserts field-reading methods, argument-combining
      # methods, field-in-expression reads, and a `Result[Int, String]`-returning
      # method (J4 erased generics through an instance method) — all under `java`.
      # Imports only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
