            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/conv_methods_self_test.l

      # Pattern-lowering self-test (#2455).  Exercises the five match-arm pattern
      # forms that the self-hosted MSIL and JVM backends previously left
      # unhandled in `lowerPatternTest` / `lowerPatternBind` — `PParen`,
      # `PRange`, `PRecord`, `PTuple`, `PTypeTest` — plus the supporting
      # record/union/tuple construction, field access, and call-site argument
      # coercion the JVM target needed to run them.  Run on BOTH targets:
      # parity is asserted, not deferred.  Imports only `Std.*`.
