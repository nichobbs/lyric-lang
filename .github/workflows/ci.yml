name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A follow-up push to the same PR (or a new push to main) supersedes
# whatever CI run is already in flight for it — the old run's ~20 jobs
# would just be queueing for runners while their result is about to be
# discarded anyway. Cancelling frees those runner slots immediately for
# whichever run actually needs to report a status. Group by PR number
# when this is a pull_request event, falling back to the ref for push
# events (mirrors the pattern already used by book.yml/claude-rebase.yml).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Single build configuration shared across every dotnet build / test /
# path-discovery step.  Changing it here flips the configuration for
# every dependent path (bin/$BUILD_CONFIG/net10.0/...) at once — keeps
# the AOT smoke + ecosystem test paths from drifting (#1080).
env:
  BUILD_CONFIG: Debug

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_code_changes: ${{ steps.changes.outputs.has_code_changes }}
      has_core_changes: ${{ steps.changes.outputs.has_core_changes }}
      has_jvm_ecosystem_changes: ${{ steps.changes.outputs.has_jvm_ecosystem_changes }}
      ecosystem_run_map: ${{ steps.changes.outputs.run_map }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none

      # Determine whether any non-docs files changed. When only book/,
      # docs/, or *.md files changed (docs-only PR), the expensive
      # build and test steps are skipped and the job exits green so
      # that required status checks are satisfied and auto-merge can
      # proceed.
      - name: Detect code changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Shared core-infra prefix: anything here can change what every
          # ecosystem-tests matrix entry does (the manifest chain, or how
          # it's invoked) regardless of which library's own directory
          # changed, so it must appear in EVERY entry's trigger pattern
          # below, not just the has_core_changes check further down. A
          # ci.yml-only change (like this PR's own diff) is the case that
          # would otherwise silently zero out the whole matrix.
          CORE_INFRA_PATTERN='lyric-compiler/|lyric-stdlib/|bootstrap/|lyric-rt/|resolver/|scripts/|Makefile|\.github/workflows/ci\.yml'

          # Per-ecosystem-library dependency map backing the `ecosystem-tests`
          # matrix (split from the old monolithic `ecosystem-security-tests`
          # job). Each id names one lyric-<id>/ library; the value lists the
          # OTHER lyric-<dep>/ directories that library's own test-manifest
          # chain actually path-depends on, transcribed from the build-order
          # comments that used to live inline in that job. `emit_run_map`
          # below turns this into a JSON {id: true|false} map: a PR touching
          # only an unrelated library's directory skips that matrix entry; a
          # compiler/stdlib/core-infra change (per CORE_INFRA_PATTERN above)
          # always triggers every entry.
          declare -A ECO_DEPS=(
            [auth]=""
            [session]="cache"
            [health]=""
            [cache]=""
            [docker]=""
            [mail]=""
            [aws-xray]=""
            [aws-secrets]=""
            [feature-flags]=""
            [validation]=""
            [storage]=""
            [proto]=""
            [otel]="proto"
            [jsonrpc]=""
            [mcp]="jsonrpc"
            [logging]=""
            [mq]="cache"
            [grpc]="auth resilience"
            [db]="logging"
            [search]="resilience"
            [lambda]="auth resilience web"
            [web]="auth resilience"
            [ws]="auth"
            [testing]="cache mail storage feature-flags mq session"
          )

          # $1: "true" forces every entry to true (conservative fallback /
          # first push); otherwise $2 is the newline-separated changed-file
          # list to grep each entry's trigger pattern against. Builds the
          # JSON via an array + IFS join rather than manual comma bookkeeping
          # so no branch of this loop can trip the shell's default `-e`.
          emit_run_map() {
            local force_true="$1"
            local files="$2"
            local id dep pattern val
            local entries=()
            for id in "${!ECO_DEPS[@]}"; do
              if [ "$force_true" = "true" ]; then
                val=true
              else
                pattern="^(${CORE_INFRA_PATTERN}|lyric-${id}/"
                for dep in ${ECO_DEPS[$id]}; do
                  pattern="${pattern}|lyric-${dep}/"
                done
                pattern="${pattern})"
                if printf '%s\n' "$files" | grep -qE "$pattern"; then
                  val=true
                else
                  val=false
                fi
              fi
              entries+=("\"${id}\":${val}")
            done
            run_map="{$(IFS=,; echo "${entries[*]}")}"
            echo "run_map=${run_map}" >> "$GITHUB_OUTPUT"
            echo "Ecosystem per-library run map: ${run_map}"
          }

          # First-ever push to a branch has no parent; treat as code change.
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "has_core_changes=true" >> "$GITHUB_OUTPUT"
            echo "has_jvm_ecosystem_changes=true" >> "$GITHUB_OUTPUT"
            emit_run_map true ""
            echo "First push — assuming code changes."
            exit 0
          fi

          # Skip the full build when only documentation or repository
          # metadata files changed.  The filter set is:
          #
          # * `book/`, `docs/`, `*.md` — narrative docs.
          # * `.github/CODEOWNERS`, `.github/PULL_REQUEST_TEMPLATE*`,
          #   `.github/ISSUE_TEMPLATE/` — repository metadata that
          #   doesn't affect what CI does.  `ci.yml` itself and any
          #   shell scripts under `.github/` stay *inside* the build
          #   set so that misconfigurations are caught on the same PR
          #   they land in, not the next unrelated push.
          #
          # `pipefail` stays on so a `git diff` failure propagates and
          # the outer `|| changed="yes"` fires the safe fallback.  A
          # single combined `grep -vE` keeps the pipeline short so the
          # `|| true` wrapper only has to absorb one benign exit-1
          # (every line filtered out on a docs-only PR); `head -1`
          # then sees empty stdin and `changed` ends up empty,
          # correctly signalling "skip".
          set -o pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | { grep -vE '^(book/|docs/|\.github/(CODEOWNERS|PULL_REQUEST_TEMPLATE|ISSUE_TEMPLATE/))|\.md$' || true; } \
            | head -1) || changed="yes"

          if [ -n "$changed" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected — full build and test will run."
          else
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — build and test skipped."
          fi

          # Second, finer-grained signal: does the diff touch the
          # compiler/runtime core (CORE_INFRA_PATTERN, declared above:
          # lyric-compiler/, lyric-stdlib/, bootstrap/, lyric-rt/,
          # resolver/, scripts/, this workflow file, or the root Makefile)?
          # Deliberately excludes native/ — that directory holds only *.md
          # backend-design planning docs (no code; the real native backend
          # lives under lyric-compiler/lyric/llvm_*.l and
          # lyric-stdlib/std/_kernel_native/, both already covered), so
          # including it would force a rebuild for doc-only edits with
          # nothing to actually verify. The compiler self-test,
          # native-backend, closure zero-overhead, ilverify, AOT-smoke, and
          # e2e-CLI jobs below only ever exercise this surface — a PR that
          # touches just one ecosystem library (lyric-web/, lyric-mq/,
          # ...), lyric-vscode/, lyric-testing/, or examples/ gains nothing
          # from re-running them. Same conservative-fallback shape as the
          # has_code_changes check above: any ambiguity (git diff failure,
          # first push already handled) resolves to "true" — a missed skip
          # costs CI minutes, a wrong skip hides a regression.
          core_changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | { grep -E "^(${CORE_INFRA_PATTERN})" || true; } \
            | head -1) || core_changed="yes"

          if [ -n "$core_changed" ]; then
            echo "has_core_changes=true" >> "$GITHUB_OUTPUT"
            echo "Compiler/runtime-core changes detected — compiler/native/JVM/AOT test jobs will run."
          else
            echo "has_core_changes=false" >> "$GITHUB_OUTPUT"
            echo "No compiler/runtime-core changes — compiler/native/JVM/AOT test jobs skipped."
          fi

          # compiler-self-tests-jvm's own gate: a superset of has_core_changes.
          # Unlike the other 12 has_core_changes-gated jobs, this one also
          # contains the ONLY CI exercise of four ecosystem libraries' JVM
          # kernels/manifests — Storage.Kernel.Jvm, Resilience.Kernel.Jvm, the
          # Auth.Kernel.Jvm feature-resolution build, and the lyric-web
          # Undertow end-to-end smoke (tests/jvm_server_smoke.l) — none of
          # which the ecosystem-tests matrix duplicates (it only runs their
          # default/dotnet manifests). Folding lyric-web/storage/resilience/
          # auth into the shared has_core_changes pattern instead would have
          # over-broadened the OTHER 12 jobs' gates for libraries they never
          # touch, so this is a separate, job-specific signal.
          jvm_ecosystem_changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | { grep -E "^(${CORE_INFRA_PATTERN}|lyric-web/|lyric-storage/|lyric-resilience/|lyric-auth/)" || true; } \
            | head -1) || jvm_ecosystem_changed="yes"

          if [ -n "$jvm_ecosystem_changed" ]; then
            echo "has_jvm_ecosystem_changes=true" >> "$GITHUB_OUTPUT"
            echo "Compiler-core or web/storage/resilience/auth JVM-kernel changes detected — compiler-self-tests-jvm will run."
          else
            echo "has_jvm_ecosystem_changes=false" >> "$GITHUB_OUTPUT"
            echo "No compiler-core or web/storage/resilience/auth changes — compiler-self-tests-jvm skipped."
          fi

          # Finally, the per-library run map itself (a fresh `git diff` call,
          # independent of the `changed`/`core_changed` computations above so
          # a grep quirk in either can't affect this one).
          eco_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null) && eco_ok=1 || eco_ok=0
          if [ "$eco_ok" -eq 1 ]; then
            emit_run_map false "$eco_files"
          else
            emit_run_map true ""
          fi

      # Guardrail for #733: PR #687 gutted `_kernel/net/*.l` files in
      # eight ecosystem libraries; the lint blocks new stubs from
      # landing while restoration PRs reintroduce real bindings.
      - name: Audit ecosystem kernel stubs (#733 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-kernel-stubs.sh

      # Guardrail for #335: keep `docs/17-axiom-audit.md` section 18
      # totals in sync with the actual `@axiom("...")`-bearing files
      # under `lyric-stdlib/std/_kernel*/`.  Forces the audit doc to
      # be updated whenever a new BCL surface gets an `@axiom`.
      - name: Audit stdlib axioms (#335 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-axioms.sh

      # Guardrail for #2125: the F# stage-0 emitter mis-resolves a qualified
      # `Str.fromInt`/`Str.toUpper`/`Str.toLower` call to `Std.Char.<same>` in a
      # compiler source importing both Std.String and Std.Char (the names
      # collide).  Use `toString` / string-only ops until the emitter is fixed.
      - name: Audit Str/Char qualified-name collision (#2125 guardrail)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/audit-strchar-collision.sh

      - name: Set up .NET (uses bootstrap/global.json)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Z3 (for the Phase 4 verifier smoke tests)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Cache NuGet packages
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bootstrap/**/*.fsproj', 'bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Bootstrap stage 1 (download stage-0 release → self-hosted packages)
        if: steps.changes.outputs.has_code_changes == 'true'
        # Stage 1 is required: the AOT smoke test, ecosystem tests, and
        # the cli.l re-parse guarantee all depend on the stage-1 bundle.
        #
        # Stage 0 downloads the latest self-hosted Lyric release.
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/bootstrap.sh --stage 1

      # Track A A1.4 (#860) deleted the F# user-facing CLI; the AOT
      # entry-point project at `bootstrap/src/Lyric.Cli.Aot/` now
      # serves all user commands by trampolining into the Lyric-emitted
      # `Lyric.Cli.Program.main` in the stage-1 bundle.  Build it and
      # use the resulting `lyric` binary for the example smoke tests.
      #
      # Stage 1 is required (continue-on-error was removed above), so
      # a missing bundle here means CI infrastructure broke between
      # steps — fail loudly instead of silently skipping.
      - name: Build AOT entry-point + smoke-test the examples
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; AOT smoke test cannot run"
            exit 1
          fi
          dotnet build bootstrap/src/Lyric.Cli.Aot --configuration $BUILD_CONFIG
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT entry-point binary not found at $lyric_bin"
            exit 1
          fi
          # Stage the stdlib packages the F# stage-0 emitter cannot build
          # (#2592: Std.Sort et al.) into the toolchain lib dir(s) via the
          # self-hosted emitter, so user programs importing them resolve at
          # run time.  Runs once after the AOT build; later steps in this job
          # reuse the populated lib dir.
          bash scripts/stage-selfhosted-stdlib.sh "$lyric_bin" "$(dirname "$lyric_bin")" .bootstrap/stage1
          # Post-collapse (D111) every Std.* reference resolves to the single
          # Lyric.Stdlib bundle deployed above, so the per-package userlib/ stdlib
          # staging is no longer needed (and would shadow the bundle via
          # copyRuntimeDepsBeside) — removed.
          for ex in examples/*.l; do
            # `@proof_required` files are verifier-only — they have no
            # `func main` so `lyric build` doesn't apply.  The AOT
            # binary's `lyric prove` path needs `Lyric.Emitter.dll`
            # in its resolution context (the F# emitter is what
            # `Std.VerifierEnvHost.hostGetEnv` chains through); the
            # AOT csproj doesn't carry the F# emitter today, so skip
            # them for now.  Tracked as a follow-up to Track A.
            if head -n 1 "$ex" | grep -q '^@proof_required'; then
              echo "=== skip proof-only $ex (AOT prove path: follow-up) ==="
              continue
            fi
            echo "=== build $ex ==="
            out="/tmp/$(basename "$ex" .l).dll"
            "$lyric_bin" build "$ex" -o "$out" --force
          done

      # NOTE: the self-hosted-emitter IL-validity check (`ilverify`) runs in
      # the standalone `ilverify-required` job below and is required by
      # `build-and-test` — it is a hard gate.  Developers run it on demand
      # via `make ilverify`.

      # Run/test single-file examples to catch runtime regressions.
      - name: Run single-file examples
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found; skipping example runs"
            exit 0
          fi
          # Run-to-completion examples (assert exit 0).
          for ex in csv fizzbuzz primes wordcount ffi_bcl ffi_datetime; do
            echo "=== run examples/$ex.l ==="
            "$lyric_bin" run "examples/$ex.l" > /tmp/"$ex".run.log 2>&1 \
              && echo "PASS" || { echo "FAIL"; tail -10 /tmp/"$ex".run.log; exit 1; }
          done
          # rest_service starts an HTTP listener and runs until killed.  Run it
          # in the background, wait for the "Listening on" line in its log,
          # smoke-test the endpoint, then SIGTERM the server.
          echo "=== smoke examples/rest_service.l ==="
          "$lyric_bin" run examples/rest_service.l > /tmp/rest_service.run.log 2>&1 &
          srv_pid=$!
          for _ in $(seq 1 20); do
            if grep -q "Listening on" /tmp/rest_service.run.log 2>/dev/null; then
              break
            fi
            sleep 0.5
          done
          if ! kill -0 "$srv_pid" 2>/dev/null; then
            echo "FAIL: rest_service exited before serving"
            tail -20 /tmp/rest_service.run.log
            exit 1
          fi
          body="$(curl -s --max-time 3 http://localhost:8080/ || true)"
          kill "$srv_pid" 2>/dev/null || true
          wait "$srv_pid" 2>/dev/null || true
          if [ "$body" != "Hello from Lyric!" ]; then
            echo "FAIL: unexpected body '$body'"
            tail -20 /tmp/rest_service.run.log
            exit 1
          fi
          echo "PASS"
          # Web.serve() per-request crash isolation (#5261, supersedes the
          # #5260 fail-fast contract): the server's /crash route panics during
          # request handling; serve()'s per-request catch-Bug arm must log the
          # [lyric-web] failure line, answer that request 500, and KEEP the
          # accept loop running — a single bad request must not take the whole
          # server down. Assert /crash -> 500, the failure line is logged, and
          # /health still serves 200 afterward; then kill the server (it no
          # longer exits on its own).
          echo "=== smoke lyric-web/tests/serve_failure_tests.l ==="
          "$lyric_bin" run lyric-web/tests/serve_failure_tests.l > /tmp/serve_failure.run.log 2>&1 &
          sf_pid=$!
          for _ in $(seq 1 20); do
            if curl -s --max-time 1 http://127.0.0.1:8199/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          if ! kill -0 "$sf_pid" 2>/dev/null; then
            echo "FAIL: serve_failure server exited before serving"
            tail -20 /tmp/serve_failure.run.log
            exit 1
          fi
          sf_crash_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:8199/crash || echo "000")
          if [ "$sf_crash_code" != "500" ]; then
            echo "FAIL: /crash returned '$sf_crash_code', expected 500 (#5261)"
            kill "$sf_pid" 2>/dev/null || true
            tail -20 /tmp/serve_failure.run.log
            exit 1
          fi
          if ! grep -q "\[lyric-web\] request handling failed" /tmp/serve_failure.run.log; then
            echo "FAIL: missing [lyric-web] failure line in serve_failure log (#5261)"
            kill "$sf_pid" 2>/dev/null || true
            tail -20 /tmp/serve_failure.run.log
            exit 1
          fi
          sf_health_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:8199/health || echo "000")
          if [ "$sf_health_code" != "200" ]; then
            echo "FAIL: /health returned '$sf_health_code' after a request-handler panic; server did not survive (#5261)"
            kill "$sf_pid" 2>/dev/null || true
            tail -20 /tmp/serve_failure.run.log
            exit 1
          fi
          kill "$sf_pid" 2>/dev/null || true
          wait "$sf_pid" 2>/dev/null || true
          echo "PASS"
          # Web.serveStreaming()/ResponseWriter (lyric-lang#5979): a chunk
          # written before the handler finishes must reach the client before
          # the handler produces the next one -- not be buffered until the
          # whole response is done. /stream sleeps 400ms between its two
          # chunks; time the request and require it took at least that long
          # (a buffered/instant response would come back near-instantly).
          echo "=== smoke lyric-web/tests/streaming_tests.l ==="
          "$lyric_bin" run lyric-web/tests/streaming_tests.l > /tmp/streaming.run.log 2>&1 &
          st_pid=$!
          for _ in $(seq 1 20); do
            if curl -s --max-time 1 http://127.0.0.1:8210/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          if ! kill -0 "$st_pid" 2>/dev/null; then
            echo "FAIL: streaming_tests server exited before serving"
            tail -20 /tmp/streaming.run.log
            exit 1
          fi
          stream_start=$(date +%s%N)
          curl -sN --max-time 5 -D /tmp/stream_headers.txt -o /tmp/stream_body.txt http://127.0.0.1:8210/stream
          stream_end=$(date +%s%N)
          stream_ms=$(( (stream_end - stream_start) / 1000000 ))
          if [ "$stream_ms" -lt 350 ]; then
            echo "FAIL: /stream returned in ${stream_ms}ms, expected >= 400ms (chunks were buffered, not streamed)"
            cat /tmp/stream_headers.txt
            exit 1
          fi
          if ! grep -q "chunk0" /tmp/stream_body.txt || ! grep -q "chunk1" /tmp/stream_body.txt; then
            echo "FAIL: /stream body missing expected chunk markers"
            cat /tmp/stream_body.txt
            exit 1
          fi
          if ! grep -qi "Transfer-Encoding: *chunked" /tmp/stream_headers.txt; then
            echo "FAIL: /stream response missing Transfer-Encoding: chunked"
            cat /tmp/stream_headers.txt
            exit 1
          fi
          if grep -qi "Content-Length" /tmp/stream_headers.txt; then
            echo "FAIL: /stream response set Content-Length (chunked responses must not need one up front)"
            cat /tmp/stream_headers.txt
            exit 1
          fi
          empty_body="$(curl -s --max-time 3 http://127.0.0.1:8210/empty || true)"
          if [ -n "$empty_body" ]; then
            echo "FAIL: /empty (handler that never calls writeChunk) returned a non-empty body: '$empty_body'"
            exit 1
          fi
          created_status="$(curl -s --max-time 3 -o /dev/null -w '%{http_code}' http://127.0.0.1:8210/created || true)"
          if [ "$created_status" != "201" ]; then
            echo "FAIL: /created (writeStatus(w, 201)) returned status '$created_status', expected 201"
            exit 1
          fi
          # BlockingMiddleware (lyric-lang#5985): a streaming route's middleware
          # must run and be able to reject the request before the streaming
          # handler is ever invoked -- a 403 here (not a crash from
          # NeverRunHandler's panic) proves streaming dispatch goes through
          # router.middlewares.
          blocked_status="$(curl -s --max-time 3 -o /tmp/blocked_body.txt -w '%{http_code}' http://127.0.0.1:8210/blocked || true)"
          if [ "$blocked_status" != "403" ]; then
            echo "FAIL: /blocked returned status '$blocked_status', expected 403 (BlockingMiddleware should reject before the streaming handler runs)"
            cat /tmp/blocked_body.txt
            exit 1
          fi
          if ! kill -0 "$st_pid" 2>/dev/null; then
            echo "FAIL: streaming_tests server crashed handling /blocked (NeverRunHandler's panic ran -- middleware did not block it)"
            tail -20 /tmp/streaming.run.log
            exit 1
          fi
          kill "$st_pid" 2>/dev/null || true
          wait "$st_pid" 2>/dev/null || true
          echo "PASS"

      # Test multi-package examples with `lyric test --manifest`.
      - name: Test multi-package examples
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found; skipping example tests"
            exit 0
          fi
          # Build dependency libraries
          libs="lyric-logging lyric-auth lyric-resilience lyric-otel lyric-db lyric-web lyric-health lyric-grpc"
          for lib in $libs; do
            echo "=== build dependency $lib ==="
            "$lyric_bin" build --manifest "$lib/lyric.toml" > /tmp/"$lib".log 2>&1 || { tail -20 /tmp/"$lib".log; exit 1; }
          done
          # Test each example
          for ex in rbac ledger jobqueue product-catalog; do
            echo "=== test examples/$ex ==="
            "$lyric_bin" test --manifest "examples/$ex/lyric.toml" > /tmp/"$ex".test.log 2>&1 \
              && echo "PASS" || { echo "FAIL"; cat /tmp/"$ex".test.log; exit 1; }
          done

      # BuildInfo well-known `version` auto-injection (docs/60 §9.2, #5852): a
      # project build with `[package].version` in lyric.toml populates
      # `BuildInfo.version` with NO `--define`. Non-background (this job has
      # Java 21 + project-build infra); asserted end-to-end on dotnet and jvm.
      - name: BuildInfo project version + --define (docs/60 §9.2, #5852)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found; skipping BuildInfo project version test"
            exit 1
          fi
          proj="$(mktemp -d)"
          mkdir -p "$proj/src"
          cat > "$proj/lyric.toml" <<'TOML'
          [package]
          name = "biverproj"
          version = "4.5.6"

          [project]
          name = "biverproj"
          output = "single"
          output_assembly = "biverproj.dll"

          [project.packages]
          "biverproj" = "src/main.l"
          TOML
          cat > "$proj/src/main.l" <<'LYR'
          package biverproj

          import Std.Console
          import Std.BuildInfo

          @build_const("greeting")
          val GREETING: String = "default-greeting"

          func main(): Int {
            val bi = buildInfo()
            println("version=" + bi.version)
            println("greeting=" + GREETING)
            0
          }
          LYR
          # (M1d) project build with NO --define: BuildInfo.version auto-injected
          # from the manifest; @build_const keeps its in-source fallback.
          echo "=== dotnet project build (manifest version=4.5.6, no --define) ==="
          "$lyric_bin" build --manifest "$proj/lyric.toml"
          out="$(dotnet "$proj/bin/biverproj.dll")"
          echo "dotnet: $out"
          echo "$out" | grep -qx "version=4.5.6"          || { echo "::error::dotnet project build did not auto-inject BuildInfo.version from the manifest"; exit 1; }
          echo "$out" | grep -qx "greeting=default-greeting" || { echo "::error::@build_const fallback wrong on project build"; exit 1; }
          echo "=== jvm project build (no --define) ==="
          "$lyric_bin" build --manifest "$proj/lyric.toml" --target jvm -o "$proj/biverproj.jar"
          outj="$(java -jar "$proj/biverproj.jar")"
          echo "jvm: $outj"
          echo "$outj" | grep -qx "version=4.5.6" || { echo "::error::jvm project build did not auto-inject BuildInfo.version from the manifest"; exit 1; }
          # (phase C, #5852) project build WITH --define: user --define overrides
          # the well-known manifest version, and substitutes the @build_const.
          echo "=== dotnet project build WITH --define (override) ==="
          "$lyric_bin" build --manifest "$proj/lyric.toml" --define version=9.9.9 --define greeting=hello-project
          outd="$(dotnet "$proj/bin/biverproj.dll")"
          echo "dotnet(--define): $outd"
          echo "$outd" | grep -qx "version=9.9.9"        || { echo "::error::project --define version did not override the manifest well-known version"; exit 1; }
          echo "$outd" | grep -qx "greeting=hello-project" || { echo "::error::project --define did not substitute the @build_const"; exit 1; }
          echo "=== jvm project build WITH --define (override) ==="
          "$lyric_bin" build --manifest "$proj/lyric.toml" --target jvm --define version=7.7.7 --define greeting=jvm-greet -o "$proj/biverproj.jar"
          outjd="$(java -jar "$proj/biverproj.jar")"
          echo "jvm(--define): $outjd"
          echo "$outjd" | grep -qx "version=7.7.7"     || { echo "::error::jvm project --define version did not override the manifest version"; exit 1; }
          echo "$outjd" | grep -qx "greeting=jvm-greet" || { echo "::error::jvm project --define did not substitute the @build_const"; exit 1; }
          # (M1f, #5852) well-known `target` define auto-injected in pipeParseAndErase
          # with NO --define: @build_const("target") resolves to the active backend
          # name on each target, and an explicit --define target=… still overrides it.
          # Single-file (the injection is not manifest-sourced, unlike `version`).
          cat > "$proj/src/tgt.l" <<'LYR'
          package tgtprobe

          @build_const("target")
          val TARGET: String = "unknown"

          func main(): Int {
            println("target=" + TARGET)
            0
          }
          LYR
          echo "=== dotnet single-file @build_const(\"target\") (no --define) ==="
          "$lyric_bin" build "$proj/src/tgt.l" -o "$proj/tgt.dll"
          outt="$(dotnet "$proj/tgt.dll")"
          echo "dotnet: $outt"
          echo "$outt" | grep -qx "target=dotnet" || { echo "::error::well-known target define not auto-injected on dotnet (#5852 M1f)"; exit 1; }
          echo "=== jvm single-file @build_const(\"target\") (no --define) ==="
          "$lyric_bin" build "$proj/src/tgt.l" --target jvm -o "$proj/tgt.jar"
          outtj="$(java -jar "$proj/tgt.jar")"
          echo "jvm: $outtj"
          echo "$outtj" | grep -qx "target=jvm" || { echo "::error::well-known target define not auto-injected on jvm (#5852 M1f)"; exit 1; }
          echo "=== dotnet --define target=custom (override) ==="
          "$lyric_bin" build "$proj/src/tgt.l" --define target=custom -o "$proj/tgt2.dll"
          outtc="$(dotnet "$proj/tgt2.dll")"
          echo "dotnet(--define): $outtc"
          echo "$outtc" | grep -qx "target=custom" || { echo "::error::explicit --define target did not override the well-known target (#5852 M1f)"; exit 1; }
          # (M1h, #5852) well-known `build_profile` define: `debug` on a normal
          # build (pipeParseAndErase fallback), overridable by --define. The
          # `release`-on-a-real-`--release`-build case needs clang/ILCompiler, so
          # it is asserted in the dedicated `aot-smoke` job (which installs those
          # prerequisites), not here in the `build` job.
          cat > "$proj/src/prof.l" <<'LYR'
          package profprobe

          import Std.BuildInfo

          func main(): Int {
            println("profile=" + buildInfo().profile)
            0
          }
          LYR
          echo "=== dotnet normal build (expect profile=debug) ==="
          "$lyric_bin" build "$proj/src/prof.l" -o "$proj/prof.dll"
          outp="$(dotnet "$proj/prof.dll")"
          echo "dotnet: $outp"
          echo "$outp" | grep -qx "profile=debug" || { echo "::error::normal build did not auto-inject build_profile=debug (#5852 M1h)"; exit 1; }
          echo "=== dotnet --define build_profile=release (override) ==="
          "$lyric_bin" build "$proj/src/prof.l" --define build_profile=release -o "$proj/prof2.dll"
          outpo="$(dotnet "$proj/prof2.dll")"
          echo "dotnet(--define): $outpo"
          echo "$outpo" | grep -qx "profile=release" || { echo "::error::--define build_profile did not override the debug fallback (#5852 M1h)"; exit 1; }
          echo "BuildInfo project version + --define OK (dotnet + jvm: no-define 4.5.6; --define override 9.9.9/7.7.7 + @build_const; well-known target dotnet/jvm + override; build_profile debug/override)" >> "$GITHUB_STEP_SUMMARY"

      # Prove proof-only examples.
      - name: Prove proof-only examples (with z3)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found; skipping example proves"
            exit 0
          fi
          for ex in pagination prove_demo token_bucket_proof; do
            echo "=== prove examples/$ex.l ==="
            "$lyric_bin" prove "examples/$ex.l" > /tmp/"$ex".prove.log 2>&1 \
              && echo "PASS" || { echo "FAIL"; tail -20 /tmp/"$ex".prove.log; exit 1; }
          done

      # Band 5 invariant guardrail (#3067): assert that no stage-1 DLL carries
      # an AssemblyRef entry for Lyric.Emitter or FSharp.Core.  These were
      # removed in #3062; a future kernel module accidentally reintroducing an
      # @externTarget to either assembly would otherwise only fail at program
      # startup with a FileNotFoundException.  The check parses ECMA-335 metadata
      # (#Strings heap) via Python — no external tooling required.
      - name: Check stage-1 DLLs have no AssemblyRef to Lyric.Emitter or FSharp.Core (#3067)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: bash scripts/check_assembly_refs.sh .bootstrap/stage1

      # Stage the self-hosted compiler as a single Lyric.Compiler.dll bundle for
      # the downstream compiler-self-tests-* jobs.  Each @test_module links the
      # bundle as one restored dep, so its Lyric.* imports resolve inside ONE
      # assembly — sidestepping the per-package cross-package emission corruption
      # (docs/41 §R7) that mis-parses even `package P`.  The bundle also carries
      # each package's `pub val` constants (the original #3086 reason for staging).
      - name: Stage self-hosted compiler bundle
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          bin_dir="$(dirname "$lyric_bin")"
          bash scripts/stage-selfhosted-compiler.sh "$lyric_bin" "$bin_dir" .bootstrap/stage1

      - name: Upload build artifacts
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifacts
          path: |
            .bootstrap/stage1
            bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}
          retention-days: 1

  # Static lint over every workflow file under .github/workflows/. Catches
  # structural bugs (bad expressions, unreachable jobs, invalid needs/if
  # combinations) that YAML parsing alone can't see -- e.g. the implicit
  # success()-over-transitive-needs bug that silently skipped
  # publish.yml's publish-ecosystem job (#5579/#5580): a bare `if:` with
  # no explicit status-check function gets an implicit success() prepended
  # by GitHub Actions, and success() evaluates over the transitive needs
  # chain, not just the job's direct needs (actions/runner#2205). No
  # `needs:`/`has_code_changes` gate -- this is independent of the app
  # build and cheap enough to run unconditionally on every push/PR.
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Five `-ignore` patterns suppress known-benign findings rather than
      # failing on them forever silently; each is tracked in #5638 with the
      # condition under which it should be revisited:
      #   1/2. `background:`/`wait-all:` are official GitHub Actions step
      #      keys (parallel steps, shipped 2026-06-25; see the changelog link
      #      in the "Parallel step execution" comment further down, verified
      #      in #5941 -- an earlier version of this comment wrongly called
      #      them repo-custom extended-runner keys) -- actionlint validates
      #      against a schema that predates the feature and has no notion of
      #      them, so a step using one always trips two separate findings:
      #      "unexpected key" for the key itself, and "step must run script
      #      with" because actionlint doesn't recognize it as a valid step
      #      body (in place of `run:`/`uses:`). Same root cause; not a bug;
      #      revisit when actionlint's schema catches up.
      #   3. gemini-teammate.yaml's `on:` trigger is deliberately commented
      #      out (integration disabled) -- revisit if/when it's restored.
      #   4. publish.yml's `matrix.authenticode` is only defined on the
      #      commented-out win-x64 matrix entry (#3941) -- revisit once
      #      win-x64 is re-enabled.
      #   5. bench.yml's job-level `env:` references `${{ env.BUILD_CONFIG }}`
      #      (a workflow-level env var) from within another job-level `env:`
      #      key -- the `env` context isn't available there per GitHub's own
      #      context-availability table, a genuine pre-existing bug. Fixing
      #      it correctly needs the `LYRIC_BIN` computation moved to step
      #      level (or every step's `run:` switched to shell-expand
      #      `$BUILD_CONFIG` directly) and a real bench run to confirm the
      #      fix doesn't change the resolved binary path -- deferred so as
      #      not to risk breaking the benchmark workflow blind; tracked
      #      in #5638.
      # `-shellcheck=` (empty) disables actionlint's embedded shellcheck pass:
      # this is the first time actionlint has run over this repo's ~6000
      # lines of workflow `run:` scripts, and shellcheck alone surfaces
      # dozens of pre-existing info/warning-level nits (SC2086, SC2015,
      # SC2155, ...) scattered across many files -- an unrelated cleanup
      # far larger than this change, tracked in #5638. The structural
      # checks actionlint was added for (#5579/#5580) don't depend on
      # shellcheck and stay fully active.
      - name: Run actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667  # 1.7.12
        with:
          args: -color -shellcheck= -ignore "unexpected key .(background|wait-all).|step must run script with|.on. section is missing in workflow|property .authenticode. is not defined in object type|context .env. is not allowed here"

  # The bundled Maven resolver (resolver/pom.xml) that `lyric restore
  # --target jvm` shells out to for `[maven]` dependency resolution
  # (docs/44-jvm-production-readiness-plan.md finding M-7) was previously
  # only ever built at publish time (the "Build Maven resolver jar" step in
  # publish.yml) -- a broken resolver/ change could sit unbuilt through CI
  # and only surface at release (#5346).  Build it here too so a broken
  # resolver/ change fails fast on the PR that introduces it.
  resolver-build:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Maven resolver jar
        run: make maven-resolver

  # Stage-2 (self-hosted rebuild) toolchain, built once and shared with any
  # downstream job step that needs it.  Most compiler-internal codegen fixes
  # (e.g. a `@externTarget` signature-encoding fix inside the compiler's own
  # `_kernel/kernel.l` files) only take effect once the compiler recompiles
  # *itself* with the fix already applied — stage-1 is built BY the external,
  # published stage-0 seed release, which necessarily predates any fix landing
  # in this PR, so stage-1 cannot exercise such a fix even though the source
  # is correct (D125 follow-up, System.Single `bufMsilType` gap). Runs
  # independently in parallel with the other test jobs; only the handful of
  # `compiler-self-tests-jvm` steps that actually need it wait on this job.
  build-stage2:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    # Its only real consumer is compiler-self-tests-jvm (build-and-test's
    # `needs` on it is always()-gated and immune to cascade-skip) — shares
    # that job's has_jvm_ecosystem_changes gate exactly, not the narrower
    # has_core_changes, so a lyric-web/storage/resilience/auth-only change
    # can't leave compiler-self-tests-jvm auto-skipped by GitHub's default
    # cascade-skip-on-skipped-need behavior despite its own `if:` wanting
    # to run.
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_jvm_ecosystem_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bootstrap/**/*.fsproj', 'bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Bootstrap stage 2 (download stage-0 release → self-hosted stage 1 → self-hosted stage 2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/bootstrap.sh --stage 2

      - name: Verify stage-2 toolchain runs
        run: |
          set -euo pipefail
          if [ ! -x .bootstrap/stage2/bin/lyric ]; then
            echo "::error::stage 2 binary missing after bootstrap.sh --stage 2"
            exit 1
          fi
          LYRIC_STDLIB_BIN="$PWD/.bootstrap/stage2/lib" .bootstrap/stage2/bin/lyric --version

      - name: Upload stage-2 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: stage2-artifacts
          path: .bootstrap/stage2
          retention-days: 1

  # Self-hosted-emitter IL-validity gate (#3943).  Required by `build-and-test`.
  # Emits the whole Lyric.Cli closure with the self-hosted emitter and runs
  # `ilverify` over every DLL, catching self-hosted-emitter IL bugs the mint
  # build cannot (union match-arm type tracking, value-erased-to-object, list
  # element-type confusion).  Zero IL-validity errors reached at #3943; this
  # job now gates auto-merge so the emitter cannot regress silently.  Developers
  # run the same check locally via `make ilverify`.
  #
  # NOTE (#4370): job id renamed from `ilverify-informational` to
  # `ilverify-required` — the old name implied a non-blocking/advisory check,
  # which was wrong even before this job started gating `build-and-test`. Pure
  # rename; no functional change. If GitHub branch-protection "required status
  # checks" on `main` reference the literal string `ilverify-informational`,
  # that setting must be updated to `ilverify-required` (Settings → Branches →
  # main → required status checks) or PRs will show this check as perpetually
  # missing/blocked — repo-admin-only, not verifiable or fixable from here.
  ilverify-required:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      - name: ilverify self-hosted emitter IL (required gate, #3943)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          bash scripts/ilverify-selfhosted.sh "bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"

  # Epic #1877 Stage 2+ zero-overhead gate for closure class synthesis (both targets).
  # These jobs compile closure_zero_overhead_self_test.l and disassemble the
  # resulting IL/bytecode to count BOX instructions (MSIL) and boxing calls (JVM).
  #
  # Stage 2+ required gates: zero-boxing must be maintained (continue-on-error: false).
  # These jobs verify that closure class synthesis avoids boxing overhead for primitive
  # captures. Fails if any BOX instructions (MSIL) or valueOf calls (JVM) are found.
  #
  #   scripts/assert-no-box-msil.sh ./bin/lyric 2   (Stage 2 gate)
  closure-zero-overhead-msil:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    continue-on-error: false  # Stage 2+: required gate — zero boxing must be maintained
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        shell: bash
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      - name: Install dotnet-ildasm tool
        run: dotnet tool install --tool-path .tools dotnet-ildasm || true
      - name: Measure MSIL BOX instructions (epic #1877 Stage 2+ zero-overhead gate)
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          bash scripts/assert-no-box-msil.sh "bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric" 2 || exit_code=$?
          exit_code=${exit_code:-0}
          # Exit code 77 means skip (ildasm unavailable); this is not a failure
          if [[ $exit_code -eq 77 ]]; then
            echo "INFO: MSIL boxing test skipped (ildasm not available)"
            exit 0
          fi
          exit $exit_code

  closure-zero-overhead-jvm:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    continue-on-error: false  # Stage 2+: required gate — zero boxing must be maintained
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      - name: Measure JVM boxing calls (epic #1877 Stage 2+ zero-overhead gate)
        working-directory: ${{ github.workspace }}
        run: |
          bash scripts/assert-no-box-jvm.sh "bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric" 2 || exit_code=$?
          exit_code=${exit_code:-0}
          # Exit code 77 means skip (javap unavailable); this is not a failure
          if [[ $exit_code -eq 77 ]]; then
            echo "INFO: JVM boxing test skipped (javap not available)"
            exit 0
          fi
          exit $exit_code

  # Placeholder job retained for workflow structure. The F# test suites
  # (Lexer, Parser, TypeChecker, Emitter, CLI) were deleted when the F#
  # bootstrap compiler was decommissioned in favor of bootstrap-from-release.
  # Self-hosted compiler tests now run directly in compiler-self-tests-dotnet-*
  # jobs via native `lyric test`.
  test-bootstrap:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Z3 (for the Phase 4 verifier smoke tests)
        run: sudo apt-get update && sudo apt-get install -y z3
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

  compiler-self-tests-dotnet-a:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - name: Redirect temporary directory to prevent SIGBUS RAM disk exhaustion
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      - name: Install Z3 (verifier_self_test's protected-entry range goal needs a real solver)
        run: sudo apt-get update && sudo apt-get install -y z3

      # Parallel step execution — `background: true` / `wait-all: true`
      # ---------------------------------------------------------------
      # `background: true` on a step launches it asynchronously: the runner
      # immediately starts the next step without waiting for this one to finish.
      # `wait-all: true` on a later step acts as a barrier: it blocks until every
      # previously launched background step has exited, then propagates any
      # non-zero exit codes as a job failure.  These are first-class, recognised
      # runner step properties — not unknown YAML keys that are silently ignored
      # or converted to no-ops.  An unrecognised top-level step key would cause
      # workflow-validation failure before any job starts.
      #
      # Official changelog and documentation:
      #   https://github.blog/changelog/2026-06-25-actions-steps-can-now-be-run-in-parallel/
      #
      # Runner support: shipped 2026-06-25 for ubuntu-latest.  No explicit runner
      # version pin is required — the feature is available on the same ubuntu-latest
      # image that this repository already uses for all CI jobs.
      #
      # Empirical verification: this PR's own CI run completed successfully with all
      # `background: true` test steps executing concurrently and each `wait-all: true`
      # barrier correctly collecting their results.  The PR was auto-promoted from
      # draft to ready-for-review by the CI gate workflow, which only fires after
      # every required check passes — confirming the runner honours both properties.
      #
      # Peak concurrency (#4486, #4841): each `background: true` step runs an
      # in-process self-hosted compilation (Msil.Bridge / Jvm.Bridge) via `lyric
      # test`.  This group was once a single ~36-38-step batch; PR #4810 hit the
      # failure mode this comment anticipated (concurrent-output/status corruption
      # for unrelated, already-passing steps, reproducible across CI runs) and
      # split it into two ~18-step batches.  Even ~18-28-step batches kept
      # intermittently misreporting a passing step as failed (map_enhancements,
      # Defer, etc.), so the batches were split further to ~14 steps each — the
      # empirically reliable cap — via the extra barriers below (and the matching
      # splits in the dotnet-b, jvm, and crosspackage self-test jobs). If a future
      # addition pushes a batch back above ~14, split it again rather than
      # reverting to fully sequential steps.
      - name: Weaver self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping weaver self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping weaver self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/weaver_self_test.l

      # Self-hosted compiler self-tests (native lyric test) — replaces the
      # deleted F# `SelfHosted*Tests.fs` Expecto wrappers (#2364).  Each
      # `@test_module` imports its `Lyric.*` compiler package(s), resolved by
      # linking the already-compiled stage-1 bundle DLLs as restored deps; no
      # recompile-from-source `LYRIC_LOAD_COMPILER=1`.  Run as one step so a
      # missing-stage-1 / missing-binary guard is shared.
      - name: Compiler self-tests (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping compiler self-tests"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping compiler self-tests"
            exit 1
          fi
          ran=""
          for t in \
            lyric-compiler/lyric/lexer_self_test.l \
            lyric-compiler/lyric/parser_self_test.l \
            lyric-compiler/lyric/typechecker_self_test.l \
            lyric-compiler/lyric/modechecker_self_test.l \
            lyric-compiler/lyric/contract_elaborator_self_test.l \
            lyric-compiler/lyric/cfg_self_test.l \
            lyric-compiler/lyric/cfg_single_file_self_test.l \
            lyric-compiler/lyric/build_defines_self_test.l \
            lyric-compiler/lyric/derives_self_test.l \
            lyric-compiler/lyric/mono_self_test.l \
            lyric-compiler/lyric/result_generic_specialization_self_test.l \
            lyric-compiler/lyric/alias_impl_self_test.l \
            lyric-compiler/lyric/quantifier_ident_self_test.l \
            lyric-compiler/lyric/range_subtype_self_test.l \
            lyric-compiler/lyric/fmt_self_test.l \
            lyric-compiler/lyric/async_generator_self_test.l \
            lyric-compiler/lyric/class_encoding_self_test.l \
            lyric-compiler/lyric/hof_type_propagation_self_test.l \
            lyric-compiler/lyric/typechecker_extern_dedup_self_test.l \
            lyric-compiler/lyric/generic_extern_self_test.l \
            lyric-compiler/lyric/enum_msil_self_test.l \
            lyric-compiler/lyric/contract_meta_self_test.l \
            lyric-compiler/lyric/restored_packages_self_test.l \
            lyric-compiler/lyric/test_synth_self_test.l \
            lyric-compiler/lyric/manifest_self_test.l \
            lyric-compiler/lyric/cli_restore_self_test.l \
            lyric-compiler/lyric/cli_version_self_test.l \
            lyric-compiler/lyric/version_self_test.l \
            lyric-compiler/lyric/cli_workspace_builder_self_test.l \
            lyric-compiler/lyric/cli_build_self_test.l \
            lyric-compiler/lyric/cli_shared_self_test.l \
            lyric-compiler/lyric/cli_copydll_self_test.l \
            lyric-compiler/lyric/cli_publish_self_test.l \
            lyric-compiler/lyric/verifier_self_test.l \
            lyric-compiler/lyric/closure_correctness_self_test.l \
            lyric-compiler/lyric/func_val_local_rettype_self_test.l \
            lyric-compiler/lyric/qualified_enum_case_self_test.l \
            lyric-compiler/lyric/qualified_union_case_self_test.l \
            lyric-compiler/lyric/slice_append_widening_self_test.l \
            lyric-compiler/lyric/pconstructor_typed_binding_self_test.l \
            lyric-compiler/lyric/nested_constructor_pattern_self_test.l \
            lyric-compiler/lyric/record_omitted_default_self_test.l \
            lyric-compiler/lyric/slice_byte_lambda_arg_self_test.l \
            lyric-compiler/lyric/app_host_self_test.l \
            lyric-compiler/lyric/deflate_zip_self_test.l \
            lyric-compiler/lyric/generator/generator_self_test.l \
            lyric-compiler/lyric/jvm_trycatch_bridge_self_test.l \
            lyric-compiler/lyric/jvm_impl_extern_class_self_test.l ; do
            echo "=== $t ==="
            bash scripts/ci-retry-on-signal.sh "$lyric_bin" test "$t"
            ran="$ran $t"
          done
          echo "Compiler self-tests ran:$ran" >> "$GITHUB_STEP_SUMMARY"

      # CfgGate self-test — exercises `Lyric.CfgGate` via native `lyric test`.
      # Compiler-package imports are resolved by linking the stage-1 bundle
      # DLLs (#2364); no `LYRIC_LOAD_COMPILER=1` recompile.  Covers #1123
      # (comment-aware @cfg detection) and #1124 (single stub for all-gated
      # directory packages).
      - name: CfgGate self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping cfg_gate self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping cfg_gate self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/cfg_gate_self_test.l

      # Bitwise self-test — first executable regression test for a
      # self-hosted-only *language feature* (the `.and/.or/.xor/.shl/.shr`
      # integer methods, #1610).  Run via native `lyric test`, which
      # synthesises a program from the `test` blocks and compiles it
      # in-process through the self-hosted `Msil.Bridge` (the F# stage-0
      # emitter can't parse keyword-named methods — `x.xor(y)` -> P0081),
      # then executes it and asserts every runtime value.  Resolves the
      # MSIL half of issue #1611 with no new F#.  No `LYRIC_LOAD_COMPILER=1`
      # here: this module imports only `Std.*`, not the compiler packages.
      - name: Bitwise self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping bitwise self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping bitwise self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/bitwise_self_test.l
      # Bool stringification cross-target parity (#5552): toString(Bool),
      # Bool.toString(), string concatenation, and string interpolation all
      # render lowercase "true"/"false" on both targets — the BCL's
      # Boolean.ToString() would otherwise render "True"/"False" on
      # `--target dotnet` while Java's String.valueOf(boolean) renders
      # lowercase on `--target jvm`, a target-dependent divergence. The
      # dotnet half of the MSIL/JVM agreement check; the JVM half runs
      # alongside `bitwise_self_test.l` (see the JVM self-tests job below).
      - name: Bool stringification self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping bool_tostring self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping bool_tostring self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/bool_tostring_self_test.l

      # Extra barrier (batch 1-pre-split, #5933): this first background group
      # ran 11 concurrent in-process compilations and produced one of the four
      # observed exit-135 random step kills (docs/58 wire/config-template, on
      # PR #5926's re-run — a comment-only diff, so not code-caused): the
      # runner kills one concurrent step mid-run with SIGBUS-class exit 135
      # and no diagnostic under memory pressure. Split into 5 + 6.
      # Per the header note: split, don't serialize.
      - name: Wait for parallel tests (batch 1-pre-split)
        wait-all: true

      # Std.BuildInfo self-tests (docs/60 §9.2) run as their OWN small batch,
      # deliberately kept out of the "batch 1-pre-split" group above so that
      # group stays at its #5933 5-step size (the 5 + 6 split that avoids the
      # exit-135 SIGBUS concurrency kill is preserved).
      # Std.BuildInfo synthesis (docs/60 §9.2): the compiler synthesizes a
      # `buildInfo()` accessor into a file that imports Std.BuildInfo. Asserts
      # the deterministic dev-checkout defaults at runtime (no `--define` under
      # `lyric test`). Imports only `Std.*`. The JVM twin runs in the JVM
      # self-tests job below.
      - name: BuildInfo self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping BuildInfo self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping BuildInfo self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/buildinfo_self_test.l

      # BuildInfo `--define` runtime path (docs/60 §9.2): asserts that
      # `--define`-supplied `version` / `build_profile` / `git_hash` actually
      # flow through the synthesized `buildInfo()` accessor to runtime values.
      # `buildinfo_self_test.l` covers only the default-fallback path (`lyric
      # test` threads no `--define`); this closes the gap for the supplied path
      # on dotnet. The JVM twin of this step lives in the `compiler-self-tests-jvm`
      # job (which has Java 21); the native twin is the "Native --define build"
      # step in `native-backend-self-tests` (#5977 closed).
      #
      # The fixture deliberately imports ONLY `Std.BuildInfo` (+ `Std.Console`
      # for `println`) and NOT `Std.Core`, so it also guards #5949: the
      # synthesized body's `Some`/`None` are core-prelude builtins (resolved via
      # `symTableTryFindOne`, not the file's own import scope), so no `import
      # Std.Core` injection is needed. The `--define git_hash` forces the `Some`
      # branch into the synthesized body, exercising exactly that resolution.
      - name: BuildInfo --define runtime path (native lyric build --define)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping BuildInfo --define runtime test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping BuildInfo --define runtime test"
            exit 1
          fi
          work="$(mktemp -d)"
          fixture="$work/bi_define_fixture.l"
          cat > "$fixture" <<'LYR'
          package BiDefineFixture

          import Std.Console
          import Std.BuildInfo

          func fmtOpt(o: in Option[String]): String {
            match o {
              case Some(s) -> s
              case None -> "<none>"
            }
          }

          func main(): Int {
            val bi = buildInfo()
            println("V=" + bi.version)
            println("P=" + bi.profile)
            println("G=" + fmtOpt(bi.gitHash))
            0
          }
          LYR
          out="$work/bi_define_fixture.dll"
          "$lyric_bin" build --define version=7.7.7 --define build_profile=release --define git_hash=abcdef "$fixture" -o "$out" --force
          result="$(dotnet "$out")"
          echo "$result"
          echo "$result" | grep -qx "V=7.7.7"  || { echo "::error::version define not injected into BuildInfo"; exit 1; }
          echo "$result" | grep -qx "P=release" || { echo "::error::build_profile define not injected into BuildInfo"; exit 1; }
          echo "$result" | grep -qx "G=abcdef" || { echo "::error::git_hash define not wrapped into BuildInfo.gitHash"; exit 1; }
          echo "BuildInfo --define runtime path OK (V=7.7.7 P=release G=abcdef)" >> "$GITHUB_STEP_SUMMARY"

      # Extra barrier (BuildInfo batch): keeps the two BuildInfo steps above
      # off the adjacent already-at-cap batches (#5933/#5967).
      - name: Wait for parallel tests (BuildInfo dotnet batch)
        wait-all: true

      # `println(Bool)` cross-target parity (#5666, a `bool_tostring_self_test.l`
      # gap since @test_module assertions can't capture stdout): `println` is
      # a polymorphic codegen builtin (unlike `print`, which stays String-only
      # until it's added to `isCodegenBuiltinName`), so `println(true)` type-
      # checks and previously rendered the BCL's `Console.WriteLine(bool)`
      # "True" on dotnet where JVM's `PrintStream.println(boolean)` already
      # renders lowercase "true".
      - name: println(Bool) lowercase parity self-test (dotnet)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping println(Bool) self-test"
            exit 1
          fi
          dir="$(mktemp -d)"
          cat > "$dir/printbool.l" <<'LYRIC'
          package PrintBool
          func main(): Unit {
            println(true)
            println(false)
          }
          LYRIC
          out="$("$lyric_bin" run --target dotnet "$dir/printbool.l" 2>&1)" || { echo "::error::println(Bool) program failed to run"; echo "$out"; exit 1; }
          for expect in "true" "false"; do
            if ! grep -qx "$expect" <<< "$out"; then
              echo "::error::expected '$expect' in println(Bool) output, got:"; echo "$out"; exit 1
            fi
          done
          echo "OK: println(Bool) renders lowercase true/false on dotnet."

      # Unsigned Byte semantics (docs/59 §4.3): division/modulo, every
      # compound-assignment path, and the >= 128 canonicalization cases
      # (List/slice round-trips, unsigned ordering, wraparound, boxing).
      # The MSIL half of the MSIL/JVM agreement check — the JVM half runs in
      # the compiler-self-tests-jvm job.
      - name: Byte-arithmetic self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping byte-arithmetic self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping byte-arithmetic self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/byte_arithmetic_self_test.l

      # Typed FFI delegate bridging (Epic #1877/#3923 FFI-boundary slice):
      # dotnet-only — the feature is MSIL-specific (SocketsHttpHandler is a
      # BCL type; the fix lives entirely in Msil.Codegen), no JVM analog.
      - name: Typed FFI delegate self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping typed FFI delegate self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping typed FFI delegate self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/typed_ffi_delegate_self_test.l

      # docs/58 (D121) self-tests, one step to keep this batch's background
      # concurrency where it was (#4486/#4841 corruption guidance): the
      # wire-expander unit suite (config templates, contributes[T], include
      # splicing, the full W0010–W0026 diagnostic surface — links the
      # stage-1 DLLs as restored deps like the weaver self-test), the
      # wire-templates RUNTIME suite (real expanded wires through the #5021
      # MSIL wire ABI; JVM half runs in the JVM job), the config-templates
      # RUNTIME suite (dotnet only — the JVM IConfig emission gap is
      # pre-existing, #3228), and the wire-DI suite on dotnet (the #5021
      # fix's direct regression test; JVM half already runs in the JVM job).
      - name: docs/58 wire/config-template self-tests (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping docs/58 self-tests"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping docs/58 self-tests"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/wire_expand_self_test.l
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/wire_templates_self_test.l
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/config_templates_self_test.l
