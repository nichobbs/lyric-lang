      # Auto-FFI metadata-resolution self-test — exercises the self-hosted
      # MSIL emitter resolving `ExternTypeName.method(args)` calls against
      # real .NET reference-assembly metadata (epic #1622, Phase 3c) and
      # emitting the real MemberRef instead of the legacy guess.  Run via
      # native `lyric test`: the program is compiled in-process through the
      # self-hosted `Msil.Bridge`, whose codegen reads the reference pack at
