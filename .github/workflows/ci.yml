      # Generic-codegen self-test on JVM (J4 M-1, epic #2663 / #2667 / #1707).
      # Pins the erased-generics correctness fix: generic `Result`/`Option` and
      # user generic records/unions now construct (boxing primitive payloads
      # into the `Object` field) and match-extract (checkcast + unbox the payload
      # to the binding's concrete type) without VerifyError, and the
      # `?`-propagation runtime runs on the JVM.  Imports only `Std.*`, so no
