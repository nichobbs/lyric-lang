          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping list-value-compare self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/list_value_compare_self_test.l

      # Equality self-test — #1480 (partial).  `==`/`!=` on a record / distinct
      # type with `@derive(Equals)` now dispatches to the synthesised structural
      # `equals` (it reaches codegen only after #1796); records are no longer
      # compared by reference.  Run via native `lyric test` (in-process through
      # Msil.Bridge).
      - name: Equality self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping equality self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping equality self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/equality_self_test.l

      # Map-key self-test — #1480.  Records with `@derive(Equals)` +
      # `@derive(Hash)` now carry synthesised `Object.Equals`/`GetHashCode`
      # overrides, so field-equal instances are the same BCL `Map` key.  Run
      # via native `lyric test` (in-process through Msil.Bridge).
      - name: Map-key self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping map-key self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping map-key self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/map_key_self_test.l

      # Map-value self-test — #1835.  `Map[K, ValueType]` values read correctly
      # in hint-less positions (`match mapGet(m, k)`, `m[k]`) — the value type
      # is tracked + unboxed instead of erasing to `Option<object>`.  Run via
      # native `lyric test` (in-process through Msil.Bridge).
      - name: Map-value self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping map-value self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping map-value self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/map_value_self_test.l

      # Impl-method self-test — #1784.  Interface/impl methods with value-type
      # parameters (`Int`/`Bool`/`Double`/`Char`) — and `?`/early-`return` in
      # their bodies — dispatch correctly (value-type args are no longer boxed
      # against the value-type param signature).  Run via native `lyric test`.
      - name: Impl-method self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping impl-method self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping impl-method self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/impl_method_self_test.l

      # Alias-rewriter self-test — #1834.  The package-alias rewriter
      # (`Lyric.AliasRewriter`) now descends into the compound item kinds
      # (IImpl / IInterface / IUnion and friends), so an `import X as Y`
      # reference inside an `impl` method body, an interface method signature,
      # or a union case payload resolves instead of tripping T0020.  Run via
      # native `lyric test` (in-process through Msil.Bridge).  Imports only
      # `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Alias-rewriter self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping alias-rewriter self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping alias-rewriter self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/alias_rewriter_self_test.l

      # Ensures self-test — #1871.  `ensures:` contract clauses now compile and
      # run through the self-hosted MSIL path: the contract elaborator's
      # synthesised `let __lyric_result_<n> = …` binding no longer NREs in
      # codegen (the bare `None` ty field that widened to `Option[obj]` is now
      # pinned).  Run via native `lyric test` (in-process through Msil.Bridge).
      # Imports only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Ensures self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping ensures self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping ensures self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/ensures_self_test.l

      # Mono-shadow self-test — #1855.  A user-defined function now shadows an
      # imported generic of the same bare name in the monomorphizer, so calling
      # a local `func tag(o: Option[Int]): Int` (which collides with the stdlib
      # proof generic `Std.Core.tag[T]`) via an annotated local no longer
      # mis-specialises into a broken identity stub (invalid IL).  Run via
      # native `lyric test` (in-process through Msil.Bridge, which seeds the
      # monomorphizer with the stdlib generics as imports).  Imports only `Std.*`.
      - name: Mono-shadow self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping mono-shadow self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping mono-shadow self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/mono_shadow_self_test.l

      # Mono-shadow self-test is dotnet-only (#2000).  Although the module
      # imports only Std.*, the JVM backend currently emits invalid stackmap
      # frames for its monomorphised generic call shapes (the class fails JVM
      # verification), so `--target jvm` cannot run it yet.  JVM monomorphisation
      # parity is tracked under the JVM-backend remediation in docs/41.

      # CLI did-you-mean suggestion self-test — exercises Lyric.CliSuggest
      # (editDistance / suggestCommand) via native `lyric test`.  The
      # Lyric.CliSuggest compiler-package import is resolved by linking the
      # stage-1 bundle DLLs (#2364); no `LYRIC_LOAD_COMPILER=1` recompile.
      # Pure logic (Std.Core/Collections only), so it runs cleanly through the
      # in-process bundle.  Part of the ecosystem-DX epic #1968 (#1976/#1988).
      - name: CLI-suggest self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping cli-suggest self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping cli-suggest self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/cli_suggest_self_test.l

      # CLI project-aware-defaults end-to-end smoke test — exercises
      # findNearestManifest (Lyric.Discovery), the bare-`lyric` build default,
      # and the did-you-mean / --help UX through the real binary (#1968:
      # #1969/#1970/#1976/#1988).  This is the integration counterpart to the
      # cli-suggest unit self-test: findNearestManifest itself can't be a
      # `lyric test` self-test because that path can't yet run host-backed
      # stdlib (Std.File) at runtime (#2001), so we drive the behaviour
      # end-to-end via the compiled CLI instead.
      - name: Release self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping release self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping release self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/release_self_test.l

      # MSIL project bridge self-test — exercises the self-hosted multi-package
      # MSIL bridge (Msil.Bridge.compileProjectToMsil /
      # compileProjectToMsilWithFeatures) end-to-end.  Covers Phases 1–3:
      # independent bundles, cross-package function/record/union round-trips,
      # and cfg-erasure diagnostics (F0012/F0013).  Placed in lyric-compiler/
      # so the Msil.Bridge transitive closure does not overflow the F# bootstrap
      # emitter; stage-1 DLLs provide the compiler-package imports (#2888).
      - name: MSIL project bridge self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping MSIL project bridge self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping MSIL project bridge self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/msil_project_bridge_self_test.l

      # Emitter project self-test — exercises the Phase 4 in-process routing in
      # Lyric.Emitter.emitProject (multi-package DOTNET builds).  Covers aliased
      # imports, per-package isolation, @cfg erasure via emitProject, restored-dep
      # wiring, and subprocess-fallback routing (#2888).
      - name: Emitter project self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping emitter project self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping emitter project self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/emitter_project_self_test.l

      - name: Init self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping init self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/init_self_test.l

      - name: Union-in-list match self-test (native lyric test, #2126)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping union-list-match self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/union_list_match_self_test.l

      # Module-level val self-test — exercises M5.2 stage 3 (non-constant `val`
      # at package scope emitted as a static readonly field initialized in .cctor).
      # Covers both the inline ldc.i4 path (literal Int/Bool) and the ldsfld path
      # (String, binary-op results).  Imports only Std.*; no LYRIC_LOAD_COMPILER.
      - name: Module-val self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping module-val self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/module_val_self_test.l

      # @stubbable + StubCounter self-test (#1776).  Verifies the full
      # @stubbable → synthesised Stub record + impl path combined with the
      # Std.Testing.Mocking StubCounter call-count API (makeStubCounter /
      # stubCounterIncrement / stubCounterGet / stubCounterReset).  Compiled
      # in-process through the self-hosted Msil.Bridge.  Imports only Std.*;
      # no LYRIC_LOAD_COMPILER=1 needed.
      - name: Stubbable + StubCounter self-test (native lyric test, #1776)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping stubbable self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/stubbable_self_test.l

      # Culture-invariant toString(DateTime) self-test (#2184).  Pins the
      # self-hosted MSIL emitter's `toString` builtin to InvariantCulture for
      # DateTime values so stage-0 (F#) and stage-1 (self-hosted) render
      # DateTime byte-identically regardless of the CI host locale.  Compiled
      # in-process through the self-hosted `Msil.Bridge`.  Imports only
      # `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: DateTime-toString self-test (native lyric test, #2184)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping datetime-toString self-test"
            exit 1
          fi
          "$lyric_bin" test lyric-compiler/lyric/datetime_tostring_self_test.l

  # Release Native AOT end-to-end — `lyric build --release` compiles a
  # hello-world Lyric program to a self-contained native binary via
  # `dotnet publish -p:PublishAot=true` and asserts it executes correctly
  # (#1975 / D079).  Isolated into its own job because it needs clang/lld
  # for the ILCompiler linker pass and downloads the Microsoft.DotNet.ILCompiler
  # NuGet package (~200 MB) on first run.
  aot-smoke:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # ILCompiler package cache — keyed on the .NET SDK version so the
      # ~200 MB compiler package is not re-downloaded on every run.
      # restore-keys fallback on the runner.os prefix so a SDK patch-version bump
      # in global.json reuses the previous cache rather than downloading 200 MB.
      - name: Cache ILCompiler NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.nuget/packages/microsoft.dotnet.ilcompiler
          key: ${{ runner.os }}-ilcompiler-${{ hashFiles('bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-ilcompiler-

      # clang and zlib1g-dev are required by the ILCompiler linker pass on Linux.
      - name: Install native-AOT linker prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y clang zlib1g-dev

      # Build a minimal hello-world Lyric program to a native binary, then run
      # it and assert the output.  This exercises the full pipeline:
      #   lyric build → F# emit → staging DLL → dotnet publish -p:PublishAot=true → native ELF
      - name: Release Native AOT smoke test (lyric build --release, #1975)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; native AOT smoke test cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          dir="$(mktemp -d)"
          src="$dir/hello.l"
          cat > "$src" <<'LYRIC'
          package Hello
          import Std.Core
          func main(): Int {
            println("hello-aot")
            0
          }
          LYRIC
          native_bin="$dir/hello"
          "$lyric_bin" build --release "$src" -o "$native_bin"
          if [ ! -x "$native_bin" ]; then
            echo "::error::native binary not produced at $native_bin"
            exit 1
          fi
          out="$("$native_bin" 2>&1)"
          echo "native AOT output: $out"
          if [ "$out" != "hello-aot" ]; then
            echo "::error::native AOT smoke test produced unexpected output: '$out'"
            exit 1
          fi
          echo "OK: native AOT binary produced and executed correctly." >> "$GITHUB_STEP_SUMMARY"

      # Native AOT publish of the `lyric` CLI itself (#1494 / Band 5).
      # `dotnet publish` honours the csproj's `<PublishAot>true</PublishAot>`,
      # producing a self-contained native ELF that AOT-compiles the whole
      # Lyric-emitted compiler (stage-1 DLL closure).  The step then runs a
      # REAL `lyric build` through the published native binary and executes
      # the result — proving the self-hosted pipeline works without the CLR
      # JIT.  It then exercises a RESTORED-DEPENDENCY build (the constdep/app
      # cross-package const-inlining scenario) through the same native binary:
      # reading the dependency DLL's embedded `Lyric.Contract` metadata now
      # goes through the metadata-direct reader (`Msil.MetadataReader`, pure
      # byte reading), not `Assembly.Load(byte[])`, so it works under Native
      # AOT where the IL loader is unavailable (#3201 / docs/45 / docs/42).
      - name: Native AOT publish of the lyric CLI (#1494)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          dotnet publish bootstrap/src/Lyric.Cli.Aot -c Release -r linux-x64 -o "$publish_dir"
          native_cli="$publish_dir/lyric"
          if [ ! -x "$native_cli" ]; then
            echo "::error::native lyric CLI not produced at $native_cli"
            exit 1
          fi
          file "$native_cli" | grep -q ELF || { echo "::error::published lyric CLI is not a native ELF"; exit 1; }
          "$native_cli" --version
          dir="$(mktemp -d)"
          cat > "$dir/hello.l" <<'LYRIC'
          package Hello
          import Std.Core
          func main(): Int {
            println("hello-native-cli")
            0
          }
          LYRIC
          "$native_cli" build "$dir/hello.l" -o "$dir/bin/Hello.dll"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$dir/bin/"
          out="$(cd "$dir/bin" && dotnet exec Hello.dll)"
          echo "native CLI build output: $out"
          if [ "$out" != "hello-native-cli" ]; then
            echo "::error::lyric build through the native CLI produced unexpected output: '$out'"
            exit 1
          fi

          # Restored-dependency build through the native binary (#3201).  A
          # local-path `[dependencies]` entry threads the producer DLL as a
          # restored dep; the consumer build must read the producer's embedded
          # `Lyric.Contract` metadata to inline its `pub val ANSWER`.  Under
          # Native AOT this previously threw `PlatformNotSupportedException`
          # (no IL loader for `Assembly.Load(byte[])`); the metadata-direct
          # reader makes it pure byte reading, so it now works.
          work="$(mktemp -d)"
          mkdir -p "$work/constdep/src" "$work/app/src"
          cat > "$work/constdep/lyric.toml" <<'TOML'
          [package]
          name = "constdep"
          version = "0.1.0"
          [project]
          name = "ConstDep"
          output_assembly = "Lyric.ConstDep.dll"
          [project.packages]
          "ConstDep" = "src"
          TOML
          cat > "$work/constdep/src/constdep.l" <<'LYR'
          package ConstDep
          pub val ANSWER: Int = 0x002A
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "app"
          version = "0.1.0"
          [project]
          name = "App"
          [project.packages]
          "App" = "src"
          [dependencies]
          constdep = { path = "../constdep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package App
          import ConstDep
          import Std.Console as Console
          func main(): Unit {
            Console.println(toString(ANSWER))
          }
          LYR
          "$native_cli" build --manifest "$work/constdep/lyric.toml"
          "$native_cli" build --manifest "$work/app/lyric.toml"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$work/app/bin/"
          dep_out="$(cd "$work/app/bin" && dotnet exec App.dll | tr -d '\r\n')"
          echo "restored-dep consumer printed: '$dep_out'"
          if [ "$dep_out" != "42" ]; then
            echo "::error::restored-dep build through the native CLI returned '$dep_out', expected '42' (metadata-direct contract read regressed under AOT)"
            exit 1
          fi

          size_kb=$(du -k "$native_cli" | cut -f1)
          echo "OK: Native AOT lyric CLI published (${size_kb} KB), built+ran an example and a restored-dependency build end-to-end." >> "$GITHUB_STEP_SUMMARY"

      # IConfig (config block) lowering self-test (#2983, #2992, #2993).
      # Wires `lyric-compiler/msil/msil_self_test_m85.l` via `lyric run` (the
      # AOT binary routes through the self-hosted MSIL emitter, which supports
      # `config {}` blocks; the F# bootstrap emitter does not, so `lyric run`
      # is the correct path).  Run 1 (env vars absent) verifies the default
      # path for the full v1 type set — Int/Bool/String/Long/Float/Double,
      # including a negated Float default and a Long default outside Int32
      # range — plus a second independent config block and field access
      # without panic.  Run 2 sets the EnvProbe env vars and verifies the
      # env-parse path (Int32.Parse / Int64.Parse / Boolean.Parse and the
      # culture-pinned Double.Parse).  A third compile-only probe asserts the
      # G0009 unsupported-field-type diagnostic.  No new F# runner needed.
      - name: IConfig config-block lowering self-test (lyric run, #2983)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping IConfig self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping IConfig self-test"
            exit 1
          fi
          out="$("$lyric_bin" run lyric-compiler/msil/msil_self_test_m85.l 2>&1)"
          for check in "port_default=true" "debug_default=true" "name_default=true" \
                       "rate_default=true" "scale_default=true" "cap_default=true" \
                       "timeout_default=true" "access_no_panic=true" \
                       "eport_parsed=false" "erate_parsed=false" "ecap_parsed=false" \
                       "eflag_parsed=false" "ename_parsed=false"; do
            if ! printf '%s\n' "$out" | grep -qx "$check"; then
              echo "::error::IConfig self-test (defaults run) missing expected line '$check'; full output:"; echo "$out"; exit 1
            fi
          done
          out_env="$(LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_EPORT=4242 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ERATE=2.5 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ECAP=8589934592 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_EFLAG=true \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ENAME=from-env \
                     "$lyric_bin" run lyric-compiler/msil/msil_self_test_m85.l 2>&1)"
          for check in "port_default=true" "rate_default=true" "cap_default=true" \
                       "eport_parsed=true" "erate_parsed=true" "ecap_parsed=true" \
                       "eflag_parsed=true" "ename_parsed=true"; do
            if ! printf '%s\n' "$out_env" | grep -qx "$check"; then
              echo "::error::IConfig self-test (env-parse run) missing expected line '$check'; full output:"; echo "$out_env"; exit 1
            fi
          done
          bad_src="$(mktemp -d)/config_bad_type.l"
          printf 'package ConfigBadType\n\nconfig Bad {\n  c: Char\n}\n\nfunc main(): Unit {\n  println("unreachable")\n}\n' > "$bad_src"
          if bad_out="$("$lyric_bin" run "$bad_src" 2>&1)"; then
            echo "::error::IConfig negative probe: unsupported Char config field compiled successfully; output:"; echo "$bad_out"; exit 1
          else
            if ! printf '%s\n' "$bad_out" | grep -q "G0009"; then
              echo "::error::IConfig negative probe: expected G0009 in compile failure output:"; echo "$bad_out"; exit 1
            fi
          fi
          echo "IConfig config-block lowering: defaults, env-parse, and G0009 negative checks pass (#2983, #2993)"

  compiler-self-tests-jvm:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Set up Java 21 (for JVM emitter tests)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      - name: Bitwise self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping bitwise JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping bitwise JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/bitwise_self_test.l

      # Aspect-weave self-test on JVM (#3402) — the JVM half of the dotnet-job
      # step above.  Pins the JVM woven-call resolution fix (`collectAspectWovenSigs`
      # registering the post-weave `__aspect_*` sigs) so a woven `proceed` no
      # longer hits the `(…)Object` guess / NoSuchMethodError.  Needs JDK 21
      # (this job), unlike the dotnet job.  Imports only `Std.*`.
      - name: Aspect-weave self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping aspect-weave JVM self-test"
            exit 1
