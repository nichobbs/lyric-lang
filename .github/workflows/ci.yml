      # Negative test: an ambiguous primitive-array overload must fail loud,
      # not silently guess.  A Lyric slice[T] argument erases to Object[]
      # before the JVM auto-FFI resolver ever sees it, so java.lang.String's
      # own (char[]) vs (byte[]) constructors tie at equal score for a
      # slice[Char] argument -- exactly the case checkPrimitiveArraySliceAmbiguity
      # (jvm/auto_ffi.l) exists to reject at compile time rather than resolve
      # to whichever overload happens to appear first in the parsed class
      # metadata.  This is a compile-time panic inside the self-hosted
      # compiler process itself, not a runtime Bug the compiled program could
      # catch, so it cannot be expressed as a @test_module assertion --
      # asserted here as a `lyric build` failure instead.
      - name: Ambiguous primitive-array overload fails loud on JVM (native lyric build --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping ambiguous-overload JVM negative test"
            exit 1
