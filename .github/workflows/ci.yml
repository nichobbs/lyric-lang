      # Function-value invocation — pins #1877: invoking a function-typed value
      # (`f()` where f: () -> R) through the uniform Func ABI.  Zero-argument
      # value/string/void HOFs must run and print the correct results, and a
      # parameter-USING lambda must fail loud (#1939, until arg unboxing lands).
      - name: Function-value invocation (#1877)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping function-value invocation test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping function-value invocation test"
            exit 0
          fi
          dir="$(mktemp -d)"
          pos="$dir/hof.l"
          cat > "$pos" <<'LYRIC'
          package Hof
          import Std.Core
          func apply0(f: in () -> Int): Int { f() }
          func twice(f: in () -> Int): Int { f() + f() }
          func applyS(f: in () -> String): String { f() }
          func runV(f: in () -> Unit): Unit { f() }
          func five(): Int { 5 }
          func main(): Int {
            println("a0=" + toString(apply0({ -> 42 })))
            println("tw=" + toString(twice({ -> five() })))
            println("aS=" + applyS({ -> "hi" }))
            runV({ -> println("voidcb") })
            0
          }
          LYRIC
          out="$("$lyric_bin" run "$pos" 2>&1)" || { echo "::error::function-value HOF program failed to run"; echo "$out"; exit 1; }
          for expect in "a0=42" "tw=10" "aS=hi" "voidcb"; do
            if ! printf '%s\n' "$out" | grep -qx "$expect"; then
              echo "::error::expected '$expect' in function-value HOF output"; echo "$out"; exit 1
            fi
          done
          echo "OK: zero-argument function-value invocation produces correct results."
          # Parameter-taking lambdas (#1939): a lambda passed directly to a typed
          # `(…) -> R` parameter has its boxed args unboxed — both an explicit
          # annotation and an un-annotated param (type propagated from the HOF
          # signature) must run and produce correct results.
          ann="$dir/ann.l"
          cat > "$ann" <<'LYRIC'
          package Ann
          import Std.Core
          func apply1(f: in (Int) -> Int, x: in Int): Int { f(x) }
          func apply2(f: in (Int, Int) -> Int, a: in Int, b: in Int): Int { f(a, b) }
          func applyB(f: in (Int) -> Bool, x: in Int): Bool { f(x) }
          func main(): Int {
            println("a1=" + toString(apply1({ x: Int -> x + 1 }, 10)))
            println("u1=" + toString(apply1({ x -> x + 1 }, 10)))
            println("u2=" + toString(apply2({ a, b -> a * b }, 6, 7)))
            println("uB=" + toString(applyB({ x -> x > 5 }, 3)))
            0
          }
          LYRIC
          aout="$("$lyric_bin" run "$ann" 2>&1)" || { echo "::error::param-taking HOF program failed to run"; echo "$aout"; exit 1; }
          for expect in "a1=11" "u1=11" "u2=42" "uB=False"; do
            if ! printf '%s\n' "$aout" | grep -qx "$expect"; then
              echo "::error::expected '$expect' in param-taking HOF output"; echo "$aout"; exit 1
            fi
          done
          echo "OK: annotated and propagated parameter-taking lambdas produce correct results."
          # An un-annotated param-using lambda NOT passed directly to a HOF (so no
          # type can be propagated) must fail loud (#1939), not read garbage.
          neg="$dir/pneg.l"
          cat > "$neg" <<'LYRIC'
          package PNeg
          import Std.Core
          func main(): Int { val f = { x -> x + 1 }; println("made"); 0 }
          LYRIC
          if "$lyric_bin" build --target dotnet "$neg" > "$dir/pneg.out" 2>&1; then
            echo "::error::un-typed param-using lambda compiled — the #1939 diagnostic did not fire"; cat "$dir/pneg.out"; exit 1
          fi
          if ! grep -qi "un-annotated parameter" "$dir/pneg.out"; then
            echo "::error::un-typed param-using lambda failed without the expected #1939 diagnostic"; cat "$dir/pneg.out"; exit 1
          fi
          echo "OK: un-typed param-using lambda (no annotation, no HOF propagation) fails loud (#1939)."

      # Capturing closures (#1479 v1+v2) — a lambda that captures an immutable
      # enclosing binding is captured by value into an object[] bound as the
      # delegate target (v1); a captured `var` is hoisted to a shared heap cell
      # so reassignments are observable across the closure boundary in both
      # directions (v2).  Both must run and produce correct results.
      - name: Capturing closures (#1479 v1+v2)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping capturing-closures test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping capturing-closures test"
            exit 0
          fi
          dir="$(mktemp -d)"
          pos="$dir/cap.l"
          cat > "$pos" <<'LYRIC'
          package Cap
          import Std.Core
          func apply0(f: in () -> Int): Int { f() }
          func applyS(f: in () -> String): String { f() }
          func apply1(f: in (Int) -> Int, x: in Int): Int { f(x) }
          func main(): Int {
            val a = 3
            val b = 4
            println("c1=" + toString(apply0({ -> a * b + 1 })))
            val name = "world"
            println("c2=" + applyS({ -> "hi " + name }))
            val base = 100
            println("c3=" + toString(apply1({ x -> x + base }, 5)))
            0
          }
          LYRIC
          out="$("$lyric_bin" run "$pos" 2>&1)" || { echo "::error::capturing-closure program failed to run"; echo "$out"; exit 1; }
          for expect in "c1=13" "c2=hi world" "c3=105"; do
            if ! printf '%s\n' "$out" | grep -qx "$expect"; then
              echo "::error::expected '$expect' in capturing-closure output"; echo "$out"; exit 1
            fi
          done
          echo "OK: by-value capture of immutable bindings produces correct results."
          # By-reference capture of a `var` (#1479 v2): a hoisted heap cell is
          # shared, so a mutation inside the closure is visible outside (m1=2) and
          # an external mutation is visible inside a closure captured earlier
          # (m2=10).
          ref="$dir/capref.l"
          cat > "$ref" <<'LYRIC'
          package CapRef
          import Std.Core
          func run(f: in () -> Unit): Unit { f() }
          func apply0(f: in () -> Int): Int { f() }
          func main(): Int {
            var count = 0
            run({ -> count = count + 1 })
            run({ -> count = count + 1 })
            println("m1=" + toString(count))
            var n = 1
            val get = { -> n + 0 }
            n = 10
            println("m2=" + toString(apply0(get)))
            0
          }
          LYRIC
          rout="$("$lyric_bin" run "$ref" 2>&1)" || { echo "::error::by-ref capturing closure failed to run"; echo "$rout"; exit 1; }
          for expect in "m1=2" "m2=10"; do
            if ! printf '%s\n' "$rout" | grep -qx "$expect"; then
              echo "::error::expected '$expect' in by-ref capture output"; echo "$rout"; exit 1
            fi
          done
          echo "OK: by-reference (\`var\`) capture shares a mutable cell across the closure boundary."

