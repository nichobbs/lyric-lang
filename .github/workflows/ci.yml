          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping ambiguous-overload JVM negative test"
            exit 1
          fi
          dir="$(mktemp -d)"
          neg="$dir/ambig.l"
          cat > "$neg" <<'LYRIC'
          package Ambig
          import Std.Core
          extern type JString = "java.lang.String"
          func main(): Int {
            val letters: slice[Char] = ['h', 'i']
            val s = JString.new(letters)
            println(s.toString())
            0
          }
          LYRIC
          if "$lyric_bin" build --target jvm "$neg" -o "$dir/ambig.jar" > "$dir/ambig.out" 2>&1; then
            echo "::error::ambiguous slice[Char] overload (String(char[]) vs String(byte[])) compiled — checkPrimitiveArraySliceAmbiguity did not fire"; cat "$dir/ambig.out"; exit 1
          fi
          if ! grep -qi "ambiguous overload" "$dir/ambig.out"; then
            echo "::error::ambiguous slice[Char] overload failed without the expected diagnostic"; cat "$dir/ambig.out"; exit 1
          fi
          echo "OK: ambiguous primitive-array overload (String(char[]) vs String(byte[])) for a slice[Char] argument fails loud."
