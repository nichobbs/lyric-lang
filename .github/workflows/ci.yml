          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping try/catch-expression JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/try_catch_expr_jvm_self_test.l

      # @projectable opaque-twin self-test on JVM (#3044) — JVM parity twin of
      # the MSIL m87 self-test (PR #3015): `<Name>View` class synthesis,
      # `toView()`, `tryInto()` round-trip via Std.Core.Result, `@hidden`
      # suppression, `@projectionBoundary` type preservation, and
      # nested/transitive recursive projection, compiled in-process through the
      # self-hosted `Jvm.Bridge` and executed under `java`.  Also pins the
      # value-position `and`/`or` slot materialisation (the old stack-carrying
      # form failed JVM verification inside match-arm results).  Imports only
      # `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Projectable opaque-twin self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping projectable JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping projectable JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/projectable_jvm_self_test.l
      # Synthesized-method-resolution self-test on JVM (#1499, #1507) — JVM
      # parity twin of the MSIL step above.  Pins the JVM `@derive(Equals/Show)`
      # free-function call path (the member-call fallback in `lowerMethodCall`
      # that dispatches `p.equals(q)` as an `invokestatic` of `equals`) and the
      # protected-type entry/func dispatch through the `<class>#<method>` registry.
      # `lowerFunc` strips the `TypeName.` prefix from the synthesised name
      # (`Point.equals` -> classfile method name `equals`) to satisfy JVMS §4.2.2
      # (unqualified names may not contain `.`).  Imports only `Std.*`.
      - name: Synthesized-method-resolution self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping synthesized-method-resolution JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping synthesized-method-resolution JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/synthesized_method_self_test.l
      # NaN-comparison self-test on JVM (#2772) — pins IEEE 754 §5.11 ordered
      # comparisons for Float/Double: `lowerCmp`/`lowerCmpFail` must select the
      # `fcmpg`/`dcmpg` ("g") variant for `<`/`<=` (NaN -> +1 -> branch not taken
      # -> false) and `fcmpl`/`dcmpl` for the rest, so every NaN ordered compare
      # is false (and `!=` is true).  Exercises both the value-position
      # (`lowerCmp`) and condition-position (`lowerCmpFail`) lowering paths,
      # compiled in-process through the self-hosted `Jvm.Bridge` and run under
      # `java`.  Imports only `Std.*`.
      - name: NaN-comparison self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping NaN-comparison JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping NaN-comparison JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/nan_compare_jvm_self_test.l
      # Extern-handle-across-a-loop self-test (#3307) — pins StackMapTable
      # local-variable typing for `JRef`/extern locals at basic-block
      # boundaries: an `extern type` value driven through a `while`/`if` (loop
      # back-edge) must keep its resolved JVM class in the frame, so the next
      # `invokevirtual` verifies (previously the bare `LAstore` framed it as
      # `java/lang/Object` -> VerifyError).  Compiled in-process through the
      # self-hosted `Jvm.Bridge` and run under `java`.  Imports only `Std.*`.
      - name: Extern-handle-across-loop self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping extern-loop JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping extern-loop JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/extern_loop_jvm_self_test.l
      # Extern-type parameter/return self-test (#3334) — pins that an `extern
      # type` value used as a function parameter or return type resolves to the
      # real JVM class in the method descriptor (e.g. JBAOS ->
      # java/io/ByteArrayOutputStream), not the `<pkg>/<Alias>` fallback that
      # produced `NoClassDefFoundError: Main/JBAOS`.  Compiled in-process
      # through the self-hosted `Jvm.Bridge` and run under `java`.  Imports
      # only `Std.*`.
      - name: Extern-type parameter self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping extern-param JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping extern-param JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/extern_param_jvm_self_test.l
      # ProcessCapture JVM self-test (#1065) — pins `Std.ProcessCaptureHost` on
      # the JVM target: pure auto-FFI implementation using ProcessBuilder +
      # Process + InputStream/OutputStream drain loop, `JBAOS.toString("UTF-8")`
      # for output conversion, and a `currentTimeMillis()` poll for the timeout
      # cap.  Covers argument round-trip (buildArgString → parseArgString →
      # ProcessBuilder), stdout/stderr capture, stdin delivery, exit-code
      # projection, and the destroyForcibly timeout path.  Compiled in-process
      # through the self-hosted `Jvm.Bridge` and run under `java`.  Requires
      # POSIX utilities at /bin/echo, /bin/cat, /bin/sh, /bin/true, /bin/false.
      - name: ProcessCapture JVM self-test (native lyric test --target jvm, #1065)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping ProcessCapture JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping ProcessCapture JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/process_capture_jvm_self_test.l
      # `lyric run --target jvm` end-to-end smoke (#674) — the first CI step to
      # exercise the `run` JVM convenience wrapper (vs. the `test --target jvm`
      # steps above).  Builds a no-arg `func main(): Int` program to a bundled
      # JAR via the in-process `Jvm.Bridge` and runs it under `java -jar`,
      # asserting stdout.  Pins the #674 regression where `run --target jvm`
      # NRE'd in `stemOf` because a `val x = match { … case Some -> if … }`
      # binding mis-lowered the parsed `--target` to a null `CompileTarget`.
      # (Arg-forwarding + Int→exit-code on JVM are tracked in #3303; this step
      # covers the no-arg / output path that #674 asked for.)
      - name: lyric run --target jvm end-to-end smoke (#674)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric run --target jvm smoke"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/runjvm.l" <<'LYR'
          package RunJvm

          import Std.Core

          func main(): Int {
            println("hello from lyric run --target jvm")
            0
          }
          LYR
          out="$("$lyric_bin" run --target jvm "$work/runjvm.l")"
          echo "lyric run --target jvm output:"
          echo "$out"
          if ! printf '%s\n' "$out" | grep -qx "hello from lyric run --target jvm"; then
            echo "::error::lyric run --target jvm produced unexpected output"
            exit 1
          fi
      # `lyric bench --target dotnet` end-to-end smoke (#680 companion) — the
      # synthesised `@bench` harness imports `Std.Time` (now / since /
      # totalMillis), so `Lyric.Stdlib.Time.dll` and siblings must be
      # co-located beside the bench output for `dotnet exec` (the
      # `copyRuntimeDepsBeside` call added to `cli_bench.l`).  Asserts the
      # harness runs and reports its benchmark count.  (`bench --target jvm`
      # is blocked on Std.Time JVM support, tracked in #3302.)
      - name: lyric bench --target dotnet end-to-end smoke
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric bench smoke"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/benchsmoke.l" <<'LYR'
          @bench_module
          package BenchSmoke

          import Std.Core

          @bench
          func addLoop(): Unit {
            var acc = 0
            var i = 0
            while i < 100 {
              acc = acc + i
              i = i + 1
            }
            ()
          }
          LYR
          out="$("$lyric_bin" bench --target dotnet --runs 3 --warmup 1 "$work/benchsmoke.l")"
          echo "lyric bench --target dotnet output:"
          echo "$out"
          if ! printf '%s\n' "$out" | grep -q "1 benchmark(s)"; then
            echo "::error::lyric bench --target dotnet did not report its benchmark count"
            exit 1
          fi
      # Match-literal + compound-assignment self-test — pins two self-hosted
      # MSIL backend correctness fixes from #1481 (epic #1470, Band 2): Float
      # literal *match* patterns now emit a real `ldc.r8; ceq` compare instead
      # of falling to the wildcard arm (always-match), and compound assignment
      # (`+=` etc.) honours the operator for local / `result` / record-field /
      # List-element / Map-value targets (String `+=` concatenates; a record
      # field `+=` no longer drops the operator; `a[i] op= v` is a real
      # read-modify-write).  MSIL target only; JVM parity tracked under #1470's
      # JVM-deferral note.  Imports only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
  ecosystem-security-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      - name: Ecosystem test suite (lyric-auth + lyric-session + lyric-health)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem tests cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Stage 1 compiled all Lyric.Stdlib*.dll files into .bootstrap/stage1/.
          # Copy them all to the canonical dep-resolution path so the test runner's
          # local-path dep resolver finds it without re-running a manifest build.
          # The main bundle (Lyric.Stdlib.dll) is required for compile-time dep
          # resolution; the individual DLLs (e.g. Lyric.Stdlib.Testing.dll) are
          # needed at runtime by compiled test DLLs.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::warning::no Lyric.Stdlib*.dll found in .bootstrap/stage1; skipping ecosystem tests"
            exit 0
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # NOTE: the per-test-dir stdlib pre-copy that used to live here is no
          # longer needed — `lyric test --manifest` now co-locates the split
          # `Lyric.Stdlib.*.dll` assemblies next to each compiled test DLL
          # itself (cmdTestManifest -> copyRuntimeDepsBeside, #1468 / #1841).
          # The `mkdir` stays because the Session.Host pre-copy below runs
          # before `lyric test` creates the directory.
          mkdir -p lyric-session/.lyric-test
          # lyric-session no longer needs a host shim: Session.Kernel.Net
          # binds StackExchange.Redis directly via @externTarget in native
          # Lyric (#1777). lyric-auth likewise needs no shim (pure Lyric
          # HMAC-SHA256 + constant-time comparison).
          cli_bin_dir="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0"
          # Route emitProject subprocess calls to the F# bootstrap CLI, which
          # handles --internal-project-build.  The AOT binary is a pure trampoline
          # into the Lyric CLI dispatcher and does not handle internal flags
          # (#1082 stripped the AOT entry point of its path-discovery shim).
          cli_dll="$cli_bin_dir/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # lyric-session depends on Lyric.Cache (a local path dep).  The test
          # runner's local-dep resolver requires the dep's output DLL to already
          # exist (lyric-cache/bin/Cache.dll) and errors otherwise, so build it
          # here before running the session suite.  Copy the result next to the
          # session test DLL so `dotnet exec` loads it at runtime — the
          # runtimeconfig additionalProbingPaths only resolves NuGet-style
          # versioned layouts (same reason the host-shim DLLs are copied above).
          echo "=== building lyric-cache (lyric-session dependency) ==="
          if ! "$lyric_bin" build --manifest lyric-cache/lyric.toml; then
            echo "::error::failed to build lyric-cache (lyric-session dependency)"
            exit 1
          fi
          if [ -f lyric-cache/bin/Cache.dll ]; then
            cp lyric-cache/bin/Cache.dll lyric-session/.lyric-test/
          else
            echo "::error::lyric-cache build produced no lyric-cache/bin/Cache.dll"
            exit 1
          fi
          # lyric-health depends on Lyric.Web (a local path dep), which in
          # turn depends on Lyric.Auth and Lyric.Resilience.  The test
          # runner's local-dep resolver requires each dep's output DLL to
          # already exist, so build the chain bottom-up before running the
          # health suite (D-progress-505 / #679).
          echo "=== building lyric-web chain (lyric-health dependency) ==="
          for lib in lyric-auth lyric-resilience lyric-web; do
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::failed to build $lib (lyric-health dependency)"
              exit 1
            fi
          done
          # Run all test manifests; capture exit codes so all always run
          # before we report the overall result.
          overall=0
          echo "=== lyric-auth tests ==="
          "$lyric_bin" test --manifest lyric-auth/lyric.toml || overall=$?
          echo "=== lyric-session tests ==="
          "$lyric_bin" test --manifest lyric-session/lyric.toml || overall=$?
          echo "=== lyric-health tests ==="
          "$lyric_bin" test --manifest lyric-health/lyric.toml || overall=$?
          # lyric-cache, lyric-mail, lyric-aws-xray, lyric-feature-flags, and
          # lyric-validation are tier-0 (no local path deps) and have green
          # suites; run them here so their coverage is enforced on every push
          # instead of build-only.  cache is already built above (session
          # dependency).
          echo "=== lyric-cache tests ==="
          "$lyric_bin" test --manifest lyric-cache/lyric.toml || overall=$?
          echo "=== lyric-mail tests ==="
          "$lyric_bin" test --manifest lyric-mail/lyric.toml || overall=$?
          echo "=== lyric-aws-xray tests ==="
          "$lyric_bin" test --manifest lyric-aws-xray/lyric.toml || overall=$?
          echo "=== lyric-feature-flags tests ==="
          "$lyric_bin" test --manifest lyric-feature-flags/lyric.toml || overall=$?
          echo "=== lyric-validation tests ==="
          "$lyric_bin" test --manifest lyric-validation/lyric.toml || overall=$?
          echo "=== lyric-proto tests ==="
          "$lyric_bin" test --manifest lyric-proto/lyric.toml || overall=$?
          # lyric-logging, lyric-mq, and lyric-grpc went green once the
          # enum-value-in-expression-position codegen fix (#3344) landed.  Their
          # path deps are already built above: cache (mq), auth + resilience
          # (grpc); logging is tier-0.
          echo "=== lyric-logging tests ==="
          "$lyric_bin" test --manifest lyric-logging/lyric.toml || overall=$?
          echo "=== lyric-mq tests ==="
          "$lyric_bin" test --manifest lyric-mq/lyric.toml || overall=$?
          echo "=== lyric-grpc tests ==="
          "$lyric_bin" test --manifest lyric-grpc/lyric.toml || overall=$?
          # lyric-web went green once the generic-`ConcurrentDictionary` extern
          # codegen fix (#3392) landed: checkRateLimit is no longer a silent
          # no-op, so the rate-limit suite asserts real deny/burst behaviour.
          # Built above (lyric-web chain); run here to guard the fix.
          echo "=== lyric-web tests ==="
          "$lyric_bin" test --manifest lyric-web/lyric.toml || overall=$?
          if [ $overall -ne 0 ]; then
            echo "::error::ecosystem test suite failed — security regression detected"
            exit $overall
          fi
          echo "ecosystem test suite passed"

  # Stdlib and ecosystem-library builds — runs in parallel with ecosystem-security-tests.
  stdlib-builds:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # Full self-hosted stdlib bundle (#2592, stage-2 milestone) — builds
      # the entire public Std.* surface through the self-hosted MSIL backend
      # via lyric-stdlib/lyric.full.toml.  The bootstrap lyric.toml is only
      # the F#-stage-0 smoke set; this step guards that the self-hosted
      # emitter can compile the whole standard library so the milestone
      # cannot silently regress.
      - name: Build full stdlib (self-hosted, lyric.full.toml)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if ! "$lyric_bin" build --manifest lyric-stdlib/lyric.full.toml; then
            echo "::error::full self-hosted stdlib bundle failed to build"
            exit 1
          fi
          echo "full self-hosted stdlib bundle built"

      # Trust-anchor reproducibility gate (Q-dist-001 prerequisite): the
      # self-hosted MSIL emitter must be byte-for-byte reproducible.  Build each
      # corpus twice and assert an exact `cmp` (no normalization — the
      # self-hosted backend fixes the Module MVID and zeroes the PE timestamp,
      # so identical sources MUST produce identical bytes).  A regression here
      # means the shipped binary is no longer reproducible.
      #
      #   (i)  the full stdlib bundle, and
      #   (ii) the WHOLE Lyric.Cli compiler closure (every Lyric.* / Msil.* /
      #        Jvm.* package + its stdlib import closure) — the strongest
      #        property available today: the entire self-hosted compiler emits
      #        byte-identically run-to-run.
      - name: Verify reproducible self-hosted emit (byte-identical double-build)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          ./scripts/verify-reproducible-emit.sh manifest "$lyric_bin" lyric-stdlib/lyric.full.toml
          ./scripts/verify-reproducible-emit.sh closure  "$lyric_bin"

      # Multi-file example packages — builds each showcase service in
      # examples/{rbac,ledger,jobqueue,product-catalog} end-to-end via
      # `lyric build --manifest` (#2514).  Unlike the single-file AOT
      # smoke test above, this exercises the full project pipeline across
      # cross-file + cross-package references, aspect instantiations, and
      # the lyric-web/db/otel/grpc/auth/resilience library dependencies.
      # Library deps are built bottom-up first so each example's restored
      # path-dependency DLLs exist.  Fails CI if any package regresses.
      - name: Build example packages (lyric build --manifest)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; example package build cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # The self-hosted MSIL bridge resolves `import Std.X` from
          # lyric-stdlib/std/*.l source, but each manifest also lists
          # Lyric.Stdlib as a path dependency whose output DLL must exist;
          # stage 1 already compiled it into .bootstrap/stage1/.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI (the
          # AOT binary is a pure trampoline; same wiring as the steps above).
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Build the dependency libraries bottom-up so each example's
          # restored path deps resolve to an existing bin/<assembly>.dll.
          libs=(lyric-logging lyric-auth lyric-resilience lyric-otel lyric-db lyric-web lyric-health lyric-grpc)
          for lib in "${libs[@]}"; do
            echo "=== build dependency $lib ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::failed to build example dependency $lib"
              exit 1
            fi
          done
          # Build each example package end-to-end.
          examples=(rbac ledger jobqueue product-catalog)
          for ex in "${examples[@]}"; do
            echo "=== build example $ex ==="
            if ! "$lyric_bin" build --manifest "examples/$ex/lyric.toml"; then
              echo "::error::example package $ex failed to build"
              exit 1
            fi
          done
          echo "all example packages built"

      # Ecosystem library builds (#2530) — builds every lyric-* library in
      # topological order so regressions in any library are caught on every
      # push.  Libraries are grouped into three tiers by dependency depth.
      # The step is idempotent: `lyric build` skips unchanged output DLLs,
      # so libraries already built by the example packages step above are
      # not re-compiled from scratch.
      - name: Ecosystem library builds (#2530)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem library builds cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Ensure stdlib DLLs are in the canonical dep-resolution path.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI.
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Tier 0: libraries with no local path dependencies.
          tier0=(
            lyric-cache lyric-logging lyric-proto lyric-generator-sdk
            lyric-mail lyric-storage lyric-auth lyric-resilience
            lyric-validation lyric-i18n lyric-otel lyric-feature-flags
            lyric-aws-xray lyric-aws-secrets lyric-db
          )
          for lib in "${tier0[@]}"; do
            echo "=== build $lib (tier 0) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 0) failed to build"
              exit 1
            fi
          done
          # Tier 1: libraries depending only on tier-0 libraries.
          tier1=(lyric-mq lyric-session lyric-jobs lyric-search lyric-ws lyric-web lyric-grpc)
          for lib in "${tier1[@]}"; do
            echo "=== build $lib (tier 1) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 1) failed to build"
              exit 1
            fi
          done
          # Tier 2: libraries depending on tier-0 and tier-1 libraries.
          tier2=(lyric-health lyric-testing lyric-lambda)
          for lib in "${tier2[@]}"; do
            echo "=== build $lib (tier 2) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 2) failed to build"
              exit 1
            fi
          done
          echo "all ecosystem libraries built"

      # Weaver self-test — exercises `Lyric.Weaver` via native `lyric test`.
      # The compiler-package imports (Lyric.Lexer / Lyric.Parser /
      # Lyric.Weaver) are resolved by LINKING the already-compiled stage-1
      # bundle DLLs as restored dependencies (#2364), so no recompile-from-
      # source `LYRIC_LOAD_COMPILER=1` is needed.  Resolves issue #1324
      # without any new F# test shims.
  crosspackage-and-codegen-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      - name: Per-package stdlib emit (#2592 self-hosted Std.Sort)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/driver.l" <<'LYR'
          package SortDriver
          import Std.Core
          import Std.Sort
          func main(): Unit { }
          LYR
          cat > "$work/prog.l" <<'LYR'
          package SortProg
          import Std.Core
          import Std.Sort
          import Std.Console as Console
          func main(): Unit {
            val s = sortInts([3, 1, 2, 5, 4])
            var i = 0
            while i < s.length {
              Console.println(toString(s[i]))
              i = i + 1
            }
          }
          LYR
          "$lyric_bin" --internal-perpackage-build "$work/driver.l" "$work/out"
          for dll in Lyric.Stdlib.Core.dll Lyric.Stdlib.Sort.dll Lyric.Stdlib.Collections.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::per-package emit did not produce $dll"
              exit 1
            fi
          done
          "$lyric_bin" build "$work/prog.l" -o "$work/out/prog.dll"
          got="$(cd "$work/out" && dotnet prog.dll | tr '\n' ' ' | sed 's/ *$//')"
          echo "sort output: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::self-hosted Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "self-hosted per-package Std.Sort returns sorted output"

      # Cross-package compile-time constant inlining (#2592 slice 1).  A
      # module-level `pub val` / `pub const` with an integer-literal
      # initializer is part of a package's ABI: consumers inline its value
      # at compile time (`ldc.i4`).  Under separate compilation (per-package
      # emit), the consumer compiles without the producer's source, so the
      # value must travel in the producer's embedded `Lyric.Contract`
      # metadata and be re-registered into the consumer's `constValues` from
      # the restored dependency.  This builds a dependency exposing
      # `pub val ANSWER: Int = 0x002A`, then a consumer that prints `ANSWER`
      # across a real assembly boundary (a local-path `[dependencies]`
      # entry, which threads the producer DLL as a restored dep), and
      # asserts the inlined value is `42`.  Before slice 1, `ANSWER` was
      # absent from the dependency's contract, so the consumer could not
      # even resolve it.
      - name: Cross-package const inlining (#2592 restored-dep consts)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/constdep/src" "$work/app/src"
          cat > "$work/constdep/lyric.toml" <<'TOML'
          [package]
          name = "constdep"
          version = "0.1.0"
          [project]
          name = "ConstDep"
          output_assembly = "Lyric.ConstDep.dll"
          [project.packages]
          "ConstDep" = "src"
          TOML
          cat > "$work/constdep/src/constdep.l" <<'LYR'
          package ConstDep
          pub val ANSWER: Int = 0x002A
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "app"
          version = "0.1.0"
          [project]
          name = "App"
          [project.packages]
          "App" = "src"
          [dependencies]
          constdep = { path = "../constdep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package App
          import ConstDep
          import Std.Console as Console
          func main(): Unit {
            Console.println(toString(ANSWER))
          }
          LYR
          "$lyric_bin" build --manifest "$work/constdep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          got="$(cd "$work/app/bin" && dotnet App.dll | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "42" ]; then
            echo "::error::cross-package const inlining returned '$got', expected '42'"
            exit 1
          fi
          echo "cross-package pub val inlines through restored-dep contract metadata"

      # Per-package compiler emit (#2592 slice 2).  emitPerPackageClosure now
      # emits the COMPILER-package closure (Lyric.* / Msil.* / Jvm.*) — not just
      # the stdlib — as separate Lyric.<Pkg>.dll assemblies, threading each
      # package's transitive compiler-import closure (already emitted) as
      # restored deps, so cross-package types AND inlined constants (#2592
      # slice 1) resolve across the assembly boundary.  This emits the
      # typechecker self-test's compiler closure (Lexer + Parser + TypeChecker)
      # and asserts the per-package DLLs exist, then runs the self-test against
      # the emit output as a TRIPWIRE (not a pass gate).  Before #3199 this
      # step claimed to execute the self-hosted-emitted DLLs but never did:
      # findCompiledLibDir gates the LYRIC_STDLIB_BIN override through
      # dirHasCompiledStdlib, which requires the *bundle* Lyric.Stdlib.dll as a
      # marker that --internal-perpackage-build does not emit, so the override
      # was silently rejected and the F#-linked path was validated instead.
      # The bundle is now copied in so the override is honored — but executing
      # the self-hosted-emitted closure currently fails on a known
      # producer/consumer naming gap: the per-package emitter DEFINES generic
      # stdlib types arity-suffixed (`Option`1`, the docs/43 correctness fix)
      # while consumer references are emitted UNSUFFIXED to match the F#-built
      # DLLs they normally link, so the run dies with "Could not load type
      # 'Std.Core.Option'" (further execution-cleanliness gaps are tracked in
      # docs/41 R7).  The exact failure signature varies by environment (the
      # type-load error locally; per-test failures on CI runners), so the
      # tripwire pins only the PASS direction: a PASS means either the
      # override silently fell back to the F#-linked path again
      # (dirHasCompiledStdlib regression) or the naming gap was fixed — in the
      # latter case promote this to a positive pass gate.  Any failure is the
      # known-gap state; its tail is printed for visibility.
      - name: Per-package compiler emit (#2592 self-hosted compiler DLLs)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          st="lyric-compiler/lyric/typechecker_self_test.l"
          "$lyric_bin" --internal-perpackage-build "$st" "$work/out"
          for dll in Lyric.Lyric.Lexer.dll Lyric.Lyric.Parser.dll Lyric.Lyric.TypeChecker.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::expected per-package compiler DLL missing: $dll"
              exit 1
            fi
          done
          # Bundle marker so findCompiledLibDir honours LYRIC_STDLIB_BIN (#3199).
          cp .bootstrap/stage1/Lyric.Stdlib.dll "$work/out/"
          rc=0
          out="$(LYRIC_STDLIB_BIN="$work/out" "$lyric_bin" test "$st" --target dotnet 2>&1)" || rc=$?
          printf '%s\n' "$out" | tail -20
          if [ "$rc" -eq 0 ]; then
            echo "::error::typechecker self-test PASSED against the per-package emit output. Either LYRIC_STDLIB_BIN silently fell back to the F#-linked path (dirHasCompiledStdlib regression) or the docs/43 naming gap is fixed — if the latter, promote this tripwire to a positive pass gate (#3199)."
            exit 1
          fi
          echo "per-package compiler closure emits and links; LYRIC_STDLIB_BIN honored; execution still blocked by the known docs/43 producer/consumer gap (tripwire, #3199)"

      # Full self-hosted stdlib (#2592 slice 3).  Every Std.* package — including
      # ones the F# stage-0 emitter cannot compile (e.g. Std.Sort, whose
      # typed-lambda generics defeat F# codegen) — now self-host-compiles via
      # emitPerPackageClosure.  This drives a driver that imports every public
      # Std module, asserts all packages emit (Std.Sort / Std.Http / Std.Rest are
      # the historically-failing ones: Http/Rest needed the async type-method
      # state-machine fix in findTypeDef/RefRowByName, Sort needed the slice ABI
      # which is already unified), then compiles + runs a Std.Sort program against
      # the self-hosted-emitted stdlib (self-consistent set) and asserts it sorts.
      # Guards against regressions in stdlib self-host-compilability.
      - name: Full self-hosted stdlib (#2592 all Std.* packages)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          mods="$(grep -rhoE '^package Std\.[A-Za-z.]+' lyric-stdlib/std/*.l | sed 's/^package //' | sort -u)"
          {
            echo "package StdAll"
            for m in $mods; do echo "import $m"; done
            echo "func main(): Unit { }"
          } > "$work/all.l"
          "$lyric_bin" --internal-perpackage-build "$work/all.l" "$work/out"
          for dll in Lyric.Stdlib.Sort.dll Lyric.Stdlib.Http.dll Lyric.Stdlib.Rest.dll Lyric.Stdlib.Core.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::expected self-hosted stdlib DLL missing: $dll"
              exit 1
            fi
          done
          cat > "$work/sorttest.l" <<'LYR'
          package SortTest
          import Std.Console as Console
          import Std.Sort as Sort
          func main(): Unit {
            val s = Sort.sortInts([5, 3, 1, 4, 2])
            var acc = ""
            var i = 0
            while i < s.length {
              acc = acc + toString(s[i])
              if i < s.length - 1 { acc = acc + " " }
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # Resolution note (#2787): the build below intentionally relies on the
          # default stdlib resolution (walking up from the lyric binary to
          # lyric-stdlib/std).  LYRIC_STD_PATH points at a stdlib *source*
          # directory, so overriding it to $work/out (a DLL output dir) changes
          # which artifacts get linked and miscompiles the program — making the
          # emitted-DLL set the linked target needs first-class support, tracked
          # in #2787.
          "$lyric_bin" build "$work/sorttest.l" -o "$work/out/sorttest.dll"
          got="$(cd "$work/out" && dotnet sorttest.dll | tr -d '\r\n')"
          echo "self-hosted Std.Sort printed: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::self-hosted Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "all Std.* packages self-host-compile; self-hosted Std.Sort sorts correctly"

      # Whole compiler self-host-compiles (docs/41 §R7 front-end completeness).
      # Drives emitPerPackageClosure over the entire Lyric.Cli import closure —
      # all ~73 Lyric.* / Msil.* / Jvm.* compiler packages — and asserts every
      # one emits.  Each package runs the full self-hosted middle-end + codegen,
      # so success means the self-hosted front-end (notably its match-exhaustiveness
      # checking, which is stricter than the F# stage-0's advisory pass) accepts
      # the compiler's own source.  Guards against reintroducing a non-exhaustive
      # match (the T0016 class that previously blocked Msil.Codegen on
      # MGenericInstByName and Lyric.Lsp on TyException).  This is the
      # prerequisite for a self-hosted-built toolchain.
      - name: Whole compiler self-host-compiles (R7 front-end completeness)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          printf 'package CompilerSelfHost\nimport Lyric.Cli\nfunc main(): Int { 0 }\n' > "$work/all.l"
          "$lyric_bin" --internal-perpackage-build "$work/all.l" "$work/out"
          for dll in Lyric.Lyric.Cli.dll Lyric.Msil.Codegen.dll Lyric.Lyric.Lsp.dll Lyric.Jvm.Codegen.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::expected self-hosted compiler DLL missing: $dll"
              exit 1
            fi
          done
          n="$(ls "$work/out"/Lyric.Lyric.*.dll "$work/out"/Lyric.Msil.*.dll "$work/out"/Lyric.Jvm.*.dll 2>/dev/null | wc -l)"
          echo "whole compiler self-host-compiles: $n compiler-package DLLs emitted"

      # Shipped Std.Sort works via the default toolchain (#2592 close).  The
      # AOT-build step above ran scripts/stage-selfhosted-stdlib.sh, which
      # staged the stdlib packages F# cannot build (Std.Sort et al.) into the
      # lib dir.  This builds + runs a Std.Sort program through the *default*
      # toolchain — NO LYRIC_STDLIB_BIN override — so it exercises exactly what
      # a user gets: a self-hosted-compiled program linking the shipped,
      # self-hosted-built Std.Sort against the F#-built Core, and sorting.
      - name: Shipped Std.Sort via default toolchain (#2592)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.Sort.dll" ]; then
            echo "::error::Lyric.Stdlib.Sort.dll not staged in the toolchain lib dir"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/s.l" <<'LYR'
          package S
          import Std.Console as Console
          import Std.Sort as Sort
          func main(): Unit {
            val r = Sort.sortInts([5, 3, 1, 4, 2])
            var acc = ""
            var i = 0
            while i < r.length {
              acc = acc + toString(r[i])
              if i < r.length - 1 { acc = acc + " " }
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # `lyric run` prints a "built <path>" progress line before the
          # program's stdout, so take the last line (the program output).
          got="$("$lyric_bin" run "$work/s.l" | tail -1 | tr -d '\r\n')"
          echo "shipped Std.Sort printed: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::shipped Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "Std.Sort resolves and sorts through the default shipped toolchain"

      # Cross-package non-generic record field encoding (D-progress-477 / facet 1).
      # The self-hosted PRODUCER (lowerRecordMsil/lowerUnionMsil) erased a
      # non-generic record's `List`/`Map`/`Option` field to `object`, while the
      # F# emitter and the cross-package field/ctor REFERENCE both use the
      # concrete encoding (`List`1<T>`).  So a self-hosted-built record's
      # reference-typed field did not bind from another assembly
      # (MissingField/MissingMethod).  This builds a dependency package whose
      # NON-generic record exposes `List[Int]`, `List[Item]`, and `String`
      # fields, then a consumer that reads them across a real assembly boundary,
      # and asserts the values.  Before the fix the read faulted.
      - name: Cross-package record field encoding (D-progress-477)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "recdep"
          version = "0.1.0"
          [project]
          name = "RecDep"
          output_assembly = "Lyric.RecDep.dll"
          [project.packages]
          "RecDep" = "src"
          TOML
          cat > "$work/dep/src/recdep.l" <<'LYR'
          package RecDep
          pub record Item { v: Int }
          pub record Rec { ints: List[Int]; items: List[Item]; name: String }
          pub func mkRec(): Rec { Rec(ints = [1, 2, 3], items = [Item(v = 9)], name = "hi") }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "recapp"
          version = "0.1.0"
          [project]
          name = "RecApp"
          [project.packages]
          "RecApp" = "src"
          [dependencies]
          recdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package RecApp
          import RecDep
          import Std.Console as Console
          func main(): Unit {
            val r = mkRec()
            Console.println(toString(r.ints.count) + " " + toString(r.items.count) + " " + r.name)
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          # Stage the local-path dependency DLL beside the consumer so it loads
          # at run time (the Rec type lives in Lyric.RecDep.dll).
          cp "$work/dep/bin/Lyric.RecDep.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet RecApp.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "3 1 hi" ]; then
            echo "::error::cross-package record field read returned '$got', expected '3 1 hi'"
            exit 1
          fi
          echo "cross-package non-generic record field binds concretely"

      # Cross-package non-generic FUNCTION PARAMETER encoding (D-progress-478 / facet 2).
      # The self-hosted PRODUCER (lowerFuncMsil) erased a reference-typed
      # parameter of a non-generic free function (a record, `slice[record]`,
      # `Option[..]`, etc.) to `object` in the MethodDef signature, while the
      # F# emitter, the function's own body slot type, and the cross-package
      # call REFERENCE (registerRestoredFunc/registerStdlibFunc, both `…WithCtx`)
      # all use the concrete encoding.  So a self-hosted-built function with a
      # reference-typed parameter did not bind from another assembly
      # (MissingMethodException).  This builds a dependency package whose
      # NON-generic functions take one (`describe`) and two (`combine`) record
      # parameters, then a consumer that calls them across a real assembly
      # boundary, and asserts the result.  Before the fix the calls faulted.
      # The record is constructed in the DEPENDENCY (`mkErr`) and passed by the
      # consumer, so the consumer never constructs a collection — mirroring the
      # facet-1 guard above, which runs the consumer without staging any stdlib
      # runtime DLL (collection literals would pull `Lyric.Stdlib.Core`).
      - name: Cross-package function parameter encoding (D-progress-478)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "fdep"
          version = "0.1.0"
          [project]
          name = "FDep"
          output_assembly = "Lyric.FDep.dll"
          [project.packages]
          "FDep" = "src"
          TOML
          cat > "$work/dep/src/fdep.l" <<'LYR'
          package FDep
          pub record Err { field: String; msg: String }
          pub func mkErr(): Err { Err(field = "name", msg = "required") }
          pub func describe(e: in Err): String { e.field + ":" + e.msg }
          pub func combine(a: in Err, b: in Err): String { describe(a) + "|" + describe(b) }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "fapp"
          version = "0.1.0"
          [project]
          name = "FApp"
          [project.packages]
          "FApp" = "src"
          [dependencies]
          fdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package FApp
          import FDep
          import Std.Console as Console
          func main(): Unit {
            val a = mkErr()
            val b = mkErr()
            Console.println(describe(a) + " " + combine(a, b))
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          # Stage the local-path dependency DLL beside the consumer so it loads
          # at run time (the Err type + functions live in Lyric.FDep.dll).
          cp "$work/dep/bin/Lyric.FDep.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet FApp.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "name:required name:required|name:required" ]; then
            echo "::error::cross-package function param call returned '$got', expected 'name:required name:required|name:required'"
            exit 1
          fi
          echo "cross-package non-generic function reference-typed params bind concretely"

      # Cross-package generic-return signature: reference-typed generic args.
      # A self-hosted-compiled call to a cross-package function whose return is a
      # generic instantiation with a REFERENCE-typed argument — e.g.
      # `Std.File.readText : Result[String, IOError]` (IOError is a union in the
      # separate Std.Errors package) — must encode the consumer MemberRef return
      # as `Result<String, Std.Errors.IOError>`, resolving the arg to its real
      # TypeRef.  The context-free signature encoder degraded the arg to `object`
      # (`Result<String, object>`), which did not bind against the F#-built
      # producer's concrete signature → `MissingMethodException` at run time.
      # Primitive args (e.g. `Result[Int, String]`) were unaffected, so this was
      # latent.  Guards `registerStdlibFunc`'s ctx-aware encoding.
      - name: Cross-package generic-return ref-typed arg (Std.File.readText)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/rt.l" <<'LYR'
          package RT
          import Std.File as File
          import Std.Console as Console
          func main(): Unit {
            match File.readText("/nonexistent-lyric-ci-path") {
              case Ok(t) -> Console.println("read " + toString(t.length))
              case Err(e) -> Console.println("err-ok")
            }
          }
          LYR
          out="$("$lyric_bin" run "$work/rt.l" 2>&1 | tail -1)"
          echo "readText program printed: '$out'"
          if [ "$out" != "err-ok" ]; then
            echo "::error::self-hosted Std.File.readText call returned '$out' (expected 'err-ok'); cross-package Result[_, union] signature regressed"
            exit 1
          fi
          echo "cross-package Result[String, IOError] return binds correctly"

      # Cross-package generic-return with a `Unit` arg (D-progress-479 / facet 3).
      # A self-hosted call to an F#-built stdlib function whose return is a
      # generic instantiation with a `Unit` argument — e.g.
      # `Std.File.writeText : Result[Unit, IOError]` ("fallible void", idiomatic)
      # — must encode the consumer MemberRef return as
      # `Result<[corelib]System.ValueTuple, Std.Errors.IOError>`, matching the
      # F# emitter's value-position `Unit -> System.ValueTuple` convention.  The
      # self-hosted encoder degraded the `Unit` arg to `object` (`Result<object,
      # IOError>`), which did not bind against the F#-built producer and faulted
      # with MissingMethodException.  The fix (`xrefUnitArgsToValueTuple`, applied
      # only to the F#-built-stdlib REFERENCE in `registerStdlibFunc`) leaves the
      # in-bundle object-argument representation untouched.  Guards the encoding.
      - name: Cross-package generic-return Unit arg (Std.File.writeText)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/wt.l" <<'LYR'
          package WT
          import Std.File as File
          import Std.Console as Console
          func main(): Unit {
            match File.writeText("$WORKPATH/wt_probe.txt", "hi") {
              case Ok(_)  -> Console.println("wrote-ok")
              case Err(_) -> Console.println("write-err")
            }
          }
          LYR
          # Substitute a writable temp path into the program source.
          sed -i "s#\$WORKPATH#$work#" "$work/wt.l"
          out="$("$lyric_bin" run "$work/wt.l" 2>&1 | tail -1)"
          echo "writeText program printed: '$out'"
          if [ "$out" != "wrote-ok" ]; then
            echo "::error::self-hosted Std.File.writeText call returned '$out' (expected 'wrote-ok'); cross-package Result[Unit, IOError] signature regressed"
            exit 1
          fi
          echo "cross-package Result[Unit, IOError] return binds correctly"

      # Non-generic union/record with a concrete-collection field: construct +
      # match (D-progress-480 / #2592 slice 1, facet 4).  Facet 1 made a
      # non-generic record/union collection field a concrete `List<T>`, but a
      # `[...]` literal builds a `List<object>` unless the construction site
      # pushes the field's concrete type onto the expected-collection stack.
      # Record construction did; a NON-GENERIC union case did not (it registers
      # no `fieldDeclaredNames`), so `Circle(tags = [1,2,3])` stored a
      # `List<object>` into a `List<int32>` field and the `match` binding — which
      # casts to the concrete field type — faulted with InvalidCastException,
      # even in a single package.  This builds a union with a `List[Int]`-payload
      # case plus a record with the same field, constructs both from list
      # literals, and asserts the matched/read counts.  Before the fix the union
      # `match` aborted.
      - name: Union/record concrete-collection construct+match (D-progress-480)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/uc.l" <<'LYR'
          package UC
          import Std.Console as Console
          record Box { tags: List[Int] }
          union Shape {
            case Circle(tags: List[Int])
            case Empty
          }
          func boxCount(b: in Box): Int { b.tags.count }
          func shapeCount(s: in Shape): Int {
            match s {
              case Circle(tags) -> tags.count
              case Empty -> 0
            }
          }
          func main(): Unit {
            val b = Box(tags = [1, 2, 3])
            val c = Circle(tags = [4, 5])
            Console.println(toString(boxCount(b)) + " " + toString(shapeCount(c)))
          }
          LYR
          out="$("$lyric_bin" run "$work/uc.l" 2>&1 | tail -1)"
          echo "union/record program printed: '$out'"
          if [ "$out" != "3 2" ]; then
            echo "::error::union/record concrete-collection construct+match returned '$out' (expected '3 2'); #2592 slice-1 regressed"
            exit 1
          fi
          echo "non-generic union/record concrete-collection field construct+match works"

      # Cross-package record construct-in-consumer (#2592 slice 2, D-progress-481).
      # A CONSUMER constructing a restored dependency's record from a list literal
      # — `Box(tags = [1,2,3], ...)` where `Box` lives in a path dependency —
      # stored a `List<object>` because `registerRestoredRecordFields` never
      # registered the positional `fieldDeclaredNames[<fqn>/field<i>]` map, so the
      # construction-site hint degraded to `object`.  The producer's concrete
      # `List<int32>`-field read then faulted with InvalidCastException.  This
      # builds the dep + consumer across a real assembly boundary and asserts the
      # producer reads the concrete list it was handed.
      - name: Cross-package record construct-in-consumer (D-progress-481)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "rdep"
          version = "0.1.0"
          [project]
          name = "RDep3"
          output_assembly = "Lyric.RDep3.dll"
          [project.packages]
          "RDep3" = "src"
          TOML
          cat > "$work/dep/src/rdep.l" <<'LYR'
          package RDep3
          pub record Box { tags: List[Int]; name: String }
          pub func describe(b: in Box): String { toString(b.tags.count) + ":" + b.name }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "rapp"
          version = "0.1.0"
          [project]
          name = "RApp3"
          [project.packages]
          "RApp3" = "src"
          [dependencies]
          rdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package RApp3
          import RDep3
          import Std.Console as Console
          func main(): Unit {
            val b = Box(tags = [1, 2, 3, 4], name = "hi")
            Console.println(describe(b))
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          cp "$work/dep/bin/Lyric.RDep3.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet RApp3.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "4:hi" ]; then
            echo "::error::cross-package record construct-in-consumer returned '$got' (expected '4:hi'); #2592 slice-2 regressed"
            exit 1
          fi
          echo "cross-package record construct-in-consumer builds the concrete list"

      # Cross-package union construct+match (#2897).  A PRODUCER package exports a
      # union with a `List[Int]` payload case; the CONSUMER constructs a case and
      # matches it across an assembly boundary.  Verifies that union-case construction
      # in the consumer correctly stores a concrete `List<int32>` and that the match
      # binding reads back the right count and element values.
      - name: Cross-package union construct+match (#2897)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/udep/src" "$work/uapp/src"
          cat > "$work/udep/lyric.toml" <<'TOML'
          [package]
          name = "udep"
          version = "0.1.0"
          [project]
          name = "UDep"
          output_assembly = "Lyric.UDep.dll"
          [project.packages]
          "UDep" = "src"
          TOML
          cat > "$work/udep/src/udep.l" <<'LYR'
          package UDep
          pub union Payload {
            case Items(vals: List[Int])
            case Empty
          }
          pub func sumPayload(p: in Payload): Int {
            match p {
              case Items(vals) -> {
                var s = 0
                var i = 0
                while i < vals.count { s = s + vals[i]; i = i + 1 }
                s
              }
              case Empty -> 0
            }
          }
          LYR
          cat > "$work/uapp/lyric.toml" <<'TOML'
          [package]
          name = "uapp"
          version = "0.1.0"
          [project]
          name = "UApp"
          [project.packages]
          "UApp" = "src"
          [dependencies]
          udep = { path = "../udep" }
          TOML
          cat > "$work/uapp/src/uapp.l" <<'LYR'
          package UApp
          import UDep
          import Std.Console as Console
          func main(): Unit {
            val p = Items(vals = [10, 20, 30])
            Console.println(toString(sumPayload(p)))
          }
          LYR
          "$lyric_bin" build --manifest "$work/udep/lyric.toml"
          "$lyric_bin" build --manifest "$work/uapp/lyric.toml"
          cp "$work/udep/bin/Lyric.UDep.dll" "$work/uapp/bin/"
          got="$(cd "$work/uapp/bin" && dotnet UApp.dll | tail -1 | tr -d '\r\n')"
          echo "cross-package union consumer printed: '$got'"
          if [ "$got" != "60" ]; then
            echo "::error::cross-package union construct+match returned '$got', expected '60' (#2897)"
            exit 1
          fi
          echo "cross-package union construct+match with List[Int] payload works (#2897)"

      # Construction-position collExpect coverage (#2592 slice 3, D-progress-482).
      # Verifies that the self-hosted `codegen.l` `collExpect` push at four positions
      # produces genuine concrete `List<T>` rather than `List<object>`:
      #   1. Return position: `func f(): List[Int] { [10,20,30] }` — return-type push
      #   2. Call argument: `sumList([100,200,300])` — parameter-type push
      #   3. `var` reassignment: `xs = [1,2,3]` — local-tracked-type push
      #   4. Nested literal: `[[10,20],[30,40,50]]` — element-type push for inner list
      # All four positions require the SELF-HOSTED emitter (`lyric test` via the
      # in-process `Msil.Bridge`).  `lyric run` compiles through the F# bootstrap
      # emitter, which does not push `collExpect` for positions 1-3 — it builds
      # `List<object>` for those positions and the CLR faults with
      # `InvalidCastException` when the concrete-typed operation runs at runtime.
      # Guarded by a `.bootstrap/stage1` presence check (::warning if missing).
      - name: Construction-position collExpect coverage (#2592 slice 3, self-hosted)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping collExpect construction-position self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping collExpect construction-position self-test"
            exit 1
          fi
          work="$(mktemp -d)"
          # The self-hosted type checker treats `[...]` literals as `slice[T]`, not
          # `List[T]`, so collExpect at function-return / call-arg / reassignment
          # positions requires the record-field construction path where the emitter
          # propagates the field's `List[T]` expected type into the literal
          # (T0060/T0070/T0043 type errors block the direct List-position paths — a
          # self-hosted type-checker gap tracked in #2394).  All four positions are
          # validated here via record fields: construct, pass as field, reassign as
          # field, and nest as inner field.
          cat > "$work/c3.l" <<'LYR'
          @test_module
          package C3
          import Std.Testing
          record IntSeq { vals: List[Int] }
          func makeSeq(): IntSeq { IntSeq(vals = [10, 20, 30]) }
          func sumSeq(seq: in IntSeq): Int {
            var s = 0
            var i = 0
            while i < seq.vals.count { s = s + seq.vals[i]; i = i + 1 }
            s
          }
          test "record-field construction builds concrete List[Int]" {
            val seq = makeSeq()
            assertEqualInt(seq.vals.count, 3, "count")
            assertEqualInt(seq.vals[0] + seq.vals[1] + seq.vals[2], 60, "sum")
          }
          test "record-field in call-arg position builds concrete List[Int]" {
            assertEqualInt(sumSeq(IntSeq(vals = [100, 200, 300])), 600, "sum")
          }
          test "record-field reassignment builds concrete List[Int]" {
            var seq = IntSeq(vals = [0])
            seq = IntSeq(vals = [1, 2, 3])
            assertEqualInt(seq.vals.count, 3, "count")
            assertEqualInt(seq.vals[0] + seq.vals[2], 4, "sum-first-last")
          }
          test "nested record-field builds concrete List[Int] for inner" {
            val a = IntSeq(vals = [10, 20])
            val b = IntSeq(vals = [30, 40, 50])
            assertEqualInt(a.vals.count, 2, "inner0 count")
            assertEqualInt(b.vals.count, 3, "inner1 count")
            assertEqualInt(a.vals[0] + a.vals[1], 30, "inner0 sum")
          }
          LYR
          "$lyric_bin" test "$work/c3.l"
          echo "collExpect propagates correctly via record-field construction positions (self-hosted)"
          echo "record-field collExpect builds inner lists as concrete List<int32>"

      # `Sort.sortStrings(list.toArray())` end-to-end (#2592 slice 4, D-progress-483).
      # The #2592 headline bug: self-hosted callers passed a `List`-backed slice to
      # the F#-built `Std.Sort.sortStrings(String[])`, which returned the unsorted
      # input because the array-based F# body couldn't walk a `List` value.
      # The `cli.l::sortFileList` workaround is NOT retired in this PR (retirement
      # is deferred to stage-2 self-hosting; see D-progress-483 for the rationale).
      # This test confirms the underlying mechanism works end-to-end: `MConcreteList`
      # values support `.toArray()` and `coerceCallArgMsil` auto-converts
      # `MConcreteList → MArray` at call sites (D-progress-483).
      # Test builds a `List[String]`, converts via `.toArray()`, sorts, and
      # asserts lexicographic order.
      - name: Sort.sortStrings(list.toArray()) end-to-end (#2592 slice 4)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.Sort.dll" ]; then
            echo "::error::Lyric.Stdlib.Sort.dll not staged — slice-4 test cannot run"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          cat > "$work/s4.l" <<'LYR'
          package S4
          import Std.Sort as Sort
          import Std.Console as Console
          func main(): Unit {
            val files: List[String] = newList()
            files.add("gamma.l")
            files.add("alpha.l")
            files.add("beta.l")
            val sorted = Sort.sortStrings(files.toArray())
            var acc = ""
            var i = 0
            while i < sorted.length {
              if i > 0 { acc = acc + " " }
              acc = acc + sorted[i]
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # Capture stdout and stderr separately so a trailing compiler warning
          # printed to stderr does not replace the program output in the comparison.
          # `lyric run` also prints its "built <path> in <N>ms" progress line to
          # stdout before the program output, so drop those lines explicitly
          # (the old `tail -1` was filtering them implicitly).
          s4_stderr="$work/s4.err"
          if ! out="$("$lyric_bin" run "$work/s4.l" 2>"$s4_stderr")"; then
            echo "::error::lyric run failed for slice-4 test"
            cat "$s4_stderr" >&2
            exit 1
          fi
          # Drop build-progress lines, then trim newlines to normalise output.
          out="$(printf '%s\n' "$out" | grep -v '^built ' | tr -d '\r\n')"
          echo "slice-4 program printed: '$out'"
          if [ "$out" != "alpha.l beta.l gamma.l" ]; then
            echo "::error::Sort.sortStrings(list.toArray()) returned '$out' (expected 'alpha.l beta.l gamma.l'); #2592 slice-4 regressed"
            cat "$s4_stderr" >&2
            exit 1
          fi
          echo "Sort.sortStrings(list.toArray()) returns lexicographically sorted result"

      # NOTE (#2908): An implicit `List[T]`→`slice[T]` coercion test (passing a
      # concrete `List[T]` directly to a function expecting `slice[T]`, without
      # `.toArray()`) is not added here.  The self-hosted type checker rejects
      # `List[T]` where `slice[T]` is expected (only the reverse — `slice[T]`
      # satisfying `List[T]` — is allowed, per `typechecker_exprs.l`).  The
      # `coerceCallArgMsil` MSIL-codegen path that performs this coercion is already
      # exercised by `Sort.sortStrings(list.toArray())` above, which adds the
      # explicit `.toArray()` call.  A purely implicit coercion would require a
      # type-checker change to widen `List[T]` to `slice[T]`, which is a separate
      # design decision.

      # Std.Xml / Std.Yaml staging check (#2592 slice 4 — curated-package
      # exclusions retired, D-progress-480).  `Xml` and `Yaml` are now in
      # CURATED_PACKAGES in `scripts/stage-selfhosted-stdlib.sh`.
      # A runtime smoke test via `lyric run` is deliberately omitted:
      # the F# bootstrap emitter stack-overflows (exit 134) for ANY external
      # code that transitively uses `XmlNode` or `XmlDoc` as a type parameter
      # (including `List[XmlNode]` returned by `elementChildren`), because
      # the emitter recursively resolves all field types of external types and
      # `XmlNode` contains a self-referential `List[XmlNode]` field.  The
      # existing `xml_tests.l` passes because it is compiled against Xml source
      # (in-flight, not DLL-restored), which avoids DLL-based recursive lookup.
      # DLL presence is the authoritative check for slice 4; correctness of the
      # Xml and Yaml APIs is covered by the stdlib emitter test suite.
      - name: Std.Xml and Std.Yaml staged (#2592 slice 4)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.Xml.dll" ]; then
            echo "::error::Lyric.Stdlib.Xml.dll not staged — curated-package exclusion not retired"
            exit 1
          fi
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.Yaml.dll" ]; then
            echo "::error::Lyric.Stdlib.Yaml.dll not staged — curated-package exclusion not retired"
            exit 1
          fi
          echo "Std.Xml and Std.Yaml DLLs are staged alongside the AOT binary"

      # Slice-length / String-comparison self-test (#2539).  Exercises two
      # self-hosted MSIL codegen fixes: (1) `String` relational operators
      # (`<` / `>` / `<=` / `>=`) route through `String.CompareOrdinal`
      # rather than a raw integer `clt` / `cgt` on the string references;
      # (2) `slice.length` and slice indexing route through the
      # collection-count / `IList.get_Item` path so they work on the
      # `List`-backed slice representation (literal, `toArray()` result,
      # `slice[T]` parameter, and genuine `String.split` array).  Run via
      # native `lyric test`, which compiles the @test_module in-process
      # through the self-hosted `Msil.Bridge`.  Imports only `Std.*`.
  e2e-cli-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      - name: CLI project-aware-defaults e2e smoke test
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping CLI e2e smoke test"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/src/nested"
          cat > "$work/lyric.toml" <<'TOML'
          [package]
          name    = "Demo"
          version = "0.1.0"

          [project]
          name            = "Demo"
          output          = "single"
          output_assembly = "Demo.dll"

          [project.packages]
          "Demo" = "src/main.l"
          TOML
          cat > "$work/src/main.l" <<'LYR'
          package Demo
          import Std.Core
          import Std.Console as Console
          pub func main(): Int { Console.println("ok"); 0 }
          LYR
          # 1. Bare `lyric` from a nested subdir discovers the project and builds it.
          ( cd "$work/src/nested" && "$bin_abs" )
          test -f "$work/bin/Demo.dll" || { echo "expected $work/bin/Demo.dll"; exit 1; }
          # 2. --help exits 0.
          "$bin_abs" --help >/dev/null
          # 3. Unknown command exits non-zero and suggests the nearest command.
          if "$bin_abs" buld >"${work}/lyric_buld.out" 2>&1; then
            echo "expected non-zero exit for unknown command"; exit 1
          fi
          grep -q "did you mean 'build'?" "${work}/lyric_buld.out" || {
            echo "expected did-you-mean suggestion"; cat "${work}/lyric_buld.out"; exit 1; }
          # 4. Bare `lyric` outside any project exits non-zero (usage).
          empty="$(mktemp -d)"
          if ( cd "$empty" && "$bin_abs" ); then
            echo "expected non-zero exit for bare lyric outside a project"; exit 1
          fi
          echo "CLI project-aware-defaults e2e smoke test passed"

      # Release entry-detection self-test — exercises Lyric.Release's pure
      # source-introspection helpers (packageNameOf / declaresEntryMain) via
      # native `lyric test`.  The Lyric.Release compiler-package import is
      # resolved by linking the stage-1 bundle DLLs (#2364); no
      # `LYRIC_LOAD_COMPILER=1` recompile.  Part of #1975.
      - name: Release Native AOT e2e (lyric build --release)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping release e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cat > "$work/hello.l" <<'LYR'
          package Hello
          import Std.Core
          import Std.Console as Console
          import Std.Collections
          pub func main(): Int {
            val xs: List[Int] = newList()
            xs.add(40); xs.add(2)
            Console.println("native release: " + toString(xs[0] + xs[1]))
            0
          }
          LYR
          "$bin_abs" build --release "$work/hello.l"
          test -x "$work/hello" || { echo "expected native binary $work/hello"; exit 1; }
          out="$("$work/hello")"
          echo "binary output: $out"
          [ "$out" = "native release: 42" ] || { echo "unexpected output: $out"; exit 1; }
          # JVM release fails loud rather than producing a managed artifact.
          if "$bin_abs" build --release --target jvm "$work/hello.l" >/dev/null 2>&1; then
            echo "expected non-zero exit for --release --target jvm"; exit 1
          fi
          echo "Release Native AOT e2e passed"

      # Auto-restore-on-build end-to-end — `lyric build` resolves dependencies
      # when lyric.lock is missing or stale, and `--no-restore` opts out (#1971).
      # Driven through the real binary because the staleness check reads the
      # filesystem (can't be a `lyric test` self-test, #2001).
      - name: Auto-restore-on-build e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping auto-restore e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Lib = { path = "../lib" }
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("app built"); 0 }\n' > "$work/app/src/main.l"
          # A second library, declared as a dependency only in the stale-lock
          # case below so the lock written for the first build is out of date.
          mkdir -p "$work/lib2/src"
          cat > "$work/lib2/lyric.toml" <<'TOML'
          [package]
          name = "Lib2"
          version = "0.1.0"
          [project]
          name = "Lib2"
          output = "single"
          output_assembly = "Lib2.dll"
          [project.packages]
          "Lib2" = "src/lib2.l"
          TOML
          printf 'package Lib2\nimport Std.Core\npub func two(): Int { 2 }\n' > "$work/lib2/src/lib2.l"
          ( cd "$work/lib" && "$bin_abs" build )
          ( cd "$work/lib2" && "$bin_abs" build )
          # 1. No lock -> auto-restore writes it and the build succeeds.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar1.out" )
          grep -q "resolving dependencies" "$work/ar1.out" || { echo "expected auto-restore message"; exit 1; }
          test -f "$work/app/lyric.lock" || { echo "expected lyric.lock to be created"; exit 1; }
          # 2. In-sync lock -> no re-restore.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar2.out" )
          if grep -q "resolving dependencies" "$work/ar2.out"; then echo "should not re-restore an in-sync lock"; exit 1; fi
          # 3. Stale lock -> a dependency added after the lock was written triggers
          #    a re-restore (the new dep is absent from lyric.lock).
          printf 'Lib2 = { path = "../lib2" }\n' >> "$work/app/lyric.toml"
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar3.out" )
          grep -q "resolving dependencies" "$work/ar3.out" || { echo "expected re-restore on a stale lock (new dep)"; exit 1; }
          # 4. --no-restore after deleting the lock -> no restore, lock not recreated.
          #    The build still succeeds (exit 0): both path deps are already built
          #    above, so no resolution is needed to compile against them.
          rm -f "$work/app/lyric.lock"
          ( cd "$work/app" && "$bin_abs" build --no-restore ) > "$work/ar4.out" 2>&1; rc=$?
          test "$rc" -eq 0 || { echo "--no-restore build should still succeed (exit 0), got $rc"; cat "$work/ar4.out"; exit 1; }
          if grep -q "resolving dependencies" "$work/ar4.out"; then echo "--no-restore should skip restore"; exit 1; fi
          test ! -f "$work/app/lyric.lock" || { echo "--no-restore should not recreate the lock"; exit 1; }
          echo "Auto-restore-on-build e2e passed"

      # Git-dependency restore + manifest-error rendering regression (#2082).
      # The F# emitter mis-resolved `Str.fromInt` to `Std.Char.fromInt` (both
      # imported), so urlToHash crashed (Char.fromInt requires n<=65535 vs a
      # ~2-billion hash) and manifest line:col rendered as garbled control
      # chars.  This step asserts: (a) a git-dep restore fails gracefully (no
      # unhandled exception / fromInt panic) with a non-zero exit; (b) a TOML
      # parse error renders a real `:<line>:<col>:` location.
      - name: Git-dep / manifest-error regression e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -uo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping git-dep regression"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          # (0) git dep -> successful resolution against a real local repo (#2126).
          #     The parsed git ref (tag/rev/branch) must round-trip to the resolver;
          #     it previously read back null and git deps never resolved.
          gitc="git -c commit.gpgsign=false -c tag.gpgsign=false -c user.email=t@t -c user.name=t"
          mkdir -p "$work/remote"
          ( cd "$work/remote" && git init -q -b main . && echo seed > f && $gitc add -A && $gitc commit -q -m init --no-gpg-sign && $gitc tag v1.0 )
          mkdir -p "$work/ok/src"
          cat > "$work/ok/lyric.toml" <<TOML
          [package]
          name = "Ok"
          version = "0.1.0"
          [project]
          name = "Ok"
          output = "single"
          output_assembly = "Ok.dll"
          [project.packages]
          "Ok" = "src/main.l"
          [dependencies]
          Dep = { git = "file://$work/remote", tag = "v1.0" }
          TOML
          printf 'package Ok\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/ok/src/main.l"
          ( cd "$work/ok" && HOME="$work/home" timeout 120 "$bin_abs" restore ) > "$work/ok.out" 2>&1
          okrc=$?
          echo "--- ok restore (rc=$okrc) ---"; cat "$work/ok.out"
          test "$okrc" -eq 0 || { echo "git-dep restore against a real repo should succeed"; exit 1; }
          grep -q "git:file://" "$work/ok/lyric.lock" || { echo "expected a git: lock entry for the resolved dep"; cat "$work/ok/lyric.lock"; exit 1; }
          # (a) git dep -> graceful failure, no crash.
          mkdir -p "$work/app/src"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Bar = { git = "https://example.invalid/bar.git", tag = "v1.0" }
          TOML
          printf 'package App\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/app/src/main.l"
          # `|| rc=$?` keeps the (expected) non-zero restore from tripping the
          # step's `bash -e` errexit before we can inspect the exit code.
          rc=0
          ( cd "$work/app" && timeout 90 "$bin_abs" restore ) > "$work/restore.out" 2>&1 || rc=$?
          echo "--- restore output (rc=$rc) ---"; cat "$work/restore.out"
          if grep -qiE "Unhandled exception|requires failed|fromInt|NullReferenceException" "$work/restore.out"; then
            echo "git-dep restore crashed instead of failing gracefully"; exit 1
          fi
          test "$rc" -ne 0 || { echo "git-dep restore of an unreachable repo should exit non-zero"; exit 1; }
          # (b) manifest parse error -> real :line:col: location, not garbled chars.
          mkdir -p "$work/bad"
          printf '[package]\nname = "X"\nversion = "0.1.0"\n[dependencies]\nFoo = { git = \n' > "$work/bad/lyric.toml"
          ( cd "$work/bad" && "$bin_abs" restore ) > "$work/bad.out" 2>&1 || true
          echo "--- manifest-error output ---"; cat "$work/bad.out"
          grep -qE 'lyric\.toml:[0-9]+:[0-9]+:' "$work/bad.out" || {
            echo "manifest parse error did not render a numeric :line:col: location"; exit 1; }
          echo "Git-dep / manifest-error regression e2e passed"

      # `lyric add` end-to-end — adds/updates dependency entries in the manifest
      # (registry / path / git / nuget), is idempotent, and refuses to write an
      # unparseable manifest (#1973).  Binary-driven because the command reads
      # and writes the filesystem (can't be a `lyric test` self-test, #2001).
      - name: lyric add e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric add e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app/src/main.l"
          ( cd "$work/lib" && "$bin_abs" build )
          # registry @version (no restore — offline)
          ( cd "$work/app" && "$bin_abs" add Foo@1.2.0 --no-restore )
          grep -q '^Foo = "1.2.0"$' "$work/app/lyric.toml" || { echo "registry add missing"; cat "$work/app/lyric.toml"; exit 1; }
          # idempotent update in place (no duplicate)
          ( cd "$work/app" && "$bin_abs" add Foo@2.0.0 --no-restore )
          [ "$(grep -c '^Foo = ' "$work/app/lyric.toml")" = "1" ] || { echo "re-add duplicated Foo"; exit 1; }
          grep -q '^Foo = "2.0.0"$' "$work/app/lyric.toml" || { echo "re-add did not update Foo"; exit 1; }
          # nuget table created
          ( cd "$work/app" && "$bin_abs" add Newtonsoft.Json@13.0.3 --nuget --no-restore )
          grep -q '^\[nuget\]$' "$work/app/lyric.toml" || { echo "nuget table not created"; exit 1; }
          grep -q '^Newtonsoft.Json = "13.0.3"$' "$work/app/lyric.toml" || { echo "nuget entry missing"; exit 1; }
          # git inline-table
          ( cd "$work/app" && "$bin_abs" add Bar --git https://example.com/bar.git --tag v1.0 --no-restore )
          grep -q '^Bar = { git = "https://example.com/bar.git", tag = "v1.0" }$' "$work/app/lyric.toml" || { echo "git entry missing"; cat "$work/app/lyric.toml"; exit 1; }
          # restore + build round-trip on a CLEAN manifest: add a path dep that
          # resolves offline and let the implicit restore run.  (The asserts
          # above use --no-restore, so the bogus registry/nuget/git entries are
          # never fetched — restoring them would hit the network.)
          mkdir -p "$work/app2/src"
          cat > "$work/app2/lyric.toml" <<'TOML'
          [package]
          name = "App2"
          version = "0.1.0"
          [project]
          name = "App2"
          output = "single"
          output_assembly = "App2.dll"
          [project.packages]
          "App2" = "src/main.l"
          TOML
          printf 'package App2\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app2/src/main.l"
          ( cd "$work/app2" && "$bin_abs" add Lib --path ../lib )
          test -f "$work/app2/lyric.lock" || { echo "expected the implicit restore to write lyric.lock"; exit 1; }
          ( cd "$work/app2" && "$bin_abs" build )
          # validation: --tag without --git fails
          if ( cd "$work/app" && "$bin_abs" add X --tag v1 --no-restore ); then
            echo "expected failure for --tag without --git"; exit 1
          fi
          echo "lyric add e2e passed"

      # `lyric init` end-to-end — scaffold an app, run + build it, and check the
      # --lib / --force / bad-name / overwrite-refusal behaviours (#1972).
      - name: lyric init e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping init e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cd "$work"
          # 1. scaffold an app, run it, build it.
          "$bin_abs" init demo
          test -f demo/lyric.toml || { echo "lyric.toml not scaffolded"; exit 1; }
          test -f demo/src/main.l || { echo "src/main.l not scaffolded"; exit 1; }
          test -f demo/.gitignore || { echo ".gitignore not scaffolded"; exit 1; }
          grep -q 'package Demo' demo/src/main.l || { echo "package name not capitalised"; exit 1; }
          out="$( cd demo && "$bin_abs" run src/main.l )"
          echo "run output: $out"
          echo "$out" | grep -q "Hello from Demo!" || { echo "scaffolded app did not run"; exit 1; }
          ( cd demo && "$bin_abs" build )
          # 2. --lib scaffolds a buildable library.
          "$bin_abs" init mylib --lib
          test -f mylib/src/lib.l || { echo "--lib did not scaffold src/lib.l"; exit 1; }
          ( cd mylib && "$bin_abs" build )
          # 3. overwrite refused without --force.
          if "$bin_abs" init demo; then echo "expected refusal to overwrite lyric.toml"; exit 1; fi
          # 4. --force + --name overwrites lyric.toml but must not clobber src/main.l.
          "$bin_abs" init demo --force --name Renamed
          grep -q 'name = "Renamed"' demo/lyric.toml || { echo "--name/--force did not apply"; exit 1; }
          grep -q 'Hello from Demo!' demo/src/main.l || { echo "--force clobbered src/main.l"; exit 1; }
          # 5. bad name rejected.
          if "$bin_abs" init weird --name "bad-name"; then echo "expected rejection of invalid name"; exit 1; fi
          echo "lyric init e2e passed"

      # `lyric run --watch` end-to-end — runs once, then re-runs when the source
      # changes (#1974).  Driven in the background; we edit the file, wait for a
      # poll cycle, then kill the watcher and assert the re-run happened.
      - name: lyric run --watch e2e
        timeout-minutes: 2
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping watch e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v1"); 0 }\n' > "$work/hello.l"
          ( "$bin_abs" run "$work/hello.l" --watch > "$work/out.log" 2>&1 ) &
          wpid=$!
          sleep 8
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v2"); 0 }\n' > "$work/hello.l"
          sleep 6
          kill "$wpid" 2>/dev/null || true
          wait "$wpid" 2>/dev/null || true
          echo "--- watch output ---"; cat "$work/out.log"
          grep -q "watch-v1" "$work/out.log" || { echo "expected initial run output"; exit 1; }
          grep -q "change detected" "$work/out.log" || { echo "expected change detection"; exit 1; }
          grep -q "watch-v2" "$work/out.log" || { echo "expected re-run after edit"; exit 1; }
          echo "lyric run --watch e2e passed"

      # Coverage collection — informational only, not a blocking gate (#1117).
      # Runs on push to main (not pull_request) to keep PR latency low.
      # Uses `dotnet-coverage` CLI against the same Expecto-based test
      # binaries the build-and-test steps already produce, so no project-file
      # restructuring is required.  The Cobertura report is uploaded as a
      # CI artifact; viewers / trend-trackers can ingest it from there.
  coverage:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: >-
      needs.build.outputs.has_code_changes == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      - name: Collect code coverage (main only)
        continue-on-error: true
        working-directory: bootstrap
        run: |
          set -euo pipefail
          # The `dotnet-coverage` tool wraps the same XPlat Code Coverage
          # engine that `dotnet test --collect:"XPlat Code Coverage"` uses,
          # but lets us drive the Expecto console-app test projects without
          # adding Microsoft.NET.Test.Sdk + Expecto.TestSdk to every fsproj.
          # Pinned exact version for reproducibility (#1163); bump when
          # rolling forward, don't switch to a floating range.
          dotnet tool install --global dotnet-coverage --version 17.16.7 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ../coverage
          for proj in tests/Lyric.Lexer.Tests \
                      tests/Lyric.Parser.Tests \
                      tests/Lyric.TypeChecker.Tests \
                      tests/Lyric.Emitter.Tests \
                      tests/Lyric.Cli.Tests; do
            name="$(basename "$proj")"
            dotnet-coverage collect \
              --output "../coverage/${name}.cobertura.xml" \
              --output-format cobertura \
              dotnet run --project "$proj" --no-build --configuration "$BUILD_CONFIG" \
              || echo "::warning::coverage run failed for ${name}; continuing"
          done
          echo "coverage artifacts:"
          ls -lah ../coverage || true

      - name: Upload coverage artifact (main only)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: code-coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 30

  build-and-test:
    runs-on: ubuntu-latest
    needs: [build, test-bootstrap, compiler-self-tests-dotnet-a, compiler-self-tests-dotnet-b, aot-smoke, compiler-self-tests-jvm, ecosystem-security-tests, stdlib-builds, crosspackage-and-codegen-tests, e2e-cli-tests]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Aggregate CI results
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"

  promote-pr-if-ready:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions:
      pull-requests: write
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == true &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Mark PR ready for review if build succeeds
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            if (!prNumber || isNaN(prNumber)) {
              console.log('[auto-promote] PR_NUMBER env var is missing or invalid — skipping');
              return;
            }
            console.log(`[auto-promote] PR #${prNumber}: All CI passed, checking quality gates before promotion`);

            // Fetch fresh PR state to verify mergeable_state.
            // GitHub computes mergeable_state asynchronously; it may be 'unknown'
            // or transiently 'dirty' immediately after CI completes. Re-poll up to 6
            // times (with linear backoff: 5s, 7s, 9s, 11s, 13s) before
            // giving up. Both 'unknown' and transient 'dirty' can resolve on retry,
            // so we keep polling for both. If the state doesn't stabilize, skip this
            // run (it will retry on the next CI event) rather than risk promoting a PR
            // whose conflict state has not yet been accurately computed.
            let freshPr;
            let mergeableState;
            const MAX_POLLS = 6;
            for (let poll = 1; poll <= MAX_POLLS; poll++) {
              freshPr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              mergeableState = freshPr.data.mergeable_state;
              if (mergeableState !== 'unknown' && mergeableState !== 'dirty') break;
              if (poll < MAX_POLLS) {
                const delayMs = 3000 + (poll * 2000); // 5s, 7s, 9s, 11s, 13s
                console.log(`[auto-promote] PR #${prNumber}: mergeable_state is '${mergeableState}' (poll ${poll}/${MAX_POLLS}), retrying in ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            // Check for merge conflicts (mergeable_state: dirty).
            // If it's still dirty after all retries, skip to avoid promoting a truly conflicted PR.
            if (mergeableState === 'dirty') {
              console.log(`[auto-promote] PR #${prNumber}: WARN merge conflicts detected (mergeable_state=dirty) after ${MAX_POLLS} polls — skipping promotion to avoid promoting a conflicted PR`);
              return;
            }
            if (mergeableState === 'unknown') {
              console.log(`[auto-promote] PR #${prNumber}: WARN mergeable_state still 'unknown' after ${MAX_POLLS} polls — skipping promotion this run (will retry on next CI event)`);
              return;
            }

            // The REST API silently ignores `draft: false` on PATCH /pulls/:number.
            // Converting a draft PR to ready-for-review requires the GraphQL mutation.
            const prNodeId = freshPr.data.node_id;
            try {
              const result = await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest {
                      isDraft
                      number
                    }
                  }
                }
              `, { prId: prNodeId });
              const prResult = result?.markPullRequestReadyForReview?.pullRequest;
              if (!prResult) {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR mutation returned an unexpected response shape: ${JSON.stringify(result)}`);
              } else if (!prResult.isDraft) {
                console.log(`[auto-promote] PR #${prNumber}: OK successfully promoted to ready for review`);
              } else {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR mutation succeeded but PR is still draft — promotion did not take effect`);
              }
            } catch (error) {
              const isSoftError =
                error.status === 403 ||
                (Array.isArray(error.errors) && error.errors.some(e => e.type === 'FORBIDDEN' || e.type === 'NOT_FOUND'));
              if (isSoftError) {
                console.log(`[auto-promote] PR #${prNumber}: WARN skipping promotion — permission denied or PR not found (check that the workflow token has pull-requests:write scope and that org policy permits the workflow to update PRs)`);
              } else {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR GraphQL error: ${error.message}`);
              }
            }
