name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # `[Lyric.*]*` instruments every type in our source assemblies;
      # `[*.Tests]*` keeps the test projects themselves out of the
      # numerator/denominator so the report measures product code only.
      COVERLET_INCLUDE: '[Lyric.*]*'
      COVERLET_EXCLUDE: '[*.Tests]*'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Determine whether any non-docs files changed. When only book/,
      # docs/, or *.md files changed (docs-only PR), the expensive
      # build and test steps are skipped and the job exits green so
      # that required status checks are satisfied and auto-merge can
      # proceed.
      - name: Detect code changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # First-ever push to a branch has no parent; treat as code change.
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "First push — assuming code changes."
            exit 0
          fi

          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | grep -v '^book/' \
            | grep -v '^docs/' \
            | grep -v '\.md$' \
            | head -1) || changed="yes"

          if [ -n "$changed" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected — full build and test will run."
          else
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — build and test skipped."
          fi

      - name: Set up .NET (uses bootstrap/global.json)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Z3 (for the Phase 4 verifier smoke tests)
        if: steps.changes.outputs.has_code_changes == 'true'
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install coverage tools
        if: steps.changes.outputs.has_code_changes == 'true'
        run: |
          dotnet tool install --global coverlet.console
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet restore Bootstrap.sln

      - name: Build
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet build Bootstrap.sln --configuration Debug --no-restore

      # ----------------------------------------------------------------
      # Tests run normally first — these gates determine build pass/fail.
      # Coverage is then collected as a best-effort second pass below;
      # if coverlet hits a snag (F#/Expecto edge case, version drift),
      # the build still passes and the coverage step just skips its
      # report.
      # ----------------------------------------------------------------

      - name: Lexer tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Lexer.Tests --no-build --configuration Debug

      - name: Parser tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Parser.Tests --no-build --configuration Debug

      - name: Type-checker tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.TypeChecker.Tests --no-build --configuration Debug

      - name: Emitter tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Emitter.Tests --no-build --configuration Debug

      - name: CLI tests
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: dotnet run --project tests/Lyric.Cli.Tests --no-build --configuration Debug

      - name: Collect coverage (best-effort)
        id: coverage
        if: steps.changes.outputs.has_code_changes == 'true'
        continue-on-error: true
        working-directory: bootstrap
        run: |
          set +e
          mkdir -p coverage

          # Discover every test DLL under tests/*.Tests and run each
          # through coverlet. A failure on a single project is logged
          # but doesn't stop the others — the merged report shows
          # whatever was successfully measured.
          status=0
          for proj in tests/*.Tests; do
            name=$(basename "$proj" | tr '[:upper:]' '[:lower:]' \
              | sed 's/^lyric\.//; s/\.tests$//')
            dll="$proj/bin/Debug/net10.0/$(basename "$proj").dll"
            if [ ! -f "$dll" ]; then
              echo "::warning::test dll not found: $dll"
              continue
            fi
            echo "=== coverage: $name ==="
            coverlet "$dll" \
              --target dotnet \
              --targetargs "$dll" \
              --format cobertura \
              --output "coverage/${name}.cobertura.xml" \
              --include "${COVERLET_INCLUDE}" \
              --exclude "${COVERLET_EXCLUDE}" \
              --verbosity normal
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "::warning::coverlet exited $rc for $name"
              status=$rc
            fi
          done
          # Surface a single overall status but never fail the step
          # (continue-on-error is set, but be explicit).
          echo "coverlet_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate coverage report
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: |
          shopt -s nullglob
          files=(coverage/*.cobertura.xml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No cobertura files found; skipping report."
            exit 0
          fi
          reportgenerator \
            -reports:'coverage/*.cobertura.xml' \
            -targetdir:coverage/report \
            -reporttypes:'Html;MarkdownSummaryGithub;Cobertura;TextSummary'

      - name: Append coverage to job summary
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: |
          {
            echo "## Code coverage"
            echo
            if [ -f coverage/report/SummaryGithub.md ]; then
              cat coverage/report/SummaryGithub.md
            else
              echo "_Coverage data not produced for this build._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print coverage summary to log
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: |
          if [ -f coverage/report/Summary.txt ]; then
            cat coverage/report/Summary.txt
          else
            echo "(no coverage summary)"
          fi

      - name: Upload coverage report artifact
        if: steps.changes.outputs.has_code_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: bootstrap/coverage/report/
          retention-days: 14
          if-no-files-found: warn

      - name: Smoke-test the CLI on examples
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: bootstrap
        run: |
          set -euo pipefail
          for ex in ../examples/*.l; do
            # Files annotated `@proof_required` are verifier-only;
            # run them through `lyric prove` instead of `lyric build`
            # (they intentionally have no `func main`).
            if head -n 1 "$ex" | grep -q '^@proof_required'; then
              echo "=== prove $ex ==="
              dotnet run --project src/Lyric.Cli --no-build --configuration Debug -- prove "$ex" --allow-unverified
            else
              echo "=== build $ex ==="
              # Use --target dotnet-legacy (F# bootstrap emitter) for smoke tests.
              # The self-hosted MSIL path (--target dotnet, the default) is still
              # experimental; the MSIL self-test suite (M1–M83) validates its PE layer.
              dotnet run --project src/Lyric.Cli --no-build --configuration Debug -- build "$ex" --force --target dotnet-legacy
            fi
          done
