      # the #5949 core-prelude resolution on the JVM target too.
      - name: BuildInfo --define runtime path on JVM (native lyric build --target jvm --define)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
