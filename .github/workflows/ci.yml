      # Release Native AOT end-to-end — `lyric build --release` produces a
      # self-contained native binary and runs it (#1975 / D079).  This is the
      # integration test for the AOT pipeline (host project + trampoline +
      # `dotnet publish -p:PublishAot=true`); it downloads the ILCompiler
      # package on first run, so it is the heaviest CLI step.
      - name: Release Native AOT e2e (lyric build --release)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping release e2e"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cat > "$work/hello.l" <<'LYR'
          package Hello
          import Std.Core
          import Std.Console as Console
          import Std.Collections
          pub func main(): Int {
            val xs: List[Int] = newList()
            xs.add(40); xs.add(2)
            Console.println("native release: " + toString(xs[0] + xs[1]))
            0
          }
          LYR
          "$bin_abs" build --release "$work/hello.l"
          test -x "$work/hello" || { echo "expected native binary $work/hello"; exit 1; }
          out="$("$work/hello")"
          echo "binary output: $out"
          [ "$out" = "native release: 42" ] || { echo "unexpected output: $out"; exit 1; }
          # JVM release fails loud rather than producing a managed artifact.
          if "$bin_abs" build --release --target jvm "$work/hello.l" >/dev/null 2>&1; then
            echo "expected non-zero exit for --release --target jvm"; exit 1
          fi
          echo "Release Native AOT e2e passed"

      # Auto-restore-on-build end-to-end — `lyric build` resolves dependencies
      # when lyric.lock is missing or stale, and `--no-restore` opts out (#1971).
      # Driven through the real binary because the staleness check reads the
      # filesystem (can't be a `lyric test` self-test, #2001).
      - name: Auto-restore-on-build e2e
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping auto-restore e2e"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Lib = { path = "../lib" }
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("app built"); 0 }\n' > "$work/app/src/main.l"
          # A second library, declared as a dependency only in the stale-lock
          # case below so the lock written for the first build is out of date.
          mkdir -p "$work/lib2/src"
          cat > "$work/lib2/lyric.toml" <<'TOML'
          [package]
          name = "Lib2"
          version = "0.1.0"
          [project]
          name = "Lib2"
          output = "single"
          output_assembly = "Lib2.dll"
          [project.packages]
          "Lib2" = "src/lib2.l"
          TOML
          printf 'package Lib2\nimport Std.Core\npub func two(): Int { 2 }\n' > "$work/lib2/src/lib2.l"
          ( cd "$work/lib" && "$bin_abs" build )
          ( cd "$work/lib2" && "$bin_abs" build )
          # 1. No lock -> auto-restore writes it and the build succeeds.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee /tmp/ar1.out )
          grep -q "resolving dependencies" /tmp/ar1.out || { echo "expected auto-restore message"; exit 1; }
          test -f "$work/app/lyric.lock" || { echo "expected lyric.lock to be created"; exit 1; }
          # 2. In-sync lock -> no re-restore.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee /tmp/ar2.out )
          if grep -q "resolving dependencies" /tmp/ar2.out; then echo "should not re-restore an in-sync lock"; exit 1; fi
          # 3. Stale lock -> a dependency added after the lock was written triggers
          #    a re-restore (the new dep is absent from lyric.lock).
          printf 'Lib2 = { path = "../lib2" }\n' >> "$work/app/lyric.toml"
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee /tmp/ar3.out )
          grep -q "resolving dependencies" /tmp/ar3.out || { echo "expected re-restore on a stale lock (new dep)"; exit 1; }
          # 4. --no-restore after deleting the lock -> no restore, lock not recreated.
          #    The build still succeeds (exit 0): both path deps are already built
          #    above, so no resolution is needed to compile against them.
          rm -f "$work/app/lyric.lock"
          ( cd "$work/app" && "$bin_abs" build --no-restore ) > /tmp/ar4.out 2>&1; rc=$?
          test "$rc" -eq 0 || { echo "--no-restore build should still succeed (exit 0), got $rc"; cat /tmp/ar4.out; exit 1; }
          if grep -q "resolving dependencies" /tmp/ar4.out; then echo "--no-restore should skip restore"; exit 1; fi
          test ! -f "$work/app/lyric.lock" || { echo "--no-restore should not recreate the lock"; exit 1; }
          echo "Auto-restore-on-build e2e passed"

      # Git-dependency restore + manifest-error rendering regression (#2082).
      # The F# emitter mis-resolved `Str.fromInt` to `Std.Char.fromInt` (both
      # imported), so urlToHash crashed (Char.fromInt requires n<=65535 vs a
      # ~2-billion hash) and manifest line:col rendered as garbled control
      # chars.  This step asserts: (a) a git-dep restore fails gracefully (no
      # unhandled exception / fromInt panic) with a non-zero exit; (b) a TOML
      # parse error renders a real `:<line>:<col>:` location.
      - name: Git-dep / manifest-error regression e2e
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -uo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping git-dep regression"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          # (0) git dep -> successful resolution against a real local repo (#2126).
          #     The parsed git ref (tag/rev/branch) must round-trip to the resolver;
          #     it previously read back null and git deps never resolved.
          gitc="git -c commit.gpgsign=false -c tag.gpgsign=false -c user.email=t@t -c user.name=t"
          mkdir -p "$work/remote"
          ( cd "$work/remote" && git init -q -b main . && echo seed > f && $gitc add -A && $gitc commit -q -m init --no-gpg-sign && $gitc tag v1.0 )
          mkdir -p "$work/ok/src"
          cat > "$work/ok/lyric.toml" <<TOML
          [package]
          name = "Ok"
          version = "0.1.0"
          [project]
          name = "Ok"
          output = "single"
          output_assembly = "Ok.dll"
          [project.packages]
          "Ok" = "src/main.l"
          [dependencies]
          Dep = { git = "file://$work/remote", tag = "v1.0" }
          TOML
          printf 'package Ok\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/ok/src/main.l"
          ( cd "$work/ok" && HOME="$work/home" timeout 120 "$bin_abs" restore ) > "$work/ok.out" 2>&1
          okrc=$?
          echo "--- ok restore (rc=$okrc) ---"; cat "$work/ok.out"
          test "$okrc" -eq 0 || { echo "git-dep restore against a real repo should succeed"; exit 1; }
          grep -q "git:file://" "$work/ok/lyric.lock" || { echo "expected a git: lock entry for the resolved dep"; cat "$work/ok/lyric.lock"; exit 1; }
          # (a) git dep -> graceful failure, no crash.
          mkdir -p "$work/app/src"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Bar = { git = "https://example.invalid/bar.git", tag = "v1.0" }
          TOML
          printf 'package App\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/app/src/main.l"
          # `|| rc=$?` keeps the (expected) non-zero restore from tripping the
          # step's `bash -e` errexit before we can inspect the exit code.
          rc=0
          ( cd "$work/app" && timeout 90 "$bin_abs" restore ) > "$work/restore.out" 2>&1 || rc=$?
          echo "--- restore output (rc=$rc) ---"; cat "$work/restore.out"
          if grep -qiE "Unhandled exception|requires failed|fromInt|NullReferenceException" "$work/restore.out"; then
            echo "git-dep restore crashed instead of failing gracefully"; exit 1
          fi
          test "$rc" -ne 0 || { echo "git-dep restore of an unreachable repo should exit non-zero"; exit 1; }
          # (b) manifest parse error -> real :line:col: location, not garbled chars.
          mkdir -p "$work/bad"
          printf '[package]\nname = "X"\nversion = "0.1.0"\n[dependencies]\nFoo = { git = \n' > "$work/bad/lyric.toml"
          ( cd "$work/bad" && "$bin_abs" restore ) > "$work/bad.out" 2>&1 || true
          echo "--- manifest-error output ---"; cat "$work/bad.out"
          grep -qE 'lyric\.toml:[0-9]+:[0-9]+:' "$work/bad.out" || {
            echo "manifest parse error did not render a numeric :line:col: location"; exit 1; }
          echo "Git-dep / manifest-error regression e2e passed"

      # `lyric add` end-to-end — adds/updates dependency entries in the manifest
      # (registry / path / git / nuget), is idempotent, and refuses to write an
      # unparseable manifest (#1973).  Binary-driven because the command reads
      # and writes the filesystem (can't be a `lyric test` self-test, #2001).
      - name: lyric add e2e
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping lyric add e2e"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app/src/main.l"
          ( cd "$work/lib" && "$bin_abs" build )
          # registry @version (no restore — offline)
          ( cd "$work/app" && "$bin_abs" add Foo@1.2.0 --no-restore )
          grep -q '^Foo = "1.2.0"$' "$work/app/lyric.toml" || { echo "registry add missing"; cat "$work/app/lyric.toml"; exit 1; }
          # idempotent update in place (no duplicate)
          ( cd "$work/app" && "$bin_abs" add Foo@2.0.0 --no-restore )
          [ "$(grep -c '^Foo = ' "$work/app/lyric.toml")" = "1" ] || { echo "re-add duplicated Foo"; exit 1; }
          grep -q '^Foo = "2.0.0"$' "$work/app/lyric.toml" || { echo "re-add did not update Foo"; exit 1; }
          # nuget table created
          ( cd "$work/app" && "$bin_abs" add Newtonsoft.Json@13.0.3 --nuget --no-restore )
          grep -q '^\[nuget\]$' "$work/app/lyric.toml" || { echo "nuget table not created"; exit 1; }
          grep -q '^Newtonsoft.Json = "13.0.3"$' "$work/app/lyric.toml" || { echo "nuget entry missing"; exit 1; }
          # git inline-table
          ( cd "$work/app" && "$bin_abs" add Bar --git https://example.com/bar.git --tag v1.0 --no-restore )
          grep -q '^Bar = { git = "https://example.com/bar.git", tag = "v1.0" }$' "$work/app/lyric.toml" || { echo "git entry missing"; cat "$work/app/lyric.toml"; exit 1; }
          # restore + build round-trip on a CLEAN manifest: add a path dep that
          # resolves offline and let the implicit restore run.  (The asserts
          # above use --no-restore, so the bogus registry/nuget/git entries are
          # never fetched — restoring them would hit the network.)
          mkdir -p "$work/app2/src"
          cat > "$work/app2/lyric.toml" <<'TOML'
          [package]
          name = "App2"
          version = "0.1.0"
          [project]
          name = "App2"
          output = "single"
          output_assembly = "App2.dll"
          [project.packages]
          "App2" = "src/main.l"
          TOML
          printf 'package App2\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app2/src/main.l"
          ( cd "$work/app2" && "$bin_abs" add Lib --path ../lib )
          test -f "$work/app2/lyric.lock" || { echo "expected the implicit restore to write lyric.lock"; exit 1; }
          ( cd "$work/app2" && "$bin_abs" build )
          # validation: --tag without --git fails
          if ( cd "$work/app" && "$bin_abs" add X --tag v1 --no-restore ); then
            echo "expected failure for --tag without --git"; exit 1
          fi
          echo "lyric add e2e passed"

      # `lyric init` end-to-end — scaffold an app, run + build it, and check the
      # --lib / --force / bad-name / overwrite-refusal behaviours (#1972).
      - name: lyric init e2e
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping init e2e"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cd "$work"
          # 1. scaffold an app, run it, build it.
          "$bin_abs" init demo
          test -f demo/lyric.toml || { echo "lyric.toml not scaffolded"; exit 1; }
          test -f demo/src/main.l || { echo "src/main.l not scaffolded"; exit 1; }
          test -f demo/.gitignore || { echo ".gitignore not scaffolded"; exit 1; }
          grep -q 'package Demo' demo/src/main.l || { echo "package name not capitalised"; exit 1; }
          out="$( cd demo && "$bin_abs" run src/main.l )"
          echo "run output: $out"
          echo "$out" | grep -q "Hello from Demo!" || { echo "scaffolded app did not run"; exit 1; }
          ( cd demo && "$bin_abs" build )
          # 2. --lib scaffolds a buildable library.
          "$bin_abs" init mylib --lib
          test -f mylib/src/lib.l || { echo "--lib did not scaffold src/lib.l"; exit 1; }
          ( cd mylib && "$bin_abs" build )
          # 3. overwrite refused without --force.
          if "$bin_abs" init demo; then echo "expected refusal to overwrite lyric.toml"; exit 1; fi
          # 4. --force + --name overwrites.
          "$bin_abs" init demo --force --name Renamed
          grep -q 'name = "Renamed"' demo/lyric.toml || { echo "--name/--force did not apply"; exit 1; }
          # 5. bad name rejected.
          if "$bin_abs" init weird --name "bad-name"; then echo "expected rejection of invalid name"; exit 1; fi
          echo "lyric init e2e passed"

      # `lyric run --watch` end-to-end — runs once, then re-runs when the source
      # changes (#1974).  Driven in the background; we edit the file, wait for a
      # poll cycle, then kill the watcher and assert the re-run happened.
      - name: lyric run --watch e2e
        if: steps.changes.outputs.has_code_changes == 'true'
        timeout-minutes: 2
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping watch e2e"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v1"); 0 }\n' > "$work/hello.l"
          ( "$bin_abs" run "$work/hello.l" --watch > "$work/out.log" 2>&1 ) &
          wpid=$!
          sleep 8
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v2"); 0 }\n' > "$work/hello.l"
          sleep 6
          kill "$wpid" 2>/dev/null || true
          wait "$wpid" 2>/dev/null || true
          echo "--- watch output ---"; cat "$work/out.log"
          grep -q "watch-v1" "$work/out.log" || { echo "expected initial run output"; exit 1; }
          grep -q "change detected" "$work/out.log" || { echo "expected change detection"; exit 1; }
          grep -q "watch-v2" "$work/out.log" || { echo "expected re-run after edit"; exit 1; }
          echo "lyric run --watch e2e passed"

      # Coverage collection — informational only, not a blocking gate (#1117).
      # Runs on push to main (not pull_request) to keep PR latency low.
      # Uses `dotnet-coverage` CLI against the same Expecto-based test
      # binaries the build-and-test steps already produce, so no project-file
      # restructuring is required.  The Cobertura report is uploaded as a
      # CI artifact; viewers / trend-trackers can ingest it from there.
      - name: Collect code coverage (main only)
        if: >-
          steps.changes.outputs.has_code_changes == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        continue-on-error: true
        working-directory: bootstrap
        run: |
          set -euo pipefail
          # The `dotnet-coverage` tool wraps the same XPlat Code Coverage
          # engine that `dotnet test --collect:"XPlat Code Coverage"` uses,
          # but lets us drive the Expecto console-app test projects without
          # adding Microsoft.NET.Test.Sdk + Expecto.TestSdk to every fsproj.
          # Pinned exact version for reproducibility (#1163); bump when
          # rolling forward, don't switch to a floating range.
          dotnet tool install --global dotnet-coverage --version 17.16.7 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ../coverage
          for proj in tests/Lyric.Lexer.Tests \
                      tests/Lyric.Parser.Tests \
                      tests/Lyric.TypeChecker.Tests \
                      tests/Lyric.Emitter.Tests \
                      tests/Lyric.Cli.Tests; do
            name="$(basename "$proj")"
            dotnet-coverage collect \
              --output "../coverage/${name}.cobertura.xml" \
              --output-format cobertura \
              dotnet run --project "$proj" --no-build --configuration "$BUILD_CONFIG" \
              || echo "::warning::coverage run failed for ${name}; continuing"
          done
          echo "coverage artifacts:"
          ls -lah ../coverage || true

      - name: Upload coverage artifact (main only)
        if: >-
          steps.changes.outputs.has_code_changes == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 30

      - name: Mark PR ready for review if build succeeds
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == true
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log(`Marking PR #${pr.number} as ready for review`);
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              draft: false
            });
            console.log(`PR #${pr.number} is now ready for review`);
