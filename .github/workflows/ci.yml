            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Task JVM tests"
            exit 1
          fi
          work="$(mktemp -d)"
          "$lyric_bin" build lyric-stdlib/tests/task_tests.l --target jvm -o "$work/task_tests.jar"
          out="$(java -jar "$work/task_tests.jar")"
          echo "$out" | tail -3
          grep -q "task tests: ok" <<< "$out" || { echo "::error::Std.Task JVM suite did not report success"; exit 1; }

      # Extra barrier (JVM batch 5-split): keeps this group under the ~14-step
      # cap (was 15) so the runner's parallel-step status collection doesn't
      # misreport a passing step as failed.
      - name: Wait for parallel tests (JVM batch 5-split)
        wait-all: true

      # Std.Task ambient-cancellation-slot regression coverage (#5342):
      # installToken/currentToken/restoreToken/hasAmbient, JVM-only (the
      # .NET twin crashes on its first call today, a separate pre-existing
      # bug tracked as #5330 — see task_ambient_jvm_tests.l's header).
      - name: Std.Task ambient-slot tests on JVM (lyric build --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Task ambient-slot JVM tests"
            exit 1
          fi
          work="$(mktemp -d)"
          "$lyric_bin" build lyric-stdlib/tests/task_ambient_jvm_tests.l --target jvm -o "$work/task_ambient_jvm_tests.jar"
          out="$(java -jar "$work/task_ambient_jvm_tests.jar")"
          echo "$out" | tail -3
          grep -q "task ambient jvm tests: ok" <<< "$out" || { echo "::error::Std.Task ambient-slot JVM suite did not report success"; exit 1; }
      # lyric-storage suite on JVM (band J6, #1444/#2669) — the first
      # multi-package ecosystem manifest exercised on --target jvm.  Pins the
      # in-process multi-package JVM project build (sibling packages bundled
      # alongside the stdlib closure), the @cfg dotnet/jvm kernel split
      # selected via the new `lyric test` feature flags, the pure-Lyric
      # Storage.Kernel.Jvm (Base64 / MD5 / HexFormat / java.io), and the
      # Std.Json JVM kernel underneath the sidecar reads.
      - name: lyric-storage suite on JVM (lyric test --target jvm --features jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping storage JVM suite"
            exit 1
          fi
          "$lyric_bin" test --manifest lyric-storage/lyric.toml --target jvm --no-default-features --features jvm
      # lyric-resilience suite on JVM (#5037) — pins the real
      # Resilience.Kernel.Jvm circuit-breaker/retry kernel (java.util.
      # concurrent.ConcurrentHashMap + per-entry ReentrantLock, replacing
      # the previous always-false/no-op stub) against the same
      # resilience_tests.l the .NET target already runs.
      - name: lyric-resilience suite on JVM (lyric test --target jvm --features jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -x .bootstrap/stage2/bin/lyric ]; then
            echo "::error::stage 2 binary missing; skipping resilience JVM suite"
            exit 1
          fi
          export LYRIC_STDLIB_BIN="$PWD/.bootstrap/stage2/lib"
          .bootstrap/stage2/bin/lyric test --manifest lyric-resilience/lyric.toml --target jvm --no-default-features --features jvm
      # lyric-auth manifest build on JVM with NO feature flags (#5571) — the
      # regression pin for target-normalized feature resolution: a plain
      # `--target jvm` build of a `default = ["dotnet"]` platform-split
      # manifest must swap in the declared `jvm` feature and compile
      # Auth.Kernel.Jvm, not the `@cfg(feature = "dotnet")` kernel (which
      # fails JVM codegen with J002 on its BCL externs).  This was the
      # failure mode of #5571's workspace-dependency chain; the same
      # resolver now backs root and dependency builds, so pinning the
      # flag-less root build pins the propagation rule too (the end-to-end
      # lyric-web Undertow smoke, tests/jvm_server_smoke.l, is wired as its
      # own step below now that #5610/#5444/#5458 landed).
      - name: lyric-auth manifest build on JVM without feature flags (#5571)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric-auth JVM feature-resolution build"
            exit 1
          fi
          rm -rf lyric-auth/bin
          "$lyric_bin" build --manifest lyric-auth/lyric.toml --target jvm
          if [ ! -f lyric-auth/bin/Lyric.Auth.dll ]; then
            echo "::error::lyric-auth JVM build produced no artifact"
            exit 1
          fi
          # The artifact must be a JAR (zip magic), i.e. the JVM bundle —
          # proof the build went through the JVM pipeline with the jvm
          # kernel selected rather than dying in Auth.Kernel.Net (J002).
          head -c 2 lyric-auth/bin/Lyric.Auth.dll | grep -q 'PK' || {
            echo "::error::lyric-auth JVM artifact is not a JAR"
            exit 1
          }
          # A JVM bundle at the dotnet artifact path would poison later
          # dotnet builds of dependents; drop it now that it is asserted.
          rm -rf lyric-auth/bin
          echo "lyric-auth JVM feature-resolution build ran (no --features flags)" >> "$GITHUB_STEP_SUMMARY"
      # lyric-web Undertow end-to-end smoke on JVM (#5610/#5444/#5458): builds
      # tests/jvm_server_smoke.l single-file (bundling the imported Web +
      # Web.Kernel.Runtime project packages with their workspace deps and
      # target-normalized features, #5571), starts the real Undertow listener
      # under java, and asserts all four endpoints — path param, header echo
      # through HeaderMap, request-body echo, and 404.  This is also the
      # regression pin for cross-package impl-method parameter registration
      # (#5610): a two-package bundled compile where an impl method takes
      # another package's record cannot be expressed in a single-file
      # self-test, so this smoke IS that test.  Needs the Maven resolver jar
      # and a lyric-web restore first: a single-file jvm build reads the
      # restored lyric-web/target/restore/jvm-classpath.txt (NOT
      # module-path.txt), and the bundle jar's manifest Class-Path carries
      # the restored Undertow jar paths, so `java -jar` needs no -cp.
      - name: lyric-web Undertow smoke on JVM (tests/jvm_server_smoke.l)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric-web JVM smoke"
            exit 1
          fi
          make maven-resolver
          export LYRIC_MAVEN_RESOLVER="$PWD/resolver/target/lyric-resolver.jar"
          "$lyric_bin" restore --manifest "$PWD/lyric-web/lyric.toml"
          (cd lyric-web && "../$lyric_bin" build --target jvm tests/jvm_server_smoke.l -o /tmp/jvm_server_smoke.jar)
          java -jar /tmp/jvm_server_smoke.jar > /tmp/jvm_server_smoke.run.log 2>&1 &
          srv_pid=$!
          up=0
          for _ in $(seq 1 40); do
            if curl -s --max-time 1 -o /dev/null http://localhost:8099/hello/Ada; then up=1; break; fi
            if ! kill -0 "$srv_pid" 2>/dev/null; then break; fi
            sleep 0.5
          done
          if [ "$up" != 1 ]; then
            echo "::error::jvm_server_smoke server did not come up"
            tail -40 /tmp/jvm_server_smoke.run.log
            exit 1
          fi
          hello="$(curl -s --max-time 3 http://localhost:8099/hello/Ada)"
          header="$(curl -s --max-time 3 -H 'X-Test: abc' http://localhost:8099/echo-header)"
          body="$(curl -s --max-time 3 -X POST --data 'ping' http://localhost:8099/echo-body)"
          code404="$(curl -s --max-time 3 -o /dev/null -w '%{http_code}' http://localhost:8099/nope)"
          # TLS phase 2.2 (#5881): before the plaintext listener, main runs two
          # in-process self-checks and logs a single PASS/FAIL line each:
          #   MTLS-REJECT-SELFCHECK — Web.serveTls with requireClientCert=true
          #     must return a typed ServerTlsUnsupported (naming #6017), never a
          #     crash or a silent plaintext-auth listener (#6040).
          #   HTTPS-H2-SELFCHECK — a TLS-terminated Undertow listener
          #     (Web.serveTls, ENABLE_HTTP2) on :8100 driven by an in-process
          #     Std.Http client that trusts the fixture cert, asserting 200 AND
          #     an h2-negotiated connection (HttpResponse.negotiatedVersion). The
          #     client retries in a BOUNDED poll loop until the listener binds
          #     (was a fixed sleep that flaked under CI jitter, #6028).
          # Both self-checks run before the plaintext :8099 listener this loop
          # waited on, so the lines are already in the log. An independent
          # curl --http2 cross-checks h2 against the real HTTPS listener.
          h2selfcheck="$(grep -o 'HTTPS-H2-SELFCHECK: PASS.*' /tmp/jvm_server_smoke.run.log | head -1)"
          mtlsselfcheck="$(grep -o 'MTLS-REJECT-SELFCHECK: PASS.*' /tmp/jvm_server_smoke.run.log | head -1)"
          curlh2="$(curl -sk --http2 --max-time 4 -o /dev/null -w '%{http_version}:%{http_code}' https://127.0.0.1:8100/hello/Ada || echo 'curl-failed')"
          kill "$srv_pid" 2>/dev/null || true
          wait "$srv_pid" 2>/dev/null || true
          fail=0
          [ "$hello" = "Hello, Ada!" ] || { echo "::error::hello endpoint returned '$hello'"; fail=1; }
          [ "$header" = '{"xTest":"abc"}' ] || { echo "::error::header endpoint returned '$header'"; fail=1; }
          [ "$body" = "ping" ] || { echo "::error::body endpoint returned '$body'"; fail=1; }
          [ "$code404" = "404" ] || { echo "::error::unmatched route returned HTTP $code404, expected 404"; fail=1; }
          [ -n "$h2selfcheck" ] || { echo "::error::HTTPS/h2 in-process self-check did not report PASS (Web.serveTls + negotiatedVersion)"; fail=1; }
          [ -n "$mtlsselfcheck" ] || { echo "::error::mTLS-rejection self-check did not report PASS (Web.serveTls requireClientCert -> typed ServerTlsUnsupported)"; fail=1; }
          [ "$curlh2" = "2:200" ] || { echo "::error::curl --http2 against the TLS listener returned '$curlh2', expected 2:200"; fail=1; }
          if [ "$fail" != 0 ]; then
            tail -40 /tmp/jvm_server_smoke.run.log
            exit 1
          fi
          echo "lyric-web Undertow JVM smoke passed (4/4 plaintext endpoints + HTTPS/h2 serveTls: $h2selfcheck; mTLS-reject: $mtlsselfcheck; curl --http2 $curlh2)" >> "$GITHUB_STEP_SUMMARY"
      # Map-iteration self-test on JVM (#3676, #3229) — pins the completed
      # `_kernel_jvm/collections_host.l` kernel (dictGetKeys/dictGetValues
      # views, pure-Lyric tryGetValue) AND the post-mono signature
      # registration that lets specialised stdlib generics
      # (mapKeys__String__Int, mapSize__String__Int, …) resolve at their
      # call sites, plus the containsKey-gated Option-constructing mapGet
      # intrinsic and the mixed void/value match-arm lowering.
      - name: Map-iteration self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping map-iteration JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/map_iteration_jvm_self_test.l
      # Entry-point argv / exit-code check on JVM (#3303) — builds a program
      # whose `func main(args: slice[String]): Int` prints its argv and returns
      # args.count, runs it with three arguments, and asserts both the output
      # and the process exit code (the synthesised `main(String[])` wrapper
      # forwards argv and routes the Int return through System.exit).
      - name: Entry-point argv/exit-code check on JVM (lyric build --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping entry-args JVM check"
            exit 1
          fi
          work="$(mktemp -d)"
          "$lyric_bin" build lyric-compiler/jvm/entry_args_jvm_main.l --target jvm -o "$work/entryargs.jar"
          set +e
          out="$(java -jar "$work/entryargs.jar" one two three)"
          code=$?
          set -e
          echo "$out"
          if [ "$code" -ne 3 ]; then
            echo "::error::expected exit code 3 (= argc), got $code"
            exit 1
          fi
          grep -qx "argc=3" <<< "$out" || { echo "::error::argc line missing"; exit 1; }
          grep -qx "arg0=one" <<< "$out" || { echo "::error::arg0 line missing"; exit 1; }
          grep -qx "arg1=two" <<< "$out" || { echo "::error::arg1 line missing"; exit 1; }
          grep -qx "arg2=three" <<< "$out" || { echo "::error::arg2 line missing"; exit 1; }

      - name: Wait for all parallel tests
        wait-all: true

      # docs/58 (D121) wire-templates RUNTIME self-test on JVM — real
      # expanded wires (include, contributes[T], provided mapping,
      # replace/remove, aliasing) compiled through the self-hosted
      # `Jvm.Bridge` `compileToJarBundled` and run under `java`.  Imports
      # only `Std.*`; the dotnet half runs in the .NET job.
      #
      # Deliberately AFTER the wait-all barrier (fully serialized), not in
      # the background batch: two consecutive batch placements of this
      # suite aborted in CI with signatures that do not reproduce locally
      # against the same stage-1 artifact, Debug AOT binary, and run order
      # (first a SIGABRT ~9s in with interleaved output, then a
      # once-off NRE ~65s in) — the #4486/#4841 batch-pressure flake class
      # this job's earlier comments document, and the same remediation.
      - name: Wire-templates self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping wire-templates JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping wire-templates JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/wire_templates_self_test.l
          echo "wire-templates self-test ran: wire_templates_self_test.l (--target jvm)" >> "$GITHUB_STEP_SUMMARY"

      # Interface default-method out/inout dispatch self-test on JVM (#3604) —
      # pins invokeinterface-vs-invokevirtual selection for IMFunc default
      # bodies and holder-call sites through an interface-typed binding.
      - name: Interface default-method out/inout self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping interface default-method JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping interface default-method JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/iface_default_method_out_inout_jvm_self_test.l

      # Lazy __lyricCount emission self-test on JVM (#4803) — pins that the
      # helper is only emitted when an erased-receiver .count/.length call
      # actually needs it.
      - name: Lazy __lyricCount self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping lazy __lyricCount JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lazy __lyricCount JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/lazy_lyric_count_jvm_self_test.l

      # Union-case-name collision self-test on JVM (#2535) — pins
      # collectFileCtors' own-package-scoped and union-qualified collision
      # keys via a real runtime construction/match.
      - name: Union-case collision self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping union-case collision JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping union-case collision JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/jvm/union_case_collision_jvm_self_test.l

  # Numbered backend self-test corpus (docs/59 §9.5, H8) — the ~215 plain
  # `func main` regression programs (`lyric-compiler/msil/msil_self_test_m1..m84`
  # and `lyric-compiler/jvm/self_test_b3..b134`, ~40k lines) whose F# Expecto
  # host was deleted without a replacement runner.  Both sets are HOST programs
  # (they exercise the Msil.*/Jvm.* emission libraries on the dotnet host), run
  # via `LYRIC_LOAD_COMPILER=1 lyric run` by scripts/run-numbered-self-tests.sh;
  # a file passes when it exits 0 and prints no `<label>=false` check line.
  # Each file recompiles its compiler-package closure from source (~50-110 s
  # measured at 4-way parallelism), so the sets are sharded across parallel
  # matrix jobs to keep every job's wall time in the 10-20 min band of the
  # other self-test jobs on the 4-vCPU standard runners: msil is 83 files
  # (~60 CPU-min) in 2 shards, jvm is 132 files (~120 CPU-min) in 4 shards.
  numbered-backend-self-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { set: msil, shard: 1/2 }
          - { set: msil, shard: 2/2 }
          - { set: jvm, shard: 1/4 }
          - { set: jvm, shard: 2/4 }
          - { set: jvm, shard: 3/4 }
          - { set: jvm, shard: 4/4 }
    name: numbered-self-tests (${{ matrix.set }} ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      # self_test_b13.l compiles its own probe fixture with the host javac.
      - name: Set up Java 21 (jvm set only)
        if: matrix.set == 'jvm'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      - name: Run numbered ${{ matrix.set }} self-tests (shard ${{ matrix.shard }})
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; cannot run numbered self-tests"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; cannot run numbered self-tests"
            exit 1
          fi
          bash scripts/run-numbered-self-tests.sh \
            --target "${{ matrix.set }}" \
            --shard "${{ matrix.shard }}" \
            --lyric "$lyric_bin"

  # Ecosystem-library security/regression tests. Split from one monolithic
  # ~25-command job (#6165) into a per-library matrix so libraries run
  # in parallel and a PR touching only one library's directory skips every
  # unrelated entry. Gating comes from `needs.build.outputs.ecosystem_run_map`
  # (computed in `build`'s "Detect code changes" step from the ECO_DEPS
  # table there) — `deps:` below mirrors that same table and drives the
  # actual path-dependency build order, leaf-first, so keep the two in sync
  # if a library's local-path dependencies change.
  ecosystem-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: auth
            deps: ""
          - id: session
            deps: "cache"
          - id: health
            deps: ""
          - id: cache
            deps: ""
          - id: docker
            deps: ""
          - id: mail
            deps: ""
          - id: aws-xray
            deps: ""
          - id: aws-secrets
            deps: ""
          - id: feature-flags
            deps: ""
          - id: validation
            deps: ""
          - id: storage
            deps: ""
          - id: proto
            deps: ""
          - id: otel
            deps: "proto"
          - id: jsonrpc
            deps: ""
          - id: mcp
            deps: "jsonrpc"
          - id: logging
            deps: ""
          - id: mq
            deps: "cache"
          - id: grpc
            deps: "auth resilience"
          - id: db
            deps: "logging"
          - id: search
            deps: "resilience"
          - id: lambda
            deps: "auth resilience web"
          - id: web
            deps: "auth resilience"
          - id: ws
            deps: "auth"
          - id: testing
            deps: "cache mail storage feature-flags mq session"
    # NOTE (#6165 follow-up): the original per-library gate
    #   fromJSON(needs.build.outputs.ecosystem_run_map)[matrix.id]
    # fails to LOAD on this runner's workflow engine (object-indexing a
    # fromJSON result by a matrix variable in a job-level `if:` is rejected
    # at parse time, which fails the WHOLE workflow to 0 jobs — see the
    # 0-job startup failures on every commit after 56618c9). Every other
    # gate in this file uses a plain `needs.build.outputs.X == 'true'`
    # comparison, which loads fine. Fall back to the coarse
    # `has_code_changes` gate (pre-#6165 behaviour: run every ecosystem
    # matrix entry on any code change) so the workflow loads. The parallel
    # per-library matrix split — #6165's main win — is preserved; only the
    # per-library CHANGE-gating is dropped. `ecosystem_run_map` is still
    # produced by `build`, so the gate can be re-enabled in a runner-safe
    # form (e.g. `contains(fromJSON(<array>), matrix.id)`) once it can be
    # validated on a working CI run.
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        # LYRIC_CLI_PATH is computed here (step level, shell-expanding the
        # real $BUILD_CONFIG env var) rather than in a job-level `env:` —
        # the `env` context is not available when *defining* another
        # `env:` key at the job level (actionlint's own -ignore list
        # documents this exact pre-existing pitfall for bench.yml's
        # LYRIC_BIN, #5638 item 5). Written to $GITHUB_ENV so every later
        # step in this job sees it as a real environment variable.
        run: |
          echo "LYRIC_CLI_PATH=bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric" >> "$GITHUB_ENV"
          chmod +x "bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"

      - name: Stage stdlib DLLs + local-dep resolver setup
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem tests cannot run"
            exit 1
          fi
          if [ ! -x "$LYRIC_CLI_PATH" ]; then
            echo "::error::AOT binary not found at $LYRIC_CLI_PATH"
            exit 1
          fi
          # Stage 1 compiled all Lyric.Stdlib*.dll files into .bootstrap/stage1/.
          # Copy them all to the canonical dep-resolution path so the test runner's
          # local-path dep resolver finds it without re-running a manifest build.
          # The main bundle (Lyric.Stdlib.dll) is required for compile-time dep
          # resolution; the individual DLLs (e.g. Lyric.Stdlib.Testing.dll) are
          # needed at runtime by compiled test DLLs.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # lyric-session no longer needs a host shim: Session.Kernel.Net
          # binds StackExchange.Redis directly via @externTarget in native
          # Lyric (#1777). lyric-auth likewise needs no shim (pure Lyric
          # HMAC-SHA256 + constant-time comparison).
          # Route emitProject subprocess calls to the F# bootstrap CLI, which
          # handles --internal-project-build.  The AOT binary is a pure trampoline
          # into the Lyric CLI dispatcher and does not handle internal flags
          # (#1082 stripped the AOT entry point of its path-discovery shim).
          # Written to $GITHUB_ENV (not `export`) so it also applies to the
          # later "Build path dependencies" / "Run tests" steps in this job.
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            echo "LYRIC_BIN=dotnet" >> "$GITHUB_ENV"
            echo "LYRIC_CLI_DLL=$cli_dll" >> "$GITHUB_ENV"
          fi

      - name: Build path dependencies (${{ matrix.deps }})
        if: matrix.deps != ''
        run: |
          set -euo pipefail
          for lib in ${{ matrix.deps }}; do
            echo "=== building lyric-$lib (${{ matrix.id }} dependency) ==="
            if ! "$LYRIC_CLI_PATH" build --manifest "lyric-$lib/lyric.toml"; then
              echo "::error::failed to build lyric-$lib (${{ matrix.id }} dependency)"
              exit 1
            fi
          done

      - name: Run tests (auth)
        if: matrix.id == 'auth'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-auth/lyric.toml

      - name: Run tests (session)
        if: matrix.id == 'session'
        # lyric-session's dotnet/jvm features are not default (StackExchange.Redis
        # is a genuine mandatory NuGet dep for the dotnet kernel, unlike
        # lyric-auth/lyric-storage's NuGet-free dotnet default) — restore first,
        # then activate the dotnet feature explicitly so Session.Kernel.Net and
        # the Redis-dependent test files actually compile and run. The Cache.dll
        # copy is needed because the runtimeconfig additionalProbingPaths only
        # resolves NuGet-style versioned layouts, not plain path deps.
        run: |
          set -euo pipefail
          mkdir -p lyric-session/.lyric-test
          if [ -f lyric-cache/bin/Cache.dll ]; then
            cp lyric-cache/bin/Cache.dll lyric-session/.lyric-test/
          else
            echo "::error::lyric-cache/bin/Cache.dll missing (should have been built as a path dependency above)"
            exit 1
          fi
          if ! "$LYRIC_CLI_PATH" restore --manifest lyric-session/lyric.toml; then
            echo "::error::failed to restore lyric-session NuGet dependencies"
            exit 1
          fi
          "$LYRIC_CLI_PATH" test --manifest lyric-session/lyric.toml --features dotnet

      - name: Run tests (health)
        if: matrix.id == 'health'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-health/lyric.toml

      - name: Run tests (cache)
        if: matrix.id == 'cache'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-cache/lyric.toml

      # lyric-docker had never been wired into CI at all (#5697 follow-up):
      # its own createContainerBody/extractJsonField suite went undetected-red
      # for multiple releases (jsonEscapeValue called the nonexistent
      # String.codePointAt, and \uXXXX/decimal decoding called the
      # nonexistent Int.parse(s, radix) — both compiled, both crashed at
      # runtime on first use). Run here so this can't regress silently again.
      - name: Run tests (docker)
        if: matrix.id == 'docker'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-docker/lyric.toml

      - name: Run tests (mail)
        if: matrix.id == 'mail'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-mail/lyric.toml

      - name: Run tests (aws-xray)
        if: matrix.id == 'aws-xray'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-aws-xray/lyric.toml

      # --features local: exercises the no-op local kernel (init()/
      # getSecret()/getParameter() always-NotFound contract). The AWS
      # SDK backend needs live credentials and isn't tested here.
      - name: Run tests (aws-secrets, local feature)
        if: matrix.id == 'aws-secrets'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-aws-secrets/lyric.toml --features local

      - name: Run tests (feature-flags)
        if: matrix.id == 'feature-flags'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-feature-flags/lyric.toml

      - name: Run tests (validation)
        if: matrix.id == 'validation'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-validation/lyric.toml

      # lyric-storage also runs under --target jvm elsewhere, but that run only
      # exercises the @cfg(feature = "jvm") stand-in of the ValidateKey
      # weaving test. Run the default (dotnet) manifest here so the REAL
      # woven @cfg(feature = "dotnet") around(call) aspect is exercised too.
      - name: Run tests (storage, dotnet)
        if: matrix.id == 'storage'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-storage/lyric.toml

      - name: Run tests (proto)
        if: matrix.id == 'proto'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-proto/lyric.toml

      # lyric-otel — type vocabulary + OTLP codec/transport tests; depends
      # on Lyric.Proto as a workspace member (built as a path dependency above).
      - name: Run tests (otel)
        if: matrix.id == 'otel'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-otel/lyric.toml

      # lyric-jsonrpc is tier-0 (pure Lyric, no deps). dotnet-target runs —
      # the JVM gaps are tracked (#6123, #6124, #6136). Guards the
      # published Lyric.JsonRpc package (#6156).
      - name: Run tests (jsonrpc)
        if: matrix.id == 'jsonrpc'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-jsonrpc/lyric.toml

      # lyric-mcp restores Lyric.JsonRpc as a workspace member (built as a
      # path dependency above). Guards the published Lyric.Mcp package
      # (#6156).
      - name: Run tests (mcp)
        if: matrix.id == 'mcp'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-mcp/lyric.toml

      - name: Run tests (logging)
        if: matrix.id == 'logging'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-logging/lyric.toml

      - name: Run tests (mq)
        if: matrix.id == 'mq'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-mq/lyric.toml

      - name: Run tests (grpc)
        if: matrix.id == 'grpc'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-grpc/lyric.toml

      # lyric-db's dotnet kernel has mandatory NuGet deps (Npgsql +
      # Microsoft.Data.Sqlite) whose extern ctors resolve from package
      # metadata at compile time — restore first, like lyric-session.
      # The SQLite native asset (libe_sqlite3.so) is not deployed by the
      # bundler yet (#5573), so point the loader at the NuGet cache.
      - name: Run tests (db)
        if: matrix.id == 'db'
        run: |
          set -euo pipefail
          if ! "$LYRIC_CLI_PATH" restore --manifest lyric-db/lyric.toml; then
            echo "::error::failed to restore lyric-db NuGet dependencies"
            exit 1
          fi
          # `|| true` on the whole substitution: under `set -e`/`pipefail` a
          # `find` that hits an unreadable dir, or the SIGPIPE from `head`
          # closing the pipe early, would otherwise abort the entire step
          # (#5602).  An empty result just means the loader falls back to its
          # normal probe path.
          sqlite_native="$( { find "$HOME/.nuget/packages/sqlitepclraw.lib.e_sqlite3" -path '*linux-x64/native*' -name '*.so' 2>/dev/null || true; } | head -1 | { xargs -r dirname || true; } )"
          LD_LIBRARY_PATH="${sqlite_native}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
            "$LYRIC_CLI_PATH" test --manifest lyric-db/lyric.toml

      # Meilisearch backend is a mutually-exclusive alternative feature, so
      # it gets zero coverage from the default (elasticsearch) run (#5598).
      # --no-default-features drops elasticsearch so the @cfg-gated probes
      # don't collide on a duplicate name.
      - name: Run tests (search, elasticsearch + meilisearch)
        if: matrix.id == 'search'
        # Both variants always run even if the first fails (matching the
        # old monolithic job's overall=$? aggregation) so a single failed
        # run surfaces both failures instead of hiding the second behind
        # the first until a follow-up push.
        run: |
          overall=0
          "$LYRIC_CLI_PATH" test --manifest lyric-search/lyric.toml || overall=$?
          "$LYRIC_CLI_PATH" test --manifest lyric-search/lyric.toml --no-default-features --features meilisearch || overall=$?
          exit "$overall"

      # --features local: guards that the local-dev kernel (a real
      # HTTP test server, Lambda.Kernel.Runtime) at least builds/links
      # cleanly. The dispatch loop itself needs a live HTTP round-trip
      # to exercise and isn't tested here — see docs/57 §5.2/§7 item 5.
      - name: Run tests (lambda, default + local feature)
        if: matrix.id == 'lambda'
        # Both variants always run even if the first fails (matching the
        # old monolithic job's overall=$? aggregation) so a single failed
        # run surfaces both failures instead of hiding the second behind
        # the first until a follow-up push.
        run: |
          overall=0
          "$LYRIC_CLI_PATH" test --manifest lyric-lambda/lyric.toml || overall=$?
          "$LYRIC_CLI_PATH" test --manifest lyric-lambda/lyric.toml --features local || overall=$?
          exit "$overall"

      - name: Run tests (web)
        if: matrix.id == 'web'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-web/lyric.toml

      - name: Run tests (ws)
        if: matrix.id == 'ws'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-ws/lyric.toml

      - name: Run tests (testing)
        if: matrix.id == 'testing'
        run: |
          "$LYRIC_CLI_PATH" test --manifest lyric-testing/lyric.toml

  # Stdlib and ecosystem-library builds — runs in parallel with ecosystem-tests.
  stdlib-builds:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # Full self-hosted stdlib bundle (#2592, stage-2 milestone) — builds
      # the entire public Std.* surface through the self-hosted MSIL backend
      # via lyric-stdlib/lyric.full.toml.  The bootstrap lyric.toml is only
      # the F#-stage-0 smoke set; this step guards that the self-hosted
      # emitter can compile the whole standard library so the milestone
      # cannot silently regress.
      - name: Build full stdlib (self-hosted, lyric.full.toml)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if ! "$lyric_bin" build --manifest lyric-stdlib/lyric.full.toml; then
            echo "::error::full self-hosted stdlib bundle failed to build"
            exit 1
          fi
          echo "full self-hosted stdlib bundle built"

      # Core I/O test coverage (docs/57-stdlib-ecosystem-library-review.md
      # §5.1): Std.File, Std.Directory, and Std.Http had no dedicated test
      # file before this. Each is a @test_module run via native `lyric
      # test`; only Std.Core/Std.Testing (+ the module under test) are
      # imported, so no manifest/path-dependency setup is needed here.
      - name: Std.File test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.File tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/file_tests.l

      - name: Std.Directory test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Directory tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/directory_tests.l

      - name: Std.Http test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_tests.l

      # Std.Tls test coverage (#5876, docs/61 §3.1 phase 1.1): PEM
      # certificate/private-key loading (Certificate/Identity opaque types,
      # TlsError classification, cross-algorithm KeyMismatch detection).
      # Runs on both targets in this job (dotnet) and the JVM batch job
      # below — see that step's comment for why.
      - name: Std.Tls test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Tls tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/tls_tests.l

      # TlsServerConfig test coverage — runs on both targets now that its
      # only target-specific case (default-field-omission construction,
      # which miscompiled on JVM per #5908 AND, per later CI evidence
      # against this same toolchain, on dotnet too — the MSIL sibling
      # #5920) was removed rather than gated; see this test file's own
      # header and docs/03-decision-log.md D-progress-689. The remaining
      # explicit-fields-only test is unaffected by either bug on either
      # target.
      - name: Std.Tls TlsServerConfig test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Tls TlsServerConfig tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/tls_server_config_tests.l

      # HttpClientBuilder TLS client configuration coverage (docs/61 §3.2 +
      # §4, D128; phase 1.2, #5877): the dual-key insecure-verify policy
      # matrix (pure function + the real Environment.setVar-wired path),
      # builder composition across the TLS/redirect/socket/version knobs,
      # and the tlsConfigSupported() capability-probe design. Fully
      # deterministic — no live TLS peer needed. The JVM half of this step
      # runs in the JVM batch below (see that step's comment for why it's
      # placed post-barrier).
      - name: Std.Http TLS client configuration test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http TLS client tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_tls_client_tests.l

      # Std.HttpEngine test coverage (#5883, docs/61 §6.1 phase 3.2): the
      # pure-Lyric sans-IO HTTP/1.1 parser/serializer/connection-FSM that
      # phase 3.3 (#5884) drives from a TcpListener/SslStream transport.
      # Zero externs, so this and the JVM step below (in the JVM batch
      # 1-split sub-batch) must and do produce identical results.
      - name: Std.HttpEngine test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.HttpEngine tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_engine_tests.l

      # Std.HttpEngine.Hpack (HPACK / RFC 7541) coverage (#5886, docs/61 §6.4
      # phase 4.1): the pure-Lyric HPACK header-compression codec — static +
      # dynamic tables with eviction, integer/string primitives, Appendix B
      # Huffman, and dynamic-table size updates — asserted against the RFC 7541
      # Appendix C byte vectors. Zero externs, so this and the JVM step above
      # (in the JVM batch 1-split sub-batch) must and do produce identical results.
      - name: Std.HttpEngine.Hpack test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.HttpEngine.Hpack tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_hpack_tests.l

      # Std.HttpEngine.H2Frame (HTTP/2 frame codec / RFC 9113 §4/§6) coverage
      # (#5887, docs/61 §6.4 phase 4.2): the pure-Lyric HTTP/2 frame
      # parser/serializer — 9-octet header, all ten §6 frame types + unknown
      # pass-through, flags/padding, connection preface, SETTINGS_MAX_FRAME_SIZE
      # enforcement, and the sans-IO streaming FrameDecoder — asserted against
      # explicit RFC 9113 byte vectors. Zero externs, so this and the JVM step
      # above (in the JVM batch 1-split sub-batch) must and do produce identical
      # results.
      - name: Std.HttpEngine.H2Frame test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.HttpEngine.H2Frame tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_h2frame_tests.l

      # Std.HttpEngine.H2Conn (HTTP/2 connection/stream state machine + flow
      # control / RFC 9113 §3/§5/§6) coverage (#5888, docs/61 §6.4 phase 4.3):
      # the pure-Lyric server-side FSM composing the frame codec (#5887) and
      # HPACK (#5886) — preface/SETTINGS handshake, per-stream lifecycle,
      # HEADERS+CONTINUATION reassembly, connection/stream flow control,
      # PING/GOAWAY, and connection-vs-stream error classification — driven end
      # to end through the real H2Frame + Hpack calls. Zero externs, so this and
      # the JVM step above must and do produce identical results.
      - name: Std.HttpEngine.H2Conn test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.HttpEngine.H2Conn tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_h2conn_tests.l

      # Std.TcpHost transport-kernel test coverage (#5882, docs/61 §6.1/§6.3
      # phase 3.1): the dotnet TcpListener + SslStream server-side TLS
      # transport that drives Std.HttpEngine. Runs a real in-process loopback
      # — a plain echo, a server-side TLS handshake that negotiates http/1.1
      # via ALPN against the real Lyric HTTPS client, and both mTLS
      # accept/reject outcomes. dotnet-only (the JVM/native transports are
      # separate later issues), so there is no JVM twin of this step.
      - name: Std.TcpHost transport-kernel test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.TcpHost tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/tcp_host_tls_tests.l

      # Std.HttpServer dotnet server-assembly test coverage (#5884, docs/61
      # §6.1 item 9 / §6.2 / §6.3 phase 3.3; D-progress-700): the dotnet
      # HTTP/1.1 server rebuilt on Std.TcpHost + Std.HttpEngine, replacing the
      # retired System.Net.HttpListener. Runs a real in-process loopback — a
      # plaintext GET against the real Lyric HTTP client, a POST body, keep-alive
      # reuse on one connection, a concurrent-connection case, a TLS + mTLS
      # accept/reject round trip against the real Lyric HTTPS client, and the
      # startListenerTls mTLS-misconfiguration (InvalidConfig) guard. dotnet-only
      # (the JVM server is a separate kernel with tls_server_jvm_tests.l).
      - name: Std.HttpServer dotnet server test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.HttpServer server tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_server_dotnet_tests.l

      # HTTP/2 end-to-end curl smoke (#5889, docs/61 §6.4 phase 4.4): the
      # dotnet Std.HttpServer over TLS advertises `h2` via ALPN and drives the
      # pure-Lyric Std.HttpEngine.H2Conn FSM. The in-process own-client check
      # (negotiatedVersion() == Http2) lives in the http_server_dotnet_tests.l
      # step above; this is the INDEPENDENT implementation cross-check with a
      # real curl/nghttp2 client (`--http2`), asserting the negotiated wire
      # version is 2 and the routed body is 200 — mirroring the JVM
      # jvm_server_smoke curl --http2 cross-check.
      - name: Std.HttpServer dotnet h2 curl smoke (dotnet_h2_smoke.l)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping dotnet h2 curl smoke"
            exit 1
          fi
          "$lyric_bin" build --target dotnet lyric-stdlib/tests/dotnet_h2_smoke.l -o /tmp/dotnet_h2_smoke.dll
          dotnet /tmp/dotnet_h2_smoke.dll > /tmp/dotnet_h2_smoke.run.log 2>&1 &
          smoke_pid=$!
          up=0
          for _ in $(seq 1 50); do
            if curl -sk --http2 --max-time 1 -o /dev/null https://127.0.0.1:8443/hello 2>/dev/null; then up=1; break; fi
            if ! kill -0 "$smoke_pid" 2>/dev/null; then break; fi
            sleep 0.2
          done
          if [ "$up" != "1" ]; then
            echo "::error::dotnet_h2_smoke server did not come up"
            cat /tmp/dotnet_h2_smoke.run.log || true
            kill "$smoke_pid" 2>/dev/null || true
            exit 1
          fi
          # -o /dev/null so `$curlh2` is only the -w output (`2:200`); without it the
          # `/hello` response body ("hello h2 dotnet") is captured too and the
          # `2:200` match fails.
          curlh2="$(curl -sk -o /dev/null --http2 --max-time 4 -w '%{http_version}:%{http_code}' https://127.0.0.1:8443/hello || echo 'curl-failed')"
          kill "$smoke_pid" 2>/dev/null || true
          case "$curlh2" in
            2:200) echo "dotnet Std.HttpServer h2 curl --http2 smoke passed ($curlh2)" >> "$GITHUB_STEP_SUMMARY" ;;
            *) echo "::error::curl --http2 against the dotnet TLS listener returned '$curlh2', expected 2:200"; cat /tmp/dotnet_h2_smoke.run.log || true; exit 1 ;;
          esac

      # Stdlib runtime suites on dotnet (#5604, expanded in D-progress-670 /
      # #5710): these `func main`-shaped suites (run via `lyric run`, not
      # `lyric test` — they predate @test_module) exercise the FFI kernels and
      # core stdlib but were CI-wired nowhere on dotnet, which let a family of
      # silent miscompiles ship invisibly — monomorphizer-dropped generic calls
      # (core/iter), open-generic isinst from tuple patterns (encoding),
      # wrong-union construction under a cross-package case-name collision
      # (regex_safe), object-degraded union-ctor MemberRefs (rest), and, more
      # recently, the D-progress-669 auto-FFI migration breakage.  Every suite
      # here is verified to pass via `lyric run`.  `xml_tests` (#5713) was
      # fixed and wired in under D-progress-672; `set_tests` (#5711 — a
      # generic `@externTarget` kernel constructor never gets a cross-
      # assembly-callable token, so `newSet()`'s call site fell through the
      # unresolved-call fallback) and `sort_tests` (#5712 — a `pub` generic's
      # private same-package helper wasn't imported alongside it for cross-
      # package monomorphisation) are both fixed and wired in here under
      # D-progress-674.  The #5077 audit (2026-07-16) wired the passing
      # remainder: book_ch01/03/05/07, book_ch13_ffi, kernel_bcl_tests, and
      # xml_viability_tests; book_ch04_tests joined once #5842 (inout
      # slice[T] cast) was fixed, book_ch12_tests once #5843 (mono
      # cross-package name-collision) was, and book_ch02_tests once #5955
      # (module-val dependent-initializer .cctor InvalidProgramException) was.
      # Deliberately still excluded (tracked, not silent): metadata_reader_tests
      # (#5624 placeholder Param rows; also needs LYRIC_LOAD_COMPILER=1).  Each
      # suite exits non-zero on any assertion failure or runtime fault.
      - name: Stdlib runtime suites on dotnet (kernels + core stdlib)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping stdlib runtime suites"
            exit 1
          fi
          for suite in \
            core_tests iter_tests encoding_tests regex_safe_tests rest_tests \
            process_capture_tests process_tests format_tests json_tests \
            collections_tests char_tests math_tests hash_tests path_tests \
            errors_tests environment_tests string_tests string_methods_tests \
            regex_tests yaml_tests testing_tests mocking_tests xml_tests \
            set_tests sort_tests \
            book_ch01_tests book_ch02_tests book_ch03_tests book_ch04_tests \
            book_ch05_tests book_ch07_tests book_ch12_tests book_ch13_ffi_tests \
            kernel_bcl_tests xml_viability_tests; do
            echo "--- lyric run lyric-stdlib/tests/$suite.l"
            "$lyric_bin" run "lyric-stdlib/tests/$suite.l"
          done

      # Std.Http async client surface (#5564): interface dispatch through
      # defaultClient() and the free getAsync/sendAsync functions.  Uses
      # deterministic error-path dispatch (no live listener needed), so it
      # runs on both targets.
      - name: Std.Http async-surface test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http async tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_async_tests.l

      # Real HTTP round-trips through the PUBLIC Std.Http API against a live
      # Std.HttpServer listener (#5560/#5561): GET, POST, and
      # sendAsync-with-header, each asserting status and the server-side
      # echo of method/path/request-header/body.  This is the coverage that
      # was missing when #5560 shipped — no other CI test ever sends a
      # request (http_tests.l above is deliberately construction-only).  The
      # listener runs in a child process the test builds via Lyric.Emitter:
      # an in-process server thread is not possible today because
      # Std.Task.scopeSpawn's Task.Run delegate never invokes the Lyric
      # closure on .NET (#5329).  LYRIC_STDLIB_BIN points at a merged dir:
      # the stage-1 compiler DLLs (the module imports Lyric.Emitter, and
      # LYRIC_STDLIB_BIN also redirects compiler-DLL discovery) overlaid
      # with the lyric.full.toml stdlib built by the "Build full stdlib"
      # step above, so the round trip executes stdlib machine code emitted
      # by the compiler under test — default discovery would find the
      # seed-built .bootstrap/stage1 stdlib, whose kernel carries the
      # previous release's codegen.
      - name: Std.Http round-trip self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping Std.Http round-trip self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http round-trip self-test"
            exit 1
          fi
          if [ ! -f lyric-stdlib/bin/Lyric.Stdlib.dll ]; then
            echo "::error::lyric-stdlib/bin/Lyric.Stdlib.dll missing — the 'Build full stdlib' step must run before this one"
            exit 1
          fi
          rm -rf .bootstrap/httprt-lib
          mkdir -p .bootstrap/httprt-lib
          cp .bootstrap/stage1/*.dll .bootstrap/httprt-lib/
          cp lyric-stdlib/bin/Lyric.Stdlib*.dll .bootstrap/httprt-lib/
          LYRIC_STDLIB_BIN="$PWD/.bootstrap/httprt-lib" "$lyric_bin" test --target dotnet lyric-compiler/lyric/http_roundtrip_self_test.l

      # HttpVersion deterministic coverage (docs/61 §5.1, D128 decision 4;
      # #5879): the Http3-unsupported gate never touches the network (build()
      # routes to Std.Http.HttpClientImpl.unsupportedReason before any kernel
      # call), so this runs with plain stdlib discovery — no LYRIC_STDLIB_BIN
      # overlay needed, matching http_async_tests.l's own step above.
      - name: Std.Http HttpVersion test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http HttpVersion tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/http_version_tests.l

      # Real HTTP round-trip proving HttpVersion.negotiatedVersion() against a
      # live plaintext Std.HttpServer listener (docs/61 §5.1, D128 decision 4;
      # #5879): default client stays Http11 over plaintext (h2 only upgrades
      # via ALPN/TLS) and withHttpVersion(Http11) pins explicitly. Same
      # child-process concurrency model and LYRIC_STDLIB_BIN overlay as the
      # Std.Http round-trip self-test above (#5329) — see
      # http_version_self_test.l's own header for why this is dotnet-only
      # (http_version_jvm_self_test.l covers the JVM leg in-process).
      - name: Std.Http HttpVersion round-trip self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping Std.Http HttpVersion round-trip self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Http HttpVersion round-trip self-test"
            exit 1
          fi
          if [ ! -f lyric-stdlib/bin/Lyric.Stdlib.dll ]; then
            echo "::error::lyric-stdlib/bin/Lyric.Stdlib.dll missing — the 'Build full stdlib' step must run before this one"
            exit 1
          fi
          rm -rf .bootstrap/httpverrt-lib
          mkdir -p .bootstrap/httpverrt-lib
          cp .bootstrap/stage1/*.dll .bootstrap/httpverrt-lib/
          cp lyric-stdlib/bin/Lyric.Stdlib*.dll .bootstrap/httpverrt-lib/
          LYRIC_STDLIB_BIN="$PWD/.bootstrap/httpverrt-lib" "$lyric_bin" test --target dotnet lyric-compiler/lyric/http_version_self_test.l

      # Std.Log structured-fields regression coverage (docs/59 §8.1): the
      # escapeLogValue substring count-vs-end bug made any log call with a
      # field key/value of length >= 2 panic at runtime.  Dotnet-only: on
      # --target jvm the fields path hits a separate pre-existing JVM
      # backend record-field-owner resolution bug (LogField cast to
      # java.lang.String inside formatFields), so the JVM leg cannot run
      # until that is fixed.
      - name: Std.Log test coverage (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Log tests"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-stdlib/tests/log_tests.l

      # Pins the D-N-026 four-format parse contract on the managed target,
      # including Option[Uuid] flowing through the generic Std.Core helpers
      # (#5196 regression); uuid_tests.l is a plain-main program, so it runs
      # via `lyric run` rather than `lyric test` (#5200).
      - name: Std.Uuid test coverage (lyric run)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Uuid tests"
            exit 1
          fi
          "$lyric_bin" run lyric-stdlib/tests/uuid_tests.l

      # Pins the D-N-027 calendar contract (epoch conversions, duration
      # arithmetic, addMonths clamping, the toIsoString parse round-trip)
      # on the managed target; plain-main program, so `lyric run`.
      # TZ is deliberately non-UTC (#5233): DateTime.TryParse of a
      # "Z"-suffixed string yields a LOCAL-kind result shifted to the
      # host timezone, and the ToUniversalTime normalization in the
      # parse seam only does real work off UTC — on the runners'
      # default TZ=UTC the round-trip would pass even without it.
      - name: Std.Time test coverage (lyric run, non-UTC host TZ)
        working-directory: ${{ github.workspace }}
        env:
          TZ: America/New_York
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Time tests"
            exit 1
          fi
          "$lyric_bin" run lyric-stdlib/tests/time_tests.l

      # Std.Task cancellation-token/delay coverage on the managed target;
      # plain-main program, so `lyric run`.  Std.Task.Scope structured
      # concurrency is intentionally NOT covered here — see
      # task_scope_known_failures_tests.l's header (issue #5329).
      - name: Std.Task test coverage (lyric run)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping Std.Task tests"
            exit 1
          fi
          "$lyric_bin" run lyric-stdlib/tests/task_tests.l

      # Trust-anchor reproducibility gate (Q-dist-001 prerequisite): the
      # self-hosted MSIL emitter must be byte-for-byte reproducible.  Build each
      # corpus twice and assert an exact `cmp` (no normalization — the
      # self-hosted backend fixes the Module MVID and zeroes the PE timestamp,
      # so identical sources MUST produce identical bytes).  A regression here
      # means the shipped binary is no longer reproducible.
      #
      #   (i)  the full stdlib bundle, and
      #   (ii) the WHOLE Lyric.Cli compiler closure (every Lyric.* / Msil.* /
      #        Jvm.* package + its stdlib import closure) — the strongest
      #        property available today: the entire self-hosted compiler emits
      #        byte-identically run-to-run.
      - name: Verify reproducible self-hosted emit (byte-identical double-build)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          ./scripts/verify-reproducible-emit.sh manifest "$lyric_bin" lyric-stdlib/lyric.full.toml
          ./scripts/verify-reproducible-emit.sh closure  "$lyric_bin"

      # Multi-file example packages — builds each showcase service in
      # examples/{rbac,ledger,jobqueue,product-catalog} end-to-end via
      # `lyric build --manifest` (#2514).  Unlike the single-file AOT
      # smoke test above, this exercises the full project pipeline across
      # cross-file + cross-package references, aspect instantiations, and
      # the lyric-web/db/otel/grpc/auth/resilience library dependencies.
      # Library deps are built bottom-up first so each example's restored
      # path-dependency DLLs exist.  Fails CI if any package regresses.
      - name: Build example packages (lyric build --manifest)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; example package build cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # The self-hosted MSIL bridge resolves `import Std.X` from
          # lyric-stdlib/std/*.l source, but each manifest also lists
          # Lyric.Stdlib as a path dependency whose output DLL must exist;
          # stage 1 already compiled it into .bootstrap/stage1/.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI (the
          # AOT binary is a pure trampoline; same wiring as the steps above).
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Build the dependency libraries bottom-up so each example's
          # restored path deps resolve to an existing bin/<assembly>.dll.
          libs=(lyric-logging lyric-auth lyric-resilience lyric-otel lyric-db lyric-web lyric-health lyric-grpc)
          for lib in "${libs[@]}"; do
            echo "=== build dependency $lib ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::failed to build example dependency $lib"
              exit 1
            fi
          done
          # Build each example package end-to-end.
          examples=(rbac ledger jobqueue product-catalog)
          for ex in "${examples[@]}"; do
            echo "=== build example $ex ==="
            if ! "$lyric_bin" build --manifest "examples/$ex/lyric.toml"; then
              echo "::error::example package $ex failed to build"
              exit 1
            fi
          done
          echo "all example packages built"

      # Ecosystem library builds (#2530) — builds every lyric-* library in
      # topological order so regressions in any library are caught on every
      # push.  Libraries are grouped into three tiers by dependency depth.
      # The step is idempotent: `lyric build` skips unchanged output DLLs,
      # so libraries already built by the example packages step above are
      # not re-compiled from scratch.
      - name: Ecosystem library builds (#2530)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; ecosystem library builds cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Ensure stdlib DLLs are in the canonical dep-resolution path.
          shopt -s nullglob
          stdlib_dlls=(.bootstrap/stage1/Lyric.Stdlib*.dll)
          shopt -u nullglob
          if (( ${#stdlib_dlls[@]} == 0 )); then
            echo "::error::no Lyric.Stdlib*.dll found in .bootstrap/stage1"
            exit 1
          fi
          mkdir -p lyric-stdlib/bin
          cp "${stdlib_dlls[@]}" lyric-stdlib/bin/
          # Route emitProject subprocess hops to the F# bootstrap CLI.
          cli_dll="$(pwd)/bootstrap/src/Lyric.Cli/bin/${BUILD_CONFIG}/net10.0/lyric.dll"
          if [ -f "$cli_dll" ]; then
            export LYRIC_BIN=dotnet
            export LYRIC_CLI_DLL="$cli_dll"
          fi
          # Tier 0: libraries with no local path dependencies.
          tier0=(
            lyric-cache lyric-logging lyric-proto lyric-generator-sdk
            lyric-mail lyric-storage lyric-auth lyric-resilience
            lyric-validation lyric-i18n lyric-otel lyric-feature-flags
            lyric-aws-xray lyric-aws-secrets lyric-db lyric-jsonrpc
          )
          for lib in "${tier0[@]}"; do
            echo "=== build $lib (tier 0) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 0) failed to build"
              exit 1
            fi
          done
          # Tier 1: libraries depending only on tier-0 libraries.
          tier1=(lyric-mq lyric-session lyric-jobs lyric-search lyric-ws lyric-web lyric-grpc lyric-mcp)
          for lib in "${tier1[@]}"; do
            echo "=== build $lib (tier 1) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 1) failed to build"
              exit 1
            fi
          done
          # Tier 2: libraries depending on tier-0 and tier-1 libraries.
          tier2=(lyric-health lyric-testing lyric-lambda)
          for lib in "${tier2[@]}"; do
            echo "=== build $lib (tier 2) ==="
            if ! "$lyric_bin" build --manifest "$lib/lyric.toml"; then
              echo "::error::$lib (tier 2) failed to build"
              exit 1
            fi
          done
          echo "all ecosystem libraries built"

      # Weaver self-test — exercises `Lyric.Weaver` via native `lyric test`.
      # The compiler-package imports (Lyric.Lexer / Lyric.Parser /
      # Lyric.Weaver) are resolved by LINKING the already-compiled stage-1
      # bundle DLLs as restored dependencies (#2364), so no recompile-from-
      # source `LYRIC_LOAD_COMPILER=1` is needed.  Resolves issue #1324
      # without any new F# test shims.
  crosspackage-and-codegen-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # See compiler-self-tests-dotnet-a's "Parallel step execution" comment above
      # for how `background: true` / `wait-all: true` work.
      #
      # Peak concurrency (#4486): this job currently launches 16 `background: true`
      # steps before its `wait-all: true` barrier, each running an in-process
      # self-hosted compilation.  CI has been green at this concurrency on the
      # standard `ubuntu-latest` runner; if a future addition here starts producing
      # non-deterministic OOM-kill failures, split the step list across two or more
      # `wait-all: true` barriers (sub-batching) rather than reverting to fully
      # sequential steps.
      - name: Single-bundle stdlib (self-hosted Std.Sort)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/out"
          cat > "$work/prog.l" <<'LYR'
          package SortProg
          import Std.Core
          import Std.Sort
          import Std.Console as Console
          func main(): Unit {
            val s = sortInts([3, 1, 2, 5, 4])
            var i = 0
            while i < s.length {
              Console.println(toString(s[i]))
              i = i + 1
            }
          }
          LYR
          # Post-collapse (D111): stdlib is the single Lyric.Stdlib.dll bundle, so a
          # program importing Std.Sort links that one assembly — not a per-package
          # Lyric.Stdlib.Sort.dll.  Build the bundle beside the program and run it.
          "$lyric_bin" build --manifest lyric-stdlib/lyric.full.toml \
            -o "$work/out/Lyric.Stdlib.dll" --target dotnet --no-restore
          if [ ! -f "$work/out/Lyric.Stdlib.dll" ]; then
            echo "::error::single stdlib bundle not produced"
            exit 1
          fi
          "$lyric_bin" build "$work/prog.l" -o "$work/out/prog.dll"
          got="$(cd "$work/out" && dotnet prog.dll | tr '\n' ' ' | sed 's/ *$//')"
          echo "sort output: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::self-hosted Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "self-hosted Std.Sort returns sorted output (single bundle)"

      # Cross-package compile-time constant inlining (#2592 slice 1).  A
      # module-level `pub val` / `pub const` with an integer-literal
      # initializer is part of a package's ABI: consumers inline its value
      # at compile time (`ldc.i4`).  Under separate compilation (per-package
      # emit), the consumer compiles without the producer's source, so the
      # value must travel in the producer's embedded `Lyric.Contract`
      # metadata and be re-registered into the consumer's `constValues` from
      # the restored dependency.  This builds a dependency exposing
      # `pub val ANSWER: Int = 0x002A`, then a consumer that prints `ANSWER`
      # across a real assembly boundary (a local-path `[dependencies]`
      # entry, which threads the producer DLL as a restored dep), and
      # asserts the inlined value is `42`.  Before slice 1, `ANSWER` was
      # absent from the dependency's contract, so the consumer could not
      # even resolve it.
      - name: Cross-package const inlining (#2592 restored-dep consts)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/constdep/src" "$work/app/src"
          cat > "$work/constdep/lyric.toml" <<'TOML'
          [package]
          name = "constdep"
          version = "0.1.0"
          [project]
          name = "ConstDep"
          output_assembly = "Lyric.ConstDep.dll"
          [project.packages]
          "ConstDep" = "src"
          TOML
          cat > "$work/constdep/src/constdep.l" <<'LYR'
          package ConstDep
          pub val ANSWER: Int = 0x002A
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "app"
          version = "0.1.0"
          [project]
          name = "App"
          [project.packages]
          "App" = "src"
          [dependencies]
          constdep = { path = "../constdep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package App
          import ConstDep
          import Std.Console as Console
          func main(): Unit {
            Console.println(toString(ANSWER))
          }
          LYR
          "$lyric_bin" build --manifest "$work/constdep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          got="$(cd "$work/app/bin" && dotnet App.dll | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "42" ]; then
            echo "::error::cross-package const inlining returned '$got', expected '42'"
            exit 1
          fi
          echo "cross-package pub val inlines through restored-dep contract metadata"

      # Per-package compiler emit (#2592 slice 2, #3199 positive pass gate).
      # emitPerPackageClosure emits the COMPILER-package closure (Lyric.* /
      # Msil.* / Jvm.*) as separate Lyric.<Pkg>.dll assemblies, threading each
      # package's transitive compiler-import closure as restored deps, so
      # cross-package types AND inlined constants (#2592 slice 1) resolve
      # across the assembly boundary.  This emits the typechecker self-test's
      # compiler closure (Lexer + Parser + TypeChecker) and asserts the
      # per-package DLLs exist, then runs the self-test against the emit
      # output as a POSITIVE PASS GATE.  The former docs/43 producer/consumer
      # naming gap (per-package emitter defined generic stdlib types
      # arity-suffixed while consumer TypeRefs were emitted unsuffixed) is
      # fixed by the always-emit-arity-TypeRefs change (#3199): both producer
      # and consumer now use the suffixed form consistently.  The bundle marker
      # `Lyric.Stdlib.dll` is copied in so `findCompiledLibDir` honors the
      # LYRIC_STDLIB_BIN override through `dirHasCompiledStdlib`.
      - name: Per-package compiler emit (#2592 self-hosted compiler DLLs)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          st="lyric-compiler/lyric/typechecker_self_test.l"
          "$lyric_bin" --internal-perpackage-build "$st" "$work/out"
          for dll in Lyric.Lyric.Lexer.dll Lyric.Lyric.Parser.dll Lyric.Lyric.TypeChecker.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::expected per-package compiler DLL missing: $dll"
              exit 1
            fi
          done
          # Bundle marker so findCompiledLibDir honours LYRIC_STDLIB_BIN (#3199).
          cp .bootstrap/stage1/Lyric.Stdlib.dll "$work/out/"
          rc=0
          out="$(LYRIC_STDLIB_BIN="$work/out" "$lyric_bin" test "$st" --target dotnet 2>&1)" || rc=$?
          printf '%s\n' "$out" | tail -20
          if [ "$rc" -ne 0 ]; then
            echo "::error::typechecker self-test FAILED against per-package emit output (docs/43 naming gap re-opened, or LYRIC_STDLIB_BIN silently fell back to the F#-linked path)"
            exit 1
          fi
          echo "per-package compiler closure emits and runs correctly (docs/43 naming gap fixed, positive pass gate #3199)"

      # Full self-hosted stdlib (#2592 slice 3).  Every Std.* package — including
      # ones the F# stage-0 emitter cannot compile (e.g. Std.Sort, whose
      # typed-lambda generics defeat F# codegen) — now self-host-compiles via
      # emitPerPackageClosure.  This drives a driver that imports every public
      # Std module, asserts all packages emit (Std.Sort / Std.Http / Std.Rest are
      # the historically-failing ones: Http/Rest needed the async type-method
      # state-machine fix in findTypeDef/RefRowByName, Sort needed the slice ABI
      # which is already unified), then compiles + runs a Std.Sort program against
      # the self-hosted-emitted stdlib (self-consistent set) and asserts it sorts.
      # Guards against regressions in stdlib self-host-compilability.
      - name: Full self-hosted stdlib (#2592 all Std.* packages)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          mkdir -p "$work/out"
          # Post-collapse (D111): the bundle packages self-host-compile into the
          # single Lyric.Stdlib.dll; the HTTP/async surface self-host-compiles
          # per-package (the #4030 hybrid).  Building both is the "all Std.*
          # self-host-compile" guard.
          "$lyric_bin" build --manifest lyric-stdlib/lyric.full.toml \
            -o "$work/out/Lyric.Stdlib.dll" --target dotnet --no-restore
          if [ ! -f "$work/out/Lyric.Stdlib.dll" ]; then
            echo "::error::single stdlib bundle not produced"
            exit 1
          fi
          printf 'package HttpAll\nimport Std.Http\nimport Std.HttpServer\nimport Std.Rest\nfunc main(): Unit { }\n' > "$work/http.l"
          "$lyric_bin" --internal-perpackage-build "$work/http.l" "$work/httpout" --target dotnet
          for dll in Lyric.Stdlib.Http.dll Lyric.Stdlib.Rest.dll Lyric.Stdlib.HttpServer.dll Lyric.Stdlib.Task.dll Lyric.Stdlib.HttpHost.dll; do
            if [ ! -f "$work/httpout/$dll" ]; then
              echo "::error::expected HTTP per-package DLL missing: $dll"
              exit 1
            fi
          done
          cat > "$work/sorttest.l" <<'LYR'
          package SortTest
          import Std.Console as Console
          import Std.Sort as Sort
          func main(): Unit {
            val s = Sort.sortInts([5, 3, 1, 4, 2])
            var acc = ""
            var i = 0
            while i < s.length {
              acc = acc + toString(s[i])
              if i < s.length - 1 { acc = acc + " " }
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # Resolution note (#2787): the build below intentionally relies on the
          # default stdlib resolution (walking up from the lyric binary to
          # lyric-stdlib/std).  LYRIC_STD_PATH points at a stdlib *source*
          # directory, so overriding it to $work/out (a DLL output dir) changes
          # which artifacts get linked and miscompiles the program — making the
          # emitted-DLL set the linked target needs first-class support, tracked
          # in #2787.
          "$lyric_bin" build "$work/sorttest.l" -o "$work/out/sorttest.dll"
          got="$(cd "$work/out" && dotnet sorttest.dll | tr -d '\r\n')"
          echo "self-hosted Std.Sort printed: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::self-hosted Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "all Std.* packages self-host-compile; self-hosted Std.Sort sorts correctly"

      # Whole compiler self-host-compiles (docs/41 §R7 front-end completeness).
      # Drives emitPerPackageClosure over the entire Lyric.Cli import closure —
      # all ~73 Lyric.* / Msil.* / Jvm.* compiler packages — and asserts every
      # one emits.  Each package runs the full self-hosted middle-end + codegen,
      # so success means the self-hosted front-end (notably its match-exhaustiveness
      # checking, which is stricter than the F# stage-0's advisory pass) accepts
      # the compiler's own source.  Guards against reintroducing a non-exhaustive
      # match (the T0016 class that previously blocked Msil.Codegen on
      # MGenericInstByName and Lyric.Lsp on TyException).  This is the
      # prerequisite for a self-hosted-built toolchain.
      - name: Whole compiler self-host-compiles (R7 front-end completeness)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          printf 'package CompilerSelfHost\nimport Lyric.Cli\nfunc main(): Int { 0 }\n' > "$work/all.l"
          "$lyric_bin" --internal-perpackage-build "$work/all.l" "$work/out"
          for dll in Lyric.Lyric.Cli.dll Lyric.Msil.Codegen.dll Lyric.Lyric.Lsp.dll Lyric.Jvm.Codegen.dll; do
            if [ ! -f "$work/out/$dll" ]; then
              echo "::error::expected self-hosted compiler DLL missing: $dll"
              exit 1
            fi
          done
          shopt -s nullglob
          dlls=("$work/out"/Lyric.Lyric.*.dll "$work/out"/Lyric.Msil.*.dll "$work/out"/Lyric.Jvm.*.dll)
          echo "whole compiler self-host-compiles: ${#dlls[@]} compiler-package DLLs emitted"

      # Shipped Std.Sort works via the default toolchain (#2592 close).  The
      # AOT-build step above ran scripts/stage-selfhosted-stdlib.sh, which
      # staged the stdlib packages F# cannot build (Std.Sort et al.) into the
      # lib dir.  This builds + runs a Std.Sort program through the *default*
      # toolchain — NO LYRIC_STDLIB_BIN override — so it exercises exactly what
      # a user gets: a self-hosted-compiled program linking the shipped,
      # self-hosted-built Std.Sort against the F#-built Core, and sorting.
      - name: Shipped Std.Sort via default toolchain (#2592)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          # Post-collapse (D111): Std.Sort ships inside the single Lyric.Stdlib.dll
          # bundle, not a per-package Lyric.Stdlib.Sort.dll.
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.dll" ]; then
            echo "::error::Lyric.Stdlib.dll bundle not staged in the toolchain lib dir"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/s.l" <<'LYR'
          package S
          import Std.Console as Console
          import Std.Sort as Sort
          func main(): Unit {
            val r = Sort.sortInts([5, 3, 1, 4, 2])
            var acc = ""
            var i = 0
            while i < r.length {
              acc = acc + toString(r[i])
              if i < r.length - 1 { acc = acc + " " }
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # `lyric run` prints a "built <path>" progress line before the
          # program's stdout, so take the last line (the program output).
          got="$("$lyric_bin" run "$work/s.l" | tail -1 | tr -d '\r\n')"
          echo "shipped Std.Sort printed: '$got'"
          if [ "$got" != "1 2 3 4 5" ]; then
            echo "::error::shipped Std.Sort returned '$got', expected '1 2 3 4 5'"
            exit 1
          fi
          echo "Std.Sort resolves and sorts through the default shipped toolchain"

      # Cross-package non-generic record field encoding (D-progress-477 / facet 1).
      # The self-hosted PRODUCER (lowerRecordMsil/lowerUnionMsil) erased a
      # non-generic record's `List`/`Map`/`Option` field to `object`, while the
      # F# emitter and the cross-package field/ctor REFERENCE both use the
      # concrete encoding (`List`1<T>`).  So a self-hosted-built record's
      # reference-typed field did not bind from another assembly
      # (MissingField/MissingMethod).  This builds a dependency package whose
      # NON-generic record exposes `List[Int]`, `List[Item]`, and `String`
      # fields, then a consumer that reads them across a real assembly boundary,
      # and asserts the values.  Before the fix the read faulted.
      - name: Cross-package record field encoding (D-progress-477)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "recdep"
          version = "0.1.0"
          [project]
          name = "RecDep"
          output_assembly = "Lyric.RecDep.dll"
          [project.packages]
          "RecDep" = "src"
          TOML
          cat > "$work/dep/src/recdep.l" <<'LYR'
          package RecDep
          pub record Item { v: Int }
          pub record Rec { ints: List[Int]; items: List[Item]; name: String }
          pub func mkRec(): Rec { Rec(ints = [1, 2, 3], items = [Item(v = 9)], name = "hi") }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "recapp"
          version = "0.1.0"
          [project]
          name = "RecApp"
          [project.packages]
          "RecApp" = "src"
          [dependencies]
          recdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package RecApp
          import RecDep
          import Std.Console as Console
          func main(): Unit {
            val r = mkRec()
            Console.println(toString(r.ints.count) + " " + toString(r.items.count) + " " + r.name)
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          # Stage the local-path dependency DLL beside the consumer so it loads
          # at run time (the Rec type lives in Lyric.RecDep.dll).
          cp "$work/dep/bin/Lyric.RecDep.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet RecApp.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "3 1 hi" ]; then
            echo "::error::cross-package record field read returned '$got', expected '3 1 hi'"
            exit 1
          fi
          echo "cross-package non-generic record field binds concretely"

      # Cross-package non-generic FUNCTION PARAMETER encoding (D-progress-478 / facet 2).
      # The self-hosted PRODUCER (lowerFuncMsil) erased a reference-typed
      # parameter of a non-generic free function (a record, `slice[record]`,
      # `Option[..]`, etc.) to `object` in the MethodDef signature, while the
      # F# emitter, the function's own body slot type, and the cross-package
      # call REFERENCE (registerRestoredFunc/registerStdlibFunc, both `…WithCtx`)
      # all use the concrete encoding.  So a self-hosted-built function with a
      # reference-typed parameter did not bind from another assembly
      # (MissingMethodException).  This builds a dependency package whose
      # NON-generic functions take one (`describe`) and two (`combine`) record
      # parameters, then a consumer that calls them across a real assembly
      # boundary, and asserts the result.  Before the fix the calls faulted.
      # The record is constructed in the DEPENDENCY (`mkErr`) and passed by the
      # consumer, so the consumer never constructs a collection — mirroring the
      # facet-1 guard above, which runs the consumer without staging any stdlib
      # runtime DLL (collection literals would pull `Lyric.Stdlib.Core`).
      - name: Cross-package function parameter encoding (D-progress-478)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "fdep"
          version = "0.1.0"
          [project]
          name = "FDep"
          output_assembly = "Lyric.FDep.dll"
          [project.packages]
          "FDep" = "src"
          TOML
          cat > "$work/dep/src/fdep.l" <<'LYR'
          package FDep
          pub record Err { field: String; msg: String }
          pub func mkErr(): Err { Err(field = "name", msg = "required") }
          pub func describe(e: in Err): String { e.field + ":" + e.msg }
          pub func combine(a: in Err, b: in Err): String { describe(a) + "|" + describe(b) }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "fapp"
          version = "0.1.0"
          [project]
          name = "FApp"
          [project.packages]
          "FApp" = "src"
          [dependencies]
          fdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package FApp
          import FDep
          import Std.Console as Console
          func main(): Unit {
            val a = mkErr()
            val b = mkErr()
            Console.println(describe(a) + " " + combine(a, b))
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          # Stage the local-path dependency DLL beside the consumer so it loads
          # at run time (the Err type + functions live in Lyric.FDep.dll).
          cp "$work/dep/bin/Lyric.FDep.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet FApp.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "name:required name:required|name:required" ]; then
            echo "::error::cross-package function param call returned '$got', expected 'name:required name:required|name:required'"
            exit 1
          fi
          echo "cross-package non-generic function reference-typed params bind concretely"

      # Cross-package generic-return signature: reference-typed generic args.
      # A self-hosted-compiled call to a cross-package function whose return is a
      # generic instantiation with a REFERENCE-typed argument — e.g.
      # `Std.File.readText : Result[String, IOError]` (IOError is a union in the
      # separate Std.Errors package) — must encode the consumer MemberRef return
      # as `Result<String, Std.Errors.IOError>`, resolving the arg to its real
      # TypeRef.  The context-free signature encoder degraded the arg to `object`
      # (`Result<String, object>`), which did not bind against the F#-built
      # producer's concrete signature → `MissingMethodException` at run time.
      # Primitive args (e.g. `Result[Int, String]`) were unaffected, so this was
      # latent.  Guards `registerStdlibFunc`'s ctx-aware encoding.
      # Concurrency cap: this group of 16 background steps includes several of
      # the heaviest self-tests in CI (whole-stdlib and whole-compiler
      # self-host compiles). A 16-step batch is at the edge where the
      # concurrent-status flakes appear (Defer flaked in a 16-step batch on the
      # dotnet-a job), so halve it to ~8 with this barrier.
      - name: Wait for parallel tests (batch 1a)
        wait-all: true

      - name: Cross-package generic-return ref-typed arg (Std.File.readText)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/rt.l" <<'LYR'
          package RT
          import Std.File as File
          import Std.Console as Console
          func main(): Unit {
            match File.readText("/nonexistent-lyric-ci-path") {
              case Ok(t) -> Console.println("read " + toString(t.length))
              case Err(e) -> Console.println("err-ok")
            }
          }
          LYR
          out="$("$lyric_bin" run "$work/rt.l" 2>&1 | tail -1)"
          echo "readText program printed: '$out'"
          if [ "$out" != "err-ok" ]; then
            echo "::error::self-hosted Std.File.readText call returned '$out' (expected 'err-ok'); cross-package Result[_, union] signature regressed"
            exit 1
          fi
          echo "cross-package Result[String, IOError] return binds correctly"

      # Cross-package generic-return with a `Unit` arg (D-progress-479 / facet 3).
      # A self-hosted call to an F#-built stdlib function whose return is a
      # generic instantiation with a `Unit` argument — e.g.
      # `Std.File.writeText : Result[Unit, IOError]` ("fallible void", idiomatic)
      # — must encode the consumer MemberRef return as
      # `Result<[corelib]System.ValueTuple, Std.Errors.IOError>`, matching the
      # F# emitter's value-position `Unit -> System.ValueTuple` convention.  The
      # self-hosted encoder degraded the `Unit` arg to `object` (`Result<object,
      # IOError>`), which did not bind against the F#-built producer and faulted
      # with MissingMethodException.  The fix (`xrefUnitArgsToValueTuple`, applied
      # only to the F#-built-stdlib REFERENCE in `registerStdlibFunc`) leaves the
      # in-bundle object-argument representation untouched.  Guards the encoding.
      - name: Cross-package generic-return Unit arg (Std.File.writeText)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/wt.l" <<'LYR'
          package WT
          import Std.File as File
          import Std.Console as Console
          func main(): Unit {
            match File.writeText("$WORKPATH/wt_probe.txt", "hi") {
              case Ok(_)  -> Console.println("wrote-ok")
              case Err(_) -> Console.println("write-err")
            }
          }
          LYR
          # Substitute a writable temp path into the program source.
          sed -i "s#\$WORKPATH#$work#" "$work/wt.l"
          out="$("$lyric_bin" run "$work/wt.l" 2>&1 | tail -1)"
          echo "writeText program printed: '$out'"
          if [ "$out" != "wrote-ok" ]; then
            echo "::error::self-hosted Std.File.writeText call returned '$out' (expected 'wrote-ok'); cross-package Result[Unit, IOError] signature regressed"
            exit 1
          fi
          echo "cross-package Result[Unit, IOError] return binds correctly"

      # Non-generic union/record with a concrete-collection field: construct +
      # match (D-progress-480 / #2592 slice 1, facet 4).  Facet 1 made a
      # non-generic record/union collection field a concrete `List<T>`, but a
      # `[...]` literal builds a `List<object>` unless the construction site
      # pushes the field's concrete type onto the expected-collection stack.
      # Record construction did; a NON-GENERIC union case did not (it registers
      # no `fieldDeclaredNames`), so `Circle(tags = [1,2,3])` stored a
      # `List<object>` into a `List<int32>` field and the `match` binding — which
      # casts to the concrete field type — faulted with InvalidCastException,
      # even in a single package.  This builds a union with a `List[Int]`-payload
      # case plus a record with the same field, constructs both from list
      # literals, and asserts the matched/read counts.  Before the fix the union
      # `match` aborted.
      - name: Union/record concrete-collection construct+match (D-progress-480)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          cat > "$work/uc.l" <<'LYR'
          package UC
          import Std.Console as Console
          record Box { tags: List[Int] }
          union Shape {
            case Circle(tags: List[Int])
            case Empty
          }
          func boxCount(b: in Box): Int { b.tags.count }
          func shapeCount(s: in Shape): Int {
            match s {
              case Circle(tags) -> tags.count
              case Empty -> 0
            }
          }
          func main(): Unit {
            val b = Box(tags = [1, 2, 3])
            val c = Circle(tags = [4, 5])
            Console.println(toString(boxCount(b)) + " " + toString(shapeCount(c)))
          }
          LYR
          out="$("$lyric_bin" run "$work/uc.l" 2>&1 | tail -1)"
          echo "union/record program printed: '$out'"
          if [ "$out" != "3 2" ]; then
            echo "::error::union/record concrete-collection construct+match returned '$out' (expected '3 2'); #2592 slice-1 regressed"
            exit 1
          fi
          echo "non-generic union/record concrete-collection field construct+match works"

      # Cross-package record construct-in-consumer (#2592 slice 2, D-progress-481).
      # A CONSUMER constructing a restored dependency's record from a list literal
      # — `Box(tags = [1,2,3], ...)` where `Box` lives in a path dependency —
      # stored a `List<object>` because `registerRestoredRecordFields` never
      # registered the positional `fieldDeclaredNames[<fqn>/field<i>]` map, so the
      # construction-site hint degraded to `object`.  The producer's concrete
      # `List<int32>`-field read then faulted with InvalidCastException.  This
      # builds the dep + consumer across a real assembly boundary and asserts the
      # producer reads the concrete list it was handed.
      - name: Cross-package record construct-in-consumer (D-progress-481)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/dep/src" "$work/app/src"
          cat > "$work/dep/lyric.toml" <<'TOML'
          [package]
          name = "rdep"
          version = "0.1.0"
          [project]
          name = "RDep3"
          output_assembly = "Lyric.RDep3.dll"
          [project.packages]
          "RDep3" = "src"
          TOML
          cat > "$work/dep/src/rdep.l" <<'LYR'
          package RDep3
          pub record Box { tags: List[Int]; name: String }
          pub func describe(b: in Box): String { toString(b.tags.count) + ":" + b.name }
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "rapp"
          version = "0.1.0"
          [project]
          name = "RApp3"
          [project.packages]
          "RApp3" = "src"
          [dependencies]
          rdep = { path = "../dep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package RApp3
          import RDep3
          import Std.Console as Console
          func main(): Unit {
            val b = Box(tags = [1, 2, 3, 4], name = "hi")
            Console.println(describe(b))
          }
          LYR
          "$lyric_bin" build --manifest "$work/dep/lyric.toml"
          "$lyric_bin" build --manifest "$work/app/lyric.toml"
          cp "$work/dep/bin/Lyric.RDep3.dll" "$work/app/bin/"
          got="$(cd "$work/app/bin" && dotnet RApp3.dll | tail -1 | tr -d '\r\n')"
          echo "consumer printed: '$got'"
          if [ "$got" != "4:hi" ]; then
            echo "::error::cross-package record construct-in-consumer returned '$got' (expected '4:hi'); #2592 slice-2 regressed"
            exit 1
          fi
          echo "cross-package record construct-in-consumer builds the concrete list"

      # Cross-package union construct+match (#2897).  A PRODUCER package exports a
      # union with a `List[Int]` payload case; the CONSUMER constructs a case and
      # matches it across an assembly boundary.  Verifies that union-case construction
      # in the consumer correctly stores a concrete `List<int32>` and that the match
      # binding reads back the right count and element values.
      - name: Cross-package union construct+match (#2897)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          work="$(mktemp -d)"
          mkdir -p "$work/udep/src" "$work/uapp/src"
          cat > "$work/udep/lyric.toml" <<'TOML'
          [package]
          name = "udep"
          version = "0.1.0"
          [project]
          name = "UDep"
          output_assembly = "Lyric.UDep.dll"
          [project.packages]
          "UDep" = "src"
          TOML
          cat > "$work/udep/src/udep.l" <<'LYR'
          package UDep
          pub union Payload {
            case Items(vals: List[Int])
            case Empty
          }
          pub func sumPayload(p: in Payload): Int {
            match p {
              case Items(vals) -> {
                var s = 0
                var i = 0
                while i < vals.count { s = s + vals[i]; i = i + 1 }
                s
              }
              case Empty -> 0
            }
          }
          LYR
          cat > "$work/uapp/lyric.toml" <<'TOML'
          [package]
          name = "uapp"
          version = "0.1.0"
          [project]
          name = "UApp"
          [project.packages]
          "UApp" = "src"
          [dependencies]
          udep = { path = "../udep" }
          TOML
          cat > "$work/uapp/src/uapp.l" <<'LYR'
          package UApp
          import UDep
          import Std.Console as Console
          func main(): Unit {
            val p = Items(vals = [10, 20, 30])
            Console.println(toString(sumPayload(p)))
          }
          LYR
          "$lyric_bin" build --manifest "$work/udep/lyric.toml"
          "$lyric_bin" build --manifest "$work/uapp/lyric.toml"
          cp "$work/udep/bin/Lyric.UDep.dll" "$work/uapp/bin/"
          got="$(cd "$work/uapp/bin" && dotnet UApp.dll | tail -1 | tr -d '\r\n')"
          echo "cross-package union consumer printed: '$got'"
          if [ "$got" != "60" ]; then
            echo "::error::cross-package union construct+match returned '$got', expected '60' (#2897)"
            exit 1
          fi
          echo "cross-package union construct+match with List[Int] payload works (#2897)"

      # Construction-position collExpect coverage (#2592 slice 3, D-progress-482).
      # Verifies that the self-hosted `codegen.l` `collExpect` push at four positions
      # produces genuine concrete `List<T>` rather than `List<object>`:
      #   1. Return position: `func f(): List[Int] { [10,20,30] }` — return-type push
      #   2. Call argument: `sumList([100,200,300])` — parameter-type push
      #   3. `var` reassignment: `xs = [1,2,3]` — local-tracked-type push
      #   4. Nested literal: `[[10,20],[30,40,50]]` — element-type push for inner list
      # All four positions require the SELF-HOSTED emitter (`lyric test` via the
      # in-process `Msil.Bridge`).  `lyric run` compiles through the F# bootstrap
      # emitter, which does not push `collExpect` for positions 1-3 — it builds
      # `List<object>` for those positions and the CLR faults with
      # `InvalidCastException` when the concrete-typed operation runs at runtime.
      # Guarded by a `.bootstrap/stage1` presence check (::warning if missing).
      - name: Construction-position collExpect coverage (#2592 slice 3, self-hosted)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping collExpect construction-position self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping collExpect construction-position self-test"
            exit 1
          fi
          work="$(mktemp -d)"
          # The self-hosted type checker treats `[...]` literals as `slice[T]`, not
          # `List[T]`, so collExpect at function-return / call-arg / reassignment
          # positions requires the record-field construction path where the emitter
          # propagates the field's `List[T]` expected type into the literal
          # (T0060/T0070/T0043 type errors block the direct List-position paths — a
          # self-hosted type-checker gap tracked in #2394).  All four positions are
          # validated here via record fields: construct, pass as field, reassign as
          # field, and nest as inner field.
          cat > "$work/c3.l" <<'LYR'
          @test_module
          package C3
          import Std.Testing
          record IntSeq { vals: List[Int] }
          func makeSeq(): IntSeq { IntSeq(vals = [10, 20, 30]) }
          func sumSeq(seq: in IntSeq): Int {
            var s = 0
            var i = 0
            while i < seq.vals.count { s = s + seq.vals[i]; i = i + 1 }
            s
          }
          test "record-field construction builds concrete List[Int]" {
            val seq = makeSeq()
            assertEqualInt(seq.vals.count, 3, "count")
            assertEqualInt(seq.vals[0] + seq.vals[1] + seq.vals[2], 60, "sum")
          }
          test "record-field in call-arg position builds concrete List[Int]" {
            assertEqualInt(sumSeq(IntSeq(vals = [100, 200, 300])), 600, "sum")
          }
          test "record-field reassignment builds concrete List[Int]" {
            var seq = IntSeq(vals = [0])
            seq = IntSeq(vals = [1, 2, 3])
            assertEqualInt(seq.vals.count, 3, "count")
            assertEqualInt(seq.vals[0] + seq.vals[2], 4, "sum-first-last")
          }
          test "nested record-field builds concrete List[Int] for inner" {
            val a = IntSeq(vals = [10, 20])
            val b = IntSeq(vals = [30, 40, 50])
            assertEqualInt(a.vals.count, 2, "inner0 count")
            assertEqualInt(b.vals.count, 3, "inner1 count")
            assertEqualInt(a.vals[0] + a.vals[1], 30, "inner0 sum")
          }
          LYR
          "$lyric_bin" test "$work/c3.l"
          echo "collExpect propagates correctly via record-field construction positions (self-hosted)"
          echo "record-field collExpect builds inner lists as concrete List<int32>"

      # `Sort.sortStrings(list.toArray())` end-to-end (#2592 slice 4, D-progress-483).
      # The #2592 headline bug: self-hosted callers passed a `List`-backed slice to
      # the F#-built `Std.Sort.sortStrings(String[])`, which returned the unsorted
      # input because the array-based F# body couldn't walk a `List` value.
      # The `cli.l::sortFileList` workaround is NOT retired in this PR (retirement
      # is deferred to stage-2 self-hosting; see D-progress-483 for the rationale).
      # This test confirms the underlying mechanism works end-to-end: `MConcreteList`
      # values support `.toArray()` and `coerceCallArgMsil` auto-converts
      # `MConcreteList → MArray` at call sites (D-progress-483).
      # Test builds a `List[String]`, converts via `.toArray()`, sorts, and
      # asserts lexicographic order.
      - name: Sort.sortStrings(list.toArray()) end-to-end (#2592 slice 4)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          if [ ! -f "$(dirname "$lyric_bin")/Lyric.Stdlib.dll" ]; then
            echo "::error::Lyric.Stdlib.dll bundle not staged — slice-4 test cannot run"
            exit 1
          fi
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          cat > "$work/s4.l" <<'LYR'
          package S4
          import Std.Sort as Sort
          import Std.Console as Console
          func main(): Unit {
            val files: List[String] = newList()
            files.add("gamma.l")
            files.add("alpha.l")
            files.add("beta.l")
            val sorted = Sort.sortStrings(files.toArray())
            var acc = ""
            var i = 0
            while i < sorted.length {
              if i > 0 { acc = acc + " " }
              acc = acc + sorted[i]
              i = i + 1
            }
            Console.println(acc)
          }
          LYR
          # Capture stdout and stderr separately so a trailing compiler warning
          # printed to stderr does not replace the program output in the comparison.
          # `lyric run` also prints its "built <path> in <N>ms" progress line to
          # stdout before the program output, so drop those lines explicitly
          # (the old `tail -1` was filtering them implicitly).
          s4_stderr="$work/s4.err"
          if ! out="$("$lyric_bin" run "$work/s4.l" 2>"$s4_stderr")"; then
            echo "::error::lyric run failed for slice-4 test"
            cat "$s4_stderr" >&2
            exit 1
          fi
          # Drop build-progress lines, then trim newlines to normalise output.
          out="$(printf '%s\n' "$out" | grep -v '^built ' | tr -d '\r\n')"
          echo "slice-4 program printed: '$out'"
          if [ "$out" != "alpha.l beta.l gamma.l" ]; then
            echo "::error::Sort.sortStrings(list.toArray()) returned '$out' (expected 'alpha.l beta.l gamma.l'); #2592 slice-4 regressed"
            cat "$s4_stderr" >&2
            exit 1
          fi
          echo "Sort.sortStrings(list.toArray()) returns lexicographically sorted result"

      # NOTE (#2908): An implicit `List[T]`→`slice[T]` coercion test (passing a
      # concrete `List[T]` directly to a function expecting `slice[T]`, without
      # `.toArray()`) is not added here.  The self-hosted type checker rejects
      # `List[T]` where `slice[T]` is expected (only the reverse — `slice[T]`
      # satisfying `List[T]` — is allowed, per `typechecker_exprs.l`).  The
      # `coerceCallArgMsil` MSIL-codegen path that performs this coercion is already
      # exercised by `Sort.sortStrings(list.toArray())` above, which adds the
      # explicit `.toArray()` call.  A purely implicit coercion would require a
      # type-checker change to widen `List[T]` to `slice[T]`, which is a separate
      # design decision.

      # Std.Xml / Std.Yaml staging check (#2592 slice 4 — curated-package
      # exclusions retired, D-progress-480).  `Xml` and `Yaml` are now in
      # CURATED_PACKAGES in `scripts/stage-selfhosted-stdlib.sh`.
      # A runtime smoke test via `lyric run` is deliberately omitted:
      # the F# bootstrap emitter stack-overflows (exit 134) for ANY external
      # code that transitively uses `XmlNode` or `XmlDoc` as a type parameter
      # (including `List[XmlNode]` returned by `elementChildren`), because
      # the emitter recursively resolves all field types of external types and
      # `XmlNode` contains a self-referential `List[XmlNode]` field.  The
      # existing `xml_tests.l` passes because it is compiled against Xml source
      # (in-flight, not DLL-restored), which avoids DLL-based recursive lookup.
      # DLL presence is the authoritative check for slice 4; correctness of the
      # Xml and Yaml APIs is covered by the stdlib emitter test suite.
      - name: Std.Xml and Std.Yaml bundled (#2592 slice 4)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          # Post-collapse (D111): Std.Xml and Std.Yaml ship inside the single
          # Lyric.Stdlib.dll bundle, not per-package DLLs.  Assert the bundle is
          # staged and actually defines the Xml/Yaml types.
          bundle="$(dirname "$lyric_bin")/Lyric.Stdlib.dll"
          if [ ! -f "$bundle" ]; then
            echo "::error::Lyric.Stdlib.dll bundle not staged alongside the AOT binary"
            exit 1
          fi
          # strings(1) over the raw PE bytes is a heuristic, not a structural
          # metadata check. A TypeDef's namespace and name are separate
          # string-heap entries, not a single concatenated "Namespace.Name"
          # string, so grepping a fully-qualified name (e.g. "Std.Xml.XmlDoc")
          # never matches anything -- confirmed broken in CI (issue #4643).
          # Requiring both the namespace string AND the public type's own
          # name string to be present is strictly more specific than the bare
          # namespace check alone, without inventing a heap string that
          # doesn't exist and without adding a new ildasm/metadata-reader
          # tool dependency here.
          dump="$(strings "$bundle")"
          if ! grep -q "Std.Xml" <<<"$dump" || ! grep -q "XmlDoc" <<<"$dump"; then
            echo "::error::Std.Xml not present in the Lyric.Stdlib.dll bundle"
            exit 1
          fi
          if ! grep -q "Std.Yaml" <<<"$dump" || ! grep -q "YamlValue" <<<"$dump"; then
            echo "::error::Std.Yaml not present in the Lyric.Stdlib.dll bundle"
            exit 1
          fi
          echo "Std.Xml and Std.Yaml are bundled in Lyric.Stdlib.dll"

      # Slice-length / String-comparison self-test (#2539).  Exercises two
      # self-hosted MSIL codegen fixes: (1) `String` relational operators
      # (`<` / `>` / `<=` / `>=`) route through `String.CompareOrdinal`
      # rather than a raw integer `clt` / `cgt` on the string references;
      # (2) `slice.length` and slice indexing route through the
      # collection-count / `IList.get_Item` path so they work on the
      # `List`-backed slice representation (literal, `toArray()` result,
      # `slice[T]` parameter, and genuine `String.split` array).  Run via
      # native `lyric test`, which compiles the @test_module in-process
      # through the self-hosted `Msil.Bridge`.  Imports only `Std.*`.

      - name: Wait for all parallel tests
        wait-all: true
  e2e-cli-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # clang and zlib1g-dev are required by the ILCompiler linker pass used by
      # `lyric build --release` (the trampoline-elimination pipeline, #4139).
      # binutils provides ld.bfd, which release.l's buildLinkerArgsUnix passes
      # via -fuse-ld=bfd; buildReleaseDotnet explicitly checks for ld.bfd on
      # PATH before linking -- without it the release e2e step fails at that
      # preflight check instead of building.
      - name: Install clang for Native AOT e2e
        run: sudo apt-get update -qq && sudo apt-get install -y clang zlib1g-dev binutils

      - name: CLI project-aware-defaults e2e smoke test
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping CLI e2e smoke test"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/src/nested"
          cat > "$work/lyric.toml" <<'TOML'
          [package]
          name    = "Demo"
          version = "0.1.0"

          [project]
          name            = "Demo"
          output          = "single"
          output_assembly = "Demo.dll"

          [project.packages]
          "Demo" = "src/main.l"
          TOML
          cat > "$work/src/main.l" <<'LYR'
          package Demo
          import Std.Core
          import Std.Console as Console
          pub func main(): Int { Console.println("ok"); 0 }
          LYR
          # 1. Bare `lyric` from a nested subdir discovers the project and builds it.
          ( cd "$work/src/nested" && "$bin_abs" )
          test -f "$work/bin/Demo.dll" || { echo "expected $work/bin/Demo.dll"; exit 1; }
          # 2. --help exits 0.
          "$bin_abs" --help >/dev/null
          # 3. Unknown command exits non-zero and suggests the nearest command.
          if "$bin_abs" buld >"${work}/lyric_buld.out" 2>&1; then
            echo "expected non-zero exit for unknown command"; exit 1
          fi
          grep -q "did you mean 'build'?" "${work}/lyric_buld.out" || {
            echo "expected did-you-mean suggestion"; cat "${work}/lyric_buld.out"; exit 1; }
          # 4. Bare `lyric` outside any project exits non-zero (usage).
          empty="$(mktemp -d)"
          if ( cd "$empty" && "$bin_abs" ); then
            echo "expected non-zero exit for bare lyric outside a project"; exit 1
          fi
          echo "CLI project-aware-defaults e2e smoke test passed"

      # Release entry-detection self-test — exercises Lyric.Release's pure
      # source-introspection helpers (packageNameOf / declaresEntryMain) via
      # native `lyric test`.  The Lyric.Release compiler-package import is
      # resolved by linking the stage-1 bundle DLLs (#2364); no
      # `LYRIC_LOAD_COMPILER=1` recompile.  Part of #1975.
      - name: Release Native AOT e2e (lyric build --release)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping release e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cat > "$work/hello.l" <<'LYR'
          package Hello
          import Std.Core
          import Std.Console as Console
          import Std.Collections
          pub func main(): Int {
            val xs: List[Int] = newList()
            xs.add(40); xs.add(2)
            Console.println("native release: " + toString(xs[0] + xs[1]))
            0
          }
          LYR
          "$bin_abs" build --release "$work/hello.l"
          test -x "$work/hello" || { echo "expected native binary $work/hello"; exit 1; }
          out="$("$work/hello")"
          echo "binary output: $out"
          [ "$out" = "native release: 42" ] || { echo "unexpected output: $out"; exit 1; }
          # JVM release fails loud rather than producing a managed artifact.
          if "$bin_abs" build --release --target jvm "$work/hello.l" >/dev/null 2>&1; then
            echo "expected non-zero exit for --release --target jvm"; exit 1
          fi
          echo "Release Native AOT e2e passed"

      # Auto-restore-on-build end-to-end — `lyric build` resolves dependencies
      # when lyric.lock is missing or stale, and `--no-restore` opts out (#1971).
      # Driven through the real binary because the staleness check reads the
      # filesystem (can't be a `lyric test` self-test, #2001).
      - name: Auto-restore-on-build e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping auto-restore e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Lib = { path = "../lib" }
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("app built"); 0 }\n' > "$work/app/src/main.l"
          # A second library, declared as a dependency only in the stale-lock
          # case below so the lock written for the first build is out of date.
          mkdir -p "$work/lib2/src"
          cat > "$work/lib2/lyric.toml" <<'TOML'
          [package]
          name = "Lib2"
          version = "0.1.0"
          [project]
          name = "Lib2"
          output = "single"
          output_assembly = "Lib2.dll"
          [project.packages]
          "Lib2" = "src/lib2.l"
          TOML
          printf 'package Lib2\nimport Std.Core\npub func two(): Int { 2 }\n' > "$work/lib2/src/lib2.l"
          ( cd "$work/lib" && "$bin_abs" build )
          ( cd "$work/lib2" && "$bin_abs" build )
          # 1. No lock -> auto-restore writes it and the build succeeds.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar1.out" )
          grep -q "resolving dependencies" "$work/ar1.out" || { echo "expected auto-restore message"; exit 1; }
          test -f "$work/app/lyric.lock" || { echo "expected lyric.lock to be created"; exit 1; }
          # 2. In-sync lock -> no re-restore.
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar2.out" )
          if grep -q "resolving dependencies" "$work/ar2.out"; then echo "should not re-restore an in-sync lock"; exit 1; fi
          # 3. Stale lock -> a dependency added after the lock was written triggers
          #    a re-restore (the new dep is absent from lyric.lock).
          printf 'Lib2 = { path = "../lib2" }\n' >> "$work/app/lyric.toml"
          ( cd "$work/app" && "$bin_abs" build 2>&1 | tee "$work/ar3.out" )
          grep -q "resolving dependencies" "$work/ar3.out" || { echo "expected re-restore on a stale lock (new dep)"; exit 1; }
          # 4. --no-restore after deleting the lock -> no restore, lock not recreated.
          #    The build still succeeds (exit 0): both path deps are already built
          #    above, so no resolution is needed to compile against them.
          rm -f "$work/app/lyric.lock"
          ( cd "$work/app" && "$bin_abs" build --no-restore ) > "$work/ar4.out" 2>&1; rc=$?
          test "$rc" -eq 0 || { echo "--no-restore build should still succeed (exit 0), got $rc"; cat "$work/ar4.out"; exit 1; }
          if grep -q "resolving dependencies" "$work/ar4.out"; then echo "--no-restore should skip restore"; exit 1; fi
          test ! -f "$work/app/lyric.lock" || { echo "--no-restore should not recreate the lock"; exit 1; }
          echo "Auto-restore-on-build e2e passed"

      # Git-dependency restore + manifest-error rendering regression (#2082).
      # The F# emitter mis-resolved `Str.fromInt` to `Std.Char.fromInt` (both
      # imported), so urlToHash crashed (Char.fromInt requires n<=65535 vs a
      # ~2-billion hash) and manifest line:col rendered as garbled control
      # chars.  This step asserts: (a) a git-dep restore fails gracefully (no
      # unhandled exception / fromInt panic) with a non-zero exit; (b) a TOML
      # parse error renders a real `:<line>:<col>:` location.
      - name: Git-dep / manifest-error regression e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -uo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping git-dep regression"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          # (0) git dep -> successful resolution against a real local repo (#2126).
          #     The parsed git ref (tag/rev/branch) must round-trip to the resolver;
          #     it previously read back null and git deps never resolved.
          gitc="git -c commit.gpgsign=false -c tag.gpgsign=false -c user.email=t@t -c user.name=t"
          mkdir -p "$work/remote"
          ( cd "$work/remote" && git init -q -b main . && echo seed > f && $gitc add -A && $gitc commit -q -m init --no-gpg-sign && $gitc tag v1.0 )
          mkdir -p "$work/ok/src"
          cat > "$work/ok/lyric.toml" <<TOML
          [package]
          name = "Ok"
          version = "0.1.0"
          [project]
          name = "Ok"
          output = "single"
          output_assembly = "Ok.dll"
          [project.packages]
          "Ok" = "src/main.l"
          [dependencies]
          Dep = { git = "file://$work/remote", tag = "v1.0" }
          TOML
          printf 'package Ok\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/ok/src/main.l"
          ( cd "$work/ok" && HOME="$work/home" timeout 120 "$bin_abs" restore ) > "$work/ok.out" 2>&1
          okrc=$?
          echo "--- ok restore (rc=$okrc) ---"; cat "$work/ok.out"
          test "$okrc" -eq 0 || { echo "git-dep restore against a real repo should succeed"; exit 1; }
          grep -q "git:file://" "$work/ok/lyric.lock" || { echo "expected a git: lock entry for the resolved dep"; cat "$work/ok/lyric.lock"; exit 1; }
          # (a) git dep -> graceful failure, no crash.
          mkdir -p "$work/app/src"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          [dependencies]
          Bar = { git = "https://example.invalid/bar.git", tag = "v1.0" }
          TOML
          printf 'package App\nimport Std.Core\npub func main(): Int { 0 }\n' > "$work/app/src/main.l"
          # `|| rc=$?` keeps the (expected) non-zero restore from tripping the
          # step's `bash -e` errexit before we can inspect the exit code.
          rc=0
          ( cd "$work/app" && timeout 90 "$bin_abs" restore ) > "$work/restore.out" 2>&1 || rc=$?
          echo "--- restore output (rc=$rc) ---"; cat "$work/restore.out"
          if grep -qiE "Unhandled exception|requires failed|fromInt|NullReferenceException" "$work/restore.out"; then
            echo "git-dep restore crashed instead of failing gracefully"; exit 1
          fi
          test "$rc" -ne 0 || { echo "git-dep restore of an unreachable repo should exit non-zero"; exit 1; }
          # (b) manifest parse error -> real :line:col: location, not garbled chars.
          mkdir -p "$work/bad"
          printf '[package]\nname = "X"\nversion = "0.1.0"\n[dependencies]\nFoo = { git = \n' > "$work/bad/lyric.toml"
          ( cd "$work/bad" && "$bin_abs" restore ) > "$work/bad.out" 2>&1 || true
          echo "--- manifest-error output ---"; cat "$work/bad.out"
          grep -qE 'lyric\.toml:[0-9]+:[0-9]+:' "$work/bad.out" || {
            echo "manifest parse error did not render a numeric :line:col: location"; exit 1; }
          echo "Git-dep / manifest-error regression e2e passed"

      # `lyric add` end-to-end — adds/updates dependency entries in the manifest
      # (registry / path / git / nuget), is idempotent, and refuses to write an
      # unparseable manifest (#1973).  Binary-driven because the command reads
      # and writes the filesystem (can't be a `lyric test` self-test, #2001).
      - name: lyric add e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping lyric add e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          mkdir -p "$work/lib/src" "$work/app/src"
          cat > "$work/lib/lyric.toml" <<'TOML'
          [package]
          name = "Lib"
          version = "0.1.0"
          [project]
          name = "Lib"
          output = "single"
          output_assembly = "Lib.dll"
          [project.packages]
          "Lib" = "src/lib.l"
          TOML
          printf 'package Lib\nimport Std.Core\npub func answer(): Int { 42 }\n' > "$work/lib/src/lib.l"
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "App"
          version = "0.1.0"
          [project]
          name = "App"
          output = "single"
          output_assembly = "App.dll"
          [project.packages]
          "App" = "src/main.l"
          TOML
          printf 'package App\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app/src/main.l"
          ( cd "$work/lib" && "$bin_abs" build )
          # registry @version (no restore — offline)
          ( cd "$work/app" && "$bin_abs" add Foo@1.2.0 --no-restore )
          grep -q '^Foo = "1.2.0"$' "$work/app/lyric.toml" || { echo "registry add missing"; cat "$work/app/lyric.toml"; exit 1; }
          # idempotent update in place (no duplicate)
          ( cd "$work/app" && "$bin_abs" add Foo@2.0.0 --no-restore )
          [ "$(grep -c '^Foo = ' "$work/app/lyric.toml")" = "1" ] || { echo "re-add duplicated Foo"; exit 1; }
          grep -q '^Foo = "2.0.0"$' "$work/app/lyric.toml" || { echo "re-add did not update Foo"; exit 1; }
          # nuget table created
          ( cd "$work/app" && "$bin_abs" add Newtonsoft.Json@13.0.3 --nuget --no-restore )
          grep -q '^\[nuget\]$' "$work/app/lyric.toml" || { echo "nuget table not created"; exit 1; }
          grep -q '^Newtonsoft.Json = "13.0.3"$' "$work/app/lyric.toml" || { echo "nuget entry missing"; exit 1; }
          # git inline-table
          ( cd "$work/app" && "$bin_abs" add Bar --git https://example.com/bar.git --tag v1.0 --no-restore )
          grep -q '^Bar = { git = "https://example.com/bar.git", tag = "v1.0" }$' "$work/app/lyric.toml" || { echo "git entry missing"; cat "$work/app/lyric.toml"; exit 1; }
          # restore + build round-trip on a CLEAN manifest: add a path dep that
          # resolves offline and let the implicit restore run.  (The asserts
          # above use --no-restore, so the bogus registry/nuget/git entries are
          # never fetched — restoring them would hit the network.)
          mkdir -p "$work/app2/src"
          cat > "$work/app2/lyric.toml" <<'TOML'
          [package]
          name = "App2"
          version = "0.1.0"
          [project]
          name = "App2"
          output = "single"
          output_assembly = "App2.dll"
          [project.packages]
          "App2" = "src/main.l"
          TOML
          printf 'package App2\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("ok"); 0 }\n' > "$work/app2/src/main.l"
          ( cd "$work/app2" && "$bin_abs" add Lib --path ../lib )
          test -f "$work/app2/lyric.lock" || { echo "expected the implicit restore to write lyric.lock"; exit 1; }
          ( cd "$work/app2" && "$bin_abs" build )
          # validation: --tag without --git fails
          if ( cd "$work/app" && "$bin_abs" add X --tag v1 --no-restore ); then
            echo "expected failure for --tag without --git"; exit 1
          fi
          echo "lyric add e2e passed"

      # `lyric init` end-to-end — scaffold an app, run + build it, and check the
      # --lib / --force / bad-name / overwrite-refusal behaviours (#1972).
      - name: lyric init e2e
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping init e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          cd "$work"
          # 1. scaffold an app, run it, build it.
          "$bin_abs" init demo
          test -f demo/lyric.toml || { echo "lyric.toml not scaffolded"; exit 1; }
          test -f demo/src/main.l || { echo "src/main.l not scaffolded"; exit 1; }
          test -f demo/.gitignore || { echo ".gitignore not scaffolded"; exit 1; }
          grep -q 'package Demo' demo/src/main.l || { echo "package name not capitalised"; exit 1; }
          out="$( cd demo && "$bin_abs" run src/main.l )"
          echo "run output: $out"
          echo "$out" | grep -q "Hello from Demo!" || { echo "scaffolded app did not run"; exit 1; }
          ( cd demo && "$bin_abs" build )
          # 2. --lib scaffolds a buildable library.
          "$bin_abs" init mylib --lib
          test -f mylib/src/lib.l || { echo "--lib did not scaffold src/lib.l"; exit 1; }
          ( cd mylib && "$bin_abs" build )
          # 3. overwrite refused without --force.
          if "$bin_abs" init demo; then echo "expected refusal to overwrite lyric.toml"; exit 1; fi
          # 4. --force + --name overwrites lyric.toml but must not clobber src/main.l.
          "$bin_abs" init demo --force --name Renamed
          grep -q 'name = "Renamed"' demo/lyric.toml || { echo "--name/--force did not apply"; exit 1; }
          grep -q 'Hello from Demo!' demo/src/main.l || { echo "--force clobbered src/main.l"; exit 1; }
          # 5. bad name rejected.
          if "$bin_abs" init weird --name "bad-name"; then echo "expected rejection of invalid name"; exit 1; fi
          echo "lyric init e2e passed"

      # `lyric run --watch` end-to-end — runs once, then re-runs when the source
      # changes (#1974).  Driven in the background; we edit the file, wait for a
      # poll cycle, then kill the watcher and assert the re-run happened.
      - name: lyric run --watch e2e
        timeout-minutes: 2
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping watch e2e"
            exit 1
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v1"); 0 }\n' > "$work/hello.l"
          ( "$bin_abs" run "$work/hello.l" --watch > "$work/out.log" 2>&1 ) &
          wpid=$!
          sleep 8
          printf 'package Hello\nimport Std.Core\nimport Std.Console as Console\npub func main(): Int { Console.println("watch-v2"); 0 }\n' > "$work/hello.l"
          sleep 6
          kill "$wpid" 2>/dev/null || true
          wait "$wpid" 2>/dev/null || true
          echo "--- watch output ---"; cat "$work/out.log"
          grep -q "watch-v1" "$work/out.log" || { echo "expected initial run output"; exit 1; }
          grep -q "change detected" "$work/out.log" || { echo "expected change detection"; exit 1; }
          grep -q "watch-v2" "$work/out.log" || { echo "expected re-run after edit"; exit 1; }
          echo "lyric run --watch e2e passed"

      # Coverage collection job removed (docs/CI audit): it looped over five
      # F# Expecto test projects (tests/Lyric.{Lexer,Parser,TypeChecker,
      # Emitter,Cli}.Tests) that no longer exist post-F#-removal, silently
      # producing zero coverage data on every run behind a swallowed
      # `|| echo "::warning:: ... continuing"`. No native-toolchain
      # replacement exists yet; see #5294 for what a real coverage story
      # over the self-hosted `lyric`/`lyric test` pipeline would need.

  build-and-test:
    runs-on: ubuntu-latest
    needs: [build, build-stage2, test-bootstrap, compiler-self-tests-dotnet-a, compiler-self-tests-dotnet-b, native-backend-self-tests, aot-smoke, macos-aot-smoke, compiler-self-tests-jvm, numbered-backend-self-tests, ecosystem-tests, stdlib-builds, crosspackage-and-codegen-tests, e2e-cli-tests, ilverify-required, resolver-build]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Aggregate CI results
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"

  promote-pr-if-ready:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions:
      pull-requests: write
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == true &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Mark PR ready for review if build succeeds
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            if (!prNumber || isNaN(prNumber)) {
              console.log('[auto-promote] PR_NUMBER env var is missing or invalid — skipping');
              return;
            }
            console.log(`[auto-promote] PR #${prNumber}: All CI passed, checking quality gates before promotion`);

            // Fetch fresh PR state to verify mergeable_state.
            // GitHub computes mergeable_state asynchronously; it may be 'unknown'
            // or transiently 'dirty' immediately after CI completes. Re-poll up to 6
            // times (with linear backoff: 3s, 5s, 7s, 9s, 11s) before
            // giving up. Both 'unknown' and transient 'dirty' can resolve on retry,
            // so we keep polling for both. If the state doesn't stabilize, skip this
            // run (it will retry on the next CI event) rather than risk promoting a PR
            // whose conflict state has not yet been accurately computed.
            let freshPr;
            let mergeableState;
            const MAX_POLLS = 6;
            for (let poll = 1; poll <= MAX_POLLS; poll++) {
              freshPr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              mergeableState = freshPr.data.mergeable_state;
              if (mergeableState !== 'unknown' && mergeableState !== 'dirty') break;
              if (poll < MAX_POLLS) {
                const delayMs = 3000 + (poll * 2000); // 3s, 5s, 7s, 9s, 11s
                console.log(`[auto-promote] PR #${prNumber}: mergeable_state is '${mergeableState}' (poll ${poll}/${MAX_POLLS}), retrying in ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            // Check for merge conflicts (mergeable_state: dirty).
            // If it's still dirty after all retries, skip to avoid promoting a truly conflicted PR.
            if (mergeableState === 'dirty') {
              console.log(`[auto-promote] PR #${prNumber}: WARN merge conflicts detected (mergeable_state=dirty) after ${MAX_POLLS} polls — skipping promotion to avoid promoting a conflicted PR`);
              return;
            }
            if (mergeableState === 'unknown') {
              console.log(`[auto-promote] PR #${prNumber}: WARN mergeable_state still 'unknown' after ${MAX_POLLS} polls — skipping promotion this run (will retry on next CI event)`);
              return;
            }

            // The REST API silently ignores `draft: false` on PATCH /pulls/:number.
            // Converting a draft PR to ready-for-review requires the GraphQL mutation.
            const prNodeId = freshPr.data.node_id;
            try {
              const result = await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest {
                      isDraft
                      number
                    }
                  }
                }
              `, { prId: prNodeId });
              const prResult = result?.markPullRequestReadyForReview?.pullRequest;
              if (!prResult) {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR mutation returned an unexpected response shape: ${JSON.stringify(result)}`);
              } else if (!prResult.isDraft) {
                console.log(`[auto-promote] PR #${prNumber}: OK successfully promoted to ready for review`);
              } else {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR mutation succeeded but PR is still draft — promotion did not take effect`);
              }
            } catch (error) {
              const isSoftError =
                error.status === 403 ||
                (Array.isArray(error.errors) && error.errors.some(e => e.type === 'FORBIDDEN' || e.type === 'NOT_FOUND'));
              if (isSoftError) {
                console.log(`[auto-promote] PR #${prNumber}: WARN skipping promotion — permission denied or PR not found (check that the workflow token has pull-requests:write scope and that org policy permits the workflow to update PRs)`);
              } else {
                core.setFailed(`[auto-promote] PR #${prNumber}: ERR GraphQL error: ${error.message}`);
              }
            }
