      # Closure / lambda-value self-test on the JVM target (J2b / B-1, #2665,
      # epic #2663).  Pins the self-hosted JVM closure backend: a general
      # `ELambda` lowers to a `<pkg>$Lambda$<n>` inner class implementing the
      # package-shared `Lyric$Lambda` functional interface (uniform
      # Object[]-packing ABI); capture analysis binds free `val`/param refs as
      # ctor fields; lambda-typed call sites dispatch through `invokeinterface`.
      # Asserts non-capturing + capturing lambdas, lambdas through higher-order
      # functions, multi-arg lambdas, a lambda returning `Result[Int, String]`
      # (J4 erased generics through the closure ABI), and a captured-String
      # lambda — all under `java`.  Imports only `Std.*`, so no
      # `LYRIC_LOAD_COMPILER=1`.
      - name: Closure-codegen self-test on JVM (native lyric test --target jvm)
