          "$lyric_bin" test --target jvm lyric-compiler/jvm/control_flow_jvm_self_test.l

      # Try/catch-as-expression self-test on JVM (#3193, epic #2663).  Pins
      # `lowerTryCatchExpr` (jvm/codegen/05_stmts.l): when every arm yields a
      # value of the try-body type, the no-throw path yields the try body's
