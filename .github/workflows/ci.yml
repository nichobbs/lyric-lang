          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping out/inout self-test"
            exit 1
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/outparam_self_test.l
          echo "out/inout-parameter self-test ran: outparam_self_test.l (--target dotnet)" >> "$GITHUB_STEP_SUMMARY"

      # Named-arg/default-param self-test — pins call-site named-arg reorder and
      # default-param fill (#1503).  JVM analog step is below.
      - name: Named-arg/default-param self-test (native lyric test)
