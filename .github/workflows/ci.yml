          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping aspect-weave JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/aspect_weave_self_test.l
          echo "aspect-weave self-test ran: aspect_weave_self_test.l (--target jvm)" >> "$GITHUB_STEP_SUMMARY"

      # Named-arg/default-param self-test on JVM — pins call-site reorder and
      # default fill on the JVM target (#1503).  Imports only `Std.*`.
      - name: Named-arg/default-param self-test on JVM (native lyric test --target jvm)
        working-directory: ${{ github.workspace }}
        run: |
