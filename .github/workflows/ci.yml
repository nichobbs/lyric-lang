            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/lyric/alias_rewriter_self_test.l

      # Ensures self-test — #1871.  `ensures:` contract clauses now compile and
      # run through the self-hosted MSIL path: the contract elaborator's
      # synthesised `let __lyric_result_<n> = …` binding no longer NREs in
      # codegen (the bare `None` ty field that widened to `Option[obj]` is now
      # pinned).  Run via native `lyric test` (in-process through Msil.Bridge).
      # Imports only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Ensures self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping ensures self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping ensures self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/lyric/ensures_self_test.l

      # Mono-shadow self-test — #1855.  A user-defined function now shadows an
      # imported generic of the same bare name in the monomorphizer, so calling
      # a local `func tag(o: Option[Int]): Int` (which collides with the stdlib
      # proof generic `Std.Core.tag[T]`) via an annotated local no longer
      # mis-specialises into a broken identity stub (invalid IL).  Run via
      # native `lyric test` (in-process through Msil.Bridge, which seeds the
      # monomorphizer with the stdlib generics as imports).  Imports only `Std.*`.
      - name: Mono-shadow self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping mono-shadow self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping mono-shadow self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/lyric/mono_shadow_self_test.l

      # Mono-shadow self-test is dotnet-only (#2000).  Although the module
      # imports only Std.*, the JVM backend currently emits invalid stackmap
      # frames for its monomorphised generic call shapes (the class fails JVM
      # verification), so `--target jvm` cannot run it yet.  JVM monomorphisation
      # parity is tracked under the JVM-backend remediation in docs/41.

      # CLI did-you-mean suggestion self-test — exercises Lyric.CliSuggest
      # (editDistance / suggestCommand) via native `lyric test`.  The
      # Lyric.CliSuggest compiler-package import is resolved by linking the
      # stage-1 bundle DLLs (#2364); no `LYRIC_LOAD_COMPILER=1` recompile.
      # Pure logic (Std.Core/Collections only), so it runs cleanly through the
      # in-process bundle.  Part of the ecosystem-DX epic #1968 (#1976/#1988).
      - name: CLI-suggest self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping cli-suggest self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping cli-suggest self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/cli_suggest_self_test.l

      - name: CLI-upgrade self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping cli-upgrade self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping cli-upgrade self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/cli_upgrade_self_test.l

      # CLI project-aware-defaults end-to-end smoke test — exercises
      # findNearestManifest (Lyric.Discovery), the bare-`lyric` build default,
      # and the did-you-mean / --help UX through the real binary (#1968:
      # #1969/#1970/#1976/#1988).  This is the integration counterpart to the
      # cli-suggest unit self-test: findNearestManifest itself can't be a
      # `lyric test` self-test because that path can't yet run host-backed
      # stdlib (Std.File) at runtime (#2001), so we drive the behaviour
      # end-to-end via the compiled CLI instead.
      - name: Release self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping release self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping release self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/release_self_test.l

      # Drain all earlier background steps before the heavy project self-tests,
      # which run heavy in-process multi-package builds and need
      # exclusive access to memory rather than competing with 24+ concurrent
      # compilation processes.
      - name: Wait for parallel tests before heavy project self-tests
        wait-all: true

      # MSIL project bridge self-test — exercises the self-hosted multi-package
      # MSIL bridge (Msil.Bridge.compileProjectToMsil /
      # compileProjectToMsilWithFeatures) end-to-end.  Covers Phases 1–3:
      # independent bundles, cross-package function/record/union round-trips,
      # and cfg-erasure diagnostics (F0012/F0013).  Placed in lyric-compiler/
      # so the Msil.Bridge transitive closure does not overflow the F# bootstrap
      # emitter; stage-1 DLLs provide the compiler-package imports (#2888).
      - name: MSIL project bridge self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping MSIL project bridge self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping MSIL project bridge self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/msil_project_bridge_self_test.l

      # Emitter project self-test — exercises the Phase 4 in-process routing in
      # Lyric.Emitter.emitProject (multi-package DOTNET builds).  Covers aliased
      # imports, per-package isolation, @cfg erasure via emitProject, restored-dep
      # wiring, and subprocess-fallback routing (#2888).
      - name: Emitter project self-test (native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping emitter project self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping emitter project self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/emitter_project_self_test.l

      - name: Init self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping init self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/init_self_test.l

      - name: Union-in-list match self-test (native lyric test, #2126)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping union-list-match self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/union_list_match_self_test.l

      # Module-level val self-test — exercises M5.2 stage 3 (non-constant `val`
      # at package scope emitted as a static readonly field initialized in .cctor).
      # Covers both the inline ldc.i4 path (literal Int/Bool) and the ldsfld path
      # (String, binary-op results).  Imports only Std.*; no LYRIC_LOAD_COMPILER.
      - name: Module-val self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping module-val self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/module_val_self_test.l

      # @stubbable + StubCounter self-test (#1776).  Verifies the full
      # @stubbable → synthesised Stub record + impl path combined with the
      # Std.Testing.Mocking StubCounter call-count API (makeStubCounter /
      # stubCounterIncrement / stubCounterGet / stubCounterReset).  Compiled
      # in-process through the self-hosted Msil.Bridge.  Imports only Std.*;
      # no LYRIC_LOAD_COMPILER=1 needed.
      - name: Stubbable + StubCounter self-test (native lyric test, #1776)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping stubbable self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/stubbable_self_test.l

      # Culture-invariant toString(DateTime) self-test (#2184).  Pins the
      # self-hosted MSIL emitter's `toString` builtin to InvariantCulture for
      # DateTime values so stage-0 (F#) and stage-1 (self-hosted) render
      # DateTime byte-identically regardless of the CI host locale.  Compiled
      # in-process through the self-hosted `Msil.Bridge`.  Imports only
      # `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: DateTime-toString self-test (native lyric test, #2184)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping datetime-toString self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test lyric-compiler/lyric/datetime_tostring_self_test.l

      # Std.Console stdin/stdout/stderr round-trip on --target dotnet (#4816/
      # #4817) — the MSIL-target counterpart to the JVM job's
      # `console_roundtrip_jvm_main.l` check.  First executable proof that
      # `_kernel/console_host.l`'s `hostReadLineOpt` seam (added in #4816 to
      # replace the `case null` idiom the self-hosted MSIL/JVM backends
      # miscompile as an unconditional catch-all, #4775) actually observes
      # real stdin input rather than reporting EOF on every call.  A plain
      # program because TAP tests have no stdin.
      - name: Std.Console round-trip on dotnet (lyric build --target dotnet)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping console dotnet round-trip"
            exit 1
          fi
          work="$(mktemp -d)"
          "$lyric_bin" build lyric-compiler/msil/console_roundtrip_msil_main.l --target dotnet -o "$work/console.dll"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$work/"
          out="$(cd "$work" && printf 'alpha\nbeta\n' | dotnet exec console.dll 2>"$work/err.txt")"
          echo "$out"
          grep -qx "echo:alpha" <<< "$out" || { echo "::error::alpha echo missing"; exit 1; }
          grep -qx "echo:beta" <<< "$out" || { echo "::error::beta echo missing"; exit 1; }
          grep -qx "eof-after:2" <<< "$out" || { echo "::error::EOF line count wrong"; exit 1; }
          grep -qx "err-line" "$work/err.txt" || { echo "::error::stderr line missing"; exit 1; }

  # Release Native AOT end-to-end — `lyric build --release` compiles a
  # hello-world Lyric program to a self-contained native binary via
  # `dotnet publish -p:PublishAot=true` and asserts it executes correctly
  # (#1975 / D079).  Isolated into its own job because it needs clang/lld
  # for the ILCompiler linker pass and downloads the Microsoft.DotNet.ILCompiler
  # NuGet package (~200 MB) on first run.

      - name: Wait for all parallel tests
        wait-all: true
  aot-smoke:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # ILCompiler package cache — keyed on the .NET SDK version so the
      # ~200 MB compiler package is not re-downloaded on every run.
      # restore-keys fallback on the runner.os prefix so a SDK patch-version bump
      # in global.json reuses the previous cache rather than downloading 200 MB.
      - name: Cache ILCompiler NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages/microsoft.dotnet.ilcompiler
          key: ${{ runner.os }}-ilcompiler-${{ hashFiles('bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-ilcompiler-

      # clang and zlib1g-dev are required by the ILCompiler linker pass on Linux.
      - name: Install native-AOT linker prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y clang zlib1g-dev

      # Build a minimal hello-world Lyric program to a native binary, then run
      # it and assert the output.  This exercises the full pipeline:
      #   lyric build → F# emit → staging DLL → dotnet publish -p:PublishAot=true → native ELF
      - name: Release Native AOT smoke test (lyric build --release, #1975)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; native AOT smoke test cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          dir="$(mktemp -d)"
          src="$dir/hello.l"
          # Also asserts the well-known `build_profile` define (docs/60 M1h,
          # #5852): a real --release/AOT build injects build_profile=release into
          # the staging compile, so BuildInfo.profile reports "release" in the
          # native binary. This is the load-bearing guard for the release-path
          # injection, and this job (unlike `build`) has clang/ILCompiler.
          cat > "$src" <<'LYRIC'
          package Hello
          import Std.Core
          import Std.BuildInfo
          func main(): Int {
            println("hello-aot")
            println("profile=" + buildInfo().profile)
            0
          }
          LYRIC
          native_bin="$dir/hello"
          "$lyric_bin" build --release "$src" -o "$native_bin"
          if [ ! -x "$native_bin" ]; then
            echo "::error::native binary not produced at $native_bin"
            exit 1
          fi
          out="$("$native_bin" 2>&1)"
          echo "native AOT output: $out"
          echo "$out" | grep -qx "hello-aot" || { echo "::error::native AOT smoke test did not print hello-aot; got: '$out'"; exit 1; }
          echo "$out" | grep -qx "profile=release" || { echo "::error::--release native build did not inject build_profile=release (#5852 M1h); got: '$out'"; exit 1; }
          echo "OK: native AOT binary produced and executed correctly (hello-aot + build_profile=release)." >> "$GITHUB_STEP_SUMMARY"

      # Regression test for #5782: `buildReleaseProject` (the manifest/
      # multi-package `lyric build --release` path, as opposed to the
      # single-file smoke test above) silently dropped every `[nuget]`
      # dependency from the ILC reference list, so any Native AOT binary
      # touching a `[nuget]`-resolved type crashed at runtime with
      # `FileNotFoundException`. This builds a two-package manifest project
      # with a genuine third-party NuGet dependency (Newtonsoft.Json — not
      # part of the shared framework, so it must actually be restored and
      # passed to ILC as a reference) and asserts the produced binary can
      # call into it correctly.
      - name: Release Native AOT smoke test — manifest project with [nuget] dep (#5782)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; native AOT smoke test cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          dir="$(mktemp -d)"
          mkdir -p "$dir/src/app" "$dir/src/helper"
          cat > "$dir/lyric.toml" <<'TOML'
          [package]
          name = "ReleaseNugetSmoke"
          version = "0.1.0"
          [project]
          name = "ReleaseNugetSmoke"
          output = "single"
          output_assembly = "ReleaseNugetSmoke.dll"
          [project.packages]
          "ReleaseNugetSmoke" = "src/app/main.l"
          "ReleaseNugetSmoke.Helper" = "src/helper/helper.l"
          [nuget]
          "Newtonsoft.Json" = "13.0.3"
          TOML
          cat > "$dir/src/helper/helper.l" <<'LYRIC'
          package ReleaseNugetSmoke.Helper
          pub func addOne(x: Int): Int {
            x + 1
          }
          LYRIC
          # `main.l` also asserts the well-known `build_profile` define on the
          # MULTI-PACKAGE release path (`buildReleaseProject`, docs/60 M1h #5852):
          # its staging compile injects build_profile=release, so BuildInfo.profile
          # reports "release" in the native binary (the single-file path is guarded
          # by the hello-world smoke test above; this covers buildReleaseProject).
          cat > "$dir/src/app/main.l" <<'LYRIC'
          package ReleaseNugetSmoke
          import Std.Core
          import Std.BuildInfo
          import ReleaseNugetSmoke.Helper
          extern type JsonConvert = "Newtonsoft.Json.JsonConvert"
          pub func main(): Int {
            println(JsonConvert.SerializeObject("hi"))
            println(addOne(41).toString())
            println("profile=" + buildInfo().profile)
            0
          }
          LYRIC
          (cd "$dir" && "$OLDPWD/$lyric_bin" restore)
          (cd "$dir" && "$OLDPWD/$lyric_bin" build --release --rid linux-x64)
          native_bin="$dir/ReleaseNugetSmoke"
          if [ ! -x "$native_bin" ]; then
            echo "::error::native binary not produced at $native_bin"
            exit 1
          fi
          out="$("$native_bin" 2>&1)"
          echo "native AOT output: $out"
          expected='"hi"
          42
          profile=release'
          if [ "$out" != "$expected" ]; then
            echo "::error::manifest+[nuget] native AOT smoke test produced unexpected output: '$out'"
            exit 1
          fi
          echo "OK: manifest project with a [nuget] dependency built and ran correctly under Native AOT (incl. build_profile=release)." >> "$GITHUB_STEP_SUMMARY"

      # Native AOT publish of the `lyric` CLI itself (#1494 / Band 5).
      # `dotnet publish` honours the csproj's `<PublishAot>true</PublishAot>`,
      # producing a self-contained native ELF that AOT-compiles the whole
      # Lyric-emitted compiler (stage-1 DLL closure).  The step then runs a
      # REAL `lyric build` through the published native binary and executes
      # the result — proving the self-hosted pipeline works without the CLR
      # JIT.  It then exercises a RESTORED-DEPENDENCY build (the constdep/app
      # cross-package const-inlining scenario) through the same native binary:
      # reading the dependency DLL's embedded `Lyric.Contract` metadata now
      # goes through the metadata-direct reader (`Msil.MetadataReader`, pure
      # byte reading), not `Assembly.Load(byte[])`, so it works under Native
      # AOT where the IL loader is unavailable (#3201 / docs/45 / docs/42).
      - name: Native AOT publish of the lyric CLI (#1494)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          dotnet publish bootstrap/src/Lyric.Cli.Aot -c Release -r linux-x64 -o "$publish_dir"
          native_cli="$publish_dir/lyric"
          if [ ! -x "$native_cli" ]; then
            echo "::error::native lyric CLI not produced at $native_cli"
            exit 1
          fi
          file "$native_cli" | grep -q ELF || { echo "::error::published lyric CLI is not a native ELF"; exit 1; }
          "$native_cli" --version
          dir="$(mktemp -d)"
          cat > "$dir/hello.l" <<'LYRIC'
          package Hello
          import Std.Core
          func main(): Int {
            println("hello-native-cli")
            0
          }
          LYRIC
          "$native_cli" build "$dir/hello.l" -o "$dir/bin/Hello.dll"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$dir/bin/"
          out="$(cd "$dir/bin" && dotnet exec Hello.dll)"
          echo "native CLI build output: $out"
          if [ "$out" != "hello-native-cli" ]; then
            echo "::error::lyric build through the native CLI produced unexpected output: '$out'"
            exit 1
          fi

          # Restored-dependency build through the native binary (#3201).  A
          # local-path `[dependencies]` entry threads the producer DLL as a
          # restored dep; the consumer build must read the producer's embedded
          # `Lyric.Contract` metadata to inline its `pub val ANSWER`.  Under
          # Native AOT this previously threw `PlatformNotSupportedException`
          # (no IL loader for `Assembly.Load(byte[])`); the metadata-direct
          # reader makes it pure byte reading, so it now works.
          work="$(mktemp -d)"
          mkdir -p "$work/constdep/src" "$work/app/src"
          cat > "$work/constdep/lyric.toml" <<'TOML'
          [package]
          name = "constdep"
          version = "0.1.0"
          [project]
          name = "ConstDep"
          output_assembly = "Lyric.ConstDep.dll"
          [project.packages]
          "ConstDep" = "src"
          TOML
          cat > "$work/constdep/src/constdep.l" <<'LYR'
          package ConstDep
          pub val ANSWER: Int = 0x002A
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "app"
          version = "0.1.0"
          [project]
          name = "App"
          [project.packages]
          "App" = "src"
          [dependencies]
          constdep = { path = "../constdep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package App
          import ConstDep
          import Std.Console as Console
          func main(): Unit {
            Console.println(toString(ANSWER))
          }
          LYR
          "$native_cli" build --manifest "$work/constdep/lyric.toml"
          "$native_cli" build --manifest "$work/app/lyric.toml"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$work/app/bin/"
          dep_out="$(cd "$work/app/bin" && dotnet exec App.dll | tr -d '\r\n')"
          echo "restored-dep consumer printed: '$dep_out'"
          if [ "$dep_out" != "42" ]; then
            echo "::error::restored-dep build through the native CLI returned '$dep_out', expected '42' (metadata-direct contract read regressed under AOT)"
            exit 1
          fi

          size_kb=$(du -k "$native_cli" | cut -f1)
          echo "OK: Native AOT lyric CLI published (${size_kb} KB), built+ran an example and a restored-dependency build end-to-end." >> "$GITHUB_STEP_SUMMARY"

      # IConfig (config block) lowering self-test (#2983, #2992, #2993).
      # Wires `lyric-compiler/msil/msil_self_test_m85.l` via `lyric run` (the
      # AOT binary routes through the self-hosted MSIL emitter, which supports
      # `config {}` blocks; the F# bootstrap emitter does not, so `lyric run`
      # is the correct path).  Run 1 (env vars absent) verifies the default
      # path for the full v1 type set — Int/Bool/String/Long/Float/Double,
      # including a negated Float default and a Long default outside Int32
      # range — plus a second independent config block and field access
      # without panic.  Run 2 sets the EnvProbe env vars and verifies the
      # env-parse path (Int32.Parse / Int64.Parse / Boolean.Parse and the
      # culture-pinned Double.Parse).  A third compile-only probe asserts the
      # G0009 unsupported-field-type diagnostic.  No new F# runner needed.
      - name: IConfig config-block lowering self-test (lyric run, #2983)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping IConfig self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping IConfig self-test"
            exit 1
          fi
          out="$("$lyric_bin" run lyric-compiler/msil/msil_self_test_m85.l 2>&1)"
          for check in "port_default=true" "debug_default=true" "name_default=true" \
                       "rate_default=true" "scale_default=true" "cap_default=true" \
                       "timeout_default=true" "access_no_panic=true" \
                       "eport_parsed=false" "erate_parsed=false" "ecap_parsed=false" \
                       "eflag_parsed=false" "ename_parsed=false"; do
            if ! grep -qx "$check" <<< "$out"; then
              echo "::error::IConfig self-test (defaults run) missing expected line '$check'; full output:"; echo "$out"; exit 1
            fi
          done
          out_env="$(LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_EPORT=4242 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ERATE=2.5 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ECAP=8589934592 \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_EFLAG=true \
                     LYRIC_CONFIG_MSIL_SELFTESTM85_ENVPROBE_ENAME=from-env \
                     "$lyric_bin" run lyric-compiler/msil/msil_self_test_m85.l 2>&1)"
          for check in "port_default=true" "rate_default=true" "cap_default=true" \
                       "eport_parsed=true" "erate_parsed=true" "ecap_parsed=true" \
                       "eflag_parsed=true" "ename_parsed=true"; do
            if ! grep -qx "$check" <<< "$out_env"; then
              echo "::error::IConfig self-test (env-parse run) missing expected line '$check'; full output:"; echo "$out_env"; exit 1
            fi
          done
          bad_src="$(mktemp -d)/config_bad_type.l"
          printf 'package ConfigBadType\n\nconfig Bad {\n  c: Char\n}\n\nfunc main(): Unit {\n  println("unreachable")\n}\n' > "$bad_src"
          if bad_out="$("$lyric_bin" run "$bad_src" 2>&1)"; then
            echo "::error::IConfig negative probe: unsupported Char config field compiled successfully; output:"; echo "$bad_out"; exit 1
          else
            if ! grep -q "G0009" <<< "$bad_out"; then
              echo "::error::IConfig negative probe: expected G0009 in compile failure output:"; echo "$bad_out"; exit 1
            fi
          fi
          echo "IConfig config-block lowering: defaults, env-parse, and G0009 negative checks pass (#2983, #2993)"

  macos-aot-smoke:
    runs-on: macos-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts

      # ILCompiler package cache — keyed on the .NET SDK version so the
      # ~200 MB compiler package is not re-downloaded on every run.
      - name: Cache ILCompiler NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages/microsoft.dotnet.ilcompiler
          key: ${{ runner.os }}-ilcompiler-${{ hashFiles('bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-ilcompiler-

      # On macOS, the lyric binary inside the build-artifacts is a Linux binary (ELF)
      # so we must rebuild the AOT entry-point project (Lyric.Cli.Aot) on macOS.
      # Rebuilding is extremely fast because all dependencies (the lyric-compiled DLLs)
      # are already in .bootstrap/stage1/ from the downloaded build-artifacts.
      - name: Rebuild AOT entry-point on macOS
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          dotnet build bootstrap/src/Lyric.Cli.Aot --configuration $BUILD_CONFIG
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::Rebuilt lyric binary not found or not executable at $lyric_bin"
            exit 1
          fi

      # Build a minimal hello-world Lyric program to a native binary, then run
      # it and assert the output.  This exercises the full custom lyric release pipeline
      # on macOS: lyric build --release -> buildLinkerArgsMac -> resolveIlcPaths -> parseSdkPacksDir -> clang -> Mach-O
      - name: Release Native AOT smoke test (lyric build --release, #4449)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; native AOT smoke test cannot run"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          dir="$(mktemp -d)"
          src="$dir/hello.l"
          cat > "$src" <<'LYRIC'
          package Hello
          import Std.Core
          func main(): Int {
            println("hello-aot")
            0
          }
          LYRIC
          native_bin="$dir/hello"
          "$lyric_bin" build --release "$src" -o "$native_bin"
          if [ ! -x "$native_bin" ]; then
            echo "::error::native binary not produced at $native_bin"
            exit 1
          fi
          out="$("$native_bin" 2>&1)"
          echo "native AOT output: $out"
          if [ "$out" != "hello-aot" ]; then
            echo "::error::native AOT smoke test produced unexpected output: '$out'"
            exit 1
          fi
          echo "OK: native AOT binary produced and executed correctly on macOS." >> "$GITHUB_STEP_SUMMARY"

      # Native AOT publish of the lyric CLI itself on macOS.
      - name: Native AOT publish of the lyric CLI on macOS
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          arch="$(uname -m)"
          if [ "$arch" = "x86_64" ]; then
            rid="osx-x64"
          else
            rid="osx-arm64"
          fi
          dotnet publish bootstrap/src/Lyric.Cli.Aot -c Release -r "$rid" -o "$publish_dir"
          native_cli="$publish_dir/lyric"
          if [ ! -x "$native_cli" ]; then
            echo "::error::native lyric CLI not produced at $native_cli"
            exit 1
          fi
          file "$native_cli" | grep -q Mach-O || { echo "::error::published lyric CLI is not a native Mach-O binary"; exit 1; }
          "$native_cli" --version
          dir="$(mktemp -d)"
          cat > "$dir/hello.l" <<'LYRIC'
          package Hello
          import Std.Core
          func main(): Int {
            println("hello-native-cli")
            0
          }
          LYRIC
          "$native_cli" build "$dir/hello.l" -o "$dir/bin/Hello.dll"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$dir/bin/"
          out="$(cd "$dir/bin" && dotnet exec Hello.dll)"
          echo "native CLI build output: $out"
          if [ "$out" != "hello-native-cli" ]; then
            echo "::error::lyric build through the native CLI produced unexpected output: '$out'"
            exit 1
          fi

          # Restored-dependency build through the native binary on macOS.
          work="$(mktemp -d)"
          mkdir -p "$work/constdep/src" "$work/app/src"
          cat > "$work/constdep/lyric.toml" <<'TOML'
          [package]
          name = "constdep"
          version = "0.1.0"
          [project]
          name = "ConstDep"
          output_assembly = "Lyric.ConstDep.dll"
          [project.packages]
          "ConstDep" = "src"
          TOML
          cat > "$work/constdep/src/constdep.l" <<'LYR'
          package ConstDep
          pub val ANSWER: Int = 0x002A
          LYR
          cat > "$work/app/lyric.toml" <<'TOML'
          [package]
          name = "app"
          version = "0.1.0"
          [project]
          name = "App"
          [project.packages]
          "App" = "src"
          [dependencies]
          constdep = { path = "../constdep" }
          TOML
          cat > "$work/app/src/app.l" <<'LYR'
          package App
          import ConstDep
          import Std.Console as Console
          func main(): Unit {
            Console.println(toString(ANSWER))
          }
          LYR
          "$native_cli" build --manifest "$work/constdep/lyric.toml"
          "$native_cli" build --manifest "$work/app/lyric.toml"
          cp bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/Lyric.Stdlib*.dll "$work/app/bin/"
          dep_out="$(cd "$work/app/bin" && dotnet exec App.dll | tr -d '\r\n')"
          echo "restored-dep consumer printed: '$dep_out'"
          if [ "$dep_out" != "42" ]; then
            echo "::error::restored-dep build through the native CLI returned '$dep_out', expected '42'"
            exit 1
          fi

          size_kb=$(du -k "$native_cli" | cut -f1)
          echo "OK: Native AOT lyric CLI published on macOS (${size_kb} KB), built+ran an example and a restored-dependency build end-to-end." >> "$GITHUB_STEP_SUMMARY"

  compiler-self-tests-jvm:
    runs-on: ubuntu-latest
    needs: [build, build-stage2]
    permissions:
      contents: read
    # Broader than the other has_core_changes-gated jobs: this one also
    # carries the only JVM-kernel coverage for lyric-web/storage/resilience/
    # auth (see has_jvm_ecosystem_changes above) — has_core_changes alone
    # would silently skip that coverage on a PR confined to just one of
    # those four libraries.
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_jvm_ecosystem_changes == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Set up Java 21 (for JVM emitter tests)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric
      # Stage-2 binary: needed only by the handful of steps below that
      # exercise a compiler-internal `@externTarget` signature-encoding fix
      # (System.Single `bufMsilType`, D125 follow-up) — such a fix only takes
      # effect once the compiler has recompiled itself with the fix already
      # applied, which stage-1 (built by the external stage-0 seed) cannot do.
      - name: Download stage-2 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: stage2-artifacts
          path: .bootstrap/stage2
      - name: Restore stage-2 executable permissions
        run: chmod +x .bootstrap/stage2/bin/lyric

      - name: Bitwise self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping bitwise JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping bitwise JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/bitwise_self_test.l

      # config-block self-test on JVM (#3228, wired in #6198) — the
      # load-bearing half: JVM `config { }` emission (static fields + a
      # `<clinit>` env-var reader) shipped in #3228.  Env-var overrides are
      # exported below and inherited by the `java` subprocess.  dotnet half
      # runs in the docs/58 job.
      - name: config-block self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        env:
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_PORT: "9090"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_LIMIT: "4294967296"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_RATE: "2.5"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_RATIO: "3.5"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_ENABLED: "true"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_OVERRIDES_HOST: "override-host"
          LYRIC_CONFIG_LYRIC_CONFIGBLOCKSELFTEST_REQUIRED_SECRET: "s3cr3t"
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping config-block JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping config-block JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/config_block_self_test.l

      # JVM half of the compound-assign String self-test (#5657).  The JVM
      # `s += <Double>` path spills the rhs to a slot before the (branching)
      # Double `.0`-normalization so the stringification is verifiable — before
      # the fix this was a class-load VerifyError.  dotnet half runs in
      # compiler-self-tests-dotnet-a.
      - name: Compound-assign String self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping compound-assign JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping compound-assign JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/compound_string_assign_self_test.l

      # JVM half of the UFCS self-field self-test (#5565) — the load-bearing
      # target: before the fix, an out-of-body UFCS method reading a `self` field
      # panicked on JVM ("erased receiver").  dotnet half runs in
      # compiler-self-tests-dotnet-a.
      - name: UFCS self-field self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping UFCS self-field JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping UFCS self-field JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/ufcs_self_field_self_test.l

      # JVM half of the Bool stringification cross-target parity check
      # (#5552) — see the dotnet-side step above for the full rationale.
      - name: Bool stringification self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping bool_tostring JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping bool_tostring JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/bool_tostring_self_test.l

      # #3693/#3705-shape generic-specialisation regression on the JVM
      # single-file build (docs/59 §5.4 item: JVM single-file mono decl
      # feeding).  The file's header always claimed a jvm run but none was
      # wired; this pins isOk/isErr specialisation over interface/record
      # Results on the `lyric test --target jvm` single-file pipeline.
      - name: Result-generic-specialisation self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping result-generic-specialisation JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/result_generic_specialization_self_test.l

      # Single-file `@cfg` erasure parity on JVM — the JVM half of the
      # dotnet-job case (docs/59 §5.4): the same source must see the same
      # `@cfg(feature = ...)` erasure and `target.jvm` pseudo-feature
      # selection on both targets.
      - name: Cfg single-file self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping cfg single-file JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/cfg_single_file_self_test.l

      # Byte-arithmetic self-test on JVM — the JVM half of the dotnet-job step
      # of the same name (docs/59 §4.3).  The canonical in-slot `JByte` form is
      # masked-unsigned 0..255: these cases pin unsigned division/modulo,
      # every compound-assignment path, and the >= 128 equality/ordering/
      # wraparound/boxing behaviour to the same values MSIL produces.
      - name: Byte-arithmetic self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping byte-arithmetic JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping byte-arithmetic JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/byte_arithmetic_self_test.l

      # Slice-ops self-test on JVM (#5244) — the JVM half of the dotnet-job
      # step of the same name.  JVM slices are uniformly `Object[]`
      # (`Jvm.Codegen`'s `TSlice(_) -> JArray(elem = Object)` erasure), so
      # this exercises the same `.append`/`.concat`/`.slice` lowerings via
      # `System.arraycopy` + `newarray`/`anewarray` rather than MSIL's dual
      # array/`List<object>` representation.
      - name: Slice-ops self-test on JVM (native lyric test --target jvm)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping slice-ops JVM self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping slice-ops JVM self-test"
            exit 1
          fi
          "$lyric_bin" test --target jvm lyric-compiler/lyric/slice_ops_self_test.l

      # Block-shadow self-test on JVM (#5191 / D-progress-603) — the JVM half of
      # the dotnet-job step of the same name.  Pins the general nested-block
