        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping try-catch-expr self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping try-catch-expr self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/lyric/try_catch_expr_self_test.l

      # Loop-invariant self-test — pins that a loop `invariant:` clause is
      # checked at runtime (the contract elaborator lowers it to `assert(inv)`
      # at the loop-body top; codegen drops the redundant `SInvariant` marker).
      # A holding invariant doesn't interfere; a violated one panics (observed
      # via a try/catch expression). MSIL target only.
      - name: Loop-invariant self-test (native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping loop-invariant self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping loop-invariant self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/lyric/loop_invariant_self_test.l

      # Function-value invocation — pins #1877: invoking a function-typed value
      # (`f()` where f: () -> R) through the uniform Func ABI.  Zero-argument
      # value/string/void HOFs must run and print the correct results, and a
      # parameter-USING lambda must fail loud (#1939, until arg unboxing lands).
      - name: Function-value invocation (#1877)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping function-value invocation test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping function-value invocation test"
            exit 1
          fi
          dir="$(mktemp -d)"
          pos="$dir/hof.l"
          cat > "$pos" <<'LYRIC'
          package Hof
          import Std.Core
          func apply0(f: in () -> Int): Int { f() }
          func twice(f: in () -> Int): Int { f() + f() }
          func applyS(f: in () -> String): String { f() }
          func runV(f: in () -> Unit): Unit { f() }
          func five(): Int { 5 }
          func main(): Int {
            println("a0=" + toString(apply0({ -> 42 })))
            println("tw=" + toString(twice({ -> five() })))
            println("aS=" + applyS({ -> "hi" }))
            runV({ -> println("voidcb") })
            0
          }
          LYRIC
          out="$("$lyric_bin" run "$pos" 2>&1)" || { echo "::error::function-value HOF program failed to run"; echo "$out"; exit 1; }
          for expect in "a0=42" "tw=10" "aS=hi" "voidcb"; do
            if ! grep -qx "$expect" <<< "$out"; then
              echo "::error::expected '$expect' in function-value HOF output"; echo "$out"; exit 1
            fi
          done
          echo "OK: zero-argument function-value invocation produces correct results."
          # Parameter-taking lambdas (#1939): a lambda passed directly to a typed
          # `(…) -> R` parameter has its boxed args unboxed — both an explicit
          # annotation and an un-annotated param (type propagated from the HOF
          # signature) must run and produce correct results.
          ann="$dir/ann.l"
          cat > "$ann" <<'LYRIC'
          package Ann
          import Std.Core
          func apply1(f: in (Int) -> Int, x: in Int): Int { f(x) }
          func apply2(f: in (Int, Int) -> Int, a: in Int, b: in Int): Int { f(a, b) }
          func applyB(f: in (Int) -> Bool, x: in Int): Bool { f(x) }
          func main(): Int {
            println("a1=" + toString(apply1({ x: Int -> x + 1 }, 10)))
            println("u1=" + toString(apply1({ x -> x + 1 }, 10)))
            println("u2=" + toString(apply2({ a, b -> a * b }, 6, 7)))
            println("uB=" + toString(applyB({ x -> x > 5 }, 3)))
            0
          }
          LYRIC
          aout="$("$lyric_bin" run "$ann" 2>&1)" || { echo "::error::param-taking HOF program failed to run"; echo "$aout"; exit 1; }
          # #5552: Bool.toString() is pinned to lowercase "true"/"false" now
          # (was the BCL Boolean.ToString() default, "True").
          for expect in "a1=11" "u1=11" "u2=42" "uB=false"; do
            if ! grep -qx "$expect" <<< "$aout"; then
              echo "::error::expected '$expect' in param-taking HOF output"; echo "$aout"; exit 1
            fi
          done
          echo "OK: annotated and propagated parameter-taking lambdas produce correct results."
          # An un-annotated param-using lambda NOT passed directly to a HOF (so no
          # type can be propagated) must fail loud (#1939), not read garbage.
          neg="$dir/pneg.l"
          cat > "$neg" <<'LYRIC'
          package PNeg
          import Std.Core
          func main(): Int { val f = { x -> x + 1 }; println("made"); 0 }
          LYRIC
          if "$lyric_bin" build --target dotnet "$neg" > "$dir/pneg.out" 2>&1; then
            echo "::error::un-typed param-using lambda compiled — the #1939 diagnostic did not fire"; cat "$dir/pneg.out"; exit 1
          fi
          if ! grep -qi "un-annotated parameter" "$dir/pneg.out"; then
            echo "::error::un-typed param-using lambda failed without the expected #1939 diagnostic"; cat "$dir/pneg.out"; exit 1
          fi
          echo "OK: un-typed param-using lambda (no annotation, no HOF propagation) fails loud (#1939)."

      # Capturing closures (#1479 v1+v2) — a lambda that captures an immutable
      # enclosing binding is captured by value into an object[] bound as the
      # delegate target (v1); a captured `var` is hoisted to a shared heap cell
      # so reassignments are observable across the closure boundary in both
      # directions (v2).  Both must run and produce correct results.
      - name: Capturing closures (#1479 v1+v2)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping capturing-closures test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping capturing-closures test"
            exit 1
          fi
          dir="$(mktemp -d)"
          pos="$dir/cap.l"
          cat > "$pos" <<'LYRIC'
          package Cap
          import Std.Core
          func apply0(f: in () -> Int): Int { f() }
          func applyS(f: in () -> String): String { f() }
          func apply1(f: in (Int) -> Int, x: in Int): Int { f(x) }
          func main(): Int {
            val a = 3
            val b = 4
            println("c1=" + toString(apply0({ -> a * b + 1 })))
            val name = "world"
            println("c2=" + applyS({ -> "hi " + name }))
            val base = 100
            println("c3=" + toString(apply1({ x -> x + base }, 5)))
            0
          }
          LYRIC
          out="$("$lyric_bin" run "$pos" 2>&1)" || { echo "::error::capturing-closure program failed to run"; echo "$out"; exit 1; }
          for expect in "c1=13" "c2=hi world" "c3=105"; do
            if ! grep -qx "$expect" <<< "$out"; then
              echo "::error::expected '$expect' in capturing-closure output"; echo "$out"; exit 1
            fi
          done
          echo "OK: by-value capture of immutable bindings produces correct results."
          # By-reference capture of a `var` (#1479 v2): a hoisted heap cell is
          # shared, so a mutation inside the closure is visible outside (m1=2) and
          # an external mutation is visible inside a closure captured earlier
          # (m2=10).
          ref="$dir/capref.l"
          cat > "$ref" <<'LYRIC'
          package CapRef
          import Std.Core
          func run(f: in () -> Unit): Unit { f() }
          func apply0(f: in () -> Int): Int { f() }
          func main(): Int {
            var count = 0
            run({ -> count = count + 1 })
            run({ -> count = count + 1 })
            println("m1=" + toString(count))
            var n = 1
            val get = { -> n + 0 }
            n = 10
            println("m2=" + toString(apply0(get)))
            0
          }
          LYRIC
          rout="$("$lyric_bin" run "$ref" 2>&1)" || { echo "::error::by-ref capturing closure failed to run"; echo "$rout"; exit 1; }
          for expect in "m1=2" "m2=10"; do
            if ! grep -qx "$expect" <<< "$rout"; then
              echo "::error::expected '$expect' in by-ref capture output"; echo "$rout"; exit 1
            fi
          done
          echo "OK: by-reference (\`var\`) capture shares a mutable cell across the closure boundary."


  # Second half of compiler self-tests (.NET target), running in parallel with job -a.

      - name: Wait for all parallel tests
        wait-all: true

      # await nested inside ETuple/EList/EIndex/EInterpolated/ERange self-test
      # (#4276): regression coverage for the seven match arms added to
      # collectAwaitTypesExprPB / exprContainsAwaitMsil. Imports only Std.*.
      # Run sequentially (not `background: true`) rather than folded into the
      # big parallel group above: adding it there as a 38th/39th concurrent
      # step reproducibly broke two unrelated, already-passing steps in that
      # group (`import extern self-test`, `Cross-package generics self-test`)
      # across two separate CI runs, with clean TAP output on both but a
      # `wait-all`-reported failure — a concurrency ceiling in the group, not
      # a defect in this test or the other two. See PR #4810.
      - name: MSIL await-expr-forms self-test (#4276, native lyric test)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping await-expr-forms self-test"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping await-expr-forms self-test"
            exit 1
          fi
          bash scripts/ci-retry-on-signal.sh "$lyric_bin" test --target dotnet lyric-compiler/msil/msil_await_expr_forms_self_test.l

  # Native (LLVM) backend self-tests — N7.1 (docs/10 D-progress-540/545).
  # Split out into its own job (previously a `background: true` step inside
  # compiler-self-tests-dotnet-a) because the work here is CPU-bound rather
  # than wait-bound: the eleven llvm_*_self_test.l files below contain ~130
  # individual `test { }` cases, and each one spawns its own `clang`
  # subprocess (compile a `.ll` module, link against lyric_rt.a, run the
  # binary) — 34 of them linking under `-fsanitize=address`, which is slow
  # to compile. Running that inside compiler-self-tests-dotnet-a meant these
  # ~124 sequential clang invocations competed for the runner's CPU with
  # ~20-40 other concurrent `background: true` steps in that job. A
  # dedicated runner gives clang/ASan the whole machine instead of queuing
  # behind unrelated self-tests, and keeps a slow native-backend run from
  # extending compiler-self-tests-dotnet-a's own `wait-all` barriers.
  native-backend-self-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - name: Redirect temporary directory to prevent SIGBUS RAM disk exhaustion
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # Builds lyric-rt (C unit tests under both clang and gcc), then runs the
      # three llvm self-tests: llvm_ir (serializer), llvm_codegen (N1 scalar
      # programs compiled through parse -> codegen -> clang -> run), and
      # llvm_heap (N2 records/unions/enums/distinct/match; its ARC cases build
      # with -fsanitize=address so a missed/premature/double release fails),
      # and llvm_self_test_n3 (N3.2 interface vtable dispatch; its ARC cases
      # likewise build under ASan to prove the interface box releases its
      # implementing object), and llvm_self_test_n34 (N3.4 protected types;
      # its ASan case proves the mutex buffer and a ref-typed field are both
      # torn down cleanly), llvm_self_test_async (D-N-022 real async:
      # async func lowers to an LLVM coroutine on the lyric-rt cooperative
      # scheduler; the sleep-driven cases prove spawned tasks genuinely
      # interleave, with the ARC/frame protocol ASan-checked),
      # and llvm_self_test_defer (P2.D1 `defer`: no try/finally on native,
      # so each lexical scope's pending deferred blocks run explicitly at
      # every scope exit -- fall-off, return, break, continue -- mirroring
      # the existing ARC scope-exit stack; a panic still bypasses it
      # entirely per D-N-003), and llvm_tls_self_test (N9.2, issue #6103:
      # Std.Encoding/Std.Tls/Std.TcpHost native twins over the N9.1
      # lyric_sock_*/lyric_tls_* seam -- a real loopback TLS handshake
      # driven from compiled native Lyric, server via hostAcceptTls,
      # client on a genuine second pthread since a TLS handshake needs
      # both peers actively driving handshake I/O, unlike a bare TCP
      # connect; its ASan case covers the LyricString/LyricList bridging
      # this item added to lyric_tls.c alongside).

      # entirely per D-N-003), and llvm_opaque (#6234 part 1: `opaque type`
      # codegen -- construction, field access, mutation, UFCS methods, and
      # an opaque type nested in a record all lower identically to a
      # record; its ASan case constructs 2000 `Certificate`-shaped opaque
      # instances -- mirroring `Std.Tls`'s real `Certificate`/`Identity` --
      # in a loop to prove the synthesised destructor releases the
      # ARC-managed field with no leak/double-free).
      # The tests import `Lyric.Llvm*` compiler packages by source, so
      # LYRIC_LOAD_COMPILER=1.
      - name: Native backend self-tests (lyric-rt + llvm via native lyric test)
        background: true
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping native backend self-tests"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin; skipping native backend self-tests"
            exit 1
          fi
          command -v clang >/dev/null || { echo "::error::clang not found on the runner"; exit 1; }
          # ASan preflight: the heap self-test links -fsanitize=address.
          # Use $TMPDIR (redirected to runner.temp above), not a hardcoded
          # /tmp, so this step doesn't bypass the SIGBUS/resource-pressure
          # mitigation the rest of this job relies on (#4975).
          echo 'int main(void){return 0;}' > "$TMPDIR/asan_preflight.c"
          if ! clang -fsanitize=address "$TMPDIR/asan_preflight.c" -o "$TMPDIR/asan_preflight" 2>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq "libclang-rt-$(clang -dumpversion | cut -d. -f1)-dev"
            clang -fsanitize=address "$TMPDIR/asan_preflight.c" -o "$TMPDIR/asan_preflight"
          fi
          make -C lyric-rt test
          make -C lyric-rt clean && make -C lyric-rt test CC=gcc
          # ASan run of the TLS transport seam (real loopback OpenSSL
          # handshakes) under gcc's reliably-present libasan — a leaked
          # SSL_CTX/SSL/fd or a use-after-free in a handshake round-trip
          # fails the run (issue #5890, docs/61 §7).
          make -C lyric-rt test-asan CC=gcc
          for t in \
            lyric-compiler/lyric/llvm_ir_self_test.l \
            lyric-compiler/lyric/llvm_codegen_self_test.l \
            lyric-compiler/lyric/llvm_heap_self_test.l \
            lyric-compiler/lyric/llvm_ffi_self_test.l \
            lyric-compiler/lyric/llvm_collections_self_test.l \
            lyric-compiler/lyric/llvm_stdlib_self_test.l \
            lyric-compiler/lyric/llvm_tls_self_test.l \
            lyric-compiler/lyric/llvm_self_test_n3.l \
            lyric-compiler/lyric/llvm_self_test_n34.l \
            lyric-compiler/lyric/llvm_self_test_async.l \
            lyric-compiler/lyric/llvm_self_test_defer.l \
            lyric-compiler/lyric/llvm_opaque_self_test.l ; do
            echo "=== $t ==="
            LYRIC_LOAD_COMPILER=1 "$lyric_bin" test "$t"
          done

      # `lyric test --target native` smoke test (N7.2): an ordinary
      # `@test_module` (no compiler-package imports, unlike the llvm_self_test_n*
      # files above) compiles through `Emitter.emitNative` and runs as a
      # self-contained binary — not via LYRIC_LOAD_COMPILER's in-process MSIL
      # host.  Native has no try/catch (D-N-003), so `TestSynth.synthesizeNative`
      # calls each test straight through: a passing suite prints normal TAP
      # output and exits 0; a failing assertion `panic`s the whole process
      # (nonzero/abort exit, no per-test isolation) — asserted here too, so a
      # future change that silently swallows the failure (exit 0) is caught.
      - name: Native lyric test --target native smoke test (N7.2)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          # The "Native backend self-tests" step above is `background: true`
          # and does not block, so it can run concurrently with this step —
          # and it does `make -C lyric-rt clean && make -C lyric-rt test
          # CC=gcc` partway through its own run, which deletes and rebuilds
          # the SHARED lyric-rt/build/ directory out from under any other
          # step reading lyric_rt.a from that same path at the same time
          # (observed: a clang link failure because the .a was mid-`rm -rf`
          # when this step tried to read it). Building into a private
          # directory and pointing the CLI at it via LYRIC_RT_PATH avoids
          # sharing mutable state with the background step entirely.
          rt_build_dir="$(mktemp -d)/lyric-rt-build"
          make -C lyric-rt BUILD="$rt_build_dir"
          export LYRIC_RT_PATH="$rt_build_dir/lyric_rt.a"
          work="$(mktemp -d)"
          cat > "$work/pass_test.l" <<'LYR'
          @test_module
          package NativeTestSmoke

          import Std.Testing

          test "addition" {
            assertEqualInt(2 + 2, 4, "2+2==4")
          }
          LYR
          "$lyric_bin" test "$work/pass_test.l" --target native
          cat > "$work/fail_test.l" <<'LYR'
          @test_module
          package NativeTestSmokeFail

          import Std.Testing

          test "deliberately wrong" {
            assertEqualInt(2 + 2, 5, "2+2==5")
          }
          LYR
          if "$lyric_bin" test "$work/fail_test.l" --target native; then
            echo "::error::expected a nonzero exit for a failing --target native test"
            exit 1
          fi
          echo "Native lyric test --target native smoke test passed"

      # `lyric build --target native --define` end-to-end (docs/60 #5977): with
      # both native-codegen gaps closed (list literals + module-level `val`
      # inlining), the CLI gate is lifted, so a `--define` feeds a `@build_const`
      # val on native. Asserts the in-source fallback (no --define) and the
      # substituted value (--define) in the actual native binary.
      - name: Native --define build (docs/60 #5977)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::error::stage 1 bundle missing; skipping native --define build"
            exit 1
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::error::AOT binary not found at $lyric_bin"
            exit 1
          fi
          command -v clang >/dev/null || { echo "::error::clang not found on the runner"; exit 1; }
          rt_build_dir="$(mktemp -d)/lyric-rt-build"
          make -C lyric-rt BUILD="$rt_build_dir"
          export LYRIC_RT_PATH="$rt_build_dir/lyric_rt.a"
          work="$(mktemp -d)"
          cat > "$work/greet.l" <<'LYR'
          package greetprobe

          import Std.Console

          @build_const("greeting")
          val GREETING: String = "default"

          func main(): Int {
            println(GREETING)
            0
          }
          LYR
          echo "=== --target native, no --define (expect default) ==="
          "$lyric_bin" build --target native "$work/greet.l" -o "$work/greet1"
          out1="$("$work/greet1")"
          echo "native no-define: $out1"
          [ "$out1" = "default" ] || { echo "::error::native @build_const fallback wrong: '$out1'"; exit 1; }
          echo "=== --target native --define greeting=hello-native (expect hello-native) ==="
          "$lyric_bin" build --target native "$work/greet.l" --define greeting=hello-native -o "$work/greet2"
          out2="$("$work/greet2")"
          echo "native --define: $out2"
          [ "$out2" = "hello-native" ] || { echo "::error::native --define did not substitute @build_const: '$out2'"; exit 1; }
          echo "Native --define build passed (fallback default + substitution hello-native)" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for native backend self-tests
        wait-all: true

  compiler-self-tests-dotnet-b:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    if: needs.build.outputs.has_code_changes == 'true' && needs.build.outputs.has_core_changes == 'true'
    steps:
      - name: Redirect temporary directory to prevent SIGBUS RAM disk exhaustion
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          global-json-file: bootstrap/global.json
      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifacts
      - name: Restore executable permissions
        run: chmod +x bootstrap/src/Lyric.Cli.Aot/bin/${{ env.BUILD_CONFIG }}/net10.0/lyric

      # MSIL backend self-tests M2a-M2d (native lyric test, D-progress-474 / #66)
      # — replaces the deleted F# MsilSelfTestM2{a,b,c,d}.fs Expecto wrappers.
      # M2a pins the #3085 fix (short-name collision `Msil.Kernel.ByteWriter`
      # vs `Std.Stream.ByteWriter` resolved by codegen scope tiers).  M2b-M2d
      # import packages exporting module-level `pub val` constants, so
      # `compilerClosureDllPaths` links the self-hosted-emitted compiler DLLs
      # staged under `<libdir>/selfhosted` by stage-selfhosted-compiler.sh —
      # the F#-emitted stage-1 metadata omits `pub val` decls (#3086).
