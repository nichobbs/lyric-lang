          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping map-key self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/map_key_self_test.l

      # Map-value self-test — #1835.  `Map[K, ValueType]` values read correctly
      # in hint-less positions (`match mapGet(m, k)`, `m[k]`) — the value type
      # is tracked + unboxed instead of erasing to `Option<object>`.  Run via
      # native `lyric test` (in-process through Msil.Bridge).
      - name: Map-value self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping map-value self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping map-value self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/map_value_self_test.l

      # Impl-method self-test — #1784.  Interface/impl methods with value-type
      # parameters (`Int`/`Bool`/`Double`/`Char`) — and `?`/early-`return` in
      # their bodies — dispatch correctly (value-type args are no longer boxed
      # against the value-type param signature).  Run via native `lyric test`.
      - name: Impl-method self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping impl-method self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping impl-method self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/impl_method_self_test.l

      # Alias-rewriter self-test — #1834.  The package-alias rewriter
      # (`Lyric.AliasRewriter`) now descends into the compound item kinds
      # (IImpl / IInterface / IUnion and friends), so an `import X as Y`
      # reference inside an `impl` method body, an interface method signature,
      # or a union case payload resolves instead of tripping T0020.  Run via
      # native `lyric test` (in-process through Msil.Bridge).  Imports only
      # `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Alias-rewriter self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping alias-rewriter self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping alias-rewriter self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/alias_rewriter_self_test.l

      # Ensures self-test — #1871.  `ensures:` contract clauses now compile and
      # run through the self-hosted MSIL path: the contract elaborator's
      # synthesised `let __lyric_result_<n> = …` binding no longer NREs in
      # codegen (the bare `None` ty field that widened to `Option[obj]` is now
      # pinned).  Run via native `lyric test` (in-process through Msil.Bridge).
      # Imports only `Std.*`, so no `LYRIC_LOAD_COMPILER=1`.
      - name: Ensures self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping ensures self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping ensures self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/ensures_self_test.l

      # Mono-shadow self-test — #1855.  A user-defined function now shadows an
      # imported generic of the same bare name in the monomorphizer, so calling
      # a local `func tag(o: Option[Int]): Int` (which collides with the stdlib
      # proof generic `Std.Core.tag[T]`) via an annotated local no longer
      # mis-specialises into a broken identity stub (invalid IL).  Run via
      # native `lyric test` (in-process through Msil.Bridge, which seeds the
      # monomorphizer with the stdlib generics as imports).  Imports only `Std.*`.
      - name: Mono-shadow self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping mono-shadow self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping mono-shadow self-test"
            exit 0
          fi
          "$lyric_bin" test --target dotnet lyric-compiler/lyric/mono_shadow_self_test.l

      # CLI did-you-mean suggestion self-test — exercises Lyric.CliSuggest
      # (editDistance / suggestCommand) via native `lyric test` with
      # `LYRIC_LOAD_COMPILER=1` (imports the compiler package Lyric.CliSuggest).
      # Pure logic (Std.Core/Collections only), so it runs cleanly through the
      # in-process bundle.  Part of the ecosystem-DX epic #1968 (#1976/#1988).
      - name: CLI-suggest self-test (native lyric test)
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/stage1 ] || [ ! -f .bootstrap/stage1/Lyric.Lyric.Cli.dll ]; then
            echo "::warning::stage 1 bundle missing; skipping cli-suggest self-test"
            exit 0
          fi
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping cli-suggest self-test"
            exit 0
          fi
          LYRIC_LOAD_COMPILER=1 "$lyric_bin" test lyric-compiler/lyric/cli_suggest_self_test.l

      # CLI project-aware-defaults end-to-end smoke test — exercises
      # findNearestManifest (Lyric.Discovery), the bare-`lyric` build default,
      # and the did-you-mean / --help UX through the real binary (#1968:
      # #1969/#1970/#1976/#1988).  This is the integration counterpart to the
      # cli-suggest unit self-test: findNearestManifest itself can't be a
      # `lyric test` self-test because that path can't yet run host-backed
      # stdlib (Std.File) at runtime (#2001), so we drive the behaviour
      # end-to-end via the compiled CLI instead.
      - name: CLI project-aware-defaults e2e smoke test
        if: steps.changes.outputs.has_code_changes == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          lyric_bin="bootstrap/src/Lyric.Cli.Aot/bin/${BUILD_CONFIG}/net10.0/lyric"
          if [ ! -x "$lyric_bin" ]; then
            echo "::warning::AOT binary not found at $lyric_bin; skipping CLI e2e smoke test"
            exit 0
          fi
          bin_abs="$(pwd)/$lyric_bin"
          work="$(mktemp -d)"
          mkdir -p "$work/src/nested"
          cat > "$work/lyric.toml" <<'TOML'
          [package]
          name    = "Demo"
          version = "0.1.0"

          [project]
          name            = "Demo"
          output          = "single"
          output_assembly = "Demo.dll"

          [project.packages]
          "Demo" = "src/main.l"
          TOML
          cat > "$work/src/main.l" <<'LYR'
          package Demo
          import Std.Core
          import Std.Console as Console
          pub func main(): Int { Console.println("ok"); 0 }
          LYR
          # 1. Bare `lyric` from a nested subdir discovers the project and builds it.
          ( cd "$work/src/nested" && "$bin_abs" )
          test -f "$work/bin/Demo.dll" || { echo "expected $work/bin/Demo.dll"; exit 1; }
          # 2. --help exits 0.
          "$bin_abs" --help >/dev/null
          # 3. Unknown command exits non-zero and suggests the nearest command.
          if "$bin_abs" buld >/tmp/lyric_buld.out 2>&1; then
            echo "expected non-zero exit for unknown command"; exit 1
          fi
          grep -q "did you mean 'build'?" /tmp/lyric_buld.out || {
            echo "expected did-you-mean suggestion"; cat /tmp/lyric_buld.out; exit 1; }
          # 4. Bare `lyric` outside any project exits non-zero (usage).
          empty="$(mktemp -d)"
          if ( cd "$empty" && "$bin_abs" ); then
            echo "expected non-zero exit for bare lyric outside a project"; exit 1
          fi
          echo "CLI project-aware-defaults e2e smoke test passed"

      # Coverage collection — informational only, not a blocking gate (#1117).
      # Runs on push to main (not pull_request) to keep PR latency low.
      # Uses `dotnet-coverage` CLI against the same Expecto-based test
      # binaries the build-and-test steps already produce, so no project-file
      # restructuring is required.  The Cobertura report is uploaded as a
      # CI artifact; viewers / trend-trackers can ingest it from there.
      - name: Collect code coverage (main only)
        if: >-
          steps.changes.outputs.has_code_changes == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        continue-on-error: true
        working-directory: bootstrap
        run: |
          set -euo pipefail
          # The `dotnet-coverage` tool wraps the same XPlat Code Coverage
          # engine that `dotnet test --collect:"XPlat Code Coverage"` uses,
          # but lets us drive the Expecto console-app test projects without
          # adding Microsoft.NET.Test.Sdk + Expecto.TestSdk to every fsproj.
          # Pinned exact version for reproducibility (#1163); bump when
          # rolling forward, don't switch to a floating range.
          dotnet tool install --global dotnet-coverage --version 17.16.7 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ../coverage
          for proj in tests/Lyric.Lexer.Tests \
                      tests/Lyric.Parser.Tests \
                      tests/Lyric.TypeChecker.Tests \
                      tests/Lyric.Emitter.Tests \
                      tests/Lyric.Cli.Tests; do
            name="$(basename "$proj")"
            dotnet-coverage collect \
              --output "../coverage/${name}.cobertura.xml" \
              --output-format cobertura \
              dotnet run --project "$proj" --no-build --configuration "$BUILD_CONFIG" \
              || echo "::warning::coverage run failed for ${name}; continuing"
          done
          echo "coverage artifacts:"
          ls -lah ../coverage || true

      - name: Upload coverage artifact (main only)
        if: >-
          steps.changes.outputs.has_code_changes == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 30
