name: Auto-enable PR Auto-merge
on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      # `gh pr merge --auto` requires both repo-level auto-merge to be
      # enabled and at least one required-status-check on the target
      # branch.  When either is missing the API errors and the gh
      # invocation exits non-zero — but that's an environmental
      # condition, not a PR defect, so we tolerate it instead of
      # failing the workflow (which would otherwise mark every PR
      # red and block the rest of the CI signal).
      #
      # IMPORTANT: For the code-review gate to hold, the
      # "Claude Code Review / claude-review" check must be registered
      # as a required status check on the protected branch (repo
      # Settings → Branches → Branch protection rules → Require status
      # checks to pass).  When that check fails (because the reviewer
      # found REQUIRED issues) GitHub will not honour the auto-merge,
      # regardless of what this step does.  This workflow only enables
      # the *setting*; the actual merge is gated by required checks.
      - name: Enable auto-merge for this PR
        run: |
          set +e
          gh pr merge --auto --squash "$PR_URL"
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::auto-merge could not be enabled (exit $rc); PR will need manual merge"
          fi
          exit 0
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
