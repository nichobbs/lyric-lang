name: Manual Ecosystem Test

# Manual smoke for the full Lyric ecosystem — bootstrap → self-hosted
# compiler → stdlib → ecosystem libraries → examples → fmt / lint / prove
# → gap analysis.  Surfaces production-readiness gaps in one run.
#
# Trigger via the GitHub Actions UI ("Run workflow") on any branch.  The
# job runs `scripts/manual-test.sh` and uploads the full report bundle
# (`.manual-test-report/`) as a workflow artifact, so reviewers can read
# `report.md`, `summary.json`, the per-stage logs, and the gap census
# without re-running locally.

on:
  workflow_dispatch:
    inputs:
      fail_fast:
        description: 'Stop on first failed stage (default: continue and report all gaps)'
        type: boolean
        default: false
      skip_jvm:
        description: 'Skip --target jvm build stages (no Java setup, faster run)'
        type: boolean
        default: false
      skip_prove:
        description: 'Skip the Phase 4 verifier stage (no Z3 needed)'
        type: boolean
        default: false
      skip_repro:
        description: 'Skip the 3-stage reproducibility bootstrap (faster smoke run)'
        type: boolean
        default: false
      only_stage:
        description: 'Run a single stage by name (e.g. gap-analysis). Leave blank to run all.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  manual-test:
    runs-on: ubuntu-latest
    # Generous budget; the full pipeline (incl. repro bootstrap and JVM
    # builds) can take 30-60 minutes on the GitHub-hosted runner.
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (JVM emission target)
        if: inputs.skip_jvm == false
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Maven (JVM target dependency resolution)
        if: inputs.skip_jvm == false
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Install Z3 (Phase 4 verifier)
        if: inputs.skip_prove == false
        run: |
          sudo apt-get update
          sudo apt-get install -y z3

      - name: Show tool versions
        run: |
          dotnet --version
          java -version || true
          mvn --version || true
          z3 --version  || true

      - name: Run manual-test.sh
        id: run_pipeline
        # Inputs are passed through `env:` so the shell sees them as data,
        # not as code interpolated into the script body (workflow input
        # injection class — see #820).  `only_stage` is the string input
        # that strictly requires this; the booleans are safer but routed
        # the same way for consistency.
        env:
          FAIL_FAST:  ${{ inputs.fail_fast }}
          SKIP_JVM:   ${{ inputs.skip_jvm }}
          SKIP_PROVE: ${{ inputs.skip_prove }}
          SKIP_REPRO: ${{ inputs.skip_repro }}
          ONLY_STAGE: ${{ inputs.only_stage }}
        run: |
          set -uo pipefail
          args=()
          [ "$FAIL_FAST"  = "true" ] && args+=(--fail-fast)
          [ "$SKIP_JVM"   = "true" ] && args+=(--skip-jvm)
          [ "$SKIP_PROVE" = "true" ] && args+=(--skip-prove)
          [ "$SKIP_REPRO" = "true" ] && args+=(--skip-repro)
          [ -n "$ONLY_STAGE" ]       && args+=(--only "$ONLY_STAGE")
          bash scripts/manual-test.sh "${args[@]}"
        # The script handles every stage's failure itself (unless
        # --fail-fast).  We still want a non-zero exit to mark the run as
        # failed when any stage failed, which the script provides.
        continue-on-error: false

      - name: Render report summary to job log
        if: always()
        run: |
          if [ -f .manual-test-report/report.md ]; then
            echo "## Pipeline summary" >> "$GITHUB_STEP_SUMMARY"
            cat .manual-test-report/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report.md produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload manual-test report bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: manual-test-report
          path: .manual-test-report/
          if-no-files-found: warn
          retention-days: 30
