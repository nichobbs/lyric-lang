name: Stage-2 self-test

# Issue #5099: every self-test job in ci.yml (compiler-self-tests-dotnet-a/b,
# compiler-self-tests-jvm) runs against stage 1 — the AOT binary built
# directly by whatever the stage-0 seed happens to be (today: the minted F#
# bootstrap compiler). Per docs/10-bootstrap-progress.md's compiler-identity
# table, the artifact that actually ships (standalone binaries, the NuGet
# global tool) is stage 2 — the self-hosted compiler rebuilding itself + the
# full stdlib into an isolated, self-consistent toolchain. Nothing in CI ran
# the self-test suite against stage 2; the closest thing (the stdlib-builds
# reproducibility check) only proves the stage-2 build is deterministic, not
# that it is correct.
#
# #5094 made the gap concrete: switching the stage-0 seed to a download
# (v0.4.14) crashed several JVM self-tests at stage 1 with a real
# MissingMethodException, while the SAME tests passed 17/17 against stage 2
# (the self-hosted compiler recompiling itself from current source, using
# v0.4.14 only as the initial seed) — current source was correct the whole
# time; the defect lived entirely in what that one released binary produced
# when used as the compiling tool. Stage-1 testing conflated "current source
# is correct" with "this seed happened to compile it correctly"; stage-2
# testing is seed-agnostic by construction and directly verifies the artifact
# that ships.
#
# This job builds stage 2 (mint stage-0, same as ci.yml, since this job's
# purpose is isolating self-hosting correctness — seed-download trustworthi-
# ness per release is the separate seed-candidacy.yml workflow's job) and
# re-runs a representative self-test subset against THAT toolchain, with its
# own stdlib pinned via LYRIC_STDLIB_BIN (make run-stage2's existing pattern).
#
# Scheduled rather than per-PR: a full self-host build is roughly double a
# stage-1-only build, so duplicating this on every PR would double CI cost
# for a gap that a nightly cadence already closes without slowing the PR
# feedback loop (stage-1 self-testing stays the fast per-PR gate).

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

# No step below references BUILD_CONFIG directly (unlike ci.yml, which uses
# it to build the AOT entry-point project explicitly) — it is set here so it
# is inherited into `./scripts/bootstrap.sh --stage 2`'s own environment:
# bootstrap.sh reads it (`BUILD_CONFIG="${BUILD_CONFIG:-Release}"`) for the
# `dotnet build --configuration "$BUILD_CONFIG"` step it runs internally to
# AOT-link the stage-1 compiler before self-hosting stage 2. Pinning it to
# Debug here matches ci.yml's rationale (faster CI builds) rather than
# leaving it to bootstrap.sh's own Release default.
env:
  BUILD_CONFIG: Debug

jobs:
  stage2-self-test:
    runs-on: ubuntu-latest
    # GitHub's default job timeout is 360 minutes; a hung/wedged self-hosting
    # build (rather than a clean failure) would otherwise tie up a runner for
    # up to 6 hours (#5165). A full stage-2 self-host build is roughly double
    # a stage-1-only build, plus the self-test subset, so 90 minutes is a
    # comfortable ceiling above a normal successful run without approaching
    # the default hang risk.
    timeout-minutes: 90
    permissions:
      contents: read
      issues: write
    steps:
      - name: Redirect temporary directory to prevent SIGBUS RAM disk exhaustion
        run: echo "TMPDIR=${{ runner.temp }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Set up .NET (uses bootstrap/global.json)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: bootstrap/global.json

      - name: Set up Java 21 (for JVM emitter tests — class files target major version 65)
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-stage2-${{ hashFiles('bootstrap/**/*.fsproj', 'bootstrap/**/*.csproj', 'bootstrap/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Same stage-0 acquisition ci.yml's build job uses (mint from git
      # history). This job's question is "can the self-hosted compiler
      # correctly compile itself", which is orthogonal to which seed produced
      # stage 1 — seed-candidacy.yml covers the download-seed-trust question
      # per release.
      - name: Build stage 2 (self-hosted compiler rebuilding itself + full stdlib)
        id: build_stage2
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LYRIC_BOOTSTRAP_MINT: '1'
        run: ./scripts/bootstrap.sh --stage 2

      # bootstrap.sh's own stage-2 runnability smoke is deliberately
      # non-fatal (a self-hosted-emitter blocker is a "signal, not a gate"
      # under its runnability-first model) — this job re-asserts it as a
      # hard gate, since a silently-non-runnable stage 2 would otherwise
      # make every self-test step below skip via its own missing-binary
      # guard and the job would go green for the wrong reason.
      - name: Verify stage-2 toolchain is runnable
        id: verify_stage2_runnable
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -x .bootstrap/stage2/bin/lyric ]; then
            echo "::error::stage-2 binary missing; self-hosted rebuild did not produce a runnable toolchain"
            exit 1
          fi
          LYRIC_STDLIB_BIN="$PWD/.bootstrap/stage2/lib" .bootstrap/stage2/bin/lyric --version

      # Required so the `--target dotnet` self-tests that `import Lyric.*`
      # compiler packages (12 of the 15 below) resolve a self-consistent
      # compiler (#5163), for the same reason as seed-candidacy.yml's
      # identically-named step: without it, `lyric test` (with
      # LYRIC_STDLIB_BIN pinned to .bootstrap/stage2/lib) falls back to
      # linking the raw per-package stage-2 DLLs, which is NOT
      # execution-clean for cross-package Lyric.* references (D112 /
      # docs/41 §R7). Staged into both stage2/lib (what LYRIC_STDLIB_BIN
      # actually points at) and stage2/bin (belt-and-suspenders, matching
      # ci.yml's own dual-target-dir staging convention).
      - name: Stage self-hosted compiler bundle
        id: stage_selfhosted_bundle
        working-directory: ${{ github.workspace }}
        # LYRIC_STDLIB_BIN is required here (#5168), not just cosmetic:
        # stage-selfhosted-compiler.sh runs the stage-2 binary itself to
        # compile the bundle driver, and that invocation needs to resolve
        # ITS OWN stdlib. Without this override, findCompiledLibDir()'s
        # discovery order never even considers a sibling stage2/lib — it
        # walks up for .bootstrap/stage1 instead (a real, existing directory
        # left over from stage 2's own build, which builds stage 1 as an
        # intermediate) and would silently succeed using stage 1's stdlib to
        # build what is supposed to be a self-consistent stage-2 artifact.
        # No crash, just quiet stage-1/stage-2 co-mingling -- exactly the
        # class of silent regression (#5094) this workflow exists to catch.
        env:
          LYRIC_STDLIB_BIN: ${{ github.workspace }}/.bootstrap/stage2/lib
        run: |
          set -euo pipefail
          bash scripts/stage-selfhosted-compiler.sh \
            .bootstrap/stage2/bin/lyric .bootstrap/stage2/lib .bootstrap/stage2/bin

      # Representative subset, NOT the full ci.yml self-test suite — a full
      # self-host build already costs roughly double a stage-1-only build,
      # so duplicating every stage-1 self-test step here would double CI
      # cost again on top of that. Chosen for front-end + middle-end + both-
      # backend-target coverage, and deliberately includes the three tests
      # that (per #5094's investigation) actually distinguished a broken
      # stage 1 from a correct stage 2: pattern_lowering_self_test.l,
      # silent_miscompile_guard_jvm_self_test.l, and j3_lowering_self_test.l.
      # Expanding this list is a reasonable low-risk follow-up (tracked
      # alongside #5099); this comment is the explicit record of what is
      # deliberately left out rather than a silent cap.
      - name: Compiler self-tests against stage 2 (--target dotnet)
        id: selftest_dotnet
        working-directory: ${{ github.workspace }}
        env:
          LYRIC_STDLIB_BIN: ${{ github.workspace }}/.bootstrap/stage2/lib
        run: |
          set -euo pipefail
          lyric_bin="$PWD/.bootstrap/stage2/bin/lyric"
          for t in \
            lyric-compiler/lyric/lexer_self_test.l \
            lyric-compiler/lyric/parser_self_test.l \
            lyric-compiler/lyric/typechecker_self_test.l \
            lyric-compiler/lyric/modechecker_self_test.l \
            lyric-compiler/lyric/contract_elaborator_self_test.l \
            lyric-compiler/lyric/cfg_self_test.l \
            lyric-compiler/lyric/derives_self_test.l \
            lyric-compiler/lyric/mono_self_test.l \
            lyric-compiler/lyric/fmt_self_test.l \
            lyric-compiler/lyric/verifier_self_test.l \
            lyric-compiler/lyric/weaver_self_test.l \
            lyric-compiler/lyric/cfg_gate_self_test.l \
            lyric-compiler/lyric/bitwise_self_test.l \
            lyric-compiler/lyric/aspect_weave_self_test.l \
            lyric-compiler/lyric/pattern_lowering_self_test.l ; do
            echo "=== $t (dotnet) ==="
            "$lyric_bin" test "$t"
          done
          echo "Stage-2 dotnet self-tests ran (representative subset; see workflow comments for what is excluded)." >> "$GITHUB_STEP_SUMMARY"

      - name: Compiler self-tests against stage 2 (--target jvm)
        id: selftest_jvm
        working-directory: ${{ github.workspace }}
        env:
          LYRIC_STDLIB_BIN: ${{ github.workspace }}/.bootstrap/stage2/lib
        run: |
          set -euo pipefail
          lyric_bin="$PWD/.bootstrap/stage2/bin/lyric"
          for t in \
            lyric-compiler/lyric/bitwise_self_test.l \
            lyric-compiler/lyric/aspect_weave_self_test.l \
            lyric-compiler/lyric/pattern_lowering_self_test.l \
            lyric-compiler/jvm/silent_miscompile_guard_jvm_self_test.l \
            lyric-compiler/jvm/j3_lowering_self_test.l \
            lyric-compiler/lyric/auto_ffi_jvm_self_test.l \
            lyric-compiler/lyric/hash_jvm_self_test.l ; do
            echo "=== $t (jvm) ==="
            "$lyric_bin" test --target jvm "$t"
          done
          echo "Stage-2 JVM self-tests ran (representative subset; see workflow comments for what is excluded)." >> "$GITHUB_STEP_SUMMARY"

      # Mirrors seed-candidacy.yml's failure-issue-filing step (#5161): a
      # nightly red Actions run alone is easy to miss (nobody watches a
      # schedule the way they watch an open PR). Scoped to the steps that
      # actually exercise stage-2 build/self-hosting/self-test, not infra
      # failures (checkout, dotnet/java setup, cache), which say nothing
      # about self-hosting correctness.
      - name: File a tracking issue on failure
        if: >-
          failure() && (
            steps.build_stage2.outcome == 'failure' ||
            steps.verify_stage2_runnable.outcome == 'failure' ||
            steps.stage_selfhosted_bundle.outcome == 'failure' ||
            steps.selftest_dotnet.outcome == 'failure' ||
            steps.selftest_jvm.outcome == 'failure'
          )
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Stage-2 self-test regression ($(date -u +%Y-%m-%d))"

          gh label create "stage2-regression" --repo "${{ github.repository }}" \
            --color "B60205" \
            --description "The self-hosted compiler failed to correctly rebuild/test itself at stage 2 (see #5099)" \
            2>/dev/null || true

          # One issue per calendar day (UTC) is enough to avoid duplicate
          # noise across retries on the same night without conflating
          # regressions found on different days, mirroring
          # seed-candidacy.yml's exact-title dedup (#5156).
          EXISTING="$(gh issue list --repo "${{ github.repository }}" --state open \
            --label stage2-regression --json number,title 2>/dev/null \
            | jq -r --arg t "$TITLE" '.[] | select(.title == $t) | .number' \
            | head -1)" || EXISTING=""

          BODY_FILE="$(mktemp)"
          {
            echo "The \`stage2-self-test\` workflow found that the self-hosted compiler"
            echo "failed to correctly rebuild itself + the full stdlib (stage 2) and/or"
            echo "failed the self-test suite run against that rebuild."
            echo
            echo "See #5099 for why this matters: stage 2 is the artifact that actually"
            echo "ships (standalone binaries, the NuGet global tool), and this is the"
            echo "only CI job that verifies it directly rather than via stage 1."
            echo
            echo "Run: ${RUN_URL}"
          } > "$BODY_FILE"

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" \
              --body "Re-confirmed: ${RUN_URL}"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "$TITLE" --label "stage2-regression" --body-file "$BODY_FILE"
          fi
