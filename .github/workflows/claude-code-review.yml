name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Create well-known labels up front so Claude never races against missing labels.
      - name: Ensure base review labels exist
        run: |
          gh label create "review-finding" \
            --color "e4e669" \
            --description "Issue created from automated code review" \
            --repo "$REPO" 2>/dev/null || true
          gh label create "review:changes-required" \
            --color "d93f0b" \
            --description "Code review requires changes before this PR can merge" \
            --repo "$REPO" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are performing a structured code review. Follow these exact steps in order.

            ## Step 1: Understand the changes
            Run both commands:
            - `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}`
            - `gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }}`

            Also read `CLAUDE.md` at the root of the repository for project conventions.

            ## Step 2: Classify all findings
            Review for: code quality, potential bugs, performance, security, test coverage,
            and adherence to CLAUDE.md conventions.

            Assign each finding exactly one severity:
            - **REQUIRED** — must be resolved before this PR can merge
            - **SUGGESTION** — worthwhile improvement but not a blocker
            - **PRAISE** — positive observation (no issue needed, omit if nothing genuine to note)

            ## Step 3: Create the per-PR label
            Run (ignore errors if it already exists):
            ```
            gh label create "pr-${{ github.event.pull_request.number }}" \
              --color "0075ca" \
              --description "Review findings for PR #${{ github.event.pull_request.number }}" \
              --repo ${{ github.repository }} 2>/dev/null || true
            ```

            ## Step 4: For each REQUIRED or SUGGESTION finding, create a tracking issue (dedup first)
            Repeat for every finding:

            a) List all open issues already carrying this PR's label to detect duplicates:
               ```
               gh issue list \
                 --repo ${{ github.repository }} \
                 --label "pr-${{ github.event.pull_request.number }}" \
                 --state open \
                 --json number,title \
                 --limit 100
               ```

            b) If an issue with the same or substantially similar title already exists,
               **do not create a duplicate** — record the existing issue number instead.

            c) Otherwise create a new issue:
               ```
               gh issue create \
                 --repo ${{ github.repository }} \
                 --title "[Review] <concise one-line title>" \
                 --body "**PR:** #${{ github.event.pull_request.number }}
               **Severity:** REQUIRED | SUGGESTION
               **File/location:** <file path and line range if applicable>

               <detailed description of the problem and suggested fix>

               ---
               *Auto-created by code review workflow on PR #${{ github.event.pull_request.number }}. Close once the finding is addressed.*" \
                 --label "review-finding" \
                 --label "pr-${{ github.event.pull_request.number }}"
               ```
               Record the issue number printed by this command.

            ## Step 5: Auto-close issues whose findings are now resolved
            For all currently open issues labeled `pr-${{ github.event.pull_request.number }}`:
            - Read each issue body to understand what it was flagging.
            - Cross-reference with the current diff.
            - If the finding is no longer present in the code, close it:
              ```
              gh issue close <number> \
                --repo ${{ github.repository }} \
                --comment "Finding resolved in the latest commit on PR #${{ github.event.pull_request.number }}."
              ```

            ## Step 6: Set or clear the blocking PR label
            After closing resolved issues, determine whether any REQUIRED findings remain open.

            If ANY open issues labeled `pr-${{ github.event.pull_request.number }}` have
            "**Severity:** REQUIRED" in their body:
            ```
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --add-label "review:changes-required"
            ```

            Otherwise (all REQUIRED findings resolved or none existed):
            ```
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --remove-label "review:changes-required" 2>/dev/null || true
            ```

            ## Step 7: Post a summary comment on the PR
            Post ONE summary comment via:
            ```
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "<summary>"
            ```

            The summary must include:
            - **Verdict line** at the top: "CHANGES REQUIRED" or "APPROVED"
            - REQUIRED findings with issue links, e.g.:
              `- REQUIRED: <title> — #<issue-number>`
            - SUGGESTION findings with issue links, e.g.:
              `- SUGGESTION: <title> — #<issue-number>`
            - PRAISE items (no issue links)
            - If any previously open issues were closed this run:
              `Previously resolved and closed: #<n>, #<m>`
            - If no findings at all: a brief positive summary.

          claude_args: '--allowed-tools "Bash(gh:*),Read(CLAUDE.md)"'

      # Read the PR label state set by Claude and fail the job if changes are required.
      # This makes "Claude Code Review / claude-review" a blockable required status check.
      - name: Fail if changes are required
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json labels \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "PR labels: $LABELS"
          if echo "$LABELS" | grep -q "review:changes-required"; then
            echo "::error::Code review requires changes before merge. Resolve the linked GitHub issues, push a new commit, and the review will re-run automatically."
            exit 1
          fi
          echo "Code review passed — no required changes."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
