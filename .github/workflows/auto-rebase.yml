name: Auto-rebase open PRs onto main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Skip on PR-merge commits that originated from this workflow itself —
# pushes from the GITHUB_TOKEN don't normally re-trigger workflows, but
# guarding with `if: github.actor != 'github-actions[bot]'` is cheap
# insurance.
jobs:
  rebase:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout default branch (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Rebases every open PR whose base is `main` onto the latest
      # `main`.  Only performs clean fast-forward / non-conflicting
      # rebases; PRs with merge conflicts are left untouched so a
      # human (or Claude, via the watch-for-conflicts rule in
      # CLAUDE.md) can resolve them.  PRs from forks need
      # `Allow edits by maintainers` (default on) for the action to
      # be able to push.
      - name: Auto-rebase
        uses: peter-evans/rebase@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
