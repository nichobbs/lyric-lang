[package]
name        = "Lyric.Search"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Search engine integration library for Lyric: Elasticsearch and Meilisearch."

[project]
name            = "Lyric.Search"
output          = "single"
output_assembly = "Search.dll"

[project.packages]
"Search"            = "src"
"Search.Kernel.Net" = "src/_kernel/net"
"Search.Kernel.Jvm" = "src/_kernel/jvm"

[features]
elasticsearch = []   # Elasticsearch (Elastic.Clients.Elasticsearch on .NET / elasticsearch-java on JVM)
meilisearch   = []   # Meilisearch (Meilisearch .NET client / meilisearch-java on JVM)
dotnet        = []   # .NET kernel backend
jvm           = []   # JVM kernel backend (Phase 6)

[dependencies]
"Lyric.Stdlib"     = { path = "../stdlib" }
"Lyric.Resilience" = { path = "../lyric-resilience" }

[nuget]
# feature = "elasticsearch" — Elasticsearch .NET client
"Elastic.Clients.Elasticsearch" = "8.14.0"
# feature = "meilisearch" — Meilisearch .NET client
"Meilisearch"                   = "0.21.0"

[maven]
# feature = "elasticsearch" — Elasticsearch Java client
"co.elastic.clients:elasticsearch-java" = { version = "8.14.0", features = ["elasticsearch"] }
# feature = "meilisearch" — Meilisearch Java client
"com.meilisearch.sdk:meilisearch-java"  = { version = "0.13.2", features = ["meilisearch"] }
