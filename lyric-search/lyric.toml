[package]
name        = "Lyric.Search"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Search engine integration library for Lyric: Elasticsearch and Meilisearch."

[project]
name            = "Lyric.Search"
output          = "single"
output_assembly = "Search.dll"

[project.packages]
# Directory form (docs/19-multi-file-packages.md): every `.l` file under
# `src/` declares `package Search` and is compiled together — `search.l`
# (shared types/interface/helpers), `elasticsearch_backend.l`, and
# `meilisearch_backend.l`.
"Search" = "src"

[project.tests]
"Search.SearchTests" = "tests/search_tests.l"

# `elasticsearch` and `meilisearch` are MUTUALLY EXCLUSIVE per build:
# `search.l`'s generic client operations (index/search/suggest/delete/...)
# dispatch to whichever single backend feature is active, via same-named
# `backend*` functions defined once per backend file
# (`src/elasticsearch_backend.l` / `src/meilisearch_backend.l`) and gated by
# a file-level `@cfg`. Both backend files share the `Search` package with
# `search.l` (docs/19-multi-file-packages.md), so no separate per-target
# kernel package is needed: both engines speak plain HTTP + JSON (issue
# #5408), implemented directly over `Std.Http` / `Std.Json` (not
# `Std.Rest` — see README.md "Platform parity" for why).
# `default` picks `elasticsearch` so the crate is usable out of the box;
# pass `--no-default-features --features meilisearch` to select the other
# backend.
[features]
default       = ["elasticsearch"]
elasticsearch = []   # Elasticsearch, over its HTTP + JSON REST API
meilisearch   = []   # Meilisearch, over its HTTP + JSON REST API

[dependencies]
"Lyric.Resilience" = { workspace = true }
