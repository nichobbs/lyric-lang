[package]
name        = "Lyric.Search"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Search engine integration library for Lyric: Elasticsearch and Meilisearch."

[project]
name            = "Lyric.Search"
output          = "single"
output_assembly = "Search.dll"

[project.packages]
"Search"            = "src/search.l"
"Search.Kernel.Net" = "src/_kernel/net/search_kernel.l"

[project.tests]
"Search.SearchTests" = "tests/search_tests.l"

[features]
elasticsearch = []   # Elasticsearch (Elastic.Clients.Elasticsearch on .NET)
meilisearch   = []   # Meilisearch (Meilisearch .NET client)

[dependencies]
"Lyric.Resilience" = { workspace = true }

[nuget]
# feature = "elasticsearch" — Elasticsearch .NET client
"Elastic.Clients.Elasticsearch" = "8.14.0"
# feature = "meilisearch" — Meilisearch .NET client
"Meilisearch"                   = "0.18.0"
