[package]
name        = "Lyric.Cache"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Typed key-value cache with TTL and a pluggable store interface for Lyric."

[project]
name            = "Lyric.Cache"
output          = "single"
output_assembly = "Cache.dll"

[project.packages]
"Cache"         = "src"
"Cache.Aspects" = "src"

[dependencies]
"Lyric.Stdlib" = { path = "../stdlib" }
