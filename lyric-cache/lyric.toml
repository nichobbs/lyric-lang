[package]
name        = "Lyric.Cache"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Typed key-value cache with TTL and a pluggable store interface for Lyric."

[project]
name            = "Lyric.Cache"
output          = "single"
output_assembly = "Cache.dll"

[project.packages]
"Cache"         = "src/cache.l"
"Cache.Aspects" = "src/cache_aspects.l"

[dependencies]
"Lyric.Stdlib" = { path = "../lyric-stdlib" }

[project.tests]
"Cache.CacheTests" = "tests/cache_tests.l"
