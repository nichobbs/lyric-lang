[package]
name        = "Lyric.Health"
version     = "0.1.0"
authors     = ["Lyric Contributors"]
license     = "MIT"
description = "Liveness and readiness health-check endpoints for lyric-web services."

[project]
name            = "Lyric.Health"
output          = "single"
output_assembly = "Health.dll"

[project.packages]
"Health" = "src"

[dependencies]
"Lyric.Web"    = { path = "../lyric-web" }

[project.tests]
"Health.HealthTests" = "tests/health_tests.l"
